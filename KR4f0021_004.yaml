body:
  text: 誡子書並題語孟然原名煴丁酉歲易曰有夫婦然後有父子禮曰昏禮萬世之始也書美釐降詩首關雎春秋重親迎五經同歸於斯攸重誠以男女居室人之大倫配合之義參乎天地而嗣續之道係乎宗祊也彼三代之興皆本后德及其亡也率繇女戎夫以帝王之尊四海之富九廟之重億兆之衆而一妃匹之賢足以興之一妃匹之惡足以滅之况士庶乎所以匹耦者人生之大命也凡宗祀之繼絶家道之盛衰德業之消長聲名之成敗莫不繇之矣而可以忽乎哉求之古人蓋可鑒矣僖負羈以盤餐而免俘僇晏子御脫輿隸而躋華仕樂羊子感斷機而成學業王伯氏徇一言而終隱節梁伯鸞以舉案而著賢聲陶彭澤以偕隱而成髙蹈以至孟子昶得裝服而佐義旗苟金龍緣內助而全城社皆淑媛勤輔相之節斯夫子著徽美之風也如其不然則以馮敬通之才氣無雙而終身坎坷劉孝標之孤髙絶俗而聲名不立無他怨耦為禍家道淪胥也魏文侯曰家貧思賢妻國亂思賢相人之擇配不綦重哉然欲求賢匹固自有道矣夫求賢匹必繇乎擇嘉姻擇嘉姻必繇乎審家範審家範必繇乎察內行以是求之斯過半矣而近世之論婚姻者皆失焉卑者但趨勢利髙者徒取聲名二者惟求已意之所欲得而絶無為子擇婦為女擇壻之心故大家世族往往參商始於婚媾而嫌釁萌於閨闥也豈不哀哉夫趨勢利者或貧富相耀或貴賤相殊妻或奴隸其夫女或頤氣其壻以致夫壻終身委靡綱常掃地所不必言矣而但取名聲者其害略同未見其優於彼也夫其家雖時推望族自負名髙而或負虛聲而無實德或盛外貌而薄內行習為髙亢釀成虛憍不近人情不知物理剛愎好忤任氣凌人難事易悅非理求備彼且自負泰山巖巖不難俯視一世况兒女子乎故其所責望於兒女之間也至無厭也至無禮也外為禮數之責內實金車之求意之所欲一不能應則怨怒叢集摧毁萬端甚且驕縱其女以凌轢夫壻離析家業助其乖違傅之嫌隙嗟乎其害有不可勝言者矣夫人而習為髙亢釀成虛憍則家人必不勤職業不修內美矣不近人情不知物理則家人必喜怒乖張舉動刺謬矣剛愎好忤任氣凌人則家人必專事口舌忠言不入矣難事易悅非禮求備則家人必動輒責人不知自反矣以若人之女為婦而欲其勤女工主中饋盡婦道興家業豈可得哉豈可得哉嗟乎嗟乎其害有不可勝言者矣煴乎吾之為汝求婚也勤矣而擇配也愼矣當爾祖文靖公時門祚鼎盛議姻者接踵而至我概不敢許也即世變以後同人謬以我為能不辱先人而樂與之締姻好者甚多我亦盡婉辭之所以然者非敢有所揀擇也以實非心之所灼信也如是者十七年於兹矣汝年過成童而姻聘未定戚友都以為言我謝之曰吾之締姻非但求已意之所欲得也實欲為子擇婦也但大家世族言不出閫不相知名縱有賢淑詎能知之吾惟求孝友姻睦忠信篤敬之人則必有令女矣何也夫人既能孝友則必能慈愛能慈愛則必能教訓其義方之率必真摰而勤懇矣姻睦則不乖戾善氣氤氲和能致祥一家之內必多內美而無口語尚省約而無紛爭矣忠信則無虛憍之習篤敬則無髙亢之風無虛憍之習則其女必能習勞職勤也無髙亢之風則其女必能卑弱下人也習勞職勤卑弱下人是班姬女訓所謂女人之常道禮法之典教也夫忠信篤敬蠻貊可行况閨庭之際父子之間乎我故曰孝友姻睦忠信篤敬之人必有令女也吾持是心以求之數年而當世實鮮其人焉惟汝婦翁鄭靑山先生則無愧此二語矣然吾前者猶未敢自謂真能知汝婦翁也故向汝婦翁亦曾議及姻事而我猶未敢遽許也直至於今回環審觀者又三年矣而汝婦翁之內行益醇令德益彰而吾之觀之益審信之益確故遂決意締姻焉小子煴汝生也晚尚未詳知汝婦翁之篤行也汝婦翁年踰強仕鬚髮班白矣而事親有嬰兒之色至愛蒸蒸和氣婉容不忍頃刻違左右每冬月則以為尊人年髙非人不暖乃捧足而臥春夏則另安一榻於尊人臥榻之旁晝夜侍側不入內室尊人以獨子恐不宜嗣續之道嚴諭之令入內亦月不得一二也每不得已而入必旋繞親前省視㡡枕擁護襆衾惟謹尊人苟不熟眠必卓立以伺即尊人三四敕之令去輒復潛伺閣外必聞尊人鼾聲而後移步焉尊人有兩子長子早世婦寡居兩房共修供養汝婦翁嘆曰吾為人子而不能獨養其親乃以纍煢煢之寡嫂耶遂辭長房之膳而獨任之居恆極甘旨之奉視無形聽無聲惟親心之所欲得也每旦必調常服湯藥以進於尊人雖盛暑必手執七箸身侍罏炭以煎調焉尊人有小疾病藥必口嘗中裙厠牏親自浣濯後尊人篤竺乾之教不茹葷血汝婦翁曲為開説求一進甘脆而尊人不允汝婦翁意若有所失求之而不得也又若至痛之在身而思脫也早夜皇皇不知所出旁倩親友日為緩頰既知雅意不回乃亦遂茹素不御酒肉嗟乎其至性誠可通神明而貫金石矣其待宗族兄弟也解衣推食絶甘分少融融怡怡無間同氣而事寡嫂寡姊如事母中外甥姪無所依者一稟乎尊人適館授粲終世無倦焉其言呐呐不出口而與人期約則一言之微風雨無愆居常主敬不欺暗室雖盛暑不袒露雖獨處不箕踞與人言如恐傷之其遇僮僕亦然雖藥裹履屐之微亦必兩手捧而授之嗟乎所謂孝友姻睦忠信篤敬者非耶而汝內母之賢孝亦漸著于中外夫父秉純粹之德母有聖善之儀而生女有非令淑者乎况又重之以太翁之好善樂道積德不倦乎易曰積善之家必有餘慶則其後人必有興者此又理之可信者也我故為汝決意締姻焉今汝以豚犬而為之館甥非人生之大幸乎我故曰吾之為汝求婚也勤矣而擇配也愼矣不意汝婦翁一旦物故泰山其頽汝將安仰雖然其流風餘藴芳軌懿範猶在也且上有太翁在汝但患頑魯不克稱玉潤耳不患無所宗依也今太翁且將迎汝就婚渠宅我惟恐汝之不間教訓不率禮儀幼志未除一旦失墜辱我堂構玷其門􅎝則不特汝終身之恥亦復貽羞所生我故日夕京京不皇起處思有以啓迪於汝也煴乎夫我之所以甘心畎畝之中憔悴草萊之側長往而不返者小子亦知其故乎此非昔人抗志煙雲怡情巖壑侈語嘉遁自託髙隱比也實以抱恨終天死有餘痛而志操寡薄不能捐生故不得已而出此耳今屏迹絶世杜門守死已十三年矣夫此十三年中刻刻以茍活為慚辱親是懼所以有不相知之親友為不入耳之勸諭欲我稍通交際略寬取與而我寧餓死不為也何也昔我先君文靖公若何而死乎年當強盛而束身以殞家有正寢而慘死於路此終身之恨百身莫贖者也為之子者一跬步一瞬息能忘之乎茍通時人而取世資是忘吾親也不特忘吾親是辱吾親也吾聞之史遷曰行莫醜於辱先悲莫痛於傷心夫忘傷心之痛負辱先之醜以取資於世人其謂我何斯狗彘不食其餘矣語云志士不飲盜泉之水廉者不食嗟來之食而况於此乎吾故甘心飢餓十三年如一日也昔我先君淸白之風家無餘財析産之時授田六頃世之變也我意守此汙萊上足以供祭祀下足以給饔餐逮汝曹之長成各授百畝以為衣食之資則父子相依終隱田間此吾心也不意遁迹湖濱連遭寇劫繼而外侮頻仍豪強侵奪繼而鼠雀耗蠧惡奴盜賣我既不事生産而室無健婦以主家政遂致日銷月削十亡其九故十三年來窮愁困頓日甚一日數年之前俯仰粗給僅無餘資以供雜事兩三年來則左支右吾僅得三餐至於去冬以及今夏則日食一飯一糜而已或并糜而無之則長日如年枵腹以過而汝及弟妹皆履穿不苴寒衾無絮矣嗟乎生計日薄家纍轉多而産入之外不染豪釐固宜其及此也夫志士不忘在溝壑此無足歎獨是俯育不周不得不令汝寄食外家棲託城市未免違我初心為耿耿耳雖然隱不在地實在此心故梁伯鸞賃舂金閶而隱節彌髙梅子真託迹市門而允稱遁世况今汝之去也親名師之訓迪依碩德之楷模所見者一家孝友姻睦之風所聞者千古忠臣孝子之事其勝於面墻一室孤陋寡聞萬倍矣第恐汝齒稚學淺志操不堅趨向不定美衣甘食則忘在家之苦節依時附俗則忘為父之雅志我故不難舌敝不辭穎秃告誡諄復以提撕警覺於汝也昔宗少文髙尚不仕其孫測能繩祖武戴安道避世稱賢其子顒克修父業故垂譽無窮徽美獨著無他以其無沗所生不隤家聲也劉向竭誠宗國而其子歆佐命新莽郤愔乃心晉室而其子超私附桓溫故遺穢無窮詬辱獨甚無他以其沗所生隤家聲也為人子者可不愼哉書曰若考作室厥子乃弗肯堂傳曰其父析薪其子弗克負荷此皆為不類之子言之也夫為子而克類則鄉邦榮之親黨羡之以至史册頌之千古美之此宗測戴顒之流也為子而不肖則鄉邦賤之親黨絶之以至史册僇之千古辱之此劉歆郗超之流也煴乎煴乎若何居乎然為宗測戴顒者固可以隱可以無隱而在小子煴則斷不可以不終隱者也何也彼身處中華時當明盛國無革除之慘家無死喪之禍則其出處豈不綽綽然有餘裕哉若我與爾則不然嗚呼國恤家冤萃於一門祖死父辱集爾小子爾小子其可忘此大痛而不終隱也乎夫孝者善繼人之志善述人之事者也在彼古人可以無隱而猶守祖父之遺風繼絶俗之雅操而况爾小子之不可以不隱者乎嗟乎世篤忠貞諸葛所以稱賢也父子異心趙括所以見僇也煴乎汝固當知所處矣汝今將依棲外氏不得朝夕在我膝前我亦不得朝夕耳提面命於汝我故書之於簡以授汝凡十事汝其悉心以聽焉如果能纖悉必遵尺寸無踰斯真克類者矣不然則非吾子也行矣小子勉旃勉旃一曰母荒學業夫學猶殖也不殖則落故夫子曰溫故而知新又曰學而時習之言為學之不可間斷也今汝自四書五經之外所誦讀者亦既多矣我每過學舍必聞汝書聲琅琅無間昏晝吾心竊喜今將就學外家吾又恐汝飢寒而苦志溫飽而忘懷也我故首以此為䇿厲焉汝必朝夕孜孜日進其新母忘其舊斯可矣然學非徒以尋章句采辭華也所以學為正人君子學為孝子悌弟也熟玩經史古人與稽然後反身而求尅其嗜欲傅之理道則自然德業日進言動可法恂恂儒雅溫其如玉人見而愛之敬之矣不學則頑悖日增暴慢斯至語言無緒面目可憎人見而惡之賤之矣人其可不學哉昔爾祖文靖公居恆手不釋卷故生則極稽古之榮死則繫綱常之重此真善學者矣我即盛年憂廢而不敢自棄篤志向學矻矻窮年此又汝之所目見者也傳曰良弓之子必學為箕良冶之子必學為裘詩曰母念爾祖聿修厥德汝其遜志時敏以無讓前人焉一曰母習時藝今之登仕路者無不以制藝起家故欲拾朱紫陟顯榮舍此無為階梯矣若冥棲遁世則無預焉所以昔者爾先祖之課我也十二歲而學文十三歲而會課十四歲而應試十五歲而觀場焉而汝今已十八歲矣而為父者尚不以此課汝何也隱顯殊塗出處異用而所期者在彼不在此也而復有言時藝之必不可以不學者謂不習此入門則辭意不通文理不順吾向亦惑之以質之一前輩前輩曰漢之董賈唐之韓柳宋之歐蘇其文何嘗不通辭意不順文理哉而未知其所習以入門者何時藝也余慡然自失然猶未敢遽以為信而回環者三年矣近見汝所作穆薑論梅花詩亦略有意義辭理頗通於此而益信前輩之言為不可誣也且時藝者科舉之利器也吾聞操刀必割萬一汝有其器而妄試之則所以玷辱先人者為何如哉茍翩翩文雅而玷辱先人則不如椎魯無文而克繼風素矣况人之能文與否又確然不繫於此乎我所以絶意不復令汝學之也一曰母預考試夫考試以時藝為主今汝不學時藝即欲試不能是已杜其源而防患於未然矣我固可以無言而必京京及之者吾猶恐汝一時熱中不明大義忘嚴父之訓而流俗人之言也孟子曰事孰為大事親為大守孰為大守身為大不失其身而能事其親者吾聞之矣失其身而能事其親者吾未之聞也小子煴為爾祖之孫為爾父之子若靦顏預試是失身也失身則辱親矣不孝莫大焉昔諸葛誕為晉文所害其子靚終身不向朝廷而坐王儀死事於軍其子裒亦終身不復西向而坐古人不幸而遘家門之禍抱終天之痛即一行動之微而尚不忘其親若此况事之大於此者乎煴乎爾先祖若何而死乎爾父今日若何以自處乎爾可以干進應試乎詩曰教誨爾子式榖似之此言子之不可以不類其父也夫飛鳥之雛小而振羽遊魚之子微亦淩波乃為天性之正茍鳥雛而遊泳於深淵魚子而竄躅於林木是怪物也是不祥也人必以為妖以為祟而殺之矣夫以吾子而預試亦猶是也煴乎可不愼乎萬一而有此也則真非我子矣生無以見汝父死無以見汝祖矣吾亦終身無以汝為見一曰母服時裝服之不衷身之災也夫違祖父之家範而炫奇邪之時服可謂不衷矣識者見而心非旁人為之指謫以至唾罵醜詆叢集厥身皆此服為之也災孰甚焉况今之所謂時服者乃僕鑒之結獨力之衣汝祖以不服此而殞身汝父以不服此而廢棄而汝獨可以汙其身乎吾之所以諄諄言之者恐汝習見習聞忽為常事而輕以自汙也身一辱不可贖體一汙不可洗詩曰彼已之子不稱其服書曰不矜細行終纍大德不可不深思也昔華寶年八歲父逺戍臨別謂寶曰須我還當為汝上頭後父沒於戍所寶年七十不婚冠夫男女大欲也居室大倫也元服大禮也而徒以厥父之一言遂終身廢而不舉况以服飾之細巾領之微而為父者反覆再四以告誡乎此而不遵則非人矣我即不知爾先祖在天之靈亦必陰殛汝也一曰母言世事言者身之樞機也言而善則善應之言而不善則不善應之榮辱攸分禍福所係可不愼哉口銘曰禍從口出淮南子曰妄言則亂楊雄氏曰言輕則招憂大易著括囊之辭金人垂三緘之誡率此志也凡人且然况違時避世之人乎阮籍遺忽形骸志氣弘放而沉冥不交世事口不臧否人物吾心慕之盧藏用隱居終南山中而有意當世好言時事吾心非之故我十三年來絶口不道世事其有入吾室對吾飲者論文藝考古今談風月則娓娓往復或夜以繼日或坐以待旦而不倦也若言及時事我輒默不應或再言之則謝曰不知如是者三而其人之喙已塞矣此汝曹之所目見者也嗟乎我尚不言而况於汝乎我每見近人律身不峻操履不嚴而徒以譏評世局為名髙以道聽塗説為氣節彼方詡詡論議而不知識者已齒冷矣此吾之所深惡而痛絶者也至人家子弟口尚乳臭目不識丁而出位妄言嘵嘵不已則必取憎長者而貽羞父兄噫汝其戒之汝其戒之一曰母遊市肆孟夫子以亞聖之德然幼志未定鄰屠酤則習屠酤之事鄰學宮乃為爼豆之容而况於中下之童蒙乎故其所見聞者不可不愼也若處一室之中所讀者聖賢之書所聞者師友之訓既漸摹於前言往行復親炙於直諒多聞雖欲不善不可得也茍出沒閭巷馳逐市井所聞者街言市語鄙俚穢惡之談所見者蠅營狗茍擾攘紛紜之態則雖欲進德遷善其道無繇且人之所以宵旦不遑逐逐於路者皆有所營也汝既俯仰別無他纍衣食不須經營則亦無事於此矣夫安居讀書何其逸逸而善名隨之奔走出入何其勞勞而惡聲著焉夫勞而得善猶且為之况於逸耶逸而為惡猶且戒之况於勞耶我今與汝約除入山省我之外歲不過二三出即至親尊長歲不過一二過無徘徊於街巷無來往於市肆鍵户一室如在深山經年纍月足不窺户乃我子也如違我言必杖汝脛一曰母預宴會昔馬廷鸞家貧為里中童子師念母藜藿不給雖有酒食未嘗下咽彼每飯不忘其親所以令名垂於史册也今我家中朝不謀夕饘粥不繼汝雖在外家亦宜不預宴樂斷除膏粱蔬食菜羹屏居一室斯為有至性者矣茍罔念其親而惟酒食是從乃飲食之人也飲食之人則人賤之矣不特此也我自遭世變決志終隱世間禮數都已廢絶故汝年十八而登降揖讓周旋折旋之禮蒙然不知也設大會賓朋稱觴為壽他家子弟進退可觀而汝獨形容木僵舉止生疏不獨見笑賓朋亦且取嘲僮僕在我實以為王霸之子蓬髮歷齒猶賢於令狐子之車服雍容也而世人豈知其意哉故不如概謝宴會既無罔念其親之譏又免不間禮則之誚不亦愈乎即汝內祖有召汝亦必以父命辭之則其他可知矣一曰母御鮮華劉贊始就學其父玭巳登顯仕而衣贊以青布衫襦此最可法夫兒童幼稚而即習為綺靡既隳其志復損其福非所以愛之也在仕宦者且然况隱者耶我數年以來窮愁日甚冬夏常服止一苧衣接見賓客私居燕處無非此矣此汝之所目見者也汝及弟妹則冬衣不完捉襟露肘以為常矣此又汝之所身歷者也設家中則冬月苧衣捉襟露肘而汝獨於外家鮮衣美服羅綺揚揚於心安乎外家以兒女之愛解衣惠汝汝受其布素辭其綺羅服其暗淡辭其絢爛斯可矣嗟乎服不稱容禮經所以告誡也蜉蝣之羽風人所以流連也煴乎汝母忽前人之言而為識者所刺一曰母通交際記曰禮上往來交際之禮所從來久矣然此為世人言之也若隱居避世則不然阮籍曰禮豈為我輩設故自史册以來並無慶弔紛紜之處士周旋揖讓之野人也汝今雖寄迹城市然終當繼父之志從父之隱若冒昧入世非我子也且今人之所以役役於此者亦不得巳也一以全人情一以避責備我自世變以來斷絶交際者十三年矣我既不行在汝無人情之當盡汝又名未挂於通人齒未及於弱冠則亦必不為責備之所及然則又何為而必強任之乎自爾先祖之門生故吏及我之同年執友遍滿天下然出者多而處者少岐路者多而同調者少故我十三年以來片𥿄不通於人間一縷不入於吾室若一通交際則必有贈遺受之則違父之志隳父之節辱莫大焉不受則世人又以却之為不恭也不亦難乎惟不通交際則所全實多矣今汝自至親尊長數人之外勿見一貴客勿接一世人即爾祖之門生故吏爾父之同年執友亦俱不得見其庶幾乎近有一名士以慶弔失倫為時論所羞嗟乎交際亦難言哉一曰母瀆親長漢光武問第五倫曰聞卿不過從兄飯寧有之耶倫對曰臣少遭飢亂實不妄過人食嗟乎古人立節厲行其細如此其嚴如此所以可貴也今人不知其故以為一過從之末一飲食之微不足為意而不知其所傷實多也然人處順境居富貴則行止或可稍寬若當窮愁落魄之時則律身必宜益峻何也富貴之人親戚交遊以望見顏色為光寵以過從飲食為榮施即有醉飽之過人必略之或反以為富貴之人宜如是也一至窮愁落魄之人則人心反是矣嗟乎世道淪胥人心惡薄以我所見大率其然可不愼哉夫以窮愁而失色於人此終身之恥也此第五倫之言所以尤可思也况汝不間禮儀不知世故若頻數過人必致開罪長者其厚道者或憫汝之無知匿而不言其刻薄者必且舉為口實資其笑柄矣可不愼哉可不愼哉汝今即處城市猶在山中即至親尊長一歲率不過一二過過亦不得託宿不可違此戒也即或至親尊長呼召汝汝必以父命辭之母忽以上十事乃大綱也其居常日用之間行已宜恭事長有禮居室相莊禦下以恩則惟倣汝父之往行以為法可也吾言盡於此矣小子識之或曰此書如黃河一曲自然千里第反覆將萬言吾恐讀者之倦而欲寐也曰子弟而不才即受教牀下亦必頭觸屏風子弟而賢則樂聞父兄之訓惟恐其言之盡也何患乎萬言或曰此書訓誡之語多在下篇前者意可節乎曰矢之利用者分寸之鏃而必任之以三尺之幹筆之利用者分寸之毫而必任之以七寸之管子欲用筆而去其管用矢而去其幹耶或曰吾見昔賢之訓誡子弟者多矣如馬援陶潛之書皆言簡意盡未聞汪洋自肆反覆萬言也或稍為精金之汰可乎曰子固習見雞足之庳而欲截鶴脛也且聖賢千言萬語皆所以教後生子亦見其多耶或曰此書訓誡之外多敘述意者言有枝葉乎吾恐為負苓之所病也曰否其意深其辭微其引事婉而痛其寓言切而隱一字一句厥有故矣語曰太行之險陟者銜之荼之苦也維舌喻之心之精微口不能言外人那得知外人那得知尺牘答業師鄭士敬先生生平義命自矢灑然不為無益之憂慮而山中告者之過愛我親友一日數驚且以其事細微非我死所進退維谷未免縈懷一接手諭慡然自失不啻薰風之解薄氷也從此眠食俱適孰非吾師之所賜哉答友人大約人心惶擾則風鶴皆兵總之生此之時自無髙枕之理然亦不必以有限之心神為無窮之愁慮也居易俟命正在此時得力耳髙明以為何如與袁公白先生拙文實自得意妄謂不愧古人然實恃先生之知愛故爾發此狂言語云目能見物而不能自見其睫苦不自知其紕繆處惟先生痛繩之諄切諄切即前沈公志中究以先生之言去一句換二字矣亦可見不肖求教之誠也諄切諄切與葛瑞五焦先臥雪人以其不死為異朝來大雨如注炊則無米㸑則無薪遂竟閉門髙臥手訊來始驚寢而起此亦何減孝然耶千古而下又當作臥雨圖矣知即欲往鄧尉尚可少留乎燒豬之約何時而踐笑笑致靈巖老和尚臣朔飢欲死豳風歎無衣今日既已兼之而硜迂鄙性斷不欲以飢寒語人日來獨處一椽而牀牀屋漏幾廢坐臥此又是飢寒之外另一况味然既是人間世所有自不可不一嘗也附聞一笑與友人乙酉以後不弔喪者今遂至無處不弔匍匐恐後老兄幸為我寄語問之曾與荀文若借面否與古民上人大士像畫上昔顧愷之鬭勝瓦官寺故畫維摩李龍眠過聽法秀為畫馬洗過乃寫大士今吾畫此奉贈既無勝心亦無悔念真我胸空洞容渠數百輩古今人不知誰為不相及也乞古老下一轉語答瑞五手教云木強而非機變誠然誠然第塗面喪心而更行之以木強又可堪耶所以市虎幻藝不待三人樂羊謗書寧止一篋怪怪奇奇可為失笑也又承問弟棲止之所天池已不可復居今暫棲東渚依家表伯張德仲先生德翁年七十矣其抗節嘗呼結襪而出奇不愧居鄛誠古人也即以弟今日孤蹤孰肯相延而先生慨然假館故雖賃伯通之廡直是分郈成之宅矣答周玉鳬儀部畫社得藉主盟便覺增重多多許一觴一詠既足以暢我幽懷亦便覺易人觀聽事以人重乃至爾乎來月會期得即下榻草堂尤荷扁舟夜分逺歸雖古人髙誼不以為疲然使人悚息不可任如何如何與古老畫社周儀部為之始盟固是山中雅集今法門諸大老遂欲把臂入林義不容辭竟是此世界中一盛事矣客謂或須另集不當入居士會中吾謂昔者陶謝宗雷可入逺公之社則胡為今日法門諸大老不可入逸民之社乎屆期早過弗俟再速答吳子佩逺飢寒不可云植節不過是能植節中一端耳人果能藜藿不糝捉襟肘見而絶不動心則其定力自無不可詣故自可尚然孟夫子云貧賤不能移必自有不移者存非貧賤即是大丈夫也孟少孤云億兆之人無官者十居其九豈皆髙士哉此語最妙若云能飢能寒便是髙節則彼乞丐者皆忠臣義士乎當今惟弟可以言此惟兄能知此言為不謬也又今吾家之飢與寒亦巳極矣然吾之為吾固自有在豈徒云爾乎人不可以徒貧賤夫人且然况吾儕也耶答老和尚天下有飢猶已飢之古聖之心也一切衆生病是故我病古佛之心也今於法體違豫之時而必損大藥以起采薪之憂山頭絶糧之際而必捐鉢粒以充采薇之腹是殆兼二心而有之乎當之愧懼不知所任遙望山頭稽首稽首柬瑞五令長豚孟然代弔先師母之喪遂一登龍門惟吾兄敦古人之誼教以隅坐隨行之禮勿作世法則感荷無量弟童時惟婁東二張先生臯里楊先生能以此相待弟至今佩之今古道淪亡惟賴吾一二人挽之於既亡耳珍重珍重致華山和尚蘗翁西華葛帔時軫至心東澗草廬亦資法惠每自拊分何福臻兹感與愧并愧浮於感至於弘期過獎則又沒齒佩之而勉思自䇿以副尊慈耳主臣主臣與支山和尚吾師今日法門之神羊也嚴氣正性凜凜氷霜令見者敬畏今者法門波靡道風掃地忽得支公一人振而起之所謂千人之諾諾不如一士之諤諤信然信然周顒目隆公若霜下之松竹昔聞其語今見其人與笻在得間亭頗幽勝瓢笠棲止甚為得宜公寀云第嫌其窄耳彼維摩丈室容八萬四千獅子座豈言窄乎靜以環堵為大在笻老自充然有餘地也答笻老弟向棲東渚止屋二間半時家口視今為多而房闥厨竈以及讀書之所接見賓客無不於此而居之充然有餘今居澗上草堂其為屋二十餘間而家口反減於昔而居之悠然甚適亦不覺其閴寂可見吾輩自有我在殊不以境遇為廣狹也彼境廣而廣境狹而狹實販夫賈豎耳又足道乎又人惟自有我在不為物轉故能素位而行自然不淫不移不屈觸處皆是不然茫茫滚滚毫無把柄豈不為境遇所動哉又聖與佛皆言無我而僕獨言有我者即聖人之所云素位而行釋門之所謂不為物轉也居易俟命素位而行苟不有我則何以居何以素哉惟笻老證之與王雙白不肖弟非不深銘老和尚至心一者正當法門厄杌之時一者復值山頭困乏之際使老和尚時絀舉贏既已非宜俾不肖取之傷廉亦豈無愧故再四躊躇在弟分固不敢當義亦不敢居也幸切致老和尚收回成命竟已其事不然即交易既成弟斷斷不敢領也此白致老和尚雙白居士來述老和尚至心欲為枋曲成一枝之棲是猶餓者而與之食裸者而被之衣也寧不感切獨是山頭淡泊百端交迫之時不肖豈敢當此即老和尚相念極切不難剜肉相濟而枋拊分循襟萬不敢承故寧蹈不恭敢爾奉辭種種悉蒼睂居士口中統惟慈照柬歸玄恭坡老云行年五十始知作活大要是慳耳而文以美名謂之儉素此段語最妙想見其胸中浩落之致但不知何以一轉念而遽自文曰吾儕為之便不類俗人乎弟年來頗悉個中况味第恨無一可慳則奈何嘗笑語所知曰吾若得如東坡但當學其慳悍然為之斷不學其自文謂不類俗人也寄此以資一撫掌與惠而行尊師書序足下詩序已成矣精微痛快處幾於筆歌墨舞致足樂也僕極愛足下之才而極欲有所禆益於足下故序中云云即不敢謂之古人之文不可謂非古人之道俟足下來面訂之可也與愍莖上人沽酒以遲陶令既甚非謂而必使陶令攢睂亦甚非情莫如惠之以秫俾其苦飢則以煮糜耽醉則以釀酒寧不甚善只此則愍公之過於逺公多矣吾嘗謂淵明為晉徴士翛然絶塵固自千古吾獨怪其飲王弘之酒若徐子滄桑二十八年未嘗霑世味一滴是不特愍公之過於逺公即徐子亦過於淵明也昨承惠秫書此為謝并博一笑與雪公向見梁武帝與華陽隱居論書法其評隲古人過核疑其言之過近於鼎帖中見梁武書其神妙不讓右軍始歎古人未有能言而不能行者雪公間中幸一展閲不特取其書法亦以見古人之所存也答玄恭索畫扇而詠及待雪因待雪而語及回天玄老真放言矣乎第不肖弟其何以當之回春寒谷而飛霜暑路精誠能變天地於俄頃而子卿嚙雪十九年偉元廬墓不西向者畢世而天又漠然若無聞吾於今者幾三十年天將回徐子乎抑畢竟徐子回天也惟玄老為能斷之巳酉冬天氣甚暖玄恭忽來云待雪靈巖且出扇索畫雪景因贈絶句為望同雲住半途連朝晴旭麗髙衢知君素有回天志急掃吳山飛雪圖與葛瑞五弟託庇粗安惟以飢驅食力碌碌良苦然所最幸者匝歲絶炊強半而歲時魚菽必供室中鎮日長飢而孰席苜蓿必飽當一笑而頷之也與二弟貫時時移居苕上昔人云寧可一日而不飲不可一飲而不醉先公嘗云寧可幾日不讀書不可架上一刻無書皆千古名語也猶吾兩人寧居一處而不會面豈容一刻有異林之感乎即會面較數自不能釋吾心之惄如也與楊明逺昨見長君答札文筆楚楚殊可喜然老夫有一言進之必從此而擴充之勿局促于此便成文章矣總之文章猶龍可大可小可長可短可繁可簡可雅可俗始得寄語長君努力自愛與葛瑞五拙文奬詡過當是真語耶承於周氏全孝傳中摘出過房二字下問益見老兄精心極矣虛懷極矣此二字出元史九十七卷食貨志鈔法中弟於三十年前讀草一史頗復記憶故用之耳答楊明逺作文非比賣畫茍非灼然信之於心而出之則其辭必不逹其文必不傳况若死忠死孝何等大節何等關係而敢冒昧命筆乎此非尋常諛墓之比也不肖弟自恨土室四十年聞見寡陋平時不能搜討逸事以致猝然不能應兄之命也願少安之俟吾灼然有信於心自然奮腕操觚大書特書耳如何如何來銀册子俱璧上幸鑒入刻下正當奇厄朝饔莫辦五口嗷嗷然吾道固爾知兄弗怪也不盡與周敉寧血疏題語專册屬書具仞鄭重至意所以遲遲報命者生平一言片語不欲草草塞責何况於此兹者竭我所知以綴數行自謂可附忠介公之汗簡藝齋之血書以不朽而無愧者語云士伸於知已故於喬梓前發此狂言也居易堂集卷之四終
