  text: 居易堂集卷之二書
  hash: sha256:331bacea768807a48f26c152d3159d31494402017967a2ed5aab5c3d5cccb145
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_002-1a}
body:
  text: 與葛瑞五書弟徐枋頓首頓首致書瑞五道兄尊前弟自二十四歲而遭家國之變今忽已四十三歲矣靦顏偷生于喪亂憂患之中轉眼不覺遂二十年回首二十年中其所遭萬死而一生及自分以必死而不死及必不欲生而復幸生者不可以縷述也退之云譬如痛定之人回思當痛時未知若何以自處也而况今二十年矣而痛尚未定者乎噫為可悲也蘇子卿陷身絶域十九年而歸漢所謂丁年奉使皓首而歸千古而下讀之猶為隕涕今已二十年而日月尚悠嗟乎人生幾何何以堪此弟今年才四十三耳而鬚髮半白齒牙搖落而筋骨關竅之間自知有深入之病嗟乎憂能傷人其信然乎然以二十年幸生而自謂尚可與兄披襟解帶而無愧者非獨以杜門守死為然也此二十年中所成書通鑑紀事類聚三百若干卷草一史文彚若干卷讀史稗語二十餘卷讀史雜鈔六卷建元同文録一卷管見十一篇計成書亦且幾百卷矣然弟之無愧于兄者不在此也二十年讀書課文編輯之中蓋亦有得於身心之學焉聖賢每謂能自得師又謂無常師弟雖不敏然於土室面牆形影相弔之時而往往自得師也於古於今所聞所見有一人一事之可敬可羡者輒以自驗吾能如是否也有一人一事之可羞可惡者亦輒以自驗吾能不如是否也有一人之砥行於一世而失節於臨時者輒以自驗吾能不如是否也有一人之脫略於形骸而矜愼於衾影者亦輒以自驗吾能如是否也偶見古者於極寬大中而忽引繩批根于一人一事輒以自問吾罹此何以自處也偶見今世於極慘核中而忽疏節濶目於一人一事亦輒以自問吾遇此得母茍免也如是者二十年於兹矣矻矻窮年孜孜不倦蓋吾心無一息之停也孟夫子所云孤孽之操心者乎易曰君子終日乾乾夕惕若魯論曰君子坦蕩蕩惟其終日乾乾夕惕若所以能坦蕩蕩也所以弟二十年來于平居時若履春氷之必陷也若蹈虎尾之必嘻也及至世路搆稽天之波弋人布彌空之網而我坦然未嘗動吾心而嬰吾寧也何也自信我之必不預于是也必不預於是蓋以平時深自處無以招之也苟平時深自處無以招之而吾不幸而仍闌入其中此亦定命也此亦無悔于中者也又何以動吾心而嬰吾寧乎凡事之足以動吾心而嬰吾寧者皆前有以致之而後有以悔之者也苟前無所致後無所悔則斯人而斯疾吾又何與焉東漢黨錮之禍遍天下名士無得免者而夏馥申屠蟠陳實則獨免焉其免也不於其後而知之也於事而有以知其確然不染者不於世之遺其人而知之也於其人之自處有以知其確然不染者苟夏馥申屠蟠陳實而仍不免吾知其所自處又必有以異于人矣此弟之素所蓄積也操此心二十年而于貴賤貧富之界則已劃然于中無所淆奪矣獨於生死之際恐尚未能持之確然而處之悠然者是所望於吾兄一言之起豫也然所謂未能持之確然而處之悠然者非不知義死之足貴非不知幸生之可羞也恐明知其貴而不能貴之恐明知其羞而不能羞之也且恐知其貴而或促之促之而反潰也知其羞而或激之激之而反餒也弟嘗舉此說以講論於親知友朋之間或有為之說曰此向平所謂讀易損益卦而已知富不如貧貴不如賤但未知死何如生者乎曰非也此悖道之言也若此言之信於人吾知其喪故吾而改素節者踵相躡也趙元叔曰不飽暖于當今之豐年夫飽暖之愈於飢寒人人而知之也惟以義較之有飽而其害勝於饑者有暖而其害過於寒者故寧去飽暖而就饑寒耳若曰錦繡之美不如粗布重裘之溫不如露肘芻豢之旨不如草根食前方丈之不如藜藿不糝有是理哉茍一反而真知粗布之不如錦繡也露肘之不如重裘也草根之不如芻豢也藜藿不糝之不如食前方丈也而有不盡去粗布露肘草根藜藿而錦繡重裘芻豢方丈之是趨也哉昔驪姬之適晉也蓬首而泣流涕被面及與君同匡牀食芻豢而後悔其泣之過也彼固不知嫁之為美也又何怪今貞女烈婦終身不字者有矣盛年自毁者有矣其性豈有異乎人哉彼固洞然乎男女大欲也居室大倫也而事固有重於此者故不得不忍而出于彼耳豈貿貿焉而謂琴瑟之調嬿婉之好顧不如窮獨伶仃枯槁而瀕死乎果貿貿焉以從之吾知其不崇朝而去之潰然若水之决而趨下而不可止也蓋以窮獨零仃枯槁瀕死之萬苦而難居而琴瑟嬿婉之多娛而易處也故君子之所以自處于貴賤貧富之交死生之際必精求而審處之惟其講之精而處之審故富之以萬鍾千駟而不顧貴之以三公之位而不易貧之以饑寒顚仆而不悔賤之以編氓一介而不移然後刀鋸湯火視之如歸不動聲色也夫子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也唯明知富與貴之可欲而必不可處明知貧與賤之可惡而必不可去惟明知其可欲而不處則其不處也為可久明知其可惡而不去則其不去也為可恃不然鮮有克終者矣故曰此言而信于人而喪故吾改素節者踵相躡也而人又謂殉節為易守節為難為烈婦易為節婦難而吾又謂其非也人有幸而致死者矣未有幸而終節者也故曰死節易也而不知不幸死則死節難矣人有不幸而改節者矣未有不幸而再生者也故曰守節難也而不知以守節致其死則守節為易夫守節者守其所以死也因時致宜從容中道不後時而忍濡不先時而傷勇不得死所而不隨得死所而不去正如饑之於食渴之於飲日出而起日晦而息也孟夫子曰繇仁義行非行仁義也吾亦謂非吾之能死也乃死之為吾所也此其所以為難也史遷曰非死之難處死為難知言哉不然僕隸賤人尚能引决况天下之士乎吾之所謂難者吾之所謂未能持之確然而處之悠然者此也嗟乎二十年之所有得者如是二十年之所不能自得者如是惟吾兄有以教之弟枋再頓首頓首答宫保張大司農書名有譽徐枋頓首頓首敬答書於宮保大司農閣下枋生也晚然竊論當代人物及古今得失之林間嘗慨然以為閣下固國朝三百年來名計相也以閣下德望之崇規摹之遠何難使國有文景之富俗有成康之隆也哉顧乃崩天遘禍宗社為墟致竄身於香林白社以老俯仰今昔能無泫然昔張蒼為漢計相佐髙祖定天下功名克終封侯纍世何其盛也以蒼之賢詎能望閣下哉而人生遭逢不同有如此者又可慨矣然伏念古人正復有如閣下之所處者李伯紀無救于中原之陷家鉉翁不能挽臨安之亡意者天篤生若人又以振兩間之正氣維萬古之綱常為大且重而非所論於一國一朝之存亡乎至于國破以後名臣遺老其立節之嚴處身之當逺者吾不能知若大江以南固未有如閣下者也閣下自託於和光以曲全其峻節自逃于無所可用以並泯其苦心所謂二十年如一日者惟閣下一人耳今世亦須才矣亦嘗搜羅于我朝之名臣遺老矣如某公某公者亦嘗改故吾而從之矣枋嘗竊論之以為今世之須才正如以新造之家須健婦以立門户則其所求者將刺繡之工乎詠雪之才乎抑有待於操管鑰之能擅籌算之長者乎其所求在此而不在彼亦斷斷明矣乃所謂刺繡之工咏雪之才無不致其招徠褰裳就之而素負管鑰籌算之能有克家賢助之稱者獨能自託於淸淨蔬素若一無所可用使求才者獨不我及以終其身於老寡婦噫不亦難乎閣下固國朝三百年來之名計相也顧獨能泊然二十年以自老於香林白社其苦心峻節又何以異此嗟乎以閣下而自老於香林白社此枋始不能不致惋於閣下之遭逢而今則又不能不致歎于閣下之苦心峻節也枋獲侍屨杖望顏色者十有七年於兹矣十有七年中之所以觀于閣下者如此故敢因賜書而一及之至於鄙文固謬未能一言之幾乎道過蒙獎飾復何敢當冬間擬輯二十年來拙著之略有當者為一集未知得遂否承委大音先生遺卷謹題璧上惟有以教之深秋寒燠不時伏惟道履自玉不宣答靈巖老和尚書底事亦熟聞之以不足罣我胸臆故不復置之齒牙浮雲太虛不特不足纍亦正復不必知也所以尊教所云助喜則未必而懊恨則絶無之然愚意以遭之而喜則反似胸中猶有物在不如竟不知之為更愈耳未知和尚以為何如像法末流鬬諍堅固風波噂􅊱在所而然所賴大人者兼容並包如水入滄溟金投大冶遇之則化歸之則融天下無復事矣不然其間詎能以寸哉是吾今日之所以益心折於吾師也與堯峰月涵和尚書名南潛靈巖嗣𣏌人之天既墜然豈無斷鰲足而柱之煉五色石而補之者鄙意百凡宜以靜鎮之即此天而終墜矣尤宜以靜鎮之何也動固無益也况人定自能勝天乎近者頗聞山頭不無紛紜我心悵然及雙老札來云一衆星散我心益悵然及聞吾道兄獨襆被書卷振䇿登山不覺以手加額曰賴有此耳宋紹興中金亮南侵兵焚采石長江無一舟敢行北岸者獨張魏公以一小舟徑進一軍見之以為從天而降遂以退敵今以合衆下山之時而吾道兄奮然獨往何以異此古德云出家乃大丈夫事非將相之所能為今日若無道兄一人不幾疑此語為欺我耶亦不幾令天下後世謂法門為無人耶心折之至不覺開懷饒舌惟心亮之近來聞見頗多不愜鄙望處獨賴吾道兄一人為狂瀾一砥耳並望敬致老和尚為萬世觀瞻不佞弟不勝手額望之與天善開士書世外之人擁膝瞌睡忽然風吹一信幾於天墜海翻為之陡然而醒亦陡然而病也旬日以來繫念兩山寸心如灼既而念之人生力量全在死生憂患時用必須於極震動中鎮定極忙亂中整暇始驗平時學問得力處耳譬如阿家翁平時節衣損食持籌握算積之既厚即遇水火盜賊非常緩急寧為所困哉法門今日固是非常之變兩山堂頭自是非常之人當自處之裕如即吾法兄學問有素自無須凡夫為不量力之涓埃也以相念之極不覺饒舌及此一哂置之答惲孫菴書名日初字仲升毗陵人退之生平倔强髙自標置謂世無孔子不當在弟子之列及讀其答殷侍郎書抑何下也至云每逢學士真儒歎息踧踖愧生於中顏變於外不復自比于人嗟乎非侍郎之所論述有以深服退之之心及退之之勇于求道絶不自欺其能如是乎雖然侍郎所論述訓詁之書也而退之推尊若是苟進其訓詁者而昌明聖學克紹宗傳則所以推尊之者又當何如乎此所以兩月以來不肖時時服膺我孫菴先生而不能去諸懷也不肖前伏讀先生論性書漸涵反覆幾於寢食其中枋雖於大道蒙無所進然正如撥雲霧而見日星縱不知天官律歷之學亦無不欣覩者及昨復讀山陰劉先生行狀則更歡喜踴躍咨嗟讚歎而實以為當世之大文也不肖枋兀居土室孤陋寡聞而獨於史學微有所見每歎休文腴而不核延壽雋而無緒遷固風規于兹虧損至後世之史史法全亡故叙致劇詳而面目不出即如李伯紀一傳至一萬五千言而其全宗社於一言係存亡於一身精采殊未鬯也朱考亭一傳亦八千餘言而至其晰微言紹聖統精微殊未闡也嗟乎亦可見傳一巨人成一巨篇之匪易矣而况劉先生狀實兼伯紀紫陽之傳合而成一文者耶其難更可知矣而今讀尊著則如聞其言如見其行事非有以抉摘心傳大開生面寧詎臻此乎吾以為子瞻之狀溫公實未能爾也歎服歎服至性命之學枋雖不敏竊不敢自棄則更願先生有以卒教之答友人書僕作畫三十年而賣畫未及數載始者實以避世之人不應復以姓名筆墨流落人間而比年以來物力日艱人情日索當世之一銖一縷既為不飲之泉而同志故人可以通有無相緩急者又皆自給不暇又見古人立身常有持之過峻而事窮勢極反致盡失其素者故不得已而賣畫聊以自食其力而不染于世耳然非我求蒙迫而後應且賣者不問其人買者不謀其面若百年採箬桃椎織屨置之道頭需者隨其所值亦置道頭而去仍不與世相接而與物交關也而僕以為充類致義之盡究非埋名避世之所宜私心自期俟前歲營葬買山二事積逋既完仍當課童豎勤耕作捆屨織席為圃灌園以自資而竟謝筆硯此吾心也今不知我者至因僕之賣畫而屢屢强其所不欲或欲書字或須面請爾爾則輸重價不爾則未能如值僕笑謝之曰若欲求富當不為此故為署門曰避世之人杜門却掃近資筆墨聊以全生非以涉世蓬蒿弗翦猿鶴無驚幸孰甚焉蓋有所謂也然此自以諭不知我者耳若足下久要雅誼自託心知何亦涉于一二俗人之態而强我以所不欲耶僕之所不欲者任王生持吾畫冊逢人便售耳豈有他哉若謂山中書硯之物猶足償僕畫價隱囊麈尾王謝家風動皆珍貴僕雖愚猶自能知之一笑一笑與朱致一書名用純附答書五年濶别三年訂期然後得一晤言一晤言而後喜可知也然别則五年聚僅五日彼此所歷之千頭萬緒欲吐之千言萬語俱不及一二兩人如望氣者俱各頷之雖云心領然究以未能大暢彼此之胸懷至今為之耿悒又承吾兄首肻於弟若於五年前有所進者弟自譬正如草根花朵其長易見其妍易知然究無根蒂遇風則折遇雨則零矣至如吾兄學道有素已如棟梁喬木驟而挹之未見其加于前也而光輝篤實處自是日異而月不同何况五年耶弟有心學問而苦無師傳就吾一二心折之友又未能日聚一堂切磋勘驗窮年纍歲弔影面牆靜中固未敢一刻放吾心而無如未得把柄故乍開乍塞旋悔旋復一日之中輪回升降不知其幾且結習既湥塵根難泯故既知之而復入之既悔之而復犯之嗟乎阿難所云安得有如來惠我三昧耶言念及此不但通身汗下當亦自為拊心而悼也如何如何至於弟於五日之間細窺吾兄精神收斂工夫縝密全於起居語默飲食動靜時體認幾至一毫不漏弟實為心折此實近來學道者所絶無也近來學道之人或竟以道自任然夷考其實大有敗闕處不特燕居獨處時時露布即稠人廣衆中亦或自不能檢點已為明眼所照破者不少故弟心折于兄以為此實當今學道者所絶無也但願吾兄以此縝密工夫直下鉗錘於弟使弟知所依歸知所循繹則是吾兄之大有造於我也弟之所祝禱于吾兄者唯此耳倘吾兄果以此子為可教不吝時一過從使弟得信所懷來則感佩當何如耶諄切諄切古人三日不見輒擬刮目相待何况五年弟自問行無所益學無所得冒昧而前慚對良友若吾兄則德髙而懷益退學大而心益小足見吾兄省治之功精矣密矣其為進境弘矣多矣接見九月朔日書猶勤勤懇懇自視愈欿然不足而謬以弟為少有所知委懷下問者無乃捨秋陽之曜而資螢爝之末光忘洪河之流而浥涓勺之微潤耶然弟安敢仰負虛懷不一竭其固陋以報尊㫖今人有以程子主敬之學為執著而不圓通者又有以為未足盡聖人之學者弟獨以為敬即天行之健天一息不健則四時不行一端不健則萬物不生易於乾言健不言敬於坤言順即言敬聖人法天之健故六經四子皆言敬也一敬而天下之理得矣天下之能事畢矣堯之允執厥中敬也舜禹加之以惟精惟一而敬尤著不敬則雜何繇精不敬則輟何繇一自是以後歷聖羣賢未有外敬以為學至於文王而詩書所以言其敬者尤為曲盡使非文王實有以積中而著外安能稱道精微若是故曰文王我師也但敬有自然者有强勉者不思而得不勉而中從容中道自然之敬也非禮勿視非禮勿聽非禮勿言非禮勿動强勉之敬也吾輩能于一念之發一物之應實下强勉之功自然漸進有得以吾兄之二十年大節苦行敬身之道當今之世孰逾吾兄而手教猶云結習既深根塵難泯既知之復蹈之既悔之復犯之此吾兄之所以既弘且毅必求至于聖人之域而吾黨之所以仰望而莫可幾及也然所云既知復蹈既悔復犯必有實見其然而非貌為是說者此無他主敬未密耳視聽言動或從內出或從外來未有不聽命於心者聽命于心而以吾之神明才力可否行止其間未有可行而不行可止而不止止其所不可止行其所不可行者也但此際幾微之辨最宜體勘可否或出於太虛或出於偏著此人心道心之殊誠僞之判而王霸之所由分也要之吾心若能時時警覺則虛與偏著亦自有不容掩昧者故易曰齊戒以神明其德即或事大理微學有未及則參之前言往行質之友朋議論亦所以盡敬也雖事理極明且易苟平昔此心放倒臨時安得卓然不亂故君子有全體之敬有隨事之敬隨事之敬即是全體之敬但折動而為用更加之意耳竊觀吾兄酬應人倫微喜諧謔諧謔雖無損于大節要非君子之所宜為何者德盛不狎侮也書所云狎侮君子罔以盡人心狎侮小人罔以盡人力猶是為治天下須得人心人力者言之若學者之事則身心之間何處可容狎侮身狎侮而其職不修心狎侮而其體不立所謂德盛不狎侮者正以狎侮之非有害于人而有虧于吾德也孔子曰修已以敬巳非外人物而為孤孑之已修亦非外人物而為偏寂之修與人接物而不失其敬正是持已而不失其敬故一修已而人安百姓安弟嘗謂若視他人一分可忽便是自已一分學力未到此語諒不悖聖賢修已之旨蓋聖賢實見人之于我此心同此理同吾無可驕於彼彼無可為我忽也夫婦之愚不肖可以與知與能及其至也雖聖人亦有所不知不能夫又可忽乎哉夫又可忽乎哉狎侮之心畢竟起於忽人忽人之心畢竟起於不自修未見自修之至而猶忽人者也此允恭克讓所以為堯之德溫恭允塞所以為舜之德也忽人亦有二故一則以自矜而忽之一則以非人而忽之吾兄檢身若弗及寧復自矜然吾而智則易見人之愚吾而賢則易見人之不肖吾兄負絶世之識抗曠古之操凡至乎前者智且失其為智賢且失其為賢而况乎愚不肖在彼猶自灼見分量無可遁藏而况吾兄之超然玄覽于其上然而以髙臨下君子所戒所以見人之非亦繇于不能自忘于善但比傲然自得者為有間耳二者皆學道之障害此須直下斬截如操銛鋒利鍔更不可犯乃見學力竊觀吾兄之意又欲先得乎道以為之主而後可以言學此猶狃於參禪學佛者之見若聖賢之道則不離乎事事物物即事事物物而道在即事事物物而學在苟欲先得乎道而後言學則離道與事物而二之亦析學與道而二之矣朱子曰人須是博學審問愼思明辨篤行然後可到簡易地位若先以蕳易存心便入異端去惟於事物而見其簡易故雖應天下之事接天下之物而不覺其煩難若舍事物而求其簡易則苟應一事接一物便覺煩難不勝紛錯此弟所以謂禪學與聖學絶不相同而吾兄亦既驗之而有見者矣若謂學無把柄但深探六經四子之書而把柄在焉吾兄之所以憂無把柄者亦坐既知復蹈旋悔旋犯故耳則弟所謂聖賢之學無過一敬者正乃把柄之所在也以敬而學學安得不以敬而問問安得不審以敬而思思安得不愼以敬而辨辨安得不明以敬而行行安得不篤以敬而與人接物與人接物安得不盡其道敬猶長隄巨防防之密也滴水不漏敬之至也毫髮無尤故一敬而天下之理得天下之能事畢變通鼓舞盡利盡神希聖希天之學盡在於是程子謂敬乃徹上徹下之道者正以此也然此亦就弟鄙見云然未知當否伏望條其得失而明以教我若弟於力行則猶未有得觸處過端怨艾藂生嘗自歎念同志者寡輔仁無徒非吾昭法其誰與歸此番入山見吾兄勇猛精進壯志無前不勝慶幸願吾兄惕之勉之又堅持之即以所自惕勉者倡我於前又以所自堅持者翼我於後幸後之日相與有成庶上以仰承先志下以不虛此生亦不負吾兩人生而同時同地同志同道無鹵莽滅裂半塗自廢而為異端曲學所笑以後音問往來務各言其所得交勉其所不逮亦無為徒相贊許近于標榜者之所為禱祝禱祝懇切懇切答退翁老和尚書昨承法諭謂枋處人子之難得盡人子之道可以為千古人子之法奬譽過分夫豈敢當惶悚惶悚復示周儀部玉鳬先生談笑辭世而和尚謂故臣遺老當此之時談笑而逝似不相宜韙哉言乎此千古所未發實千古所未曾見及也天地之內不可無此語然愚以為死生之際人所難言根器不齊識趣各異要未可一律而論當審其人生平所自持以觀其臨命一息之表見茍其人而真忠臣真孝子真聖賢佛祖則臨命之頃啼笑俱優如其不然笑固不可期哭亦未為得也如曹瞞分香賣屨千古笑罵其鄙褻復為後人勘破此正阿瞞以欺天下後世謂其無心於漢祚耳此言一出其惡愈甚嗟乎於此可見苟生平如瞞則當其死時悲喜語默無一而可矣周儀部天真粹白瑜不掩瑕忠孝皆本自然胸中絶無一物非末世矜持名跡以行仁義者比實未知其易簀時果復何如若誠如尊諭意者以二十五年幸生為憾而今而後始得灑然從吾君於地下遂聽然而笑乎抑或以二十五年之久而猶能不失其身猶得見吾故君而無愧因含笑入地也且至性之士哀樂過人嘗有笑而悲恨甚于哭泣者古人往往見之要未可一律而論也故愚意死生之際人所難言當就其人生平而論之耳未知和尚以為何如至文章一道不朽盛事亦未易言而大要可指有無定之法有不易之體惟其無定故千變萬化而不窮惟其不易故觸緒縱心而必歸控馭如巨冶然金鐵既鎔惟意所命倏忽傾寫鐘鼎斯成而鼎不訛鐘鐘不濫鼎無定之法不易之體具在是矣而近世不察多失其宗言法者病之於泥不言法者病之於疏而文章之道幾為不開之茅徑矣承示古無定體非無定體也風氣有殊也譬如古者茅茨土階而今者金門玉堂奢儉美惡亦已懸絶矣而上棟下宇其體豈變哉又示詩宗漢魏漢魏以前無漢魏其宗六朝三唐亦然愚意惟其無前所以為宗也譬如佛法拈華之前豈必復有拈華少室之前何嘗復有少室但今之人惟知求漢魏而不知求其所以為漢魏但知求六朝三唐而不知求其所以為六朝三唐是病在不知其所以宗而非宗之過也昌黎云惟陳言之務去又云惟古于辭必已出吾亦謂茍造其極何必古人真能叙事便是馬班真能修辭便是檀左真能訓辭深厚便是典謨真能詠歌盛德便是雅頌亦何法之可循而不知真能叙事必合馬班真能修辭必合檀左真能訓辭深厚詠歌盛德必合典謨雅頌何也是實有不易之體古人已立其極而吾不能出其範圍也杜少陵句有云未及前賢遞相祖述不有其體復何祖述哉然是求之學與道而非求之文章之法與體也深造於學自得其道則有無體之體無法之法不假繩墨自中規矩不循陳策自合古人游刃運斤無所不可矣復承以禪論文如曹山不借臨濟無依雲門闢機惟能不借斯成至文誠至論矣愚則更謂真能不借則盡借而無害真能無依則重依而無纍真能闢機則循門守轍而自成機軸矣故惟太史公可以盡借國䇿世本惟蘭臺可以盡借史記盡借國䇿世本而不貶其為史記盡借史記而無纍其為漢書蓋惟能盡借而無害方成其為真不借也未知和尚以為何如忽承垂教發此狂言汗漫支離竦罪竦罪與堯峰月涵和尚書豐山有石鐘霜既降則鳴蓋有其具得其地遇其時則不能已於聲也他山之石雖和霜而不能鳴豐之鐘非霜降而亦不能鳴何者三者不能相并也維人尤然此阮嗣宗所以有廣武之歎而桓宣武所以有平乘之悲也今以吾道兄著作非常之才臨三楚慿弔之地而當今俯仰流連之時而登山臨水而遇物寫懷有不著書充棟者吾不信也雖或今者現身法王息心道要舉今古塊壘文章結習一掃而空之然愚以為真意所寄正自不妨一存本色不然讀哀郢之篇歌弔屈之賦攬衡湘雲夢之奇擷幽蘭搴芳杜吾道兄其何以為情乎老和尚行後不特弟一人無所歸依舉三吳同人如赤子之離慈母故亟望老和尚速鼓慈棹即賦歸來也惟吾兄力勸駕焉自春而夏而秋計道履勝善珍重不宣與寶安去息和尚書名居𬈑靈巖嗣為余族兄兩年不侍慈顏不得音問中心惄如有懷莫寫惟時從梁溪友人口中問訊道履平安耳前知吾兄已謝院事退居一淨室中此時逺避塵俗稀簡應酬深為得宜雖曰道人具菩薩心以救世為亟然時節因緣固有以不救世為救世者此中尤須簡别弟嘗云聖賢窮則獨善其身然獨善而默持百世之風教則其兼善愈大而非末世以身殉物者可藉口逹節矣與葛瑞五書昔人云借書一癡借人書一癡索書一癡以吾觀之天下事寧獨以此為癡哉凡嗜之膠於心而物不能解者皆癡也當其專心致志舉吾之身無非是者故饑寒不能慘吾體憂患不能動吾心舉天下之美好不足以易吾欲而其所成亦遂以名天下而不腐於後世昔人有嗜奕者每旦甫開睫仰而視其帷之頂則有枰焉於是指點目瞬首肯而口囁嚅者皆殺活爭劫之勢也嘗與友賭棋不勝心不服僂行而密算之遂觸危石而仆碎首而殞焉夜半人救之始蘇苟無救亦竟以死矣噫何其癡也而其奕亦遂以無敵于天下故如鍾繇學書嘔血破塜米顚乞帖發狂投水非癡之極則亦不能精之至也不獨此也湯武之放弒劉項之所爭奪以巢許之髙及老莊之齊得喪同視之寧不為癡哉而究之巢許之硜硜必洗其耳老莊之矻矻著書以必申其說亦未為不癡也以吾觀之古今之人不癡者何限而足以名天下而不腐於後世者必癡者也惟其癡愈甚則其詣愈極而其傳愈逺嗟乎當今天下非吾與兄其誰能癡哉昔蔡雍一見王粲盡以書籍與之此亦癡也沈約賞王筠之文劉顯推孔奐之博識出藏書相付此亦癡也劉孝標好學聞人有異書必往祈借此亦癡也袁峻家貧無書每從人假借鈔寫此亦癡也何也人之有才與我何預而卑之藏書一人心目之力寧能盡天下之書而祈借鈔寫哉然今唯兄能為雍與約與顯而吾獨能為孝標與峻故吾願吾二人者循環於三癡之中而已與靈巖曇應和尚書名文杲退翁老人嗣風波之世鬪諍之交誓不欲以此身一涉其間故今不特欲口絶譏評亦並欲口無讚歎恐一有讚歎則又為不讚歎者生嗔耳如何如何此語並可一呈老人使一開笑口且以見不肖之所存也如何如何與王雙白書張默全先生藥囊擅和扁之術蓮社推宗䨓之賢名滿三吳者三十年矣此固吾三吳薦紳先生所稔聞也而其內行純備孝友大節不愧古人實人所未盡知者近復讓數千金之産如棄敝屣去户屨常滿之業如脫塵垢盡以與其弟而孑身入山隱跡僧舍不攜一童豎不應一世緣一室蕭然閉户獨坐令人可望而不可即此其髙風不尤古人所少哉不肖弟為乞同志數人為詠入山詩以贈之意必求當世巨公而且志在山林者如髙彚旃學憲馬爾采國博得推分贈言然後足垂不朽矣枋二十年土室薇蕨不繼且一家善病默老以參苓珍藥起之而且載酒問奇絶甘分少有古人之風吾心竊感之亦心竊髙之此固左右之所目見而讚歎無已者也枋鄙瑣無似然素性硜硜不敢妄為許與居常竊論交情自交情人品自人品不可以愛憎德怨絲豪夾雜若默老盛德實愧未盡形容非敢阿私所好也若彼虛憍浮慕盜譽標名者吾去之惟恐不速又敢從而妄諛之哉與王生書僕自滄桑以來二十餘年絶不刻一詩一文所以者何避世之人深不欲此姓名復播人間也則僕之傭書賣畫豈得已哉僕之傭書賣畫實即古人之捆屨織席聊以茍全非敢以此稍通世路之一線也而足下每每强僕以書字毋乃與僕之初心大刺謬乎况僕之不書字亦正以苟全也心之精微口不能言豈易一二為足下道哉乃僕辭之甚苦而足下猶必絮言其人若何品行若何家世不妨為書字噫何足下之難曉如是乎豈僕之有所揀擇簡傲而云然乎噫亦謬甚矣僕嘗謂索僕書畫而必强僕以書字亦猶于茹素之人而必强進以魚肉既已謬矣及其堅辭而猶盛言魚肉之可食不更大謬乎承委種種並厚幣一一完璧鄙人硜硜苟非吾意雖千金所不欲也以足下之難曉也故特以書報與朱致一書附答書表弟徐枋頓首奉書於致一大表兄尊前不肖弟自十六歲執經先師朝夕受教於先師者五年師嚴道尊耳提面命其切我以義而薰我以德實有古人之所少者實有稱說之所不能及者即今不肖弟稍知所自立又孰非五年中正其始之所造就乎弟故自成童以迄白首服師之訓而佩師之德如一日也乙酉之變先公畢節於前先師殉難於後繼彭咸而遊汨羅又復一揆不肖弟痛之異之每一念至痛絶心肝必期有以寫吾心者時即矢意為先師作一傳欲俟於文事稍有窺見然後為之及執簡而受役於同人亦有年所豈反遺我初心哉第甫叙疇曩百端交集伸𥿄欲書而悲來輟翰者不知其幾矣今以衰病浸尋不欲更稽奮腕操觚努力從事為參詳節概裁酌巨細勒成一篇繕寫淨本專函呈上雖心似踐而精已銷亡無有健筆雄辭可以耀日星之輝而炳川嶽之靈者則又終無以極吾心之所存也如何如何惶悚惶悚謹東向再拜枋手白表弟用純頓首頓首謹復俟齊老表兄尊前伏蒙髙誼為先人撰傳見示兼拜手教勤懇備至恭讀回環感而繼泣泣而且愧嘗論弟子受業於其師得以行成德立者雖曰淵源有自陶鑄有資亦由天挺人才其精神志慮自有以奮興而逺到也惟其才之偉傑為與道親故其於師門之一言一動一步一趨皆有以得其指趣而受其裁成古來聖賢所謂見知聞知皆是道也不然則雖日遊鄒魯之門墻日依閩雒之几席亦何自而知其所以為孔孟所以為程朱也哉而其所得於師門者復有以身著之以言顯之之不同顏曾之在孔門奉無隱之傳不言之教神明默成以馴造道之極致而不聞頌揚孔子之為聖何如其至又何如其大此所謂以身著之也而孟子謂智足以知聖者則皆曰汙不阿私所好雖有若子貢宰我三子之德行若不逮夫顏曾而其善言孔子則亦未有若是精實至當者恭惟老表兄執經先人之日用純尚在童蒙顧亦嘗厠處其間竊見吾俟齊篤信之思固已與諸從遊者有别維時俟齊科名甚早志氣甚盛方謂大其師承者在乎經國家而利民人不謂先人旋踵尊先公之後痛從彭咸遺則而吾俟齊亦遂屏居土室抑何不幸然而四十年來履非常之危遇歷百折而不回同於一日則於師門之所承傳亦既身著之矣雖始也入奉趨庭之命而又出聆函丈之誨既也內懷偉元攀柏之痛而又外深端木築室之悲然自非天挺人才自以其身維繫千古之綱常羣倫之名教亦安能在三之際盡孝盡義若兹也即不復以其文為先人揚芳播烈而後世皆知俟齊徐先生為節孝朱先生弟子其於先人為有光而滋重也多矣况復舉先人一生綱紀布列彚而為傳則是身著言顯一人兼之以先人之名德大節或不負乎斯文用純則何幸而邀此榮施蓋自顧不肖幼聞嚴訓又得以中表子弟仰覩尊先公大君子之末光而且蒙先人之澤與吾俟齊契誼深厚垂五十載然而悠悠畢生無所振奮即比於沒溺塵溷者差若有間然不過朽株枯木同為腐廢既不能以行諸身者發揮先人之遺緒又不能以其言導揚萬一能無愧歟若夫銜戢之忱充溢五內子瞻謂多言何足為謝仰祈照悉不宣居易堂集卷之二終
