  text: 居易堂集卷之十三
  hash: sha256:ad390922594c6ca54372be409f2e1b63f2ab3fcb3aabd490c8766a6e6ccc5457
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_013-1a}
body:
  text: 誌銘明故正治上卿資政大夫太子少保南京吏部尚書贈太子太保謚安節袁公墓誌銘公諱洪愈字抑之姓袁氏吳郡長洲人嘉靖丙午登鄉薦第一丁未成進士筮仕中書舎人授禮科給事中出爲福建僉憲河南漕儲道山東督學道湖廣叅政入爲太僕少卿南太僕卿歷鴻臚光禄至太常卿致政復起自工部右侍郎右都御史總憲南臺爲禮部尚書至太子少保吏部尚書告老而歸歸三年卒贈太子太保謚安節嗚呼逺哉敬考袁氏世家自食采受氏繇周而漢而六朝以迄於唐代有偉人史不絶書宋有龍圖閣直學士以進士起家名仲賢者家於汴數傳而至京西提刑使珦從髙宗南渡卒塟長洲蛟龍浦之赭墩世爲長洲人焉珦生璡官院判建祠宇於提刑墓側名曰福源菴璡生祐之官承節郞監廬州都務稅祐之生樞官國史實録院撿閱文字娶濮安懿王女爲郡馬都尉以兵拒元與其長子力戰而殁㓜子易以畱他郡得免已而廬墓著書終身不出學者稱爲靜春先生黃文獻公溍爲誌其墓子泰隱居教授名與父埒王文節公褘爲作重修福源菴記泰生養福工詩善書名德重一時洪武初以賢良方正官湖廣福建憲副養福生熊是爲公髙祖熊生驤是爲公曾祖驤生昂是爲公祖昂生雯則公之考也四世不顯然文行卓犖踵美前休世載其德鬱而未施委祉於後以迓天禄故篤生鉅人蔚爲名世良有以也公生有異表廣顙豐頤疎睂方瞳唇厚及寸色如朱聲如洪鐘爲諸生時見者知爲公輔之器至性耿介絶世獨立甞言吾人砥節勵行直當上法伯夷其趣尚如此惟其無慾故剛而不撓終始一節七十年如一日也當分宜柄國威燄彌天舉朝結舌公在諫垣抗疏首攻其私人翰林白啓常選郎葛爲奸利狀兼詆冡宰李黙爲阿私上是其言冡臣被嚴㫖翰林罷官選郎逮問一時朝論翕然推服然愛公者無不爲公寒心分宜怒甚然以公淸望莫可爲罪出爲福建僉事有建陽令者爲冡宰門生官箴狼籍誡弗悛公按祖宗法庭笞令又督學使者曲法以冡宰介弟充明經貢公署督學篆追奪其計偕之資以給應貢者之孤士論大快之時部内山賊竊發勢同燎原官兵多挫衂公密偵得其間道身先士卒繞出賊背擊之賊出不意盡奪氣一戰而斬其渠率餘賊悉降郡縣以平而督漕河南亦值師尚詔之亂草賊萬人訌於睢陽而伊藩典楧者有異志儲械招亾名備尚詔反與爲聲援及尚詔平典楧彌躁戾所爲益不法勢岌岌衆無敢言者公奮不顧身獨夜馳見廵撫爲定計廵撫即具密疏上之隨命一科臣同金吾中官察勘伊藩具得其不軌狀典楧繇是抵罪而國患以弭公一人之力也太康扶溝盜起捕獲千餘人訊坐大辟者六百餘人公惻然傷之力請於撫按乞會同他官詳讞惟賊首二十餘人當斬餘俱散遣復爲良民一時六百人俱不死公所至其偉績如此及掌南臺御史譚希忠建言請復閣中絲綸簿及禁内宫門鐵牌語侵内䜿上怒嚴㫖詰問在廷大僚無敢爲言者公毅然爲稱引典故委曲解釋且進言曰邇者言事之臣往往以不當聖心致加譴罸夫天威難犯人情易摧如各以言爲戒脱有大事誰復爲陛下言者上覽奏動容怒頓霽御史得薄其罸南工部主事黃金色廉謹有聲以孤子忤時詿誤在理衆力擠之公廉得其實力爲開陳竟復其官公雅負人倫之鑒初僉憲閩中海忠介公爲延平郡教授長揖監司郡守甞面折廵按御史於是見嫉上官毁言日聞公獨以師禮待之且爭之諸公爲署上上考因遷縣令及公官太僕復疏薦之遂超擢後海公以直諫名天下官御史大夫殁而謚介肅改謚忠介可以見公之知人矣公爲南宗伯陳十事其六曰崇眞儒則薦吳貢士王少湖先生也王先生名敬臣爲方伯陽湖公子有曾閔之孝程朱之學以公舉徵爲郡教授不起特命爲國子博士葢曠典也王先生一時名重天下司宼王公世貞當世所稱弇洲先生也初以忤分宜在籍久弗出公被南太宰命疏辭因舉王公自代謂王公以文章擅海内而其德性器識翻爲文名所掩眞不世之才經世之器也天子俞公奏即起王公爲大司宼而天下服公爲知言公官督學所取士及生平所識㧞前後爲名公卿如曺公邦輔爲大司農陸公光祖孫公鑨爲太宰丁公賓爲宫保大司空于公愼行爲大宗伯不下二十餘人而其中尤稱名世者則海忠介王司宼王先生三人也公爲冏卿其所建議著爲憲典官太常則一時奉祀九十餘壇必親必敬以感神貺一時吏氓皆歎爲未曾有也公貴時考贈尚書公及母皇甫夫人皆棄世公以禄弗逮養終身哀慕而友愛尤篤公兄弟四人同母長世恩仲世忠公行三季洪志甞曰吾兄弟四人猶四肢矣不特共休戚一錢亦當均之故官俸皆均分至官九卿兄弟四人具在未甞異居公有門人爲邊撫逺以一貂裘獻公公曰吾兄弟四人若此一裘誰當衣者况吾起寒素安用此峻却之徐以錢易得四羊裘值冬時雪月之夜兄弟四人披裘飲酒爲歡嘗徹夜焉當奉常考績入都時新鄭爲相公尤與忤欲請假會聞仲兄訃遂棄官歸哭之慟終期之喪不茹葷不御紈綺如執親喪焉嗚呼吾讀公世家覽其行狀爲之反覆流涕而歎公之孝也惟孝故能敬身能敬身故能不失其身自少以至於老自筮仕以至宦成爲年七十有四爲官四十三年初則忤分宜既則忤新鄭終則忤江陵故始以望重諫垣而例出繼以盛年淸卿而致仕後則以朝野宿德而十四年廢籍不起也卒之際會休明舉朝推薦再歳五遷竟登八座䝯封三代盡如公官公即請老恩㫖弗允再疏始從公請而備加優異晉太子少保於是左都御史吳公時來復上疏曰人臣負髙世之望以樹表儀則朝廷有優賢之典以風在位故大臣去位不絶其禄熙朝往時曾行盛典上可其奏爲賜月廩歳夫以歸又三年而考終訃聞逺近縉紳士民悲涕相弔天子爲之震悼褒䘏有加贈太子太保予謚安節諭祭三壇命行人董塟事隆重如此葢備數也公生於正德丙子卒於萬曆已丑年七十有四元配夫人申氏少師大學士文定公之姑也繼配夫人鄒氏子男三人長一鶚以公任官順天府治中次一駿先公卒次一鶚庠生女一適後府經歷錢秉元孫男三孫女四曾孫男一女二以萬曆十九年二月二十四日賜塟於長洲縣東吳鄉蛟龍浦之赭墩爲諭塟新阡與始祖宋提刑公以下祖塋相望公之志也公之玄孫徵亦賢者也與余善以公之墓未有誌爲缺如因以見命敬爲之銘銘曰嶷嶷袁公聖淸自砥維公孝友宜兄宜弟維公果逹允文允武吾聞之詩不侮矜寡不畏强禦維公以之仲尼有言我戰則克祭則受福維公似之嗚呼我公九京可作雖爲執鞭余欣慕之明故資治尹嘉議大夫禮部右侍郎兼東閣大學士贈禮部左侍郎謚文肅文公墓誌銘毅宗烈皇帝御天下凡十有七年舉一人爲相而天下悅而其人亦能不苟慕其官不肯一言附柄臣以無負主上之知以無慙天下蒼生之望以去相位者十七年中天下有一人焉曰文相國文肅公云初公官翰林即以直言謫旋削官烈皇召起之又以忤時奉差出及入相甫兩月又拂衣去公通籍十五年而前後立朝不滿三載天下惜之謹按公世爲長洲人七歳邅母喪哀感旁人哭泣居處有孝童聖童之目八歳屬文龍見有異徴年二十一而舉於鄉每計偕輒報罷公門地鼎盛少薦賢書而讀書厲行無異寒素迨公父棄養哀毁幾滅性杖不能起既塟蔬食苫寢廬墓三年絶城市跡於是天下益想望公如弗及年五十始成進士爲熹廟改元之歳廷對大魁天下臚傅之日歡動輦轂咸爲朝廷得人慶學士大夫無論識與不識僉謂應期名世無妨晚成而下至販夫輿隷田畯野老緇黃婦孺自通都大邑以及㴱巖窮谷無不手額相告謂某已作狀元者制科以來未之有也時光考所召還廢籍衆正盈朝公既以宿學登上第侃侃發舒無所囘顧故事官翰林者以讀書稽古爲職業凡廷論之是非世道之消長若無預者公心甚非之授官未半歳逆璫初用事遂興黨人之議禁講學首輔葉文忠公總憲髙忠憲公力諍不能得而刑部尚書王莊毅公紀以言事中㫖削籍去公發憤拜疏以爲臣實不願盛明之世令諸臣被道學名謫削以去而天下榮之重於三公九卿且漢唐宋末季黨人僞學之禁空人國而危宗社可爲殷鑒疏入而宵人醜正指摘疏中忌諱字以激上怒逆璫傳㫖且與杖輔臣蒲州韓公力救且爲開陳疏意非屬指斥而一時講幄諸賢交章論救公乃以謫去自是璫禍日棘天下之媚璫者無所不至於是公與宫詹姚文毅公俱削籍爲民文毅時亦官翰林公之甥也時數興大獄鋃鐺四出一時名賢前後罹難髙忠憲公聞逮自沉死而吾吳周忠介公禍尤烈忠介居鄉吳士民戴之如父母旣緹騎逮開讀之日吳士民傾城焚香以送周吏部哭聲震天緹帥稍訶叱衆不勝憤數萬人奮起擊殺諸緹騎忠介逸而就逮時吳中之禍且不測一日數驚而公與姚文毅公故以忤璫削奪尤自分必死矣會聖人御寓殛翦元凶乃以得免遂起公爲翰林院侍讀尋進宫允再進宫諭克日講官公素直莭好言天下大事方以再覩休明聖明出之九死非痛切言不足以報稱因條時事欲上會爲講官遂以橫經說書開陳反覆公謂吾得晨夕侍講幄不違咫尺則吾所竭力以効者或稍浮於尺一之奏牘也公威重山立容貌甚過絶人每侍講烈皇甞目迎而送之時政在操切天威不測刑部尚書喬公允升副都御史易公應昌一時老成負重望俱以詿誤逮繫公進講魯論君使臣以禮極言人君當培養士氣推心感人若徒峻刑法恐啓猜嫌之漸古者刑不上大夫重大臣所以重國也上傾聽爲之改容既罷講即傳㫖釋喬公易公于獄中外懽動故事講筵多忌諱置春秋禮記弗講神廟曾命官專講禮記至是上命輔臣選春秋專經者進講時首輔烏程温體仁故以春秋起家而講臣中則公以春秋名天下者也烏程忮幾見阨久之始進講至宰喧歸賵凶禮當缺上令𥙷牘公乃言喧以六卿之長而壞法亂紀自王朝始焉用彼相烏程銜之上覽而頷之隨命卜相即拜公禮部右侍郎兼東閣大學士與首輔某等同平章事一時謂聖主得賢相天下當太平翕然稱慶朝野歡呼無異於傳臚時而適當朝政一新撤鎭監罷内操人心久鬱者而一朝渙汗海内咸稱新叅相業於此不訾矣而烏程實不能容思有以中之初烏程之爭枚卜自爲書訟言羣臣朋黨銳身出攻禮部侍郎虞山錢謙益斥爲黨魁排去之得入相今即以其故智以公爭言官許譽卿不當削即露章入告詆公爲指斥以次輔香山何公吾騶持正不傅遂并斥之紏叅不出言路指摘別無他端枘鑿一言并罷兩相祖宗朝以來即擅政如分宜江陵未之有也時崇禎八年十一月也先是九月中熒惑犯太微占者謂次輔當之正人去國天爲示變公歸未幾遽以疾薨嗚呼吾觀烏程始終相位者八年其所以齮齕正人者後先一轍卒以亂天下則公之爲去畱爲生死豈偶然哉吾讀烈皇時事又讀公家乗至此未嘗不流涕而痛哭也公之先自公六世祖惠始居於吳五世祖洪始以郷薦官易州淶水教諭髙祖林官温州府知府其弟森官廵撫都御史兄弟俱起進士以勲德重曾祖徴明官翰林待詔名德重一世至其翰墨蠻裔爭購即至今人所稱文待詔衡山先生者也祖彭官國子博士其仲嘉官和州學正克修父業爲人士宗繇是文氏最盛於吳稱天下之甲族考元發以鄉進士官河南衛輝府同知艾而懸車稱三吳碩德前妣彭宜人妣周宜人實生公公諱震孟字文起別號湛持公生而奇偉睂稜上指目光射人與世所傳文信國像無異人以爲異焉其書蹟遍天下一時碑板署額與待詔埓崇禎甲戍爲同考試官所得皆天下名士時謂賴公以不虚國家盛典云公夫人陸氏先公卒側室袁氏二子長秉國子生娶廣西叅政申公用嘉女次乗邑廩生娶周忠介公女皆袁出女四俱適吳之望族孫男五人孫女人秉奉公之喪與陸夫人合塟於天池山竺塢之新阡與祖塋相望焉嗚呼公之薨也阨於柄臣不敢請䘏又六年始贈禮部左侍郎予謚文肅而祭與塟竟缺如時論悼歎然謂尚有待也而國變隨之矣悲夫銘曰容貌絶人是眞漢相天降具瞻精含辰象孝童稱聖見龍匪亢德爲國器文推宗匠源逺流長河溯崑崙應期命世保兹舊門年甫弱冠遂薦賢書閱三十年韋布蓼荼服政之歳始躋天衢昂首一鳴大魁天下補袞是期批鱗莫貰景卿隕地麟鳳迸野焉往不黜直道事人論思視草抗疏橫經嚴辭正氣河嶽日星公於侍從阨于節甫既黜禁林旋夷編户淚灑西州魂驚北寺公于揆席阨于林𣏌一言媒孽六旬解組公誠格天星躔失度繼公輔政天下大悅貂璫罷鎭羽林罷閱漸杜薰腐扃固密勿一日二日正已正物旋乾轉坤補天浴日嗚呼我公其道如弦麟經進說鳳噦孤鶱焉用彼相公實微言逢彼之怒瞋思墜淵違俾不逹杌隉由焉嗚呼我公一身已矣死而不朽生而名世胡彼不容以不能保我子孫黎民于萬􅥴明故文林郎四川道監察御史吳公墓誌銘嗚呼吾讀吳江吳氏家乗全孝翁傳及御史公行狀而知孝德之格天而植人紀於無窮也吳氏自全孝翁起家子若孫踵美爲大司宼孫曾以降官卿貳籓臬不易數而皆從鄉會進士出此皆全孝基之也而御史服其節母之教終身如一日不獨以功名氣節稱尤以孝行著而節母之守節教子有古烈女風嗟夫爲人婦而不失其身與爲人臣而不失其身等子輿氏曰不失其身而能事其親又聞之詩無父母遺罹則女子之守節亦孝也吾故歎吳氏之克以孝世其家且漸涵中外爲可銘矣御史諱煥字闇生又字亦臨全孝翁其髙祖也大司宼立齋公諱洪爲曾祖禮部郎出守嚴州春塘公諱崑爲祖而孝廉怡春公諱邦相則公之考也以公貴贈文林郎四川道監察御史而母則旌表貞節之范太孺人也公生五歳而怡春公棄世節母年二十四公同産一女止二期節母故怡春公側室公嫡兄某析令異居吳氏雖世貴而淸白之貽産甚薄且庶孽析居於湖浦廢墅初出之夕破屋壁立孤燈掛壁間母子三人相抱而哭節母秉堅貞剛毅之性懸怡春公像于室朝夕督厲其子公亦痛母苦節讀書至夜半則泣節母與相對亦泣不能已也遘水災田皆沒而室復傾移乾去濕歳無寧居時爲秀才與同邑周忠毅公宗建趙憲副士訏輩遊文行相鏃礪時論擬之八俊而爲族人所誣兩搆訟獄年饑家破不能粒食脱粟之飯僅以供母而巳萬曆已酉登鄉薦捷報至夜將半節母與公既聞捷俱泣下節母曰兒與母初至此亦夜半相抱而哭猶幸有今日也丙辰成進士筮仕杭州之海寧令邑故濱海多豪猾通權貴常脅持當事公一以淸廉慈惠治之久之大治輸將及時獄訟幾息二年以考最調劇邑移會城之仁和公奉母之官一如治海寧既而節母病不起公將奉喪歸兩邑士民奔走會哭路祭奔送者四百里相接哭聲盈於路初公爲期會徴收本年折色適節母之喪遂停徴百姓喧叩撫軍之門必求吳令畢徴收事撫檄至公辭百姓譁曰豈忍妨公喪禮止求設櫃吾民自投之公由是聽之三日之内一歳之輸盡畢葢數十萬金云服闋補大名之内黄内黃小邑北方民悍年饑多亾命爲盗公憂之於是悉召饑民諭之曰此地大旱此瘠土無宿儲又無鉅室富家可以勸助吾民其死乎吾今爲延汝命衆皆泣公曰吾不惜考成以公家所貯本色權宜借汝聽汝麥熟以折色償還庫之期聽汝自至設有不濟則吾願以一官償汝萬命於是萬口歡呼已而哭泣所全活不啻萬計及期百姓償納同日而至一日盡畢考績入都循良爲天下第一朝論有不次之擢而璫禍旋起初公與周忠毅公宗建周忠介公順昌善逆璫又察知公廉正必不爲用因授指其私人工部主事曺欽程疏劾忠毅及公俱削奪既緹騎四出聞有至吳江者忠毅與公相謂曰必爲我兩人也及開讀止逮忠毅公忼慨周旋傾資以助其槖饘亦自分必不免會聖人出而逆璫誅即起公爲四川道監察御史即拜疏謂忠賢㐲甲宫墻張牙閫外震主之威幾危社稷然殷憂啓聖正天之所以助聖明而開至治故特生此大逆觸之者君子助之者小人若懸秦鏡以照破天下之膽自此而流品可清國黨可破國是可定也臣竊見建祠導逆諸奸其作俑者欺君賣國罪不容死即附和者塗面呈身無所不至此皆神人共憤天地不容重者當立肆市朝末減者即逺投荒裔而更有漏網大憝之崔文昇爲逆璫第一心腹若忠賢逆謀果成文昇必居首功佐命此其罪在劉若愚李永貞李朝欽諸奸逆之上而奈何以未經發覺尚在帝左右乎文昇死黨布滿宫闈臣不敢愛死首發其奸所應立逮正法者也至効死擊奸諸臣如楊漣左光斗周宗建周順昌等皆粉骨裂膚㧞舌搞齒爲臣死忠捐糜無悔若不亟爲表章則人心必澌滅伏祈皇上旌忠鋤逆竝不踰時則綱常幸甚宗社幸甚疏上畱中公伏靑蒲待命三日事且不測尋内傳拏文昇及同黨宦竪二人各杖一百發孝陵淨軍公感上知復疏言封疆益激切謂事緩則以封疆爲宦海事急則以封疆爲陷阱人知王化貞熊廷弼以封疆分戰守而不知在廷先以門户分封疆因以經撫分戰守而國家之成敗安危一置不問此可爲痛哭者也以災異應詔陳直言謂必求三大要以囘天心一在殛奸之宜斷一在進賢之宜先一在擇相之宜愼上俞其奏次第行之尋命廵按陜西時秦中宼禍甚棘而秦撫胡廷宴故閹黨也冗不治事疆事益壞公受命即露章劾去之而總督武之望適病死軍事無所統亂者蠭起公慨然以平賊自任即拜疏請假臣便宜期於滅賊又舉鎭將及叅遊杜應魁髙從龍等爲可大用上皆允之公與新撫劉廣生延撫洪承疇商雒道劉應遇相爲掎角追勦堵截各盡其宜險塞要害各有屯據賊蹤一動聲響四傳百里立應公受事一歳之内而六奏捷人謂公籌策之功爲多而所舉將領多有功更有効死者人皆以公爲知人也公既竣事將囘京適敵薄都城撫督皆勤王秦宼復乗虚四起遂圍韓城公復畱躬率所畱兵將及撫督聞警發囘邊兵奮擊賊大殱之韓城以全會京師解嚴奏凱復命上㴱加奬諭再命公稽察兩畿十三省軍餉駐節京師户部尚書畢十臣以會計選察悉咨於公而公憂江南財賦浩繁欲除民運之害疏請以白糧分載漕艘下部覆行今之更爲官運猶其遺意也餉差竣例舉劾天下籓司郡守州縣長例有謝薦總計不下十餘萬金公一無所受初公按秦例有贖鍰四萬餘金公亦竟委之不顧云公以勞劇故病即堅請以歸又數年以疾卒臨死語不及私公自㓜至壯以至仕宦其奉母如一日而節母之所以教公者雖在宦邸猶如兒時當節母病革公盡瘁以事湯藥既不起慟輒絶三年之内衰絰不除未甞見齒人尤以公之終身一節稱公爲大孝云公生于萬曆癸酉歳卒於崇禎庚辰歳年六十九元配周孺人大冡宰周恭肅公孫女側室姜氏薛氏子五人長陛恩貢生娶顧氏少保大司馬顧冲吾公女次允廸貢生娶沈氏汀州知府大時沈公女次昌文邑廩生娶徐氏先宫詹學士文靖公次女鄉進士枋之姊次暹浙江嘉興縣廩生娶屠氏翰林院簡討屠公㓜成女俱姜氏出次昌全娶陳氏少保左都御史陳公中湛孫女薛氏出女五俱適望族孫男十五人卜地於某原某阡以塟銘曰維公之先聿興全孝誕啓後人如天斯燾福禄攸躋人文弘造累公累卿是則是効篤生御史孝亦克全蒞官戰陣纎介無愆不失其身臣節凜焉維兹臣節母訓昭焉孰曰公賢實維母懿茹荼教子氷霜血涙允無非儀又何遺罹詩禮是聞母子無愧奉直大夫吏部驗封司員外郎華公暨元配談宜人合葬墓誌銘公諱允誠字汝立贈承德郎户部主事諱恩爲髙祖瑞州守諱舜欽爲曾祖四川叅政諱啓直爲祖而贈奉直大夫吏部驗封司員外郎諱復吉稱二菴先生者則公父也姓華氏華氏姓子姓系出春秋宋戴公後有孝子寶顯于晉家常州之無錫遂世爲無錫人焉二菴先生有三子長允謀仲允誼長舉孝廉仲舉明經竝以學行稱于世而公則第三子也兩兄于公俱十年以長二菴先生庭訓素嚴而督課公爲尤切乃公未弱冠而二菴先生卒公哀毁骨立執喪百事盡禮吊者驚歎而母秦太宜人世所稱賢母也一以二菴先生之所以督課公者教公而命從兩兄學公孝友天植至性過人痛父之志仰母之訓而事兩兄如嚴師入孝出悌篤學力行磨礱涵濡歩趨繩束庭闈之間無踰尺寸一時文行爲世所推識者以大人先生期之人世之榮不爲公羡也辛酉舉於鄉天啓壬戍即聯第春官時相國賀文忠公官翰林分校禮闈爲所得士先是東林唱起絶學天下學士翕然宗之東林者即髙忠憲公及錢啓新先生諸賢講學之所也公諸生時即受易於錢啓新先生既成進士復北面從學於髙忠憲公忠憲授公以主靜之學公易學素精澄心潛體動靜語黙一本乎易資之既㴱出之亦粹格致閎功馴至無間而復證之於忠憲之心傳即濂溪周子所謂定之以仁義中正而主靜立人極者於是公叅學精密力行完堅事親無遺孝事君無遺忠臨財嚴於一介臨敵勇服三軍當雷霆而無懾罹刀鋸而不回無非此矣忠憲還朝公從行謁選授工部都水司主事忠憲官左都御史而時逆璫方釀禍忠憲即去官公亦遂歸里崇禎元年逆璫伏誅諸正登庸公進補營繕司員外郎受命督窑厰事額發帑金數十萬故事受事者羡什一公洗手奉公銖黍無染而賦給均贍工役奔命於是陶埴精良經費減省其有羡代償前官之逋而且儲以爲後費焉凡諸司事係金錢而與内臣交關者諸閹必藉口紏督干請無所不至即素號强項者亦俛仰曲從之公獨始終一無所狥既而敵薄都城百官城守公分守德勝門敵首衝德勝勢莫能支而公盡瘁守禦料敵應變智略輻輳出奇無窮於是器仗獨完瞭望獨審吏士獨用命時上爲微行以歷觀登埤者傳諭德勝門守備嚴整須賞銀若干兩而逮治懈事者公素淸羸若不勝衣而盡瘁四十餘日手口交作晝夜無息而精神益勝其忠誼如此既復遷兵部職方司員外郎協贊郎中事職方樞曺之要職也爲天下武弁苞苴之藪及公受事公私饋問一概禁絶即分所應有亦痛絶之時公有所感槩固請終養不允於是公慨然曰我旣不能退而全身以養母則當進而死職官下此吾心也亦吾親之心也遂拜疏直陳三大可惜四太可憂數千言謂以聖主圖治之盛心爲諸臣鬭智之捷徑爲可惜以多士修職之精神爲小夫趣辦之能事爲可惜以興邦啓聖之日時爲即聾從昧之舉動爲可惜而刑罰不中斧鉞無威可憂也是非共蔽忠讒互淆可憂也貪竸成風羞惡盡喪可憂也奸燄薰灼正氣消靡可憂也而疏中直糾烏程相温體仁及冡宰閔洪學閣部朋比阿黨市權奉嚴㫖切責責令囘話故事詰責爾爾甞逮問重則詔獄輕則司宼無或免者舉朝爲之震慄而公再疏三疏言之愈切爭之愈力至欲迫理洪學所冐之軍功迫奪洪學所叨之恩䕃而詆訶體仁紾臂塗顔廉隅掃地通衢路布遍體瘡痍讀者無不吐舌而不知公之忠誠已黙荷主知矣公僅奪俸半年而疏中所陳徐見施行幾無一不如公之請者旋罷閔洪學體仁亦去位閣部爲之肅淸當是時公直聲震天下先是公爲營繕而却帑金之羡數萬金爲職方而概絶武臣之問遺南臺韓涇垣疏舉天下清官四人最列公名一時清名滿天下及是疏出而公之直聲復震天下焉於是天下無論知與不知咸想望公丰采咸謂若公者所謂大人能格君心之非者也若公得位行道庶幾天下不難平治乎而公復以終養得請歸矣時崇禎十四年也公年已五十而身就子舎怡怡色養伯兄旣捐館惟與仲兄朝夕佐右極養堂之歡至太宜人八十之年而病危復安氣絶復蘇爲人世所未有爲史冊所罕見焉旣居太宜人喪而喪過乎禮幾至滅性嗟乎五十而慕僅于公見之矣甲申三月之變烈皇死社稷公痛憤不欲生南都既建起公爲吏部文選員外郎懇辭不允既復轉驗封司公既就職清節愈峻初荆溪相周延儒之再召也投刺邀公一見謂當以殊擢報公固不往并不報刺至是而權相刺謁亦竟不報旋即請告歸在署止十有三日耳嗚呼始公之出志在興復及見事無可爲故即歸迨歸而南都亦隨陷矣公時死志已决而欲得死所巍然全髮屏居墓田迨戊子春國變三年而公爲故國之完人時復避地鄉僻依至戚鄒氏會鄒氏有家難被縛疾呼公公曰此必爲我也今正我畢命時矣遂肅衣冠而出姪尚濂即鄒氏壻亦以全髮被執至吳郡見廵撫周伯逹伯逹婉轉勸公以薙髪公絶不爲應及至金陵詣訊所公箕踞坐尚濂亦坐既而蹶然起公問曰何爲濂曰濂死志已决但恨極欲言無可語耳公曰男兒至此惟淸爾心括爾口濂曰諾既而問者咸集或勸公如伯逹公背立面南舉手指天曰二祖列宗神靈在上我髮不可去身不可降濂亦誓不薙髮訊者雜語移時公閉目坐地遂罹慘毒公了不爲動臨難神色如平時時戊子四月十四日也初公既事髙忠憲公得忠憲心傳心恱誠服身體而力行之而忠憲亦知公至謂公爲生知安行逆璫之禍忠憲拜表自沈獨貽書於公以後死絶學之系屬焉及公從容徇義實與忠憲無異而相國賀文忠公旣得公於闈中亦以國士遇公而文忠亦不屈於賊身死國難者也噫亦異矣公元配談宜人柔淑約素與公同德一心閨闥之際儼如賓師公盛德不勝書而其腆蒸嘗飾滫􅔱絶甘分少讓産捐資行之無少阻亦得談宜人之助爲多公遭難宜人將身殉之既不得死矢心竺乾之教蔬食布衣十九秊如一日臨命正袵西向危坐而逝尚濂婦鄒氏年十九聞變遂自經亦以救解宜人哀而敬之撫之終身焉公生於萬曆戊子年六十一狥難於戊子歳宜人生於萬曆丁亥年八十終於丙午歳又五年辛亥秋與公合葬於龍山擔鉤塢之新阡禮也四子三皆爲邑諸生長衷恒娶鄭氏次衷恪娶吳氏次衷慊娶秦氏次衷惺殤女四人皆適士族孫男十人潛上沁上汲上澈上衷恒出澄上涵上淵上潤上衷恪出衷慊撫姪溯上爲子而復舉濬上焉孫女三曾孫男女各四公有妾二人吳氏濮氏俱善事談宜人俱悉心於談宜人寔後先談宜人以死而公之僕薛成者公被執即長慟不食先一日死僕朱孝公凶問至號泣立死噫是豈偶然哉是豈偶然哉故生公之時而有神像卓立之徴及公死之日而有烈風雷雨之變也嗚呼公即當世所稱爲華鳳超先生者也晚更自號豫如銘曰公事忠憲志起絶學克紹心傳爲時先覺敦倫盡性不愧不怍公精於學觸境皆宜譬如歳功寒暑隨時如水在地惟所用之爲川則流爲澤則瀦所以公身無施不可夷險晦明進退去取動皆豫如况於生死可死而死神形以完髪膚全歸忠憲心傳我先文靖亦完膚髮首狥大義綱常昭揭公寔一揆同光日月我今銘公雨涙飲血惟此血涙千秋不滅奉政大夫分廵登萊道按察司僉事沈公墓誌銘公諱壽嶽字巨山姓沈氏其先吳興人也後徙郎川諸塘復遷於宣城之洪林遂爲宣城人曾祖寵官御史祖懋敬官蒲州丞叔祖懋學以廷對大魁天下官翰林修撰謚文節父有容官左都督特進榮禄大夫公榮禄之第四子也生而不凡志意矯矯爲博士弟子文行竝茂華問彌彰爭持風裁踔厲激發一時鉅公偉人無不絀其官稱行輩折節與交崇禎庚午得薦南京兆舉孝廉而座主則江右姜公曰廣也公既舉於鄉益得行其志鄉俗之利病風教之綱維隱然仔肩不少讓遇事議論棘棘不阿遂以公事與其縣之尹陳君忤陳君幾中之三上春官不第就師儒之職於海州興起學宫約束生徒刷垢登良最舉其職三年而海州士風大振時楚爲劇賊所躪殘毁破壞故縣尹陳君者已人諫垣爲天子貴近臣遂以前憾舉公爲楚之羅田令羅田楚之尤殘者也雉堞不完民無百家公極意拊循勞徠蠲逋息征民以漸蘇歸者接道而公復以與驕弁捍卒爭法紀不能俯首低顔遂幾以身狥投劾家居而遘烈皇帝之變憤痛廹裂幾不能生弘光帝立公座主姜公曰廣爲相國相國海内正人之所宗主而時逆黨阮大鋮㴱比權奸以得氣勢勢益張甚計必逐相國而大興黨禍公以一罷廢縣令家居事外而獨奮入與大鋮面爭之大鋮言舊怨公言抵之益力中其要害大鋮揺首不忍聽大鋮時方殺正人不附己者而公攖其鋒又幾以身殉東省王公瀠請開府山東再疏舉公才擢分廵登萊道海防僉事而南都陷矣時在所稱亂公上痛君國俯憂桑梓隨事弭患盡瘁多方而異類猜螫蹙轢無已已亥之歳海師儵入所謂郡守者棄城潛遁而宣之紳士迎師頗異及師退守還守將周内紳士自掩其逃而公亦爲所染公慷慨自引始終一辭鍛錬楚毒絶無支蔓宣得以全而公竟以身狥焉嗚呼公時年六十七矣當公之爲羅田也故縣尹陳君之爲給諫者督餉楚中以舊憾督羅餉更棘身自按羅面責公公與爭曰以殘羅之民呻吟瘡痍氣息未屬何力以輸官稅爲之令者亦何處行其催科𫾣朴乎此征之亦逋不征亦逋征而逋令罪而民斃不征而逋令罪而民完均之罪也而獨以完吾民令之所願也陳君爲之動容卒拜疏蠲羅賦而海師之入宣也主者有事文廟一時博士諸生儒冠法服具威儀不期而會者數百人薦紳執事亦最稱盛主者歎息謂所未有而公弟壽民與子麟生獨皆不往卒之大獄起勢岌岌故太史楊公昌祚孝廉湯君斯祜先被收知者勸公逺去可以免公曰今日之事若潰大水非有人身爲堤防以捍之則禍不可言矣諸公非無其心力不能也吾雖懦願以身當之死國吾心也况死國而全桑梓乎賈彪曰吾不西行大禍不解彪以生解之而吾以死解之可也遂坐以待收至死無異辭受難赴市行甚速死之時直立不動有白氣衝起時辛丑之十一月也嗚呼甲申乙酉兩京繼陷至於辛丑亦已十八年矣國亾十八年而公卒以國事死悲夫於以見公十八年而其心無一日不死國也爲可尚矣所謂殺身成仁者非耶公曾祖御史公以直言忤分宜相嚴嵩未五十而致仕叔祖文節公以爭江陵相張居正不當奪情罷官而父榮禄公以文臣子孫任閫外之寄亦以身許國者也公所謂胚胎前光目擩耳染不學而能者乎又何當仁不讓而視死如歸也先是公第五弟壽崇嗣榮禄公爲江陵畱守癸未元旦賊破城畱守罵賊不屈死而㓜弟壽嶤南都陷以布衣從鄉老起義兵不克而死吁有以也公原配宜人劉氏繼配宜人某氏皆有婦道俱先公卒四子麟生鳦更生嘉麟生劉宜人出麟生善繼公之志自逃於浮屠未甞一日服其裝服而公從弟壽民則國破二十餘年猶能爲故國完人云故江左稱家世忠節者常首推宣城沈氏銘曰沈氏之先胄系神明汝南平輿厥有沈亭搴珪推組竹邑海昏讓侯來遷爰著吳興始終江左赫奕崢嶸文約儒俊吏瑀隱麟逮於公祖寔分於宣懷娠夢日公寔誕焉文儒吏隱公寔兼焉更益一死節逾勁焉維滂有言埋首陽山不愧夷齊豈愧皇天居易堂集卷之十三終
