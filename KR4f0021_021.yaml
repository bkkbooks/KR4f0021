body:
  text: 俟齋集得之濟南李氏為其門人潘次耕編校先生有清逸民卷首序例皆不假時賢品題觀其誡子書志行更可想見詩志題跋吾尤欣賞云國體變後十六年丁卯秋初固安劉豫荒陋不敢言詩文然讀先生文與其序例有以知其言之長也溫篤峻摯不徒以文美世傳選部竟罕有録者何哉居易堂集外詩文目録書與楊明遠書二首與葛瑞五書與朱致一書與薑奉世書二首與華山碓菴和尚書尺牘與吳甁菴與楊明遠五首序靈巖碓菴和尚五十壽序記西山勝景圖記書後居易堂集外詩文書與楊明遠書為良友效筆削於家乘此自千秋之事詎容草草既已卒業作札報兄有三大快焉甫翁行狀本是弟昔年所定今復閲之有不容不再刪潤者今者不惜數日之工盡知竭能字櫛句比為兄削成真可謂毫髮無遺恨者今而後真不朽之作矣今而後始知吾學問文章視二十年前不特不落而且有天淵之隔吾之立言果可以傳於後世此一大快焉承兄命幼兒代弟書册幼兒書法雖復不惡時為好事者書扇書箋若此長篇大章卷册等件實尚未試筆恐未能勝任愈快今為通家老伯所委連書兩傳二千餘言第一篇固佳至隱君傳則尤佳殊不辱長者之命竟可勒之貞珉者則其書法不啻跨竈矣此二大快也良友重委殊難塞責前者既已奉諾然殊恐其中或有未盡中心惴惴今者一一皆可仰契尊旨且可為世好通門千秋佳話一旦完來如釋重負此三大快也故日來弟當極憂愁飢餓中不覺喜而起舞未知吾兄展卷時及復如何也有此三大快今亦須以兩事屬兄一者即悉如弟所改勿更一字録一篇來更以吾所刪改及總評語勿有隱諱一示諸郎君俾後生輩知此老於文章學問果有一得更俾知此老於乃翁真為益友也一者幼兒書册若果以為佳乞一示里中同志知書者更一示勤中昆玉及家仲請其緒言以激賞此兒也未知尊意以為如何臨楮翹企不宣其二垂髫定交至於垂白回思先公與隱君時及今吾兩家子姓時逾􅕊載人歷四世而心期益固世好益敦此不特友朋佳話實人倫瑞事也則吾兄周甲之慶不肖弟能無一言之頌乎獨是性既懶廢事復牽率日復一日如許後時拊分自責良可怪矣非真知已量之有素其能寬之末減乎茲者撰成不腆之辭裝成卷軸敬致左右惟吾兄鑒其積誠宥其後時雖或未足揄揚盛美自必頷而存之不麾之門外也外一扇乃幼兒塗鴉亦以申敬惟一並笑留至荷至荷幸甚幸甚近履多福闔宅餘慶不勝瞻戀計獻歲益臻新祉受經臯比當益如林種種關意統希示慰倘歲首能如昔年故事鼓興惠然則樂不可支也衷言如縷另陳別楮種種俯電幸甚幸甚與葛瑞五書山中人呼梅為驚蟄花前札訂梅花時見過月初即望惠然而春來雨雪風寒當復阻人遊興今梅已落矣恐過晤又不果也悵悵比來計道履佳勝為慰吳子雨岑有道之士也雖寄迹市鄽然多孝友大節實有古人之風向與玄恭極善近與弟亦稱莫逆渠有新刻二册託致左右意欲求葛子破格推愛贈以一言榮於華袞矣渠之見託實在前歲去春夏則以弟未完尊傳不便相聞既則日望道駕之臨可以面語故蹉跎至今而每一晤言或片札相聞必屬及屬必再三渠遍交聞人而以尚未一識葛子為悵遍獲聞人篇章而以未得葛子一言為悵則其人可知矣故弟亦不吝為破格申請特託鄧元哲齎書代叩惟俯照之昨見錢礎日選本有拙著葛子傳不肖弟雅不欲以賤姓名梨棗傳布凡拙文有梓行者皆用方外之名三十餘年如是只如南嶽碑銘序言皆然葛子知我知必俯晰微意能札致礎老改刊方外之名則佩知我之德不淺矣又近聞今之所謂史局至不欲為死節諸公立傳則世網之密忌諱之多可知假如尊傳中距守赴義等字樣似亦未便前謂尊傳竊附名山之藏未必汲汲行世故耳明哲君子必有深見惟裁示之弟實懦夫或有過葸知能鑒諒也不宣與朱致一書入春又復兩月惟日翹望玉峯見東來紫氣則知大君子之福德與日與歲俱增也遙賀遙賀茲有切啓者幼兒今年十五齡矣意欲令之開筆課文而倀倀無從當今人師經師惟吾兄一人且弟之所心注必欲令兒曹景行者亦惟吾兄一人前歲不度不量至欲仰攀道駕往臨家孰此既斷斷不能然私心仍必欲令兒之執經座下今有先輩時制義五册欲求吾兄為選定付之課讀且求逐篇於轉承開闔法脈肯綮處一一批出不肖弟奉以周旋以啓誘此子知吾兄之所弗吝弗拒也昔人有欲從其師而不得即從其門下高弟轉相授業或有一人受經於老師而轉以友教天下即此意也幸甚幸甚不能躬親請事拊時惄然臨啓翹誠知荷深鑒幸甚幸甚與薑奉世書昨者惠然偕靑老見過劇談快飮具得讀靑老近著幾年來無此樂也慰愜懷抱又何可言弟過承載酒且肴蔬精腆大費物料殊為不安耳石刻書後重書一過馳到遵命勉改一二字然有愚鄙欲一進之者夫兢兢不忘其先人之手澤而必欲壽之貞珉非加於人一等乎年已強仕讀書百遍期必成誦質疑問難如不得已非好學乎以有用之才而屛處山澤不試不仕非隱居乎此皆道其實而非諛況此自為文之體足下可無庸心於其間者何足下之必欲僕易去之也今之人無其實而好虛聲惟恐人之不譽已固是大病然若矯枉過正正恐過猶不及惟足下鑒之耳昔郭林宗談獎人倫稱詡來學如雨中危坐甑墮不顧又何足數而被以話言與之品目一時興起蔚成名士二者交美並耀史册千載以來未聞病林宗以好詖人而病茅容孟敏諸子以好譽已也君子樂道人之善獎成後進惟恐不及自是其性分中事在善承之者因其品題勉思竪立以不負弘期可耳未聞必不欲一言之見稱而以為得者或者僕非其人乎則吾不敢知矣辱在世誼過荷謬推苟有所知直抒胸臆惟足下鑒之耳幸甚幸甚困學樓額亦書到並照不宣其二德被存殁誼同高厚不佞惟有感欲死痛欲死而已家人頂戴實同此情枉唁戚友靡不感歎若華氏昆仲子姪及潘次耕尤稱高誼至隕泣不止也則僕之銜結可知矣僕以孑然衰老遭此意外慘酷亦萬無可生之理昨別後即擬尺素略申哀感而無如五內崩裂哀傷迷眩不知所出申紙不能作一字昨手翰反先之尤增悚息然知在憫鑒也此刻亦欲一札謝震老然痛迫意竭只索擱筆臨楮長慟不知所云奉世老世丈真知己古人五月十一日未刻期服枋頓首頓首亡兒過辱謬知有加無已前承賜商云云此自友朋千秋至誼然僕實有鄙懷癖見斷所不敢承此自素蓄積或未甚悖然當如此千秋高誼唯應婉辭固謝豈容如此徑情而談此真所謂直而無禮矣此亦垂死之老哀情眩亂之所致也惟知己曲宥之可耳臨楮泥謝不宣又行與華山碓菴和尚書法門止足之誼世外金蘭之交謬辱心期三十年如一日則不肖弟之所欲伸頌於左右者情復何等乃昔春初度緇素雲臻所以稱寶掌而祝無量者踵趾相躡士室廢人自不敢隨時旅進然一言之頌其何敢忘惟是懶廢愈甚益復後時計知己能宥諒之於形骸之外也茲者課得一序佐以拙畫少展寸敬聊供破顔雖知支叟曾訶王濛之詞然計了元不卻子瞻之供也幸甚幸甚敬令兒曹奉齎禮足以代躬稱祝其長壽之縷春屬積誠一扇塗鴉幼兒私覿統惟笑留乃仞道愛幸甚幸甚尺牘與吳甁菴芝蘭一幀草書一幅奉為掌珠稱賀惟笑而留之至荷至荷外委甁菴序如命課就書絹幅完到雖復遲遲然撰寫實非草草者或可以答知己也知弗但悵其遲耳笑笑前二扇偶未能書另書蘭扇二握奉上書法實佳即拙筆中亦所少識者自能賞鑒也與楊明遠歲首不得吾兄一晤言則甚悵昨特作札致兄復值他出不得一批答則益悵觸緒增懷臨風惘惘如何可言向者每歎文章之難不特能文者絶不可得即一可與言文者亦絶不可得近復歎友朋之難無論緩急有無者不可得求可以披情愫話愁苦者尤不可得望兄一晤言望兄一批答實欲話愁苦也如何如何其二竹林之遊近復如故屢札所以未及者苦無以報兄也即果如來教尚有格格弟豈以私而廢公乎吾明遠何淺之乎為丈夫也笑笑其三自兩月前告急尊前促畫值之後亦幸不甚飢所最苦者中外無一力如此酷暑中兒婦一身肩任最苦最勞之事此則老懷惄如早夜不遑冀欲有以稍紓此苦者也至友如吾兄當喜我賤體之粗安而又當攢眉我之家無使令也如何如何一月以來未免有駴耳驚心者蓋自愧受福過分即吾兄處境亦自同人中所少者吾兄但能遠觀別處之天變何不近覽目前之人事但能知足觸處而生喜心愧心則無往而非好境界矣何至如尊札食少心煩種種云然也不肖弟雖處極苦極窘中然益自恬愈益自間適所願進之於左右與我老友共之不敢獨享此味也如何如何弟於家間所最喜者兒子兒婦纖悉稟成今將經歲矣而室中不聞一語不聞一聲也吾至友當亦為我慶忭耳其四三四日前偶得一友朋詩卷全本讀之幾乎下拜乃知亂世一鬱奇才輩出吾輩足迹不逾閭閈見聞不過二三而妄自高大幾幾夜郎不知有漢矣讀其詩既甚歎服又甚愧恨弟自留其詩卷俟我盟兄來同為欣賞也如須畢竟不起弟為之一哭而慟嗟乎當今之人求如許才情如此風華者亦豈易得即如眷眷於弟而極口奬許亦豈他人可幾已矣天下復少此人矣吾黨復少此人矣故展轉痛之甚也盟兄已曾去一探其喪乎亦撫棺一哭之乎卿墅父母在此喬梓曾一晤言否人生於死生之際自是不容漠然兄與如須氣誼不薄當亦同弟之傷悼也今聞卿老將移家吳門以撫如須之孤寡此亦甚善庶幾吾輩友朋之責略寬耳拙文一篇就正喬梓其文頗淋漓湊泊故筆不加點而成者雖未知文生乎情情生乎文然差足以見吾胸中之懷也弟生平以友朋為性命況生死之際耶兄覽之便可見矣兄所言五十金義盟已曾舉事否倘已就緒幸挨次卸會為妥總是第一會要還徐昭法也昭法之苦已極固不可與他人同例耳然乎否乎兄為我借百金後弟又稱貸五十金矣而五十金已如湯沃雪不知去向奈何奈何數日以來無所事事偶翻韓集見其當時以飢寒乞憐於當路投詩獻文靡所不至嗟乎孰謂韓子而若是耶吾輩雖飢餓固不忍為此態也雖然韓子之時又不可與今同日而語東漢趙元叔云寧飢寒於堯舜之世不飽暖於當今之豐年楊子勉乎哉吾兩人其共識之吾所願則學趙子也別後月餘兄於家中何所作為今既不出遊自當潛心學問時日易失而難得人生非金石不可恃倘強壯之時不努力為之使異日雖死而不死當大命既臨妻子環泣之時則噬臍寧有口耶一年之內所不意其死而忽然以死者數人時賢中如萬年少薑如須弟手足中如協季先兄皆是夢想不到者人生大都爾爾豈有常哉弟因此感觸故益岌岌栖栖惟日不足總之此生有一日則盡一日之業孔明云鞠躬盡瘁死而後已即隱淪山墅亦自有事業不可不以此志自勗也如其不然偷飽苟溫無所用心於禽獸何異哉其五尊王父傳弟何敢一刻忘之時時在心亦時時以他文試之然尚非作傳手姑徐徐俟弟胸如武庫筆如峽泉一瀉千里然後與尊王父作傳始可一出而不朽矣若他人有見委者弟不難立就至如兄所委便不同況又重之以先世大事耶事固有輕重難易非可一概作門外漢語也弟與兄何如者而於此有飾詞有吝色便非人類明遠以後倘再語及此亦非知己矣亦非文章當家矣奈何讀史事已畢一遍弟復將從頭重新看起史記兩漢又復看完七月半後至今別有所經營遂不復翻閲然所經營者亦史中事也今已有成就者俟兄來亦要當面就正弟總是終歲之內無多空過之日也序靈巖碓菴和尚五十壽序立於千載之下而吾之道有以超出於千載之上非亘古過量人未易語此昔也吾於退翁老人見之薄海內外知與不知翕然宗仰雖或道大莫容究之如仰日星而漸摩於春風時雨之中與之俱化退翁其敻乎不可幾哉退翁既往其道長存碓菴和尚復大其緒俾前人風規於以不墜亦未易為一二言也退翁嘗言佛祖出世道高千載普濟羣品亦不過救一時之偏藥衆生之病而已時節因緣方便接引正如熱者療之以淸涼之劑飢者飽之以美滿之食以身為教苟當其時則維摩之一默無異子輿之好辨吾回環於老人之言而益心折於碓菴也當今之世門諍堅固天下惣惣淪胥舌波城府深密牢不可破而碓菴獨能以無諍三昧處之夷然不屑見者意消而天下無復事矣蓋以無諍之度越尋常何啻吞若雲夢者八九直如金投大冶水入滄溟碓菴今日殆庶幾焉故其於世出世間無入不自得而世出世間接其謦咳瞻其眉宇亦有若坐春風而沐時雨者所謂無忝徽音克明師匠非碓菴其誰與歸即余之無似落落寡合三十年來孑然孤立而獨與碓菴稱人外之契久要無間幾於雷陳非僅支許也戊午歲春碓菴始稱五十余故介一言以為壽夫寶掌之年百齡為稚自初度以往彌高彌劭其道愈光將不特無諍於有諍之際抑且無諍於無諍之前而復其所詣為不可思議將見大地山河盡為淸淨莊嚴之域而溪聲海潮無非讚歎碓老其坐而進之矣是為祝記西山勝景圖記上沙在天平靈巖之間其地最勝多喬林古藤蒼松翠竹與山家村店相掩映真畫圖也一澗潺潺水周屋下時雨既過則奔流激注如雷鳴澗之所出自為一村余草堂在焉軒窗四啓羣巒如拱空翠撲人朝霏夕靄可臥而遊又不假少文畫圖矣吳中諸山惟竺塢多幽深之致一入塢中迥然絶塵山鳥山花若與世隔昔文文肅公築廬於此亭館泉石標奇領異中則有釣磯石屋外則湘雲渡仙掌峯而石橋跨於澗上石幢峙於波心此又招提之勝概矣靈巖固吳山之巨麗也一登涵空之閣陟琴臺之巔多奇石多古迹騷人憑弔資其風雅山遊士女咨為故實每當歲寒積雪尤為奇勝瓊林玉樹與琳宮瑤館爭晶瑩於碧霄翠靄間恍疑洞天上界也天平泉石之勝甲於吳山自陟山麓而上龍山多石夾立中通一徑而老樹蒼藤每於峭壁危峯之上扶疏蔭覆使遊人步步可以憩息而最勝者則蓮華洞也其蹊徑之屈曲竹樹之蔥蔚誠有所謂善畫者莫能圖也華山為吳山最勝自初地登峯頂鳥道屈曲崖樹交柯緑陰覆道昔趙凡夫朱白民兩隱君為山靈一開生面凡夫有摩崖大書白民鑿一巨石為接引像至今猶標勝山中云天池在華山之幽四面皆石壁巉巖嶄嶻羣峭摩天中匯一池遙望絶壁四圍蒼翠樹石參天谷鳥翔鳴溪山悄然真殊境也七十二峯閣在潭山之麓背山面湖一望而七十二峯之勝盡在目矣至若煙雨空濛波濤淜湃咫尺千里正如魚龍變怪倏忽出沒不可方物每遊必盡其奇吾不能為形容也過虎山橋為龜山龜山之麓直接平地夾岸榆柳遙望水面有物如螺浮廟墩也長虹縹眇如線銅坑橋也每風恬浪息湖光如鏡則孤帆出於天末遠山浮於波面一覽於此真移我情矣陽山之巔多巨石此則兩崖對峙如闕故名箭巖箭巖之上有浴日亭東則有望海觀日出西則俯太湖觀落照此浴日之所由名也余而立隱居於此嘗見雲海之勝一世界無非白雲變態萬狀真幻觀也陽山為一郡之鎮亦稱四飛山山之半有支公道場古文殊寺寺前有臺上即長雲峯也拔地數丈雄偉磅礴石罅中多雜樹丹黃紫翠四時不凋以掩映於蒼崖碧巘間亦奇矣山不得水則不雄若虎山橋在二堰間巒翠浮空波光極目一石梁跨之正如長虹夭矯橫亘碧落而梵宇臨於山巔一從登眺不復知此身之在塵世矣吳之山惟玄墓最奇背壁面湖又以梅花為香國山蹊水涯無非梅者今聖恩巨剎金碧照耀與湖山爭勝亦諸方罕儷也書後題遺薑奉世史記書後薑子奉世好讀太史公書其鈎深闡微有非今人之所能及者嘗相對竪義出其微言老夫亦謹避三舍余因語奉世自古通人能知史記者鮮即子瞻亦獨宗漢書惟鄭夾漈則熟精史記謂迥非孟堅可擬余固有史記癖自謂夾漈後一人今乃復見奉世此不特遠過今人矣奉世所見甚精而獨深契余書後二篇因令兒曹繕寫以遺之知研精之餘當復有起余也刮目俟之題跋題白雲岵屺圖長蘆簡公嘗語余曰某早歲出家遊方之外顧明發之懷未嘗少間昔須闍提太子割身肉以療父母睦州陳尊宿織蒲履以養親緬懷古人實切自愧惟無己之思如一日耳余因作此圖以貽之仰望白雲陟彼岵屺聊寫其思親之倣佛孝子之身終此以志也昌黎云有墨名而儒行者則進之世出世間必有知此圖者志銘薑如農給諫齒墓志銘山東萊陽薑貞毅先生成崇禎辛未進士筮仕儀真令以卓異授禮科給事中建言廷杖謫戍宣州衛世變流寓吳門癸丑歲年六十七卒於吳門治命諄諄必葬戍所不復返骨故鄉先生之心亦可悲矣先生二子安節實節謹奉遺命卜葬宣州之敬亭山成先志也初萊陽之變先生贈公諱瀉里以諸生嬰城拒守城陷不屈死先生臨殁作易簀歌自傷不能從二親之邱隴言尤惋痛天下悲之先生被禍既酷而家國繼變萬死餘生年未六十齒皆脫落先生有二十七齒僅存三齒落二十四齒安節實節平時襲而藏之既葬宣州而痛先生之臨殁悲歌思二親之邱隴於是復奉遺齒歸瘞萊陽贈公之墓側庶幾先生之心乎噫為可悲矣先生諱埰字如農私諡貞毅長子安節移家廬墓宣州次子實節仍居吳門先生之葬敬亭自有志此為齒墓既忠且孝是宜銘銘曰批鱗不折折檻不懾齽齘齟齬穿齦語欲泣還無聲亂離易感傷況復為弟兄坐對無次序宴言略逢迎有時擁夜被寒月空庭生情語相慰籍一笑落木榮笑已終悲歌霑淚徒縱橫時事多愴意非復矜醒淸靈均仍楚官魯連甘秦坑胡為余小子身重髮膚輕所以戀微息猶睇東方明漫漫既長夜何自荒雞鳴秉燭追古人中心嘗京京日夕敢玩愒該討萬軸傾多書比傅迪好古豈老彭抽書分韻腳慘淡殊經營高吟學梁甫作賦還楚傖悼亂王仲宣詠懷阮步兵努力歲寒期哀哉君子行今體詩園橘初實庭柯欣結實佳果更怡顏葉密新苞隱霜高摘顆班歌能追楚誦樂不減商山獨立歡相對摩挲去復還挽惠孟仁三首當年握手在濠梁俯仰千秋意未忘為誦莊生齊物論嗒然一笑等彭殤故人零落竟無餘拊景懷人悼索居昔哭張君曾一涕豈堪君又去籧廬不能磨鏡敶魯酒且與招魂賦楚辭葉落蛩吟助哀思為追夙昔淚如縻題仿洪谷子山水蓼雨蘋風興不孤渺然幽思看江湖生來未識玄真子看取煙波一釣徒題畫雜詠五首靑山緑水絶紅塵桂楫蘭橈好問津自是奧區都壽域仙癯處處樂千春靑田白羽九天來直下層霄步碧苔道是薛公傳阿堵不知丁令海山回高松謖謖鶴翩翩芝草離離茁玉田學得長生喜偕隱繇來山澤有癯仙歷落山家對翠屛蒼茫水色接靑冥片雲低渡溪橋斷野老扶筠曾幾經澗水遙從天外來穿林漱石自徘徊四圍山色渾無盡百道泉聲亦快哉長洲徐俟齋先生高風亮節卓然千秋所撰居易堂集二十卷吳江潘次耕為之編校余嘗讀其文皭然如氷雪猶想見其為人集首自定凡例十一則於編集宗旨論列頗詳謂合
