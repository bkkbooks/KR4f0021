body:
  text: 記吳氏鄧尉山居記鄧尉山居為余伯舅吳明初先生隱居養母處也吳氏為吳望族推財讓産世多隱德先生早歲蜚聲庠序晚以詩文自雄而孝友剛方尢為宗族鄉黨所推重以太夫人不樂棲泊城市故遂家於鄧尉焉其宅傍山臨水南向闢雙扉再進為祠堂三楹稍左折而東向為書屋庭植修梧髙枝入雲屋外古樹四合緑陰覆天後三楹為山堂軒敞髙豁屋如其人堂左為小樓南向啓北窗則波光燈練搖曳樹杪即西堰也一覽而虎山堰水歷歷在眼登眺之勝于兹極矣與樓相望復為樓為廡太夫人之養堂先生之內寢也伯子長原亦安居焉先生嘗語余曰此地僅有瘠土數畝樵蘇所給不償官逋嵗苦追呼新絲新榖所不能免然吾祖父埋玉於此馬鬛之封在焉吾故獨肩其勞子孫以之不敢委也蓋先生於本支為世嫡故墳墓之所託祠堂之所在先生得居之長原得守之非他子姓所得而有也長原篤行確如克修父業世亂以後年方壯盛即擲去儒冠盡棄經生學樂以隱德世其家披裘抱甕躬耕采藥怡然自得也余既樂親其人而復愛其山居之勝故時時溯從不辭頻數每一淹留輒至忘返鄧尉實吳之奧區而渭陽所居復擅一山之絶繇宅之右循籬落而西則為銅井為青芝為真如塢為玄墓羣山逶迤綿亘數十里層巖復嶂丹崖翠閣掩映無盡有澗水度逺嶺而來細流潺潺周於屋下襟帶衡門􅚈成通港小橋斜度平疇秩秩衡從其門田外復有山如屏過橋曲折數里許兩岸皆水田也蒹葭出水蒲叢刺天茭菰菱芡彌衍波面又有水楊數株落落堤間每泛小往來緑港中盡日沿緣惟聞欵乃絶無人聲既而見桑麻墟里儼然武陵桃源也出港即為上下堰為虎山為光福市人煙聚落與逺山茂樹參差相雜堰之盡為銅坑外即太湖具區也晝則輕帆柔櫓與鳬乙相出沒夜則煙水淪漣與月上下而孤村逺火明滅林外此中深趣信幽絶矣山多植梅環山百里皆梅也又饒楊梅桂樹一歲之中春初梅放極目如雪遙望諸山若浮於玉波銀海中僅露峰尖翠微欲動而香氣襲人過於蒸鬱夏秋則楊梅桂花各擅其妙夫棲託好佳而優遊卒嵗豈復知此身之在塵世哉昔阮孝緒為精舍僅以樹環繞戴顒築室聚石引水植林開澗便垂史䇿豈若先生之宅居名山之中山泉花木種種極致乎獨此山墅堪偕其人為不朽矣余遊覽既審遂為之圖復作記以系之以志是父是子之所以居之者如此後之覽余斯文者其亦有以想見其人其地也夫芥舟飲酒記天下既亂士多長往而不返者其不得已而身依城闕亦必有所託以自適於形骸之外者也李子文中盛年遭世變即日除經生籍其志決矣而隱不違親浮沉人間顧意有不得輒扁舟獨往不漁不釣容與水裔歌滄浪誦漁父激楚流連意盡然後返有足悲者丁酉春日則拏舟見其友徐子於五湖之濱徐子故隱者死生契濶十有三年矣握手勞苦俯仰今昔泫然濡睫者久之文中乃邀徐子至其舟中則見其滿載皆金石刻及宋元名人書畫也垂簾撫卷婆娑意得文中即出酒相與痛飲談風月討古今浮白歌呼以酒自雄不復知其遇之窮矣酒酣文中顧徐子曰余將名此為芥舟可乎徐子曰子固得莊生齊物之指矣天地一拗堂也江河一杯水也則相與羣遊於天地江河之內者又何適而非芥乎子既以舟為名也余請與子徴舟之事昔人放棹急流輒讀離騷讀罷則哭志其痛也搴鷁水嬉扣船歌河女而風霆雜至志其貞也通梁水齋盛載鼓吹乘潮解纜臨波置酒賞其豪也載酒滿百斛船四時甘脆置兩頭酒減輒復益言其放也以至藏舟於壑則感萬物之變遷牽船於岸則語逹人之髙致淸談則船呼孝廉漁釣則舟名野人同遊則有登仙之羡放歸則有載愁之稱此皆昔賢之佳話而揚舲者之故實也而皆不足為子道也意者其張志和之浮家宅乎彼固有其髙矣而無杯酒賓從之歡抑陶峴之水仙乎彼固有其樂矣而無書庋茶鐺之供若是舟也固將以襄陽之書畫而兼二子之雅致乎坐客皆稱善樂甚於是舉酒復酌相與攬夜色之蒼茫拊河山之寂寂以足扣船引聲而歌小海之唱而風起水波鴟夷為之倣佛也歌笑雜􅊱飛觴無算尊中之酒不空而雞已三喔矣病中度嵗記枋猶記憶童時侍先公先夫人度歲歷歷如昨每當除夕晡時先公必呼枋柯易禮服先公率之以祠五祀拜家廟魚菽糕果秩秩也進而少休甫暝集余兄弟及女兄弟於堂上則己燒椽燭如晝焚百和香香氣煙煴襲人衣先公先夫人各盛服而出率余兄弟同入至太夫人閣前拜請至堂中共舉觴焉拜訖然後先公先夫人交拜舉觴以次余兄弟跽而稱觴於先公先夫人膝前以次余兄弟男女六人亦遞相致酒事畢則僮豎爇洪罏於庭先時備松薪之佳者截而斫之縱橫架之髙與簷等實以柏香冬青取其香也此亦榾柮遺意第稍華飾耳爇爐時火光燭天雜施爆竹煙火火樹銀花頗亦繁費蓋先公極貧平時以典質為事而性不喜庳車羸馬以為儉且上奉太夫人極養堂之歡故歲時伏臘家庭燕喜尤盛而可述也既而先夫人早世既而太夫人仙逝每遇令節先公必偃仰踟蹰澘然出涕無復曩時之觀故位望雖日隆余兄弟雖日就成立而其為家庭之樂則大減於昔矣自崇禎十七年甲申三月十九之變先公益屏聲伎出媵侍惟以死為念故於除夕及弘光元年元旦遂令家人不得賀歲不行拜禮其為度歲也黯然無光余兄弟痛先公之意不禁欷歔而先公則己淚浥衣袖矣是年夏閏六月先公即為汨羅之遊余兄弟痛先人之意每當度歲則僅一拜先人木主家人亦不賀歲兒輩亦不拜謁十有三年未嘗改也然歲事之應盡者不敢有缺二三年來窮愁日甚每歲輒減至於今之歲交瓶罄罍恥除夕晡時尚未午飯而又未知次日饔餐之何在也復值余危病息偃在牀百度皆廢以至祠神祀先魚菽不供糕果不薦靑燈熒熒家人相對四壁悄然而子女幼稚但知令節不解人意競來相聒薑豹操井臼通子覓梨栗而衣無襟袖兩手瘒瘃履穿不苴足趾在地每一顧之焦心腐腸况復見其軒渠旋繞跳地作虎子耶今年米價甚賤為數十年來所未有窮閻細民無不食精鑿製糕糜而余家則歲除無午飯趙元叔以窮鳥自賦曰不飽暖于當今之豐年韓退之謂冬暖而妻號寒年豐而兒啼飢余殆無愧此二賢矣特通子薑豹之年正余侍先公先夫人及太夫人度歲之年也俯仰今昔不自知其涕之無從矣嗟乎夫何使我至於此極也雖然吾於此而有所進矣昔人謂士君子自處固有生死不難決絶而落寞悲涼之際反惝然不能自持如韓退之貶潮州而述封禪寇萊公居謫所而陳天書也嗟乎余之落寞悲涼已十有三年矣憂患頻仍不遑寧處飢寒頓仆莫必其命其為落莫悲涼亦已極矣其亦愼有以自持哉再生記丁酉冬十一月初五至初七日祁寒大風而余苦無裩止一舊單縠者又為鼠所穿其穴如碗平時擁書兀坐而已肌粟毛𥪡時適送一客歸行至曠野間寒風如刀無可逃避初九日遂大發病寒熱交戰雖其勢劇厲然以為此瘧耳可無他虞也始病數日猶強起支吾及二十日竟伏枕不能起矣草一日遂絶粒矣瘧每三日一發發如排山倒海然余所苦者非瘧也特苦胸鬲迷悶口中作惡痰滿喉間耳每日惟啜苦茗數十碗餘即湯飲入口必大嘔噦如是者三十日至十二月草一日覺胸鬲稍寬醫者云當勉進粥飲遂強啜之然僅能一口而止至草五日復絶食不罷進矣戊戌新歲病勢益惡瘧雖緩而胸鬲愈飽悶痰益多每仰臥則痰從兩頤流溢而出口間喉間苦惱穢惡不可名狀而痰糊其口不能出一語時又絶食氣息如絲而五十日不如厠余因自念此必後不能下故爾中飽必得滂然一行然後胸鬲必寬飲食可進也鄭三山先生聞之曰噫是何言也以四十日絶食之人尚可以行藥排蕩之乎此萬萬不宜者余謂當服行藥時先製大劑參苓待其一去即以補之當可無恙有庸醫者聞余意欲行欣然從事既大泄之後而胸次仍不寬彼曰此積食尚未消也復以消導剋伐之藥四劑令服之臨別時云服此四劑後似可服參矣及四劑以次服完而胸鬲飽愈甚庸醫者曰若是則尚不可以服參也當再以四劑消導之時正月初十日也絶食已四十五日矣肌膚消鑠大肉盡去枯瘠如柴被外露骨手足展動須人為力竟日暝臥畏聞人聲余亦自分必死矣既服初十日一劑則忽然嘔吐藥與痰雜出而嘔吐之苦心肝震蕩百骸俱痛每吐一次則氣絶半日庸醫者目擊之曰今而愈矣寒痰已動也苟頑結胸中則難為計耳當以次服完餘藥然後加減可也十一以後每服藥必吐吐必加劇日凡幾次余因止其藥不服十四日而嘔吐止是時則已勺水不能進至十七日午間無端復吐已不服藥四日而所吐猶藥也十八日復吐遂咯咯出血至此萬無生理余於是訣遣家人囑付後事家人婦子惟相對號慟而已無可為計者一以囊無一錢庾無一粒甑塵釜魚瓶罄罍恥則動皆窒礙一以窮居鄉僻每事須人而城中骨肉手足無一至者余因請老友張蒼睂至榻前屬以後事且語之曰此言當告之家仲以次則伯叔從兄弟及懿親尊長而無如無一人至者故以告之吾友我一瞑之後當依吾言以次好為之不然余之精爽可畏也張君受誡未畢慟哭不能仰視余誡令勿哭令我得畢所欲言張君慟不已余遂亦失聲而慟且曰頃我訣別兒曹為之一哭訣別婦輩為之一哭因語婦子人於死生之際即為灑脫然苟漠然無情是豺狼也既訣之後苟復戀戀掩泣垂涕洟是兒女子也所以吾最逹觀而不可無此一慟一慟之後吾更不復與汝曹兒女語矣勿怪我為無情也吾意至死不復出涕不謂今復為君失聲也絮語之頃家人復來云萬一有不諱則無棺以殮計將何出而人故必焚其衣以送今止一舊綿衣在身餘別無他衣則奈何余不覺開口而笑曰此後死者之責也意吾死當必有棺第吾眼中無之耳雖然即無棺庸何傷至於焚衣送死此俗法也昔楊王孫家纍千金而尚裸葬而况我乎此正無足悲然吾固有二恨一者先君未曾入土一者余十三年營一書而未曾成帙余縱為羊祜蔡雍乘願再來而已無及負恨入地萬世不瞑如何至我十三年來杜門守死采薇續命今生則無食死則無棺如此以死亦可以報先朝見我先人而無愧矣蓋棺定論此之謂也茍或不死則任重道逺行百里者半九十正未知所稅駕耳張君別去時余已絶食五十五日而是日又復三慟而語言蟬聯大耗神氣下午遂益加沈篤氣綿綴無半絲命在呼吸間矣而鄭三翁先生至乃正月二十日晡時也先生少休廳事至余臥榻前褰帷而見其面曰噫何至於此也因復端坐良久先生曰某以俗事逺出故來遲然亦不意子病之至於此今某來願有寸效余張目而頷之時已不能言也頃之先生復曰得無畏人乎得無惡人聲乎時張君在坐促先生診脈先生曰不爭此時刻吾多與之言以察其神觀如何耳又頃之因以手循余身自頂至踵者三焉乃診脈診未竟先生躍然起曰子固不死吾當起之於數日間耳余雖沈篤而聞此言猶能疑之張君者亦未之信曰苟無他虞已為萬幸亦不期於數日間也先生曰始吾見其面而憂之以為有死法及坐定與之言而察其神觀則喜今診其脈則益喜渠雖不言而神觀猶淸至於脈息則命門有根決無他慮吾當起之於數日間耳因自劑藥而自煮之時張君已為我治具供客屢以趣先生先生曰必當待病者服藥而後吾儕食可下咽也漏下一鼓先生手捧藥以人掖余而飲之見其藥不滿五分甘而且淸遂一啜而盡先生曰今夜當安眠明日病必減也先生既往張君所良久而余復吐先是先生之未至也余語家人曰若易醫用補劑而不能受則決無幸矣既而復吐舉家之人惟痛哭待盡張君宅去余家數武家人奔告先生先生大驚默然良久曰服吾藥而吐何也因攜燈蹶趣來視余先生曰維不吐乃佳服吾藥而吐何也沉吟頃之舉燈以視所吐則又大喜因呼余家人示之曰所吐者皆痰也既不咯血而余藥不反則己奏功矣他人之藥四日後而尚停胸膈間吾藥未食頃而已遍行經絡自此當日就平復也次日黎明余家人尚未起而先生則己手捧藥而入其分數淸甘如前余又服之是日午餘而覺余之神氣益淸復能言矣又一日而余益向愈種種安適竟復健談張君及坐客無不驚歎下拜曰先生真神人也第三日蚤先生製四劑付余將解維去而余是時遂能啜粥時正月草三日辰刻也先生於二十日晡時始到時余正彌留甫兩日而起坐又一日而思進飲食以八十日沉疴六十日絶食之人而又為庸醫誤藥至於嘔血垂斃而起之之速如此求之史册亦罕其倫也當先生未診脈而以手循余身也見余約絮於背薦薪而寢惄然傷之為之流涕時天氣正寒先生立解所著綿衣以衣我而令余於臥處更益薪焉夫病有六不治苟犯其一己絶生理若余者既已有其三矣所謂衣食不能適形羸不能服藥而庸醫雜進致藏氣不定也有此三端而先生乃以三劑立起之於兩日之間嗟乎茍非身受者亦未敢遽信也因作再生記以識其詳焉箬廬記硯山之陽蘇臺之隂右有香涇左出橫塘山水靡麗吳之奧區中有野屋數椽蕭然環堵則箬廬也趙處士封初居之處士醫學妙天下而心慕朱百年之為人以其賣箬者賣藥遂以名其廬焉余為之圖而序之詳矣客進曰賣藥與賣箬同乎曰不同賣箬止以全其髙節耳若處士之賣藥既以髙其節復以邁其德而大其學焉是惡可方也如醫和之論疾蠱越人之還結脈得於未形起於已死使危而復安亡而復存所謂收之斗極而還之司命者功固烈矣而不特此也金匱之藏玉函之書垂世立説以禆終古生生之德而躋斯人於壽域豈採箬者之所能及乎人有四體五藏天有四時五行人有寤寐呼吸天有分至啓閉人有蒸否隔塞天有嬴縮災變所以月入牽牛則民疫癘月出房南則民夭札心腹之疴則蒙恆之風下上之風則狂恆之雨天人雖殊而陰陽氣數則一也故曰善言人者必本乎天良醫審人事之至精則不出户而窺天不假占驗推測而四時啓閉五行消息災祥度數洞然於胸矣於是而合天人於寸心運造化於指掌此亦非採箬者之所能及也攻邪者力而未除養正者久而靡復故診病而後知邪之易入用藥而後知正之難扶蕙蘭荆棘不同其滋蔓自然之理也而扶弱必先鋤強間邪乃所以存正君子小人往來之幾人心道心危微之界盡若是矣易曰開國承家小人勿用魯論曰克己復禮天下歸仁此其意惟良醫為能知之故良醫克致其道可以治世可以明心此又非採箬之人之所能及矣且處士之醫學日精聲問日逺每旦則户屨常滿乞藥如市而當世一二大人先生及方外巨公無不與之為友正如支公與許詢締交宗雷歸東林之社而孔北海忘年於禰衡堯夫布衣齒於耆英之元老當時會稽南山之樵腰鎌而伐箬亦未聞其有此也客曰若是則處士何取於兹也曰固也今以處士之日殖其學以息乎其廬廬之外則靑山若鄰緑疇盈前林屋相望通渠繞焉近依山市而又僻處不與市接客至則沽酒烹鮮閉門則無市塵人迹入其門則竹木環蔭花藥扶疏廬中則一几一榻左右圖書琴尊間設茗碗不枯客退則撫卷垂簾偃仰獨得向有一童應門以處士之貧棄之而去於是灑掃負戴皆身為之嘗留客則身被短褐提壺入市引酌極歡入內則與偕隱之婦身親舂汲昕夕自如意翛然也昔朱百年不應辟命遺去簪􅌧入會稽南山以樵箬為事惟與孔顗友善相對酣飲而採箬則置之道頭意者以處士之學將以通天人之數窮性命之微而又濟人利物如此其廣而息偃廬中若無一事此則有取於賣箬者乎余因語處士當於廬之中別構一楹顏之曰百年亭益以明景行而且以見處士之老於是廬也處士曰善余不入城市已二十年所矣而亦以乞藥之故身造其廬因以吾之所知及所見者而為之記顧氏松風寢記士君子生當明盛相忘於太平之福即城郭變遷曾不足以經其懷抱茍不幸而更喪亂遇革除即一草一木之微而事關故國莫不動先王弓劒之思焉而况於天書宸翰乎故尺札等於天球隻字珍於大貝雖曰詞翰之良亦時會使然也吾蓋深有感於顧苓氏之松風寢也顧氏世著江東自典午渡江家聲軼乎王謝厥後越六代以迄皇明代多偉人若苓之髙祖太僕公某於世宗朝為諌官建言廷杖以直節顯四傳而至苓而克大厥緒益振家聲當弘光時以明經廷對既膺上第而南都陷弘光帝遜去同舉者或言當再觀變以圖去就苓竟拂衣出重繭而歸且行且哭曰吾不忍以祖父淸白之身事二姓也既得抵里遂隱居虎丘山麓奉烈皇御書松風二字以顏其寢室名之曰松風寢息偃其中不交世事若將終身焉苓之言曰吾寢於斯食於斯而出入瞻仰於斯以無刻不覲吾先皇之耿光也先師不云乎歲寒然後知松柏之後凋則吾所不違咫尺者庶幾有以自勉而終身無忘乎故君可也徐子盍為我記之徐枋曰諾昔李應風裁峻整天下楷模人目之如謖謖徑松下風言其非花月穠鮮之所可比也又虎丘迫近城郭故自古之隱居者鮮處焉而何求獨能避世於此以棲遁終斯二者固史册之所美談也苓今將兼而有之乎非所謂東南之美而隱不違親者耶枋固願苓之峻節如李膺而潛德不遜於何求也若華陽隱居生平最愛松風所居庭院多植松然身為齊室舊臣而興言符命以邀梁祖其為松風也愧苓逺矣而枋更有感也宋道君以無道亡國生降沙漠而奎藻秋風猶博思陵之一慟若吾先皇之殉社稷千古為烈而遺墨僅得託於野人􅎝柱之間嗟乎悲夫此苓之所以昕夕低佪也甲寅重九登髙記澗上草堂在天平之陽靈巖之陰雞籠羊腸擁其右笏林岝崿峙其左連峰疊巘迤邐相屬若環拱我草堂者余於人世寡所嗜好而獨負山水之癖滄桑以後絶迹城市而遐搜幽討山巔水澨惟恐不及自居草堂則息影杜門足不窺户十餘年矣蓋諸山之勝無時無日不在吾前其煙鬟嵐翠朝霏夕靄若故出奇爭勝以慰避世之人之岑寂者一澗度重嶺而來繞衡門而東注平時則潺潺㶁㶁幽鳴不絶時雨既過則迂回奔放奇絶萬狀一坐草堂軒窗四開而山水之奇已盡得之少文臥遊并不假圖畫矣又何假出户僕僕杖屨為哉余客馮子鶴仙復時時攜琴過草堂為我作數弄鶴仙琴學妙天下所謂撫絃動操衆山皆響又不若少文僅託之空言也余向有幽憂之疾甲寅秋少間余語客曰余足不窺户十餘年矣今幸疾少間欲一盡登臨之樂以寫我憂何如今日復當重九設有佳客至者吾當與之登髙而劇飲焉客曰善語未畢而馮子鶴仙載酒而至因與佩紫萸泛黃菊持螯引滿飲酒樂甚鶴仙從容請曰先生禁足之戒近得解嚴乎出草堂數武即諸山環列請破例一為登髙之會可乎坐客皆笑曰此固先生之心也於是少長數人聯袂而出度小橋越澗而南出喬松之下松皆數百年物復度澗而陟山麓循石磴曲折而登焉此山固靈巖之支山也山皆巨石層磊石皆作翡翠丹砂色山頂平衍可坐千人於是相攜而陟其巔覽雲物之蒼茫來林巒之紫翠余與鶴仙卓立雲際引聲長嘯山鳴谷應風起雲湧而天籟吹我衣裾松濤起於足下矣見者以為神仙中人也昔人云九日登髙未知起於何代而自漢迄今未改魏文帝云九為陽數日月並會俗嘉其名以為宜於長久故以登髙宴會余曰不然夫人之登髙送逺即以望其來歸也陽至九而已極况於重九故亦登髙而餞之以期其復也如余者十年不出門户而今乃復攜良朋宴令節登髙於此山也豈偶然哉鶴仙曰昔羊叔子置酒峴山謂從事鄒湛曰自有宇宙便有此山繇來聞人勝士登髙逺望如我與卿者多矣皆湮沒無聞使人悲傷湛曰以公令聞必與此山同傳若湛等乃當如公言耳然湛卒因叔子以傳今某無似然幸得從先生遊願先生記之俾千百世後亦得附先生而與此山同其不朽也余重其意因為之記而並為之圖以遺之鄧尉十景記虎山橋尺遊鄧尉者必繇虎山橋虎山固鄧尉諸山之始也其地四面皆山中􅚈二堰以受諸山之水回環上下約二十餘里有石梁在亂山中雄跨二堰間層巒疊嶂映帶無已而左右巨浸波光極目正如長虹夭矯橫亘碧落每一登眺不復知此身之在塵世矣余每謂鄧尉二堰實不減西子湖以其山水相得也然西湖諸山奇麗處正如子瞻所云淡粧濃抹獨能擬似若鄧尉二堰則如仙真勝流不可方物矣余避世土室足不窺户惟春秋僅一出展先文靖公之墓而獨以酷愛鄧尉山水之勝不得不破土室之戒一歲中嘗三四過之每至虎山橋輒徘徊不能去也司徒廟司徒廟柏千年物也雄奇偃蹇各極其致有非圖畫之所能盡者殆不減杜少陵所詠孔明祠前柏也零落空山榛蕪滿地昔人祠宇湮沒無聞多矣而此獨以柏樹得傳不亦異乎或曰此漢髙密侯祠也銅坑過虎山橋為龜山龜山之麓直接平堤夾岸榆柳皆在下堰中遙望水面有物如螺雜樹蒙之浮廟墩也堰之盡長虹縹眇如線銅坑橋也外則太湖巨區矣煙水淪漣山林窅冥而輕帆出沒直浮天末亦一山之絶銅井鄧尉諸山銅井最勝以其有石有泉也其頂髙出諸山獨有二大樹冠之逺見三十里石磴盤紆拾級而上既陟其巔有巨峰橫偃大如十間屋其髙幾丈嵌空崚嶒作勢奇妙峰下有泉二俱在石罅中石皆靑碧色其質細潤如古銅器而泉深如井故名銅井一云泉底有銅故水味嘗澀要不可考也峰側有古廟居二大樹下廟旁精舍三四楹坐臥食息與奇峰相對而煙雲出沒皆在足底真殊境也石壁鄧尉諸山苦少奇石故石壁雖在僻逺而遊屐之所必到也先自平疇躡山麓而上數折至山之半闢徑如砥夾路皆松杉也上倚巉巖下俯太湖湖水淜湃吞嚙山足風起則谷嘯水湧聲聞甚逺盤山而行二里許將至石壁下又有一峰隔之再轉而入其徑最狹過數武忽有平地周數畝上即石壁也石固遜銅井之靈妙而獨以雄峭作奇嶄嶻如削壁色正黃勢回抱當不減赤城矣中有精舍遊者至此必止息焉槎山鄧尉看梅名勝處玄墓稱絶餘則馬家山董墳朝元閣槎山磡上皆其選也然馬家山朝元閣皆有梅花而無太湖山不得水其勢不奇磡上固臨湖然一面取致曠而不深惟槎山則三面皆崇山峻嶺復自平田中突起一小山山之麓直入湖中登山瞰湖則逺水兼天一望無際而回顧三面凡巖壑壁塢籬落叢薄幽深窈窕曲折層疊無非梅也春日既麗花光照眼正如玉波雪浪洶湧靑巒碧巘間自與澄湖萬頃爭奇矣七十二峰閣顧文康公墓在潭山之麓七十二峰閣即丙舍也閣旁多長松巨石後有峭壁雄踞閣背山面湖一望而七十二峰之勝皆在目矣黛睂螺髻縹眇煙波間吾不能為形容也西灣西灣在玄墓之西太湖至此一曲故名西灣其地為鄧尉山中最僻處人迹罕到而多隱者依山為村山家野店無不朴古山多叢竹彌衍數里亦諸山所無也余喜其地之僻嘗遊息焉地在湖漘每中夜濤聲直薄於枕意即唐張潮所詠之西灣也隔湖即鳯凰山云磡上磡上亦名東灣以與西灣相對也多髙崖拔起湖中亦有平沙浮衍波面崖上下皆山家屋宇籬落井井行列屋後皆髙山循山皆梅花數里中無雜樹軒窗乍啓波光如射而蒹葭離披天水俱永直移我情矣玄墓名勝志云吳之山惟玄墓最僻亦最奇面湖險隩丹崖翠壁望之若屏又名鄧尉法華障其前銅坑青芝迤邐其左遊龍界其右岡連嶺屬詭狀殊態不可殫述余以為此固他山之所有也未足盡其勝也若以梅花為香國回環百里皆梅與山水相間此天下之山之所無也而尤奇者以漁洋為屏太湖為沼左右開障其整如列睂此種氣象茍非開法王座則何物足以當之勝國末萬峰和尚駐錫於此故玄墓亦名萬峰歷年三百昔之祗林覺路蕪沒於荒榛衰草中不可復問矣烈皇初三峰和尚重居祖席稍稍興復然十不得一也今剖和尚繼之而法席愈盛莊嚴締構二十餘年於是參差殿閣危樓傑觀遍滿山崖掩映於深林茂樹之間照耀金碧尤為勝槩考之書記問之故老不特盡復其舊實什伯當時云鄧尉畫册復還記余昔畫鄧尉十景册為剖翁大師壽寫景命意頗極筆墨之致自謂不讓古人見者亦皆驚歎絶倒舉以似師師展卷快賞手授其侍司命什襲藏之且語余曰當以永鎮山門也自是此册遂傳播人口凡有好事嗜奇者入山必請而觀之更有未曾遍歷山中名勝者反以此册為津梁幾於按圖索駿不啻少文臥遊自是此册益為好事者所重今方丈繼席以前人所傳益珍重藏弆有淮上某者家富收藏素精賞鑒入山問道因請此册欣賞遂攜去作米顚乞帖狡獪請以三十金為償今方丈及山中耆舊皆不願也時時渡江涉淮以索此册頻歲無間而某堅不肯還至某歲某捐館舊監寺僧復渡江涉淮以索之此册始得復還吳門然時值歲荒常住無以飽衲子而往還之費又不下數金無所出因復以此册質於吾友吳子吳子欣然如數應之喜相告語余遂於辛酉春夏之交復作一畫册以償吳子而購此册復歸之鄧尉常住焉昔李衛公好奇成癖遺命敕其子孫不得以平泉莊一樹一石與人此固逹人所笑然若子孫固守其前人之所傳則自當爾况法書名畫足為家世故實者又非樹石之比也吾故益重今方丈及山中耆舊之不欲得多金而必索此册然間關往復如此不易今既復還尤不宜輕以示人恐復為有力者負之而趨也雖然世出世間一也後賢固守其前人之貽而必欲取之而後快是東坡居士所云天下豈有無父之人哉一聞是而當息其取之之心矣故身與鬼所不能守者惟此足以守之也余畫册為丁酉歲時剖翁年六十今歲辛酉余年亦六十復歸此册焉亦奇矣因泚筆記之思樂亭記治平寺方丈之左有亭三楹昔我先君文靖公所築也寺故在石湖之濱踞楞伽山麓所謂茶磨嶼者創蕭梁時宋治平間重新之因以名寺豫章大數十圍石井亦數十圍皆千年物也昔時喬木自湖濱交蔭山門卓午無日色盛夏無暑每息其下惟蟬聲在樹濤聲入耳竟日不聞人聲稍迤而西則楞伽山頂浮圖矗雲際東則石梁雄跨如長虹臥波中面石湖波光際天煙景明滅而風帆漁艇蓼渚蘋洲掩映無極此最勝也方丈為吾家香火院先六世祖中丞公與懷上人遊即有詩題贈先君子每春秋祭掃輒過之愛其地幽勝留連不能去因築亭於此為避暑避客之地焉先君性恬退逺炎若凂通籍垂二十年而前後立朝不滿七載雖平時里居負公輔望奔走天下大吏數請事然先君皭然不染超然評論之外常置一舟名吳趨􅟊靑簾朱檻香茗圖書同載一二故人渡橫塘泛石湖而南居宿亭中客至里第輒謝之以為常歲必三四過至盛夏時或有客若騖者則先君子未嘗不在此亭也先君晚年知天下事不可為而殉國之志素定寺僧常言乙酉歲春夏間同一客至亭促坐移日臨行偃仰久之曰吾得再過此乎季夏果殉節嗚呼悲矣築亭為崇禎丁丑歲當時軒窗四啓古木幽花雜於砌間閲四十餘年傾圯摧朽幾不可撑支寺僧晟公捐資重葺今更完好然無復舊觀矣晟公來請余顏之吾聞之禮曰人子之於親也思其所嗜思其所樂極情之所至雖一嚬一笑一飲一食猶不敢忘况平生寄託去來棲止流風遺澤之所在乎敬名之曰思樂亭亦以識余小子之不敢忘吾先君逺炎若凂之心也昔蘇子美築室於郡城之南園名滄浪亭閲數百年幾更變遷既為僧寮然後人常於荒煙蔓草中尋其故址復亭以名之昔賢常云士之欲垂名於千載之後不與其澌然而同盡者則有在矣子美文人其遺於世猶如此况大節與日月爭光者乎則庸知千百世之下治平遺迹不獨賴此亭以永耶嗚呼千百世瞻仰在兹又獨吾子子孫孫無忘文靖之澤也耶居易堂集卷之八終
