front:
  text: 居易堂集卷之十六
  hash: sha256:882ee4340fa7fadfc8e9cb9b744bb9805c870c69182ed8349a3098096c034d52
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_016-1a}
body:
  text: 賦主藥神賦并序十主藥神本見華嚴有吉祥旃檀林清淨光明名稱普聞蔽日光􅓚等名昭陽單閼之歲暮商無射之月見龍眠墨蹟有主藥神圖爰倣而像之並作賦以系之其辭曰兩儀既判三辰始明四序去來五德煙煴寰區永奠水土攸平陽和布而東作清商屆而西成于是羣動誕殖萬彚萌生紛總總其林立蠢蠕蠕而含靈人立三才之統伊維萬物之尊立綱陳紀條貫枝分教養浹于九垓仁壽瀰于八紘然而有治有亂者理數使然也有成有毁者物性必遷也亂與毁者伊之病也成與治者幾之安也不安其安而不病其病者藥之權也天地之病隕星蝕日吹霾雨血澥飛墬沈山崩川竭是以聖王為良醫修實德為上藥邦國之病四維不張五經掃地學較荒蕪倉廩空虛是以聖佐為良醫施王政為上藥維人之病先感腠理尋入腎腸既潰僨其筋髓遂沈痼於膏肓六賊訌奰二豎潛藏五藏癥結四體蹶張陰紐陽絡之既解三陽五會之不當詩書足以悅性而不能禦水火之偏勝菽粟足以資生而不能剪蟊賊之無良苟無百草之滋五石之齊去聲即今劑字是即盧醫處其禁方俞跗察于明堂而曾不能救一病亦猶將士素習于兵而不操寸鐵其何以尅敵而受降也哉天愍羣生為産庶藥以療多病易猶納鑰上下天地橫絶八極東抵蓬萊南越炎海西過流沙北極窮髮莫不近取諸人逺取諸物其草則返魂懷夢却睡忘憂吉雲良曜平露迎飂音留金光食而天老玉紅醉而神遊又有鹿葱鹿韭龍御龍芻豨首烏扇鳳葵蠡薺昌羊引年牽牛止痡參結根而為人厥名神衛芝掘地而如掌其實仙腴又有長卿蕳子杜若管仲因劉寄以得名思李姬而入夢庭生堯韭于以駐顔海餘禹糧無勞播種其木則圜丘長生之樹瀛海不饑之木或多影而萬年或無影而九欘音竹辟惡帶夫女香禦凶稱夫帝座槐榆與橘柚為弟兄龍目與荔支為臣僕通重譯而采華實四照而迷榖若乃松肪為飯柏實延年靑囊蠲忿縹李成仙桂為百藥之長杏惟五榖之先巨桃華實萬歲大椿春秋八千攝攝佩而通神措措服而華顔若是者靡靡離離遝遝鱗鱗若太倉之粟積音漬如巨渤之波興莫不揚翠葉扤紫莖發紅花秀朱榮緗葩縹蒂綺蘂絲英或含膏而垂露或綴實而繁星或蟠枝而偃蓋或懸囊以明燈或夭蟜枝格偃蹇連蜷若虬攫而龍升龍涎雞舌金顔艾納辟諸邪通百靈酷烈淑郁雜遝紛紜至於金石之倫蟲魚之族取之有方用之不瀆于是荆州之貢三品麗水之産五金鏐鈑銑鐐鍮鉐鏈鑌麟趾馬蹄寧獨紀瑞龍圜龜撱音妥于以完形續骨赤仄袪邪紫珍餌藍田之玉屑餐丹水之玉膏璠璵瑾瑜瓊璘璇瑤既澤理而滅瘢亦禦氣而逍遙服玄真而命無極食紫英而精不搖又有噀血之砂凝霜之乳和白鳳之膏搗靑麟之髓鯈音條雞身而鵲鳴鯥音六牛首而蛇尾同朏朏以解憂似鰼鰼之禦火鹿蜀與虎鼻宜男天嬰偕倉庚療妬鞠通含墨而愈聾脉望降星而度世鵙鵙已瘧灌灌止眯采及丙丁之魚食同已亥之豕更有荈茗益壽醴醪導和丹丘之葉青田之壺千日安眠六碗通靈惟仙蔎而神酴音徒是固極山海之所滋合天地以為羅浩汗散漫錯㹅紛紜玄幽奧賾瑰怪華腴無以統之溲渤不殊爰有明神是經是營之綱之紀判時令劃疆㝢宜燥濕別溫涼審疑似辨甘苦松入土而成苓橘過江而為枳蛇粟引蔓實非靡蕪烏喙經年名曰附子當歸移寸而易性小草垂根而逺志或同用而異宜或一名而數指或畏爍而樂濡或避金而就土既纍􅎟而分銖亦合彼而違此莫不辨晰豪釐精詳名理維神之靈實聖且神星精在天嶽降同塵或度世而現身則藥王藥上或應時而濟物則醫緩醫和壺公懸壺而市涪翁竝音傍涪以居桑傳鵲飲華綴蛇車杏成林而知董橘覆井而為蘇徐登禁架削桑成脯公阿越方枯樹生荑若乃相隱華陽令求勾漏書著等身方懸肘後東臯北渚花藥扶疏金匱玉函緘題輻輳之才彈鋏而識人瘤秋夫針芻而瘥鬼候至如黃龍浴水玄鹿仙芫華消其蟯瘕髮氣變其蛇癥馬嗣明之鍊石卵薊子訓之摩銅人女子知名口無二價龍神乞命方出千金若乃騎龍杖而歸來負鹿囊而行逺診知隔幕之顔精別垂帷之腕鄧先生棲五嶽之樓陶隱居築三層之館所謂吉祥光明名稱暜聞亦主日幢亦主檀林者非歟伊千古之名賢實十神之化身也邃古以來俯仰萬􅥴藥以神為主病與藥相比音避既疹疢之潛消亦人物之共劑投之輒應用之最精降及斯世貿亂神形人既冥頑藥亦不靈若陸海之不可以舟濟若石田之不可以耜藝如入狂泉之國而偕狂如飲盜泉之水而胥盜丹砂不能正其魄琥珀不能明其心汶汶墨墨嗤嗤攘攘音村入庚韻淪胥以鋪哀此下民亂曰舉世大病兮病于人心人心不可返兮吾憂世之陸沉變亂是非兮枉直糾紛讒人髙張兮賢士無名潝潝訿訿兮嘊嘊狺狺伯夷為貪兮盜跖廉叶鄰魯男為亂兮登徒貞莫知紀極兮日月重昏吾哀告于神師兮願將大藥而錫兹使含生之遍嘗兮亦舉世而療之俾人心之返正兮回末流以攻治平聲斬崑崙以為砭石兮爇鄧林以為艾炙摧銅山以為鑱針兮挽銀河以為湯液人心之如墨兮浣黑而為白人心之如鈎兮砭曲而為直使中行不外啓其戎敵兮長樂不內背其君恩豺聲之不刃其親兮牛哀之不食其兄音馨八庚韻蘭不讒屈之身兮跖不盜惠之名彼乃于焉不瘖兮惟永可以不盲劉乃任永二人名神善吾請爰叩帝廷帝曰俞哉往勝乃任神受命兮降寰瀛驅海嶽兮鞭風霆割雲桹兮杵星精和金膏兮粉玉英于是貪泉變為上池兮狂瀾變為德水邪蒿變為瑞軼兮腥蕕變為香蘂蒲爼聿成益聰兮蘘荷化而益智兔絲胥成瑤草兮松脂結為威喜神醫洗髓兮神藥換心既旋乾而轉坤兮亦過化而存神梟焉反哺鴆亦延齡妬女之蟒味伊蒲而革性懶婦之魚照紡績而仍明鑿齒雕題懷般般之義訓狐鴻豹擾足足之仁於是爝火熄日月出紫色泯丹華植一人興四海謐維神之烈不再造于斯世乎於是為歌以頌于神曰世平平音便平聲兮壽延綿兮藥之功兮神之貺兮神之貺兮億萬年兮鷓鴣賦并序鷓鴣南方之鳥也飛必南翔集必南首其鳴曰但南不北故亦名懷南余聞而悲之君子曰可以人而不如鳥乎爰作鷓鴣賦其辭曰攬乾坤之維絡覩天地之氤氲南為向明之位北為宅幽之扄南扇華風於赤縣北窮荒裔于玄冥維南為陽維北為隂所以司天有南正之官吹風有南吕之律易著南離之卦詩稱南陔之什舜唱歌于南薰文作樂于南籥叶棫向之則卉服而躋中華背之則伊川而為戎翟此固天經之自然亦物性之不革南方有鳥名曰鷓鴣育質朱垠誕靈炎隅日氣赤烏之瑞星精斗牛之墟純羽類于玄豹異質等于天雞心同向日之葵翼比好風之箕軒翥而背北風戢翼而巢南枝名曰懷南亦稱越雉畏負霜而鶉衣循建月而鵲起聲似轆而鈎輈身非車而南指既辟瘴而習隱亦享尊而神取本草天神取鷓鴣每月一隻以饗至尊繄隨陽之介鳥實南紀之珍禽賦離方之稡質稟火德之炎精違窮髮之玄漠向赫曦之朱明雖託類于羽族固殊志而異心乃者八紘絶維九陔折柱天地橫流江河鼎沸鄧林之杞梓俱焚崑山之玉石盡碎水絶安瀾之魚山鮮伏穴之獸叶元嘉歸燕并無林木之巢咸安異烏豈有殿楹之跱蛇虺出于洞穴豺虎交於衢路于時橘既變枳荃亦為茆軼不指佞松不後凋鵷雛嚇于腐鼠海鷂避其潛蛟海雞能食蛟蛇不鵲不烏非鶩非鳬又惡知鴻鵠之不為燕雀而孔鸞之不為鴟梟惟兹神取叶湊上聲矢心無負稅衡浦之蘭林憩湘潭之蕙畝亶余性之不移凜余心之可剖隼名一宿雉不再偶斯一節之可稱亦聲施于厥後豈如同鳳舉之千尋覽德輝於九有飛必南翔集必南首翔乎禮樂之林集乎冠裳之藪容與徘徊威遲翕習朱鳥踞正南之位大鵬奮圖南之翼眇乎纎羽兼兹二德雖爰居避風而不長乎炎裔雖鴻鴈隨陽而有時乎北適疇焉介節比其貞心矢一心之不渝雖千古其長新既九死而無悔亦百折而不傾江河之瀾既狂而不能沈淫于弱羽天帝之醉未醒而不能迷惑于微禽豈燕尾之翦漢胡鶉首之屬秦若夫執圭越吟泠人楚音一絫欷而激響一撫操而流聲舊鄉悲于疾首故國愴其傷心至如木門節士廬居處子逃隱鄰封淚枯墓樹坐不望乎淇園身不向乎典午若乃羈臣絶國逺嫁異域痛皓首而未歸去紫臺而無極鴈書一繫愁雲蕭條鵾絃再彈悲聲咽􅊱于是望南天而碎心遡南風而泣血伊千古之徽烈實一心之所成維我心之匪石同百鍊之精金曠有美而必合乃標德于斯禽慨余身之安棲縱一羽之所逝總六合而遐觀窮八荒以橫睇四澨既傾雙丸亦墜悲臺造天恨水帶地氣與臺而巃嵸心同水而濞沸恨六龍之無還悲五馬之空渡風蕭蕭而長鳴雲慘慘而將暮腸一日而九回魂一夕而九逝騁我目兮窮荒渺余懷兮南裔于是探禹穴于會稽弔重華于蒼梧帝子去兮不返神女降兮焉如翔千仞兮萬里溯三湘兮九疑乃使精衛填海子規望帝揮魯陽之戈回羲和之馭麗杲杲于中天去漫漫之長夜于時而暢但南之芳聲畢懷南之洪緒是雖隴坻慧鳥能思上皇秦繚貞禽不入異域方兹鷓鴣焉能為匹遂為文以賦之因臨風而嘆息眷天末而長懷又誰能傅我以羽翼張公賦并序謝康樂作山居賦并自注以言其事此賦雖不敢妄擬古人然亦當自注之鍊辭鍊意使事使辭一得之愚不欲自泯也默全先生姓張氏名舜臣吳郡吳人也世以醫名先生遂名天下生平著孝友大節重然諾好人倫確然有古人之風焉乙巳歲夏先生年六十矣先生洗腆致酒以奉髙堂之歡入山以語余曰君何以壽我余笑曰吾將與子以不朽矣六月之詩曰張仲孝友孔北海曰公者仁德之正號不必三事大夫也余重先生之孝友足以敦薄俗而還醇風爰表其世系疏其爵里作張公賦以贈之其辭曰帝青陽之苗裔張氏出自姬姓黃帝子少昊青陽氏應列宿于天厨二十八宿張為天厨主觴客占微垣之象緯標族望于清河流同源而漫衍枝共本而扶踈系本出于皇姬厥初祖于弓正青陽氏第五子揮為弓正始制弓矢子孫賜姓張氏以世功而為族實當官而受姓既上粲于星精亦下同于河潤謂族望清河也家世則杜陵茂陵漢張安世杜陵人張敞茂陵人維桑則方城武城漢張皓子避地居方城因世家焉晉張華梁張弘榮唐張知謇俱范陽方城人陳張譏張正見後魏張彛張讜隋張奫俱南陽武城人下邽上谷唐張仁願華州下邽人後魏張衮上谷沮陽人北齊張曜上谷昌平人山陽濟陰漢張儉山陽髙平人張馴濟陰定陶人臥龍束鹿晉張軌據涼築臥龍城居之唐張興束鹿人鳳州鴈門宋張珏隴西鳳州人後魏張黎鴈門平原人官閥則長壽廣武隋張威封長壽縣公晉張華初封廣武縣侯孝昌安樂江左宋張永封孝昌縣侯晉涼張軌初封安樂鄉侯定逺定襄唐張公謹封定逺郡公南齊張冲封定襄侯平臯平陸後魏張恂封平臯子張彛張讜俱封平陸侯或稱計相張蒼事漢髙帝以列侯主計稱計相或號恩侯漢宣帝以皇曾孫遘巫蠱之禍掖廷令張賀教養翊衛之帝即位追思賀恩欲封其塜為恩德侯五王居首唐張東之與崔玄暐敬暉桓彥􅚘袁恕巳同倡義遷武氏誅二張反正中宗皆以功封王時稱五王柬之為漢陽郡王實首功焉萬户封留漢髙自擇齊三萬户封張良良辭三萬户自請封留後日封萬户位列侯平推廷尉漢張釋之為廷尉曰廷尉天下之平也功都岸頭漢張次公以功封岸頭侯於是鼎盛河西晉五湖之亂張氏遂霸河西國華江左張為江左望族史臣曰有晉自宅淮海張氏無乏賢良及宋齊之間雅道彌盛直與六朝相終始云忠孝著于周韓周宣王時張仲為卿士詩曰張仲孝友張良以五世相韓為韓報仇擊秦始王詩書傳于鄒魯自漢至宋張氏窮經為儒宗者代有其人礪常山而作屏張耳封常山王帶曲江而分土始興張氏後因官居于韶州曲江唐張九齡其後也時稱九齡為張曲江傳經而為帝師漢安昌侯張禹授易論語為帝師作賦而稱王佐阮籍見張華鷦鷯賦而歎曰此王佐才也蟬聯西鄂之郊漢張衡晉張輔後魏張耀北齊張保洛俱南陽西鄂人鵲起東門之府漢張湛居中東門侯舍時號為中東門君門多賜棨唐張知謇兄弟同貴門皆列棨㦸里號鳴珂唐張嘉貞為相弟嘉祐為金吾將軍一時鼎盛時號所居坊為鳴珂里垂玉海之文苑南齊張融文集數十卷自名為玉海起金城之霸圖前涼張氏霸河西居金城焉赤松辟榖張良辟榖願從赤松子遊黃石傳書張良受書圯上老人為黃石公既五世而相韓亦九侯而佐漢漢張安世始封為富平侯後延壽勃臨放純奮甫吉凡九世嗣爵為侯者垂二百年録尚書于禁中後漢張禹為太傅録尚書事居禁中釋文言于講殿梁武帝于文德殿釋乾坤文言張譏咨審循環詞令溫雅帝甚異之賜之裙襦云表卿稽古之功赤龍駒之賦文梁武帝時河南國獻赤龍駒能拜伏善舞帝令張率為賦白馬生之强諫張湛常乘白馬見光武臨朝有惰容輒諫後帝每見湛輒言白馬生且復諌矣規鳳扆而作針宋張知白獻鳳扆針壁龍圖而濡翰宋張去華竹元元論真宗命寫其論于龍圖閣之四壁渾天七政璇機漢張衡盡璇機之正作渾天之儀報國千秋金鑑張九齡于玄宗千秋節上事鑒十章號千秋金鑑特贊與三公絶席後漢張禹長者與萬石同傳張叔名歐若乃家雄河內漢張玄魏張範後魏張蒲北齊張子信俱河內人洲接沔濱江左宋張興世居臨沔水當其門前忽生一洲及興世為方伯而洲遂十餘頃西州名士張奐酒泉燉煌人為漢名臣子芝少少持高操名重一時文為儒宗武為將表魏張恭初為燉煌功曹後拜戊已校尉子就父子著稱西州後魏張湛亦酒泉燉煌人為河西著姓宗人張通博通經史有四子徹麟儉鳳皆傳家學知名于時南陽冠軍南齊張敬兒南陽冠軍人蓮勺初繇軹徙漢張禹本軹人徙蓮勻酒泉不隤家聲幽州則兄弟兩公唐張知謇幽州方城人封范陽郡公弟知泰封漁陽郡公猗氏則祖孫三相張嘉貞蒲州猗氏人相玄宗子延賞相德宗延賞子弘靖相憲宗祖孫連相三朝河間則扶杖殿中隋文帝素欽河間張羡德望朝見敕令勿拜扶杖升殿博望則乘槎天上漢武帝令博望侯張騫窮河源騫得織女支機石而還始知直逹明河也稽古則敕賜裙襦注見釋文言句從吾故聊使結襪以重之埋輪都下漢順帝時遣八使徇行風俗張綱獨埋其車輪于洛陽都亭曰豺狼當道安問狐狸遂彈劾大將軍梁冀書奏京師震竦顧雍致歎于冠羣吳張溫卓爍冠羣顧雍歎曰溫當今無輩徐陵讓位于僕射張種識量宏博時以為宰相之器僕射徐陵抗表讓位擅兩國而稱公宋張昭封舒國公鄭國公張耆封鄧國公徐國公張士遜封鄭國公鄧國公都九州而為伯叶霸唐張萬福食祿七十年凡蒞九州朝無西顧而衣繡晝行張既馮翊髙陵人魏武即用為雍州刺史曰還卿本州可謂衣繡晝行後既悉平河西羌胡文帝詔褒之曰使吾常無西顧之念爵分南陽而彈琴清暇唐張鎬封南陽郡公嗜酒鼓琴自娛京兆之走馬章臺張敞為京兆尹常走馬章臺以便面拊馬陽都之鬭雞翁舍漢宣帝追念張賀舊思封陽都哀侯為自處置其里居塜西鬪雞翁舍南上少時所嘗遊處也堂有千歲之號宋張士遜三入相神宗嘗飛白書千歲字賜之士遜因建千歲堂家有萬石之名唐宰相張文瓘有四子父子皆至三品時稱萬石張家載書則三十乘晉司空張華家多藏書嘗移居載書三十乘賜第則七百楹宋張耆年十一即給事真宗藩邸及帝即位賜第七百楹書充􅑿于祕府唐張嘉貞纍世富貴所聚書畫侔于祕府堂經始于靈鈞涼張茂築靈鈞臺比鄰籬落而驚語江左張鏡少與光祿大夫顔延之鄰居顔談義飲酒喧呼不絶而鏡靜默無言聲後鏡與客談延之從籬邊聞之取胡牀坐聽辭義清玄延之心服謂客曰彼有人焉繇是居平不復醋呌重譯梯航而購文唐張鷟文名重天下新羅日本使至必出金購鷟文吳會之五龍騰躍張茂度子演鏡永辨岱俱知名時謂之張氏五龍吳郡人中朝之一鷟飛鳴張鷟早慧兒時夢一紫大鳥五色成文止其庭大父曰吾聞五色赤文鳳也紫文鸑鷟也若壯殆以文章瑞朝廷乎因名之曰鷟據涼州而倚柱涼張氏時有謡云秦川中血沒腕惟有涼州倚柱觀稱江東之步兵晉張翰一歲連典四州江左張冲一歲之中授四州刺史三世竝降萬乘宋武帝幸張永宅梁武帝幸張稷宅三世竝降萬乘時人榮之湘東號百六之公梁元帝為湘東王䇿張綰百事綰對闕其六因號為百六公河南領十二之郡隋張須陀領河南道十二郡討捕黜陟大使盛稱蓋代貴本連天徐陵詩張星本在天河上繇來張姓本連天此誠上應星精之炳耀下同河潤之波瀾者也所以忠節則安太子于俄頃漢髙欲易太子張良定䇿招四皓出而太子得不廢翊曾孫於既危注見恩侯句代晉恭而飲鴆宋武篡晉以藥酒一罌付張禕令鴆晉恭帝褘受命而嘆曰鴆君而求生不如死也因自飲而死殉梁室之將頽梁張彪義不事陳陳文帝致之遂自殺睢陽齒同城碎睢陽破賊將尹子竒問張巡曰聞公督戰嚼齒皆碎何至是巡曰吾氣吞逆賊顧力屈耳子竒怒以刀抉其口齒存者三四耳太原柵與雲飛後唐張敬逹堅守太原以拒晉祖石敬瑭敬瑭為長圍連柵以攻之攻具將成輒有大風雨暴水而壤之不屈穹廬同蘇武之持節博望侯張騫使月氐徑胸奴中單于留之十餘歲騫持漢節不失堅嬰孤壘似臧洪之被圍南齊末張冲為舒州刺史堅守郢城梁武起兵手書喻意又遣辨士說之冲確然不回堅守至死時論比之臧洪之被圍也孝行則泣遺劒後漢張武生不識父常持父遺劒至亡處祭醊哭泣哀故扇江左張敷生而母亡數歲而知之便深感慕求母遺物而散施已盡惟得一扇乃緘録之每至感思輒開緘流涕奉經帕而流漣張譏幼喪母及有識求得母一錯綵經帕每歲時輒對帕哽咽聞箏聲而悽惋梁張稷兄瑋嘗彈華稷以母劉氏先善此伎每聞璋彈便悲感頓絶終身不復聽之州里謂之淳孝植墓之柳杖生枝宋張愈居母憂至孝植所持柳杖於室忽生枝葉入夢之金鎞刮眼後魏張元年十六祖喪明讀藥師經然燈析請以期復明七日夜夢一老翁以金鎞刮其祖目後三日祖目果明報讐之子頻聞梁張景仁手斬父讐首以祭父墓唐張琇年十一歲與兄瑝手殺父仇宋范陽張藏英手殺父仇燕薊間稱為報仇張孝子刲股之竒屢見宋張奎割股肉和藥以療母疾張掞幼篤孝父病刲股肉以療張伯威剔兩臂肉以療祖母疾白雀馴于階除紫芝産于庭院張九齡居母喪毁不勝哀有紫芝産座側白雀巢家樹治績則一穗兩岐之麥漢張堪為漁陽太守有異政民歌之曰桑無附枝麥穟兩岐張君為政樂不可支治行為第一異畝同穎之禾梁張纘為湘州刺史􅍹蠻向化益陽縣人作田皆異畝同頴人異之武陽之遺袍不拾唐張允濟為武陽令有異政行人夜發遺𫀆道中行十餘里乃寤人曰吾境未嘗拾遺因還取之如言而得欽賢之繪像為師宋張田知廣州作欽賢堂繪古昔刺史之清廉者之像于壁日夕師拜之蘇軾嘗比田于古之廉吏奠靑郊而祠社唐張文琮為建州刺史立祠社稷場于東郊禱白崖而遂雩宋張士遜為射洪令治績第一以旱禱雨白崖山雨遂霑足粟賑饑于上廩宋張傅知楚州歲饑便宜發上倉粟賑貸事訖奏所活萬計身捍水于浮堤宋張觀知相州河决浮梁武請避北原觀不從躬率卒徒築堤民遂無患兖州政化食虎六駮周隋時兖州境有虎害及張華原為刺史州東甑山忽有六駁食虎咸以為政化所至榖城清風植柳千株宋張唐英為榖城令舊縣圃歲賦薑種與民取息銓曹指為富縣唐英至一空其圃植千株柳于其中聞者歎美其清風儒術則尼山入夢爰生孔孫元張孔孫父夢謁孔子廟得賜佳果巳而孔孫生遂名之稚齒通經遂稱曾子後漢張霸七歲通經鄉人號為張曾子鄢陵為梁丘之宗後漢張興頴川鄢陵人習梁丘易為梁丘家宗弟子嘗萬人學舍實周官之比宋張璪請倣周官之法立齊舍八十二區學官之盛近代無比講易而坐虎皮宋儒張載談經而稱麈尾陳後主造玉柄麈尾新成親執之曰當今雖復多士如林至于堪執此者獨張譏耳即手賜譏弟子雲從萬人注見上門徒霧市五里後漢張楷字公超通春秋尚書門徒賓客父黨宿儒問業者車馬填街徒從無所止黃門貴戚為起廬舍于路次時稱公超之市楷又能作五里霧定麟經于一書張霸減定嚴氏春秋為二十萬言時名張氏學粲鴻寶于萬𥿄梁張纘著鴻寶一百卷延之歎曰彼有人焉注見比鄰句少文嘗言吾道東矣張敷與髙士宗少文談繫象少文時屈因歎曰吾道東矣文章則敷七命之金華晉張協作七命曰有晉之融皇風也金華啓徴詠四愁之玉案張衡作四愁詩云美人贈我錦繡段何以報之青玉案擬兩都而作京張衡擬班固兩都賦作二京賦續三征而染翰梁張纘為湘州刺史作南征賦蓋謂其繼班彪北征曹昭東征潘嶽西征而作此也𬈑渤超于玄虛張融作海賦顧愷之曰此賦實超玄虛謂勝木華海賦也鷦鷯稱于大阮注見王佐句南宫獻翠微之篇唐張昌齡冀州南宫人獻翠微宫頌曲江題白羽之扇玄宗以白羽扇賜張九齡九齡遂作白羽扇賦濛汜則司隸傳車晉張載作濛汜賦司隸校尉傅玄見而嗟賞以車迎之言談盡日蟲籒則天子同硯北齊張景仁善篆隸兒童時詣國學摹石經許子華曰張郎風骨必當通貴不但官爵顯逹必當與天子同筆硯傳衣履後如所言自倉頡以來八體取進一人而已原芝之一晷千言宋張孝祥讀書一過目不忘下筆頃刻數千言因芝生太廟獻文曰原芝草聖之墨池衣練後漢張芝字伯英尤精草書家之衣帛必書而後練臨池學書池水為之墨韋仲將謂之草聖袁粲美其遺音袁粲言于宋明帝曰臣觀張緒有正始遺音孔融寶其書篆魏張紘善楷篆書孔融得其書甚寶之至如應鴟苕之霸諺涼張軌時謠曰涼州鴟苕寇賊消鴟苕翩翩怖殺人立鵲尾之竒功宋明帝時南郡王義宣反相持久不决屯兵鵲尾張興世建䇿破之嘗一日而九捷宋張玘亦合轍而分鏦宋張威創法為撒星陳分合不常聞鼓則合聞金則散常以步制騎焉戎旃標淨天之鶻張威臨陳酣戰兩眼皆赤時號為張鶻眼威因立淨天鶻旗以自表雄圖兆奮翅之鴻涼張駿時謠曰鴻從南來雀不驚誰謂狐雛尾翅生髙舉六翮鳳凰鳴又有青城逸士宋張愈隱青城山白社遺民晉宋間張野張孝秀依逺公居廬山之東林結白蓮社既浮家于西塞唐張志和浮家泛宅往來苕霅間有西塞山漁歌亦遁跡于東林注見上春雨桃花之水張志和漁歌曰西塞山前白鷺飛桃花流水鱖魚肥青箁笠緑簑衣斜風細雨不須歸秋風蓴菜之羹張翰在洛秋風起思吳中菰米蓴菜羹鱸魚鱠煙波釣徒釣非垂餌張志和自稱煙波釣徒垂釣不設餌志不在魚也巖居教授教亦觀形晉張忠隱泰山餐芝餌石服氣修導其居依崇巖幽谷鑿地為窟室弟子相從者五日一朝其教以形不以言弟子受業觀形而退鮐背壯于丹藥唐張武遇異僧贈以丹藥十丸云每正旦服一丸可延十年之壽武年百餘歲常自稱七十輕健如故漁歌聽于玄真張志和自稱玄真子漁歌見上又有鐘清太極張永曉音律宋太極殿前鐘聲嘶孝武帝常以問永永云鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越鼎辨黃初五代唐張䇿少聰悟父同嘗浚井得古鼎銘曰魏黃初元年春二月匠吉干同以為竒䇿時年十三辨曰漢建安二十五年十月魏文帝受禪改元黃初是黃初元年無二月也銘何謬耶同大驚異之察斗宿之雙劍晉司空張華見寶劒之精上衝斗牛因令雷渙求之果獲龍泉太阿問女星于七車漢武帝祠甘泉至渭橋有女子浴于河乳長七尺上怪問之女曰帝後第七車知我所來時張寬在第七車對曰此天星也主祭祀齊戒不潔則女人星見伴鐵硯以麟管張華博物志成即于御前賜青鐵硯及麟角管鳴石鼓以桐魚吳臨平岸崩出一石鼓槌之無聲以問張華華曰取蜀中桐材刻為魚形扣之則鳴矣如其言果聲聞數里正六璽之始宋張昭博通經術著六璽所出上歷帝之圖後魏張彛又有占風鵲鬭北齊張子信善風角嘗與奚永洛對坐有鵲鳴庭樹而鬬墮焉子信曰向夕有風從西南來歷樹拂堂必有口舌之禍果如其言永洛以先知之遂免于難候地龍驚張衡以精銅鑄候風地動儀圓徑八尺蓋合隆起狀如酒樽藏機于中八龍承之凡有地震則隨其方面一龍之機發焉無不驗者曾有一龍發機而地不動京師學者咸怪其無徴數日驛至果地動如其方于是皆歎服其神妙史謂衡數術窮天地制作侔造化八百年而曆正隋張胄玄博學多通尤精術數定新曆改正前曆差一日顔慜楚上疏曰漢洛下閎改顓頊曆為太𥘉曆云後當差一日八百年有聖者定之其在今乎四百歲而玄興張衡好太玄謂崔瑗曰吾觀太玄方知子雲妙極道數漢家得天下二百歲之書也復二百歲殆將終乎漢四百歲玄其興矣釋張掖石龜之䜟魏明帝青龍中張掖出一石負圖有龜龍麟鳳之形詔告天下以為魏受命之寶張臻謂此當今之變異而將來之禎祥也後儒以晉興當之而歎臶之先識當臨松金馬之文晉張氏霸涼時臨松山石有金馬字磨滅粗可識而張字分明思玄遺乎塵壒張衡有思玄賦觀象粲乎星精後魏張深明臣候著觀象賦又有繪女酡顏唐張士政常畫一美女于壁酌滿杯酒飲之酒無遺滴畫女面赤半日許像僧求侣梁張僧繇嘗畫天竺二胡僧像侯景亂散拆為二一僧為唐右常侍陸堅所寶堅疾篤夢胡僧告云我有同侣離拆多年今在洛陽李家若求合之當以法力助君陸如言購得疾遂愈揉碧草而成蛾張士政嘗取草一掬再三揉之悉成燈蛾飛去飲赤堇而粲齒張果隱中條山世傳數百歲人玄宗曰吾開異人飲堇不死遂以堇汁飲之三進頽然曰非佳酒也乃寢頃之起引鏡視齒燋縮乃以鐵如意擊墮之更出藥傅其齗良久齒已生粲然駢潔帝益神之寫松分其菀枯唐張藻善畫松擅名當代能以手握雙管一為生枝一為枯枝畫龍興于雲雨張僧繇畫四龍于壁不點晴每云點之即飛去人以為誕妄固請點之須臾雷電破壁二龍乘雲上天而未點晴者仍在嘗賜號於通玄張果及五代張薦明俱賜號通玄先生乃易名于正素宋張舉代有名族家有名人無賢不備無德不臻璨乎若球琳琅玗之産縣平聲圃森乎如楩柟𣏌柳之生鄧林所以東吳之望髙顧陸朱張顧陸為吳中著姓陸機吳趨行云四姓實名家西京之貴侔許史漢宣帝時勳戚世貴為金張許史鈎黨與李杜齊名張儉政績與龔黃竝齒漢京兆尹之有名績者四人長安為之語曰前有趙張後有龔黃張即敞也窮經而馬鄭不如宋張昭十歲能讀古文未冠遍讀九經盡通其義以為馬鄭不已若也命世而管蕭為侣張文瓘字稚圭英公李績常歎之曰稚圭令之管蕭氣矜乃荆軻聶政之儔金張潛幼有志操慕荆軻聶政為人名德乃仲弓叔度之比王儉謂張緒過江所未有北士或可求之耳不知陳仲弓黃叔度能過之否才名則二陸同芳晉張載反弟協亢俱有文章名時論以三張與二陸竝稱孝友則三姜齊軌梁張弘䇿性至孝兄弟友愛不忍暫離雖各有室常同臥起世比之三姜清言則樂廣不能擅其前張緒其叔鏡比之于樂廣髙蹈則嚴光不能專其美李德裕嘗稱張志和為嚴光之倫此誠極九州之盛族為千古之髙門也淑氣所鍾復誕張公不以遇顯惟繇德豐敦百行之首為五常之宗奉慈幃于華髮實和氣而婉容閒居有潘輿之樂潘嶽間居賦奉太夫人板輿色養有萊綵之風老萊于事親至孝已垂白常著綵衣戲舞以娛親浣裙牏而無假萬石君為親浣濯中羣厠牏扇莞蒻而必躬莞蒻席也謂其溫衾扇枕此總言其孝也棣蕚同輝荆株竝茂此言其兄弟同㸑也田氏兄弟三人素友愛後將柝居庭中荆樹忽枯兄弟感之遂不復析荆復茂盛陸機詩曰三荆歡同株循南陔而采蘭采蘭孝子相誡以養也娛北堂而舞袖注見上氷無臥而魚游用王祥事林無悲而鳥聚叶驟峘山有鳥生四子羽翼既成將分四海其母悲鳴陸機詩曰四鳥悲異林此亦言其友愛兄弟不分㸑也六十年而孺慕恭子職以無虧八千歲而為春願吾親以同壽莊子大椿孝子以嘗藥為職仁人以醫國為心飲池三十日見垣一方人扁鵲事斧納心以寶笈金張元素學醫夜夢有人用大斧長鑿開心竅納書數卷于中自是洞徹其術名聲重天下􅕧傳鵲之鏡經江左宋徐文伯精于醫曾祖熙隱秦望山有道士過乞飲留一瓠􅕧與之曰君子孫宜以此術救世開視之乃扁鵲鏡經也于是泉甘藂橘蘇耽善療人疾種橘于井藥授長桑扁鵲師長桑君五色診病見倉公傳千金為方唐真人孫思邈著于金方懸肘後之金匱晉葛洪為肘後方書藏之金匱入壺中之玉堂費長房遇壺公入壺中見其中玉堂嚴麗解三縛以湯液北周金州刺史伊婁穆有疾云自腰至臍常有三縛求姚僧垣療之僧垣即為處湯三劑穆初服一劑而上縛解次服而中縛解三服而三劑悉除驅二豎于膏肓醫和事杏林若長生之樹董奉為人療病病除令種一杏樹遂成林焉筠管同返魂之香漢封君逹常乘青牛為人療病號青牛師有病死者以腰間竹管中藥與服皆立起服青䴴而輕體華他授人以服青䴴法􅃮葉屑一斗青䴴十四兩久服去三蟲利五藏輕體頭不白煉黃石而為霜北齊馬嗣明煉石法以粗黃色石如鵝鴨卯者猛火燒令赤納醇醋中石落成屑頻燒至盡療背毒立愈剖蛤精之如榆北齊徐之才精于醫人有患腳根腫痛諸醫莫識之才曰此蛤精疾也繇乘船入海垂腳水中病者曰實然之才為剖得蛤子二大如榆莢銷魚鱗之若鏡唐時有一少年眼中嘗見一小鏡子求醫趙卿診之卿與少年期來晨以魚鱠奉候少年如期赴之施臺盤止設一甌芥醋更無他味卿亦不出少年饑甚且聞醋香未免輕啜之逡巡至盡覺胸中豁然眼花不見趙卿方出少年以啜醋慙謝卿曰郎君先因吃鱠太多醬醋不快又有魚鱗在胸中所以眼花適來所備芥醋正欲郎君因饑啜之便愈此疾烹鮮之會乃權詐也求白獺而滅痕吳太子孫和舞如意誤傷鄧夫人頰血流太醫令求白獺髓雜玉反虎珀屑以滅其瘢乘靑牛而療病注見上換一心于鬼腹陳塞者為人治疾善禁呪有逆旅子者病狂人莫能療乃往請陳陳見之曰此疾入心矣乃以法出逆旅子之心取道旁一新死驛吏之心易之逆旅子遂蘇而病愈起三痼以尸枕江左宋徐嗣伯精于醫有嫗人患滯泠積年不差嗣伯為診之曰此尸注也當取死人枕煮服之如其言即差後秣陵人張景腹脹而黃衆醫不能療嗣伯曰此石蛔耳極難療當人死枕煮服之如其言大利去蛔蟲五升頭堅如石病即已後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可煮死人枕服之仍埋枕于故處如其言又愈王晏問之曰三病不同而皆用死人枕而皆愈何也嗣伯曰尸注者鬼氣伏而未起故令人沈殢得死人枕投之魂氣飛越不得復附體故尸注可差石蛔者久蛔也醫療既僻蛔蟲轉堅世間藥不能遣以鬼物驅之然後可散故令服死人枕也夫邪氣入肝故使眼痛而見魍魎應須邪物以釣之故亦用死人枕氣因枕去故令埋于塜間也晏深歎服其神妙辟故妃於靈臺隋秦王俊有疾文帝召醫許智藏治之俊夜夢其亡妃崔氏泣曰本來相迎若許智藏來必見相苦奈何明夜俊又夢曰妾得計矣當入靈府中以避之及智藏至為俊診脉曰病已入心不可救也如言而薨帝異之袪美女於翳影北齊武成帝病恍忽常見空中有五色物稍近變成一美婦人徐之才診之曰此色欲太虛所致處方服一劑遂覺稍逺再服還變成五色物三四服而竟愈芫花起其將頽臨菑汜里女子薄吾病衆醫皆以為當死不治倉公以芫花一撮療之出蟯數升而愈蓮子蘇于既殞唐金吾騎曹革得和扁之術有御史崔某者將買一青衣名蓮子令革診之曰二十年無疾人也既而暴死將出葬之革知之奔告曰此尸厥非死也亟破棺出之於是刺其心及臍下各數處鑿去一齒入藥一刀圭於口中衣以單衣臥空牀上以素練縳其手足溫微火干牀下曰此少衰則蓮子生矣已而果然既徙癰而著樹江左薛伯宗善徒癰疽公孫泰患背伯宗為氣封之徙置齊前柳樹上明旦癰消樹上便起一瘤二十餘日瘤大膿出樹即枯萎亦療鬼而針芻江左宋徐秋夫為射陽令嘗有鬼呻吟聲甚悽苦秋夫問何所須鬼曰吾患腰痛聞君善術願見救濟秋夫為縳芻作人形按孔穴為針之明日見一人來謝恩云疾巳除忽然不見當代服其通靈蟯成癥而瀝髮宋明帝宫人患腰疼牽心發即絶徐文伯曰此髮癥也以油灌之吐物長三尺頭巳成蛇能動懸柱上水滴盡一髮而已病即愈蛇綴壁而懸車華他常行道上見有病咽塞者因語之曰向來道偶有賣餅人蓱虀甚酸可取三升飲之病自當去如他言立吐一蛇乃懸干軍造他謝焉及進顧北壁懸如此蛇以十數乃知其竒石博見中藏之結宋孝武路太后病衆醫不識文伯診之曰此石博小腸耳乃為水劑消石湯病即愈火齊去覆杯之痺漢陽虛侯病甚倉公診脉以為痺根在左脅下大如覆杯即以火齊粥飲之六日而愈陽絡與隂紐而若睹見扁鵲傳柔湯將剛劑而兼施見倉公傳練精易形湔腸浣腹上古俞跗及華他事蓱虀之飲三升注見上石槽之泉百斛有婦人長病經年世謂寒熱冬十一月華他令坐石槽中汲寒水灌之且云當滿百灌始七八寒戰欲死灌者懼欲止他令滿數至八十灌熱氣蒸出滿百灌復溫火療之病遂愈遊鈞天之廣樂趙簡三宿而有言望浹髓之沉疴齊侯五日而不復扁鵲事察明堂而為圖著禁方而成録又復精研二諦妙闡三乘此又言其精佛法也長慧苗以却病敷忍草而回春慧苗忍草出佛書皆喻性也現曇花以度世優曇鉢羅花每佛出世方開花倚貝葉而長生西域有貝多樹其葉可寫佛經丁香傳其禪悅昔有問佛法者古德答語云丁香湯柏子印其精心昔人問如何是祖師西來意答語曰庭前柏樹子六句皆借佛法說到醫藥也醫王有如來之號藥神主旃檀之林粲微笑于拈華濟羣生于飲露騁辨才之無雙入法門之不二布金為給孤長者給孤長者布黃金于地滿秪陀林遂為給孤園請佛說法散花乃毗耶居士維摩居士說法毗耶城中天女散花寶筏濟其迷津言其省悟道法也玉函開其樂土音杜江左明醫張仲景著醫書名玉函經此言其以醫證道也以一指而為禪昔天龍禪師人每問佛法輒豎一指因稱天龍一指彈以一杯而為渡昔有僧嘗以一杯自隨每臨河輒用杯度人稱柸渡和尚一指一杯此言其以醫度人也于是炳心燈于鷲嶺朗慧日于雞園鷲嶺雞園皆佛說法地覺路晨開于復旦昏衢夜曉于重玄百藥無非禪苑一乘即是恩田佛說以布施為福田養親為恩田此言其以證道事親也下二句同尊宿養親織屨睦州之室如來報母說法忉利之天乃知竺墳為教孝之書岐黃為養親之術還三代之淳風躋八荒于壽域斯人盡是羲皇舉世胥遊樂國于是析壽張而儋爵後魏張蒲北周張軌俱封壽張子旌孝張而名里江左張敷性至孝孝武帝詔旌之名其所居為孝張里覽揆則夏日生申年歲則堯時丙子張果自云吾生于堯丙子歲星見為南極老人世稱其西王阿母矣居易堂集卷之十六終
