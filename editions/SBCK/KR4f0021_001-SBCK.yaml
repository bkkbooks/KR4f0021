body:
  text: 答蘇松兵備王之晉書附來書待罪名􅀖託居仙圃敬仰先賢大節遙挹主人髙風儗直造墓廬一申瞻企自愧塵鞅碌碌遂致䇿之不前兹者投劾以去又復刺促遄歸晤對光儀竟成欠事矣惟是久託萬間之芘而未獻一芹慚悚盈襟無可自逭聊具戔戔少展寸忱非敢云賃廡之資也綂惟笑茹爲荷偶有鶴一􅃗欲將去不知肻相隨否如其不覊或當畱爲山池之玩也臨啟不盡瞻依孤哀子徐枋稽顙拜痛自先人束身殉節捐棄藐孤而藐孤不肖不能從死偷生苟活致毁體辱親誠爲兩閒之罪人抑亦名教之罪人矣病毁交摧生理已絶呻吟苫塊跧伏隴丘如是者半年於兹而卒未能一刻强起致人間世事一枕都廢昨者小伻自城至荒塋忽傳翰教存及藐孤而九死餘魂一絲僅繫未能拜貺完璧以歸知執事當不以世法苛垂死之人而罪其不恭也至一畆之宫荒榛可掬何足以駐使節哉伏枕支離口占奉報不知所云答長洲縣知縣田本沛書附來書恭惟老先生鴻飛􅄀㝠天際人也弟心切識荆而風塵面目自愧不堪登碩人門謹此修候興居以誌懿德之好昨面按臺盧大人對弟輩極道老先生之髙心切儀之老先生何吝一見定有爲台臺處之最當者也俗冗中不盡欲陳尚容匍匐晉謁孤哀子徐枋稽顙拜先人畢節止水捐棄藐孤而藐孤不􅀋不能相從九京偷生草土誠爲千古之罪人矣然自遭大故慙恨痛毁并集方寸致百病交攻沉疴莫起今雖視息尚存而生理已絶經年伏􅒘雞骨支苫身不勝衣口絶饘粥餘氣游魂百事盡廢所欠惟一死耳執事試思鮮民之生也如此而尚能扶之而起令入世法乎且㷀㷀倚廬昕夕繐帳之側形影相竝跬歩不踰古人事亾如存或有取爾也執事倘以禮教民當亦弗强之使出耳是用不能勉承台㫖扶掖摳趨設㪅有齒及藐孤者幷祈執事善爲我辭代陳病困俾得洞鑒藐孤垂死苦狀則執事之所造不淺矣伏枕口占倩筆布悃不知所云答吳縣知縣汪爚南書附來書台兄以髙華之哲發瓊英之門弟聞風相思實於徐子風繫聲情既復從牛鶴老得悉台臺素履意氣干雲風雅應世不減當年南州髙士未及握手殊云耿悒因念折十餘年前弟雞窓風雨惟尊翁先生琅篇是佩誼猶私淑安在今日不可以通家誼效懃懇也時奉功令爲諸上公車者勸駕知台臺痛情莪蓼無心應制但例當具呈本縣申詳藩司以便彚報儀部不則恐當事者不察㮣以引避相䋲未免觸忌有累明哲耳祈台兄速裁之專此以聞按臺盧大人景仰之切已託田寅翁專致不盡欲言孤哀子徐枋稽顙拜鮮民之生僅餘一息固不能以垂死之身望塵匍匐且先人畢節捐生藐孤義當相從止水㪅不敢以應死之身隨時俛仰用是墐戸荒廬屏跡丘墓不復知有人間世矣不謂執事以牛父母說項之私遂致推屋之誼翰教忽頒奬譽謬及不孝誠兩間罪人何以當此捧楮汗背無地自容矣另諭領悉佩此殊私惟增銘戢尋當補牘臺端種種綂希丙照口占率復伏枕主臣答陳給諫臥子先生書昨承面諭惓切復辱手教諄諄小子微末豈敢堅執鄙見惟是揆之於義反之於心有不能安者故不敢耳若安危得喪反非所斤斤也先公大節與日月爭光亦何藉小子之區區况今欲申大義於天下者亦當弗待忠節之後爲之區區也不肖之所以不欲以片􅁓􅃗字申逹實自謂所處有確然不可移易者自不可與諸先生同年而語也長者當知吾心耳若漳海所傳則尤非吾所安以小子微末何所表見於時而乃遽臻此此不過以先人之大節而及藐孤若不肖不自揆靦焉就之得無昔人所云又因以爲利者耶言至此血淚與汗泚同流矣幸憫鑒血誠勿爲再及則成我之恩又復何似乎不肖言盡於此矣率臆披陳悚息悚息致楊解元維斗先生書東來王君冐險而至耑訪臯里及吳趨而已既至吳趨家人辭以廬墓因復踉蹌到湖莊不肖在荒隴昨歸與相見渠致東道主人之命甚惓切所齎操者亦頗鄭重然不肖自有以謝之但王君急欲一豋龍門以畢此來公案而不肖不欲令其冐昧走見故堅畱之而先耑尺一以逹尊前此寔有湥意長者當不以爲謬幸有以命之答楊解元維斗先生書徑啓東來云云不肖已堅謝之直令其衣褐還璧不敢啓視也尊諭惓惓具仞至意苐不肖所以處此不過盡吾分之所當然寔恨不能從先人於止水恐貽先人羞豈可以苟存之視息而反􅌤焉復有所叨冐乎所以毅然辭之揆之於義盟之於心實有自信者昨辭謝之際抵掌而談即銜命之人亦聞鄙言而爲泣下似不以方命爲罪此種血誠當俟躬侍山齋始一披陳耳至於左右自未可同年而語也主臣主臣與胡其章給諫書名周􅕔乙酉之變破家剗􅀋故業俱􅈥所僅存者吳趨里第耳木主在廟遺像在堂雖藐孤已長往山林而㷀㷀未亾尚守喪于此不意貴同門呂公忽欲以爲傳舎檄役掃除闔家驚惶無所奔避行路之人猶爲傷惻嗟乎嗟乎何至於此先人靈輀雖歸荒隴而堂中繐帷儼然如在既無别業可以安頓遺累丙舎又止三楹不蔽風雨若以敝廬爲貴同門駐節之地是必撤先人之喪使未亾人露處而後可也昔鍾會百萬治第入見太傅衣􅃣猶終身不復進民生于三事之如一先人于貴同門禮先一飯自不致一旦有他人入室之心即使久爲廢宅人人得而有之在貴同門尚當有不經西州門之意况今老穉四十餘口於焉棲託者乎桺下之隴猶禁樵蘇文靖之宅不爲馬埓以今視昔豈遂雲泥在不肖仍不忍薄待貴同門故猶諄諄言之也台翁錫􅀋哀㷀久彰髙義知不待不孝辭之畢爲大聲疾呼而止之於垂至耳不然或即以不孝此札致貴同門惟貴同門裁之何如臨楮哀眩不知所云與欽遵一書名式李灌翁先生至誼有加休戚同體眞古人所無弟之所銘心次骨􅋦感無地者也若爲友貸粟云云則鄙意竊有所不欲特以父執尊行之命不敢不屈意勉領一次然夏初拜惠而至今胸中阨阨未安殊懷慚恧爾時即託鄭三山先生及家表伯張德仲先生婉辭灌翁詳致鄙意昨者復承白粲朱提之惠則豈鄭張兩先生尚未道逹區區乎抑或以弟言之不誠故未􅀩矜􅁢耶鄙性硜硜頗嚴取與今雖饑餓未變初心此定荷灌翁先生及吾先生㴱所鑒知者即夏初拜命時切叩先生問所自來謂若未得所安則當學孔顗以來米上水載去原札定在先生當可覆按也今所示惠諸君皆未通一刺未謀一面者弟又安能靦顏以食其粟耶未同而言昔賢所誡况未同而賂乎閔中叔不以口腹累故人若既非故舊而所累又不止猪肝一片則其所處斷可知矣來米四包暨銀五封完璧歸趙伏冀吾先生緩頰致還灌翁即以此札幷致去當懇慈炤也不宣答吳憲副源長先生書名嘉禎折附來書尊公浩然之氣千古長存大兄純孝髙遯林泉堅守先人之志士林莫不誦之但空山不可久居鄉村多盗剽掠之患其小者也近來匿影山阿者多不測之禍維斗臥子公旦彥林無辜􅃤戮大可畏也况妬賢之人此間不少不以忠節仰慕轉以立異萋菲毎聞其言不勝浩嘆倘有讒毁做成機穽誰能挽囘㴱爲大兄慮之今日之計速速進城與二哥同居兄弟相依和光混俗可以處亂可以避禍守身之道不得不然萬勿固執遺事後之悔恃在世交敢效狂直祈大兄俯聽望之望之尊公大事及時早襄世界紛紛􅇏火可慮并祈畱意焉跽接台諭披誦􅅆環感極涕零一字一泣老年伯愛之㴱故憂之切憂之切故誨之嚴心非木石能不怵明訓而􅈝焉自驚若冷水澆背蹶起而變計乎然枋之所以竄跡丘墟側身􅅵畆者非不知孤立之召禍同塵之取容乃一往不顧也葢亦籌之熟而處之審矣先君子捐身殉國枋固不􅀋不能相從九京然方寸之地猶耿耿未死即欲規方爲圓同乎流俗而揆之大義心有不可忍者一察之時宜勢有不可合者三即以論于禍福而理有不可以彼易此者二重荷藥言屢及敢不一一爲長者陳之乙酉陸沈之日先君子日謀死所顧呼枋而命之曰吾固不可以不死若即長爲農夫以沒世亦可無憾而枋竊不自量必欲從死不謂天實靳之致閏月十二之變枋以病垂死另居弗克從而前志弗申矣然猶冀無毁髪膚他日庶可見吾親於地下因變姓名匿跡蘆中瀕死數番流離四月意或可以徼倖萬一不謂㪅罹意外身嬰駭機當是時以全髪被戮早見先人未始非初心也而事與心左復受髠刑凡此者皆枋之求死而不得死亦自分必死而未死者也雖然其敢以志之屢挫身之茍延謂天之不欲我成也遂風靡波委廢棄先訓乎用是京京日夕一刻九􅅆然既無奇節偉行可以慰地下之靈所欲秪遵而無􅀒者亦不過長爲農夫之一語耳顧一旦改頭換面從俗浮沉枋縱不自惜奈辱先人何此心之所不忍者也性本忤俗未克三緘即㴱自悔艾而遇一時人聞一時事則當機輒發嚼齒穿齦不可復遏以轉喉觸諱之人而欲周旋於箝語防口之世一不可合也迂懶既甚䈥緩肉駑不可韋絃即在當日恪守庭訓經年杜門逹官貴人都不識面今若仍其故我則入城無異居山而來而不往疵釁㪅生即欲强事奔趨而木强面目猝不能改二不可合也世網日密新法愈苛而枋祖臘非王衣冠猶舊幸與樵牧爲伍略能自繇一入城市動皆桎梏而必罹不測三不可合也且也褊衷狹性既與世日乖則世人視之將同怪鳥跡之所至矰繳隨之然其竄㴱山之中網羅猶緩一與世近則羣起而逐弋人之慕須臾莫避故遯荒則禍遲而或可免入城則禍速而必無幸均一禍也何必去遲而就速乎是固不可以彼易此者也枋又聞之行莫醜於辱先禍莫大於名滅先君子身任綱常爲南朝一侍郎從容蹈節枋既不能學從親止水之江鎬獨不能學終身不西向之王裒乎倘偷飽苟温强顏喪志不特不克􅀒荷而且隤其家聲矣誅夷竄逐一時之禍也羞先人而爲世戮笑萬世之禍也擇禍莫若輕是又不可以彼易此者也凡此數端有其一且不可以入世况枋寔兼之乎苟不盡反其本來一以時人之性情爲性情而徒欲以入城免禍是猶惡沸而增其薪也枋之所以决意長往排衆非而守其所獨是㴱有見乎此耳不然以枋之不肖無足比數即屹立狂瀾未必爲士林增重即隨時頫仰亦未必爲吾黨貽羞㪅何所爲固持而確不可移乎實亦轆轤於胸一刻千轉審已觀時萬不能不出於此所謂籌之熟而處之審也今循此以往倘邀天之庇苟幸無事得老死先人墳墓之側固所至願即不然因此而觸時忌加之以不可知亦且甘心受之灑然無憾矣老年伯提命之勤視同子姓道義之愛恩逾骨肉故敢剖肝瀝膽直陳左右惟哀而察之至幸至幸與徐禎起書不肖弟與兄既屬世誼又忝總角之交兼之氣􅀋自􅀒不羞知已遘亂之後形跡雖疎神往自無間也數􅀩手書見存􅅄譽過當愧荷愧荷方期尺牘相聞逹其積愫不謂忽遘荒隴盜樹之變爲人子者土室自錮不能出爲螳臂之奮以死爲歸其爲不􅀋極矣昔李􅂶行喪廬墓手刃盜墓樹者千古以爲美談始以爲史䇿之過繇今觀之而後知其列于獨行孝友之傳爲無忝也慚痛之餘自謂世講通門必以枋之不􅀋而棄之絶之不謂吾兄以逈出千古之誼毅然爲之首倡聲罪致討義聲從此大振昨者豪猾俯首詎謂非子房一擊之力也耶不特此也將來先人四尺之封猶得蓬顆蔽冡亦孰非義聲之所貽耶感且不朽矣因思昔賢之門或以蹈時禁捍世網至有㪅名他師變易衣冠以自别非黨者此固人􅀋所不齒其最髙義者景毅自表爲黨不以漏籍而苟免然毅固李膺之門徒也而已千古矣其有生未及北面而乃於死後禍患之際毅然以門墻自任而不難攖時豪之鋒者不㪅加於古人一等哉不肖弟既感且痛中心服膺又可以書頌耶吾兄既有此逈出千古之誼不肖亦當破不入城之例一叩徐子之廬於分始安而病未能如何如何臨楮啣戢不知所云答房師姜弱蓀先生書名荃林自癸未秋伏謁函丈之後驟㪅大變死生契濶于今十年矣甲申冬曾一奉手敕門生枋隨具奏記愧未能少效涓埃方謂竭誠有日不意南中之變又復隨至天崩地坼不我後先國恤家􅁈萃於小子可勝痛哉乙酉閏夏先君子遂從容殉節畢命止水而枋志操懦劣不能從親以死毁體苟活有忝所生平居自念如卞壺之淸溪柵􅀽粲之石頭城俱父子蹈義日月爭光枋乎何獨愧古人乎故八九年來遁水逃山不入城府堅臥土室閉門􅁍掃交遊親串亦概謝絶其間屢遭意外幾㪅九死兵燹之後外侮疊來致先人五畆之宅既不能守汗萊之田十減其七麤布不完饘粥不給室人徧譴穉子恒饑人事寡諧生趣都盡此之爲悲悲可知矣然尚强延視息者先人大事未襄老師大恩未報在三之誼爲責甚重存此微軀庶幾報塞而吳山蠡水一見爲難道路荆榛音問莫致故徒懷西風以好音望天南而隕涕耳何意使命儼然貺臨乎陳几拜稽開函誦讀喜極而泣不自知其涕之無從也亟進使者恭問起居萬福聞此數年之中老師渉歷艱危備嘗險阻門生枋辱在一體方寸如灼既聞髙風峻節百折不囘無悶山林灌園自給此即西山之薇東陵之瓜無以過也枋又不勝服膺愧企踴躍瞻仰之至矣所竊自􅇺者十年守死不敢辱身以辱吾親以辱吾師兢兢日夕母踰尺寸枋曾柬一前輩云枋縱不能學從親止水之江鎬獨不能學終身不西向之王裒乎止此區區可以仰對老師知亦爲老師之所心許也辱諭向年拙刻此枋少作不堪覆瓿忽􅀩齒及慚恧欲死患難之後枋竊有志向學遺書萬軸密爾自娛欲於古今得失之林有所論述以無􅀒老師知人之明但未知此生能遂此微願否拙著一二種既以身隱焉文不敢付刻又乏傭書繕寫遂未及寄呈尊覽然就政自有日耳與武部李霜囘使君書名令晳十七年避世土室杜門守死饑寒垂絶甘而樂之而年來憂患坎坷艱難險阻無一日之寧今又爲弟姪官逋之累非死則辱不知稅駕竊思所以十七年長往不返者正不欲自辱其身以辱先人耳一旦以他人貽戚而交手蒲伏受事公庭其能堪乎遂决意棄家孑身遯跡漂泊湖外但此身雖出樊籠而一家八口盡在危地危急存亾此其時也兹託舎親王生先叩函丈不肖擬覓便風直造龍津卜隱苕霅之間埋名避世便當與吳門絶正如夏馥之入林慮變其姓名梁鴻之棲會稽自呼期耀愚雖不敏有志於斯未知執事能以伯通之廡假我否必絶逺城市可以棲託數椽足矣倘邀大惠遂其隱志則自執事一人而外不欲㪅使人間知此子之落誰處也不肖所望爲先人之王成者惟執事一人今將以苕霅爲桃源以執事爲王成何如何如與闔族書先人創立義田均潤同宗二十餘年於兹矣枋雖不肖仰遵先志守而勿失亦十七年如一日也十七年來食租則闔族成丁出納則歷年主者顆粒毫􅁵與枋無預但上以繼志爲心次以贍族爲念豈計一身之利害哉國變之後親友關切有逺識者逆知將來田必爲累勸枋早爲之所寔非一人而枋堅執以先人遺澤豈敢輕毁苟同宗食德而於枋無大害則支吾補苴以身當之而義澤藉以垂久苟閱幾十年遂可無廢此初心也詎意年來錢糧干係如許重大豪􅁵罣誤則身受戮辱家以破碎甚者辱及妻孥如某家某家可見矣彼自任輸納者且然今義田既爲公器又復任非其人緩急完欠略無主裁設有意外誰任其咎而均田在即則里役雜來庸調踐㪅誰尸其事展轉思之不寒而慄俱非世外隱居之人所宜以身爲嘗試者也若使有利則闔族均霑有害則獨歸之先人之孤避世之人此固理之所不出且亦闔族尊長所斷斷不忍以相貽者也九月中即致書任事之人及于木大兄託其轉商之闔族一則逐分剖田一則售田分價意謂即有成說而今事在至廹非可緩圖而田非迅貨售價之說自不能行惟有分田爲大公至正耳田分則即有賦役之煩亦自衆擎易舉且人自爲守則輸核必嚴錢糧出納斷無罣誤在闔族仍享義田應得之利而在枋則無户役非常之害寧不一舉兩得仁至義盡不待再計而决者哉闔族成丁給米者不止百人其田不便如此瓜分惟當分房合剖其單丁則附分本身親房之内各房就所分之田共爲料理昔八家同井尚守望相助出入相扶况今皆分形同氣之人哉此亦仁至義盡不待再計而决者也既分之後隨即收户豁去先人户名以免意外之慮則先人幸甚先人之孤幸甚不肖枋不勝激切之至耑候報音即便將田均配肥􅇤訂期闔族到山公同拈􅍐分析不肖枋不勝翹企之至主臣主臣與楊明遠書名炤兩年踪跡疏濶幾同參辰然每當形影一室寂寞蕭涼之時未嘗不念我楊子也前辱以大文見示意者亦以此子於此頗有所見而尚不我遺棄乎意甚感故爲縱論之夫作文貴有筋節筋節者段落也于文則爲段落于人則爲骨格夫人之骨有長者有短者有巨者有細者有橫者有竪者有圜者有銳者有合用者有獨用者有接續以爲用者體􅀋不同各適其欵然後貫之以筋脉而運之以氣血則爲人矣文猶是也其段落者骨格也其意與氣者筋脉也而詞藻則血肉也故段落既定而少意氣以貫之則脉不屬有段落意氣而少詞藻則色不榮今且置意氣詞藻不論先論段落苟逐事爲叙逐段衍説一事數語靡有重輕如人之髖髀而與指節同其長短頭顱而與􅏓掌同其瑣碎豈能成人哉子瞻云節節而爲之葉葉而纍之􅀞竹猶不可况於作文乎故文有疊聚法有鋪張法或一言而包舉數事或數語而該括生平此疊聚也或一事之微一日之近而連篇累牘以言之又重複言之又流連而嗟歎之此鋪張也惟能疊聚然後能鋪張能鋪張然後能疊聚二者固相須爲用也所謂疊聚者非率略也貴簡而明核而不窘所謂鋪張者非敷衍也貴關係貴精采動色而陳鑿鑿娓娓使讀者惟恐其文之竟也斯得之矣其一言包舉數語該括者猶指節也猶􅏓掌也其一日一事而連篇累牘者猶髖髀也猶頭顱也能大能小能長能短能大者小之能小者大之能長者短之能短者長之斯善作文者矣此所謂筋節也試看馬班諸篇無不然也夫段落得而後意氣行意氣行而後精采出三者亦相須爲用莫分先後無有主賓者也如逐事爲叙逐段衍説一事數語靡有重輕則段落不分而意不立意不立則氣不行氣不行而精采索然矣所謂精采者乃精神丰采也非詞藻之謂也詞藻止可以􅀧綴裝餙而不可以爲實用故史漢中多用詞藻語然皆在閒事瑣事借以爲一篇之助若其大綱領大關鍵處則必用淡用眞惟淡故有味惟眞故能動人若于所謂大綱領大關鍵處而亦以詞藻出之則去之逺矣生氣索然矣况所謂詞藻者又未必詞藻乎如史記屈原賈生荆軻貫髙李廣諸傳漢書李陵蘇武龔勝諸傳其于死生頓仆降囚憂辱忼激發處不過常語數四流連抑揚宛轉重複而哭者爲哭笑者爲笑矣夫文之爲人作傳紀猶􅀞之爲人傳神寫炤也冠裳衣履樹石器物非不朱紫雜陳粉黛竝用而至於􅀧睛則惟墨而已所謂冠裳衣履裝餙也所謂樹石器物􅀧綴也若􅀧睛則一身之生氣在焉此大綱領大關鍵也苟于文之綱領關鍵處而用詞藻是以朱紫粉黛爲人􅀧睛也其可乎吾㪅有一喻如名家之宴客珍極水陸不厭濃肥然所以合賓主之歡而節淸言之緒者則惟酒與茗而已珍極水陸者以悅口也以目食也故可用其裝餙􅀧綴也而酒與茗所謂綱領關鍵也故惟瀹之以水而不可以膩鼎腥甌薦也苟謂濃肥之悅口而以肉羮烹顧渚飣餖溷淸聖則人能不唾之而走乎夫人既有骨格而一身大肉俱在間處如手足則去肉什九至耳目之用則全無肉矣苟以大肉而積於手足耳目之處則骨雖存而能不臃腫痿痺矓瞶而翳塞哉故爲文段落既得之後猶當審詞藻之宜也夫人之無事者難爲文而人之事蹟多者亦難爲文故於無事者貴有識力而于事蹟多者貴有裁制何也夫人即無事然一生而豈無數事抉摘其微使有關係所謂能短者長之能小者大之也夫人即事蹟甚多然一生而豈能事事皆大綱領故必裁簡其要使有定論所謂能長者短之能大者小之也苟逐事爲叙逐段衍説則無事之人可數言而畢而事蹟多者乃盈策不止也有是理乎即如管子一匡九合尊周攘夷其事蹟不勝書矣而太史公傳之無多語陳孟公似一酒徒耳而班固傳之娓娓一千幾百言此可見矣雖然此不可以躐取也學至而得之矣弟固不能文然于作文之道頗有所窺見至紀傳之體尤識一二以于此中久也誠以馬班諸篇一尋繹之必以余言爲然恃愛妄言幸勿怪又今人爲人家乗中作傳無非掇掠行狀中語櫽括成文即天下所推之文章大家皆然未有自出一奇自成一文者也兄試揀世間名家之􅁙録或家譜閱之即知之矣弟今爲尊翁先生作傳則獨出手眼另開生面絶無一言一事與尊狀中相同者而又本來面目具在恕先在焉呼之或出也前於萬峰遇侯硯德硯德最精於史漢弟與之論史學云人而操筆爲人作傳不特其人之罏冶直是其人之造物硯德曰何謂也弟曰若爲其人之罏冶則其人不過任我之陶鑄今爲人作傳則其人直惟我之生成矣安得非造物耶硯德曰作傳爲其人之造物極妙語苐須具無上識力抉摘其人之生平去取重輕無毫􅁵􅁈枉爲得耳弟曰豈有造物而枉人者哉君獨不記栽者培之傾者覆之耶惟不枉所以稱造物也硯德再四稱善遂劇談至夜半而寢即如爲尊翁先生作傳若但推其詩􅀞而沒其一生眞意即云詩即李杜􅀞即董巨而枉甚矣何也其生平不在此也且亦易盡而無餘藴矣故弟於詩􅀞略之而抉摘其一二事以爲傳實以此一二事便可概生平也其文頗亦淋漓痛快無愧史漢家法或有嫌其偏重一二事而于尊翁生平交遊及所登臨之處不免太略者愚意殊不謂然若逐事爲叙隨時詮次是日記年譜矣所遊必及所交必載是輿地圖􅀧鬼簿矣豈得言史筆言作傳哉只如陳遵傳反覆千餘言止言其遊俠好飲酒而於其立功封侯皆略之楊王孫傳一篇止言裸葬一事而于其家累千金善黃老學皆略之何也惟此足以概之也觀此則足以知弟文矣雖然此惟史漢爲然若後世諸史則亦幾同或者之論矣爲尊公先生作傳畢甚快故不覺復及之與􅁑瑞五書幾年以來入山過從此晤最樂無風雨以之無疾困以嬲之無惡賓俗客之闌入無塵縁外累之嬰心一樂也板屋繩牀可以棲息閑窓名花可以坐對池亭巖壑懸之杖端怪石幽泉不勞屐齒一樂也穉筍正佳有同玉版新茶適口何須䨓莢而瓶中之粟未罄牀頭之酒可醉一樂也開懷任意知無不言而操心既危􅄀與道契時時得兄首􅈕若以爲可與入道者此又弟之所最樂者也吾兄徘徊仙掌峰下則有把酒邀明月之思又聞有于竺塢精舎􅉂坐七日之願及臨别則有再過相存之約三者俱不可􅀒十二日有􅀞集賓從頗多願吾兄於十三日來正當月色極佳時今年天氣少雨新夏寒燠適宜可坐巖石之側傾尊劇飲以醉爲期酒渇則汲澗泉瀹新茗啜之而山中老友有能吹洞簫彈鳴琴者倩其一弄與松風澗水互爲響答吾與兄則賡采芝之歌和幽蘭之操攬景會心遺脫生死當使千古而下仰我此遊豈特與竹林西園爭勝哉追逸嘯於蘇門飲霞觴於瑤池無以異矣六時之中兄須幾時􅉂坐弟則㪅不以談擾兄或吾自歸草廬及兄坐起而欲飲欲遊則又未嘗一刻不與兄連袂披襟也如是以爲遊不與獨居寓齋有間乎如是以邀兄而兄能無來乎嗟乎多生結習以朋友爲性命世亂以後如須逺人爲吾至友每一相過則孟公之投轄彥國之閉關無所不至酒盡粟罄典衣繼之直至醉而病病而不能興然後散去而輒復作數日惡今年齒日加憂患日㴱遇事日淡自以爲能忘於情而于吾􅁑子之聚散則猶不能不作惡也嗟乎人生一世間良朋亦何可多得此凡人皆然况又避世獨處之人耶嗟乎如須死矣逺人又不可復問而吾􅁑子復逺居下邑相去百里一歲中大都得兩過從耳每花月妍麗風雨淒其或一室獨坐或臨風極目悄焉傷心低徊泣下人或怪問而不能言也事往自問而亦不自知其所以悲也承平之時交滿天下一㪅喪亂僅四五人三數年間復漸汰去而止得如須逺人今日者茫茫天下知我者如葛子豈復有二哉而吾之所以惓惓望葛子之來來則惓惓不忍令葛子之去情與昔同而意則有進矣吾亦願吾葛子之大􅇺其心惠然再來而㪅有以進之也與潘生次耕書次耕足下自古文章名世立言不朽者多矣而驚才天縱橫絶古今當成童之時擅國士之譽而卒能有以自立其文辭不少槩見可指而數也於此見天之生才實難非所謂千里比肩百世接踵者乎次耕足下今年始十八耳而落筆千言汪洋自恣辭賦懸於日月才調驚於風雨騷人詞伯見而歛手此不特今人之所絶無即求之古人亦所僅有昔人謂文章風氣關乎世運如足下之挺生以幾成立不將大振風雅起衰扶敝足爲世道慶乎而僕則尚有惓惓之愚欲進之於足下也昨四月十二日得讀足下登華山詩問知足下年甚少便已驚絶心中時時有足下及兒子持足下還山吟韓蘄王墓碑歌來再讀之則益驚喜過當歎息絶倒而復不能不爲周詳憂念于足下也嗟乎天之生才實難而耗才甚易物之尤者忌必集之故富極貴溢災禍橫生况天之忌才倍甚於富貴乎賈誼年十八誦詩屬文名振洛陽終軍年十八上書天子發策漢廷陸雲年十六爲芍藥賦辭義竝美王勃年未冠射䇿髙第獻頌闕下之數子者莫不抱不世之才騖天縱之姿以遊於不朽之林則其所成就寧有量哉而夷攷其實率未有讐其才者獨賈誼辭賦之盛比于風騷治安之書聿稱王佐可謂裒然有成矣而乃以銳于制作紛㪅無序以致卒絀于時識者猶不能不致憾于誼之不能用孝文非孝文之不能用誼繇兹以談生才既難成才尤難而處才益㪅難也有奇才者必有奇阨得之太奢失之亦太劇盈虚消息物理固然所以古來賢才奇傑之士大都死生契濶顚沛流離家道坎坷身嬰沉痼其所遭遇必極人世之所不能堪有不可一朝居者然而或成或廢所立逈殊則所以處其才者異也故才一也善處之則日月爭光不善處之則草木同腐湮沒不傳可勝悼哉可勝悼哉夫桃李之花非不穠麗也蒲桺之生非不鬱怒也而風雨以零之霜雪以籍之而掃地盡矣無他彼固狥其華而未狥其實有其外而未有其内也若松柏之有心竹箭之有筠則不然矣所以賢才奇傑之士其所爲死生契濶顚沛流離家道坎坷身嬰沉痼者固天之所以阨之亦正天之所以成之也苐爲松柏竹箭則成爲桃李蒲桺則廢耳雖然其所以爲松柏竹箭者又豈異人任哉次耕足下僕固未㴱知足下然就一二所聞及往往見足下詩歌中所稱述則足下之遭遇亦良苦矣僕甚爲足下痛之而又爲足下幸也足下既抱不世出之奇才擅窮人益工之絶藝而天復以憂患坎坷玉汝于成則天之所以與足下者甚厚而足下其可輕用其才而輕視其所遭乎憂患以動其心窮愁以堅其骨而益靜其居處簡其出入嚴其師友收歛其才華􅂶拓其器識藏其鋒以需大試養其氣以期大成則異日所成就又豈古今一才人能盡足下哉足下才不患不奇名不患不聞而僕之所以惓惓不能已於足下者有其才而善成之成之而善處之也髙密侯鄧禹光佐中興功流天壤元宰通侯年二十四則其才亦甚奇矣然未嘗以年之太少才之太奇而嬰造物之忌來人世之尤富貴壽考以功名終無他其所以處才者善也昔阮籍見張華鷦鷯之賦而識爲王佐之才王適讀陳子昂感遇之詩而知其爲海内文宗以今觀昔去人不遠以足下之才何難詣此然藏之不固則發之不長試之屢罷則千里一蹶故僕所願於足下者旂常鐘鼎之勒銘淸廟明堂之雅頌成一代之制作爲詞林之盛事立言不朽與德功齊豈徒齷齪鉛槧月露風雲而已哉語云千金之弩不爲鼷鼠發機又云衝風之末曾不能飄鴻毛蓋謂大器之不可輕試而力殫者不可復振也是亦望足下之善處其才也舉世橫流知音者希次耕足下幸勉自􅋢徐枋頓首頓首與時次其書風雨至而不輟其音霜雪零而不渝其色此誠碩交古人所少所以古人亦每稱歎而致慕焉若次其先生之于不肖則誠有之矣不肖弟迂鄙無似落落寡諧遂爲異已所嫉不戕之不止撫事悼心時爲摧絶昔人謂歐陽永叔耳白過面名聞天下脣不􅀒齒時罹毁謗不肖弟不有其名而時有其毁此誠骨相所招又何尤耶然虞飜云死當以靑蠅爲弔客得天下一人知已而可無恨今不肖雖爲怨嫉者所不容而乃得次其先生爲知已則所得不較多多耶不肖弟誠幸甚矣天池一雲僅隔一嶺過從頗便今既復他之恐晤對將疎惟此爲紆鬱耳如何如何瑞五將同言夏致一過訪次老能同來㪅樂先此申謝餘面頌不宣答惠生而行書兩日賤恙稍減然耳聾如故竊思千古聞人如左丘之盲楊雄鄧艾之吃仲長子光之瘖習鑿齒之跛皆有之而未有以聾著者意造物者今將以僕厠其間耶笑笑杜少陵句耳從前月聾然要是文人寓言亦未許闌入此社也絶倒絶倒僕年十四五即泛濫於諸子百家自漢至宋説家者流無不熟覽然仍無暇於此每兩三年一翻閱耳亂後將二十年亦僅得三四寓目昨承假我展卷如對古人兩日已盡閱遍矣所謂百川學海者此謬書也乃庸妄人目不識丁者射利而爲之大都剽割陶南村輟耕録而妄爲之標題耳而又剽割其至下者吁可歎也兹藉手璧上其唐人小說餘卷千乞盡數假我願卒業焉僕當賴以起病不啻讀陳琳之檄也切望切望
