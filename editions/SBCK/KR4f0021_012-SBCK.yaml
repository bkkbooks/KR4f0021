body:
  text: 傳朱先生傳朱先生諱集璜字以發吳郡崑山人也曾祖希曾官江西南昌府寧州判官祖景昇官唐王府審理父家佐不仕先生其長子也朱氏自唐名仁􅁤者稱孝友先生居睢陽以名德重至宋直秘閣名子榮者避金兵以六歳兒附柁渡江來吳世爲崑山人弘治丙辰恭靖公諱希周以廷對大魁天下官太子太保南京吏部尚書稱一代名臣即寧州公之兄也自宋秘閣公發祥於吳世載名德簪纓累葉且五百年天下稱盛族無與爲比至先生而益大其世德益振其家聲焉先生尊甫館榖四方家貧甚母歸氏即太僕公有光之姪出於名家積習詩禮懿行爲一時所稱其教先生慈而能嚴先生克秉母訓跬歩不苟從師力學爲制義說經論事恒有獨詣要皆本於性情以故一時翕然重之􅀹善爲古文辭名公鉅卿委質請事先生之古文大行名聲籍甚而小試輙落時論爲之久鬱而先生恬如也年三十始補博士弟子員而先生之名德已推重鄉􅀖屹然鉅人長者矣時文名尤大振每衡文較士名未嘗出三人下於是食餼縣官當是時烈皇爲天下求賢孜孜若不及謂天下賢才非制科所能盡於是詔天下提學官貢郡縣學生之優異者親賜䇿問先生得展宿抱對䇿殿廷果列上第天子方將不次擢用而所對䇿忤時相意乃以他事沮格皆令入太學旋罷歸時論㴱惜之時崇禎乙亥歳也先生爲諸生而繫心君國憂時念亂一飯不忘時天下多故居恒鬱鬱嘗俯仰歎曰四郊多壘寧獨卿大夫之辱乎而桑梓之間有一事􅀜民生之利害先生凡有可爲必竭力爲之時先生望重鄉􅀖當事及鄉老亦以先生之言爲行止故所爲亦輙成故事吳郡屬邑嘉定崇明不轉􅒩以二邑無米也時邊食告急盡須子粒乃令長洲吳縣崑山太倉代二邑輸米少濡緩同乏興論時吳中荒旱飛蝗蔽天斗米九百錢道殣接踵正供無出况復代輸然無敢言者先生獨慨然首倡免代之議上書郡邑及縉紳爲四州縣百姓請命文移書疏一出先生之手早夜皇皇如療疾痛乃自邑郡而上以迄具題逹之司農而後得免止崑山一邑所免代兌米葢一萬二千四百餘石云天下財賦仰於江南江南獨重吳郡吳氓水耕苟塘堰既廢則蓄泄無時向之膏腴皆爲石田故言吳中水利者謂三江不治三吳百世之憂也先生㴱念之顧其事重大非可郡邑歳月圖而崑山一邑利害之最切者亟浚邑東南之夏駕河亦此土百年之利也夏駕河承太湖入吳淞之水注之婁江而歸海爲三吳水利司命以海潮上下湧沙易塞良田不治居民流散縣令滇中楊永言惻然傷之而距夏駕河六里有鷄鳴塘亦納吳淞之水東注議并濬治縣令同邑人合辭以請先生先生於是告之縣令請邑諸生張謙孫道民爲佐以共勷其事時兩河竝濬爲役甚鉅而軍需孔亟官帑告竭先生爲設法令兩河附近業戸炤田輸貲略有三等以其田之去河逺近爲輕重焉力則計淺㴱以時晷程作息尺寸必均人心悅服於是力作委輸動如指劃六閱月而兩河工告成一時人稱非先生誠孚於衆者㴱不能至此辛已歳饑先生倡平糶於郡中甲申國變先生告縣令行保甲於崑山先生視民事如家事焉初聞烈皇死社稷􅂘甚慟屏酒輟肉如執親喪乙酉五月南都復破所在瓦解而崑拒守先生實佐佑之城破先生書絶命辭曰可質祖宗可對天地生無自欺死復何愧自投於東禪寺之後河有識之者曰公何若是先生叱曰爾何知速去我爲此鬼不爲彼民遂以死此七月六日也先是閏六月十二日行被髪之令先文靖公將殉節爲書以別先生曰存此不屈􅂰不被髪之身以見先帝於地下見先人於地下惟表兄爲我明此志焉葢節母先太孺人先生之姑也先文靖與先生爲中表兄弟誼獨厚故臨殉節而獨以書別先生且曰以發亦必死未知得見吾書否其相信如此先生家極貧而事父母及大母極孝平時奉養及死喪大事皆獨任絶不分委之叔與弟郡邑之從遊者無慮數十百一時名家爭延爲師凡經先生指授者不獨文章日起其行誼必有可觀余十六歳執經於先生朝夕侍先生者五年第六年壬午余遂倖售去而是科得雋者先生之門凡三人焉先生修睂廣顙睟然於面居恒容色和霽而端嚴若神邑里敬畏亦同神明云既殉節一時學者按謚法私謚爲節孝先生有觀復堂集二十卷藏於家四子長子用純尤賢其學行一如先生與余善野史氏曰吾聞先生童時從學舎歸謂母曰兒同學陶四兄大不􅀋諸生吾願與爲友陶四兄者即後所稱陶穉圭先生者也名琰先生既城守陶先生鄉居亦率衆援城城破先生殉節於城中陶先生還家自經死而先生濬河時所舉張謙孫道民者亦於城破時俱不屈而死嗚呼先生何其知人也即余從遊於先生六年倖售去時年二十一而先生贈之詩曰夙昔承家學忠孝天所紀吁其母􅀒先生之知哉沈徵君傳沈徵君名壽民字睂生寧國之宣城人也曾祖寵官參議祖懋敬官蒲州丞父有恒太學生名德重於鄉徵君其第三子也有恒嘗夢一老人儀容甚偉手一編署孔孟之學以授之而徵君生性嚴毅不妄言笑十三歳而遘母喪哀毁居處悉合禮節時學士無不以制義起家剽竊爲工志在科第而徵君獨精審書義必宗先輩名理文一出而名重天下崇禎丙子烈皇復保舉之制求賢若渇徵君年三十爲諸生負重望應天廵撫張公國維察於江南九郡五十餘州縣中非徵君不可以應詔時寇禍半天下天子宵旰即家起宣大總督武陵楊嗣昌於憂中爲兵部尚書倚以辦賊既而寇患愈􅁄徵君方應辟舉即抗疏劾嗣昌曰綱常著而後可以正世風功罪昭而後可以定國是夫國有禮斯治臣移孝作忠奪情爲變禮所出掌樞實隆責攸歸未有倖試於前巧諉於後背親負主如兵部尚書楊嗣昌者也嗣昌以居喪起復業一年矣金革無避漢儒之曲說縱令寇廹門廷君命莫委即應躬歷戎行滅此朝食以報君之烈贖忘父之愆此嗣昌今日不待再計者也而奈何安枕京師支吾朝夕中懷規避外餙勤勞於以衊天常而昧國憲若嗣昌者將誰欺哉狂寇震突今何時也功莫大於會勦事莫重於身親三月之期既臻且盡氷雪已泮草芽浸萌楚蜀之燄彌張闖逆之首未授而囘顧孤孽尚厚顏持䇿於司馬之堂不亦辱朝廷而羞當世也耶使嗣昌奮義一出忼慨誓師則不特忠諒於聖明亦且氣吞於逆醜以十二萬方張之師二百八十餘萬咸集之餉顧不能及鋒而用鼔行以前使餉復有􅃜師或解體當此之際㪅難爲籌而偷匿因循究將安底苟日復一日師老禍延別有難言或出非料嗣昌斯時雖屈首服丁汝䕫之刑束身死王洽之獄竟何益哉疏奏通政司以疏字溢額沮弗爲通徵君再上疏劾嗣昌曰樞臣籌國已誤微臣昧死再陳夫嗣昌樞臣也與羣臣異嗣昌奪情之樞臣也㪅與樞臣異身厠草土擢掌六師請費請兵有乞必允皇上倚注之重㪅未有二奈何閱歳以來空文罔實了無禆於􅀖政徒有潰於人倫臣雖草茅義難緘黙敢再據近事之舛逆爲皇上陳焉臣聞古純臣之謀國其慮害逺其審機􅃀未有苟且睂睫游移齒頰間者漢段熲營先零謂必當用兵斷以二夏定之事平果二夏唐馬燧營河中謂罪不可捨願得三十日糧足矣事平果三十日使有如今日者矢曰三月茫無寸功勦既不能撫且餙罪明㫖曰相機操縱非專任縱也曰殱渠散脅尤先務殱也嗣昌既不能躬履行間一狥之理臣熊文燦而混搖等十數萬之賊方橫豫中非文燦撤兵於前即嗣昌移將於後鳳泗之狂氛稍創鎭臣方漸次搜討非嗣昌預嚴聽調之檄於前即文燦忽傳會議之牒於後此兩人欲專爲撫而復阻人爲勦之明驗也今者誘劉國能於隨州餌張獻忠於襄陽委曲懇祈幸其一諾遽謂彼無反側此應招徠奉天子之聲靈以邀賊一􅁓之認帖即撫局果成而辱國損威已不可贖而况其未也夫天下未有不能殺人而能生人授柄於敵而可懾敵者流寇之禍蔓延七省肆毒十餘年矣屠戮之慘震古未聞甚乃悖逆滔天擅驚寢殿凡爲臣子疇弗痛心况在嗣昌尤難共戴以十二萬之師不爲不武以二百八十餘萬之餉不爲不􅂶整旅以往何凶弗摧鼓行而前何讐弗滅俾其力極勢窮面縳輿櫬猶應宣布皇威律以無赦而後愍其歸死昭上恩德以宥之夫如是而撫可成也今者漫無翦治頓事姑容招之不來强而後可無乃既隳勦之功而復乖撫之術哉歷觀史册往事可師勦不失撫施爲有序耿弇大破張歩於臨淄僵尸相屬歩始負斧鑕於軍門以降馮異大破樊崇於崤底東奔宜陽崇始棄兵甲如丘山肉袒請降朱雋之破黃巾斬首萬餘而後降之葢威不極則惠不㴱力不窮則心不帖自然之理也今文燦憒然不知擒縱之有方而嗣昌復夷然不顧養癰之可患雖復逺寛三歳之限㪅累數年之民正恐盪賊無期主憂彌切臣不知所終矣疏奏通政司張紹先嗣昌黨也以徵君再疏愈激切因以危言沮之徴君於是復上書通政以爲微忱一日不逹斷難緘黙自甘物不得平終鳴母使獲罪執事幸甚紹先不得已始具疏請上裁詔不允封進武陵亦惶恐具疏自請處分徵君謂兩疏止阨於逾格上未嘗拒之使勿言也遂櫽括前兩疏之意使就額復拜第三疏紏之疏入畱中不報遂投劾而歸名震天下漳每黃公道周歎曰此何等事在朝者不言而草野言之乎吾輩眞愧死矣黃公負天下望好直諫亟欲言時事一時正人屬望爲相恐其忤上意不得大用多勸止之黃公忿曰宣城沈睂生諸生也一疏再疏至於三疏淋漓反覆不下數千言宋臣眞西山立朝一月而三十六上封事豈可使我逺愧眞公近慚沈子於是踵徵君後卒拜疏爭之而南北臺諫何楷錢增林蘭友成勇及詞臣劉同升趙士春次第爭奪情而南兵部尚書范公景文復率南九卿具公疏上大怒於是范公削籍成御史緹騎逮訊餘俱鐫謫無一免者黃公既以謫去久之被薦復逮杖闕下猶以廷辯奪情故也而徴君首發昌言前後三疏始終無纎介天下謂徵君忠誠之心固已格君而㴱荷主知矣後北都之陷以賊南都之陷以黨禍自撤其籓籬皆徴君於六年前早言之不幸而其言皆驗天下又致憾於其言之不用也徴君既歸天下士益宗之亟望其用世適已卯秋自督學御史以下勸預􅁄闈不應舉主張公亦移書趣之徴君復之書曰屢承嚴諭敢不恪遵第鄙性迂愚願從所好故希心飛遯抗語歸耕非矯餙也况凡紏武陵皆奉嚴譴壽民以首事觸機之人假使聖怒早及不免先諸君子受禍矣尚得覬覦進取哉未及與衆正同其罪自應與衆正同其憂不必與賢者同其興正宜與賢者同其廢迂愚之心如是而已於是授徒姑山杜門不出金沙周儀部鑣迎徴君與掩􅀜究性命之學迨南都建而黨禍興矣初徴君紏武陵疏斥阮大鋮妄畫條陳鼓煽豐􅉮時大鋮居金陵以聲利招徠天下之士意叵測於是梁溪顧杲貴池吳應箕出南都防亂掲合天下名士以攻之大鋮謂主之者儀部而倡之者實徴君也既得志首欲殺此兩人而後及其餘既矯詔盡儀部於獄復以蜚語中徴君將出緹騎逮寧國郡守朱元錫先期知之密令徴君逸去乃變姓名攜家匿跡於金華山中流離播遷備極艱苦適當歳荒屑榆而食凡有問遺概􅁍弗受朱郡守故有生死之誼貽之十金庋而置之壁三年未嘗發視也南都不守昔與善而因之賈禍者既當路欲相引薦徴君對使焚其書且與之書曰龔勝謝枋得爲無端徴薦反速厥死故凡今之欲徴僕薦僕者直欲死僕者也當儀部繫獄禍且見及而有索逋於儀部者徴君鬻已田償之不令儀部知初儀部有子數歳自金華歸里即招之來學渡海葬友人遺骨於海外而往􅂘金沙貴池之墓徴君有六子洙爕棆鑑埏逢皆令以教授自資不渉世事生平闢二氏之教甚力著有閑道録教學者以忠恕爲宗謂自孔子以及孟子一貫之㫖也臨殁書曰以此心還天地以此身還父母以此學還孔孟遂卒自乙酉至是三十一年矣葢棺而猶爲故國之完人於是學者私謚爲貞文先生漳海黃公嘗題徵君讀書處曰耕巖草堂故天下亦稱耕巖先生云野史氏曰嗚呼吾讀沈徴君擊武陵三疏未嘗不反覆流涕也吾聞榖城將陷榖城令預題署壁云勉哉殺身成仁無負賢良方正榖邑小臣阮之鈿拜闕恭辭遂死之嗚呼何其從容也以保舉出者獨此不愧沈徴君耳雖然若徴君獨無􅀒賢良方正哉自徴君拜疏未二年而文燦以失律伏法又二年而嗣昌督師以陷藩仰藥死又二年甲申三月十九而賊陷都城國竟亾矣楊伯雨傳楊伯雨名潤自號聯江豫章臨江府淸江人也父鉅伯雨㓜爲其伯祖誠烈後世本農家誠烈則賈於吳伯雨從焉伯雨性孝友舉止有禮自㓜而然初入吳年未弱冠而誠烈􅁀病死伯雨出入井井雖經營貨殖廢居輕重然脩潔自好介然豪髪不茍每伏臘蒸嘗自傷覊孤俯仰流涕以爲常吳人爭重之周氏以女妻焉居齊門外之陸墓里既已有室成家尤以歸宗爲急乃攜其室挈其􅇸資歸淸江奉事本生父母克盡孝養及殁而克盡喪葬之禮皆一身獨任家故有里匠二役伯雨以久居於吳未能與族分憂因盡推其㭊箸之產祖業既不霑一箸之貽而喪葬大事又不委之諸弟人固以爲難及周氏殁復罄其吳中所攜􅇸資委之諸弟輕身復來吳人以爲尤難也至吳續娶張氏女伯雨貌淸羸形神卓立而鬚鬢灑然淸風拂人見者異之年五十始舉一子及七十餘而神觀舉止不少改其常時有畸人沈處士者抗跡絶俗名動一時閉􅀜佛舎一時名公卿莫能覩其面顧聞伯雨病革遽破􅀜出與伯雨訣聞者異之豫爲終制囑累數百言惟以立身盡孝勉其子焉生平喜讀書􅀹􅄝醫學製丹丸治病一二十年猶驗手鈔方書七帙凡若干卷卷末自題􅀜西後人洪都楊伯雨手録一時人亦亟稱楊伯雨故遂以字行一子即今人所稱楊隱君曰補先生也自有傳野史氏曰初誠烈之死也伯雨以孤童覊旅吳中數千里一身稍不自振㧞即已矣豈今尚復有知之者乎一念自立卓然有成詒子及孫詩禮聞譽蒸嘗祠墓或世族弗逮也嗚呼豈異人任乎嗚呼吾於此而知楊伯雨矣楊無補傳楊無補名補其先江西淸江人也父潤始徙吳遂爲吳人少好讀書家貧工詩畵其父素知醫欲令以醫術爲生弗屑也時士大夫罕言詩而畵學自沈周文徴明後不傳將二百年無補顧以年少屈起閭巷獨能兼之見者驚歎而無補意未愜嘗曰吾將遍遊天下之名山大川盡閱海内世家巨室之所秘藏然後足以成吾學矣爲人孝謹重然諾行止無踰尺寸閭里多重之年二十四而父殁又三年而母氏棄世家益貧甚既葬事已竣乃辭墓而出浮江淮登泰岱周旋齊魯之郊遂北遊都門登黃金臺崇禎初禮部尚書董其昌徴君陳繼儒爲一代風流之冠而文相國震孟姚宮詹學士希孟􅀒天下重望皆以詩文推許無補而呼爲小友於是無補名重一時傾動都下館閣諸公無不與之爲友者而與同里徐文靖公尤善云貴陽楊文驄者名士也善書畵能詩自􅀒其才遺忽一世顧獨重無補無補長七尺餘貌羸秀鬚鬑鬑然風韻甚逺善病雖日遊諸公意蕭然也客都五年南還復登之罘觀海遊黃山渡錢塘上會稽已而再遊都門往來金陵江都間甲申五月聞北都之變遂歸吳門隱居鄧尉山焉時崇禎十七年也南都再建柄國諸公多舊遊屢趣之一出終不應歎曰吾老矣不幸遘此世變崩天之禍震古所無吾雖齊民能無痛於心乎且吾之所以足跡半天下役役二十餘年者意有以大吾之所學而後出其所蓄積以與古人爭衡以藉其成於諸公已矣今不可復問矣遂泣下時賊臣搆文靖公甚急而楊文驄爲柄國者至親官武部郎貴用事所言無不得當於柄國者無補曰龍友不言可以絶交矣龍友文驄字也乃立起如金陵語文驄曰天下以文章聲氣推君垂三十年天下之所以交重君者以君能右善􅀋附正人也君於柄國者爲至親君言無不得當者天下莫不聞徐公負天下蒼生之望天下方􅀝望之爲相以佐大業君居能言之地而不爲推轂天下故失望今事急君固何以謝天下語未卒文驄曰子責某是也微子言吾已謁之相君此非相君意尋當解耳於是即出金陵而歸江南破行被髪之令無補於山中聞之戄然起曰唉徐公其死矣遂哭之頃之而文靖殉節訃果至徐枋者文靖公長子也年二十餘避亂隱居無補雅重其人遊處如兄弟相得甚歡而無補年已五十餘矣每過其家輙欣然引巵酒笑語終日或時時涕泣聲盡咽以爲常嘗促坐飲酒甚樂一二故人皆在坐飲酒酣無補四顧坐客傍徨久之因微吟曰將軍既下世部曲亦罕存遂悲不能自勝坐客以下皆􅂘泣竟罷去既而山中亂復遷􅀒郭窮巷而非其意也當是時適有故交來官吳門求見無補無補不得已而一入州府心甚傷之鬱鬱數年遂以死死時葢年六十矣初無補病即自知不起呼家人預屬家事數語而已既病篤乃復召其子而命之曰吾交天下士多矣今固未有如孝廉昭法者即書畵小道彼亦將繼數百年之絶業矣蔡邕曰吾家書籍當盡與之惟得所歸耳徒藏無益也吾愧無藏書可以益孝廉者所有畵本數十百幅可盡歸之可盡歸之無忘吾言言已遂不復開口其篤好人物如此而其子亦能遵父遺言卒以其家所藏盡歸孝廉所謂孝廉昭法者即徐文靖公長子枋也其所作畵暮年益進其詩亦然自􅃟四百餘篇行於世長子炤與余善贊曰當國家全盛無補以布衣薄遊都門聲動輦轂下衣冠懷之惟恐在後抑何盛也昔人所稱通隱殆無愧焉吾意其人和易長者也乃遭世變亂天下同流顧以身入州府䀌然傷之竟鬱鬱而死嗟乎有以也夫姜如須傳姜如須名垓山東萊陽人也祖良士父瀉里俱邑諸生篤學好古世爲名儒瀉里生四子長圻仲埰叔垓季坡兄弟四人俱以文學才名著於時而叔與仲爲尤顯仲早貴官禮科給事中以直節拜杖名震天下如須㓜奇慧八歳通三經十歳善屬文十六而爲詩賦時同里宋侍郎玫盛年而位孤卿文名葢世而一見君傾心折節與交每向人稱姜叔子不去口故君年最少盛名傾一時年二十三爲崇禎丙子登鄉薦第七又五年庚辰成進士出先文靖公門先公負大下望擅人倫之鑒然每言吾幸叨禮闈得士二十一人然姜生非常人也及官行人甫入署見署之題名碑有逆臣阮大鋮崔呈秀姓名與魏忠節公大中竝列君謂薰蕕不同器每見史冊亂臣賊子既加誅殛猶必毁其姓氏爲爲虺葢以天下之惡遺誡萬世也今縱不然而尚與忠節褒䘏之臣竝勒穹碑不亦辱朝廷而羞當世之士乎即拜疏曰大中當日之所以不惜一死必忤璫觸􅆋而斃者正以不忍與此輩比肩竝立耳及死而其名猶與之溷則地下之怨恫又何已乎伏祈敕下所司即爲剷除庶見聖朝旌別之嚴則不特慰忠魂於已往正所以勵臣節於無窮也激切反覆纍纍數百言疏入上可其奏一時朝論翕然韙之謂君爲新進而居然領袖正人而權臣爲之側目大鋮輩䘖之次骨矣適仲兄埰亦拜疏紏時事直言不諱上震怒命錦衣逮治詔獄事不測君急難奔走不知所爲而獄防峻内外阻絶君早夜微服立所司門外迨給事至刑􅈠君即移病亦入圜扉侍兄左右無稍間時總憲劉公宗周僉憲金公光宸論救過切且以刑􅈠爲狥縱再嬰上怒詔復逮給事杖一百君聞命直走午門外冐萬死於叢人中躍出與仲兄訣把兄手聲與淚俱見者泣下杖畢給事已絶氣君口含溺喂之始再甦日夜營護調視醫藥給事得不死而萊陽陷君父瀉里不屈死甚烈弟坡伏父屍而􅂘被掠入營夜半爇火將焚其營遂遇害兄圻被重創佯死堞下少間抱父屍以逃家人死者二十餘人訃聞君一慟幾死且入獄以吿給事即拜疏曰臣父瀉里爲邑諸生三十年甘貧自守夙矢忠義不幸城陷臣父大罵不屈死於是臣弟坡及臣姊姜氏臣嫂王氏臣妻孫氏臣弟婦左氏一時俱死死者二十餘人僅臣母得免而未審存亾而臣兄埰復以狂瞽冐瀆天威幽囚犴狴臣聞訃奔歸則罪臣縲絏勢必速斃欲畱侍兄則臣父􅁀骸未收而臣母瀕死無倚臣於此際膓寸斷矣重念臣兄埰􅀒罪既重銜痛彌㴱進不得盡忠於君不可以爲人臣退不得致孝於父不可以爲人子葢從來以言得罪者多矣未必家有非常之禍即臣鄉之被􅃤殺者衆矣而救死扶傷猶得骨肉相保未有身在幽囚既聞闔門酷禍而曾不得奔喪一􅂘者也臣是以忍死呼天伏祈將臣付法司繫獄代兄使得奔喪臣死且不朽即或以臣兄罪必不容逭奔喪之後仍復逮治前日妄言之罪并治臣以今日妄請之罪亦死且不朽矣疏入上雖不允其請而心知之且㴱憫其一門死事而給事之禍從此稍紆矣君即日徒跣奔喪奉母南遷至吳門甲申三月給事始出獄戍寧國衞而三月十九國變矣君聞變北向號慟不欲生南都再建權奸搆黨禍中諸正人阮大鋮修舊怨必欲殺君君從吳門變姓名間行抵甬東會南中壞浙中復起而君亦先幾引去不及於難遯跡台宕間之佇石山遂稱佇石山人亦自號土室潛夫久之復來吳君痛家國之變居恒悒鬱遂以多病病少間復自吳至萊陽葬父暨五喪偕入土還吳而復病病遂以死死時年四十耳君美風度善談笑每稠人廣坐跌蕩文酒意氣自如而偶一感觸時時涕泣忠孝其天性也先文靖既殉節君五年居吳四叩先公之墓􅂘泣甚哀婁東初登啟事君亟遺之書曰昔賢如譙􅀇李業王皓以髙節盛名爲時引重左齎璽書右進鴆毒顧諸君毅然不以彼易此知閣下斷之於心久矣當給事之逮杖也君方臥病聞命驚起奔赴一足不及履走里許從者以履追著之而竟給事之獄不入内寢所著詩文爲海内所推有佇石山人集藏於家一子㝢節初壬午秋君以行人分較北闈得士十二人以闈牘呈先文靖公先文靖公見之甚喜及見請毁署碑請代兄繫獄二疏則益大喜歎息久之曰吾固知姜生姜生果不􅀒吾知矣野史氏曰吾聞君之祖良士學行爲一時名儒隆慶丙子中省試第七以本房與主司爭遂落及君登賢書歳與名數俱合豈其先人績學之緒鬱而未施待君而後酬耶當壬午秋君以大行仲兄以給諫陪祭山陵時人榮之及君爭逆臣名不得汙署碑而給諫亦以紏權奸至瀕死時人尤重之稱天水二龍吁若君兄弟其易及哉張英甫傳張英甫名雋晚號蒼睂吳郡長洲人也英甫故陳氏子㓜育於其舅張翁故姓張氏初英甫貧甚幾無以自食英甫奮曰苟如是何以爲人乃售其城居復盡賣其妻嫁時衣裝而去城四十里居於鄉曰金墅金墅濱湖饒魚米人以織席爲業英甫饒心計縱橫術鉤距廢居十不失一嘗以甲之錢易乙之榖甲乙俱無所􅃜而錢榖皆􅑿他人效之莫能得也不數年而家產千金其妻秦氏亦能勞苦早夜織席以佐之於是英甫繕室宇置膏腴之田世變之交米價踴貴後賦役日繁民間以田爲陷阱而英甫則預置其田於善所正供之外無毫􅁵之費於是但饗榖貴之利而終歳不聞追呼時家益殖蓄徤丁耕百畆身則涉汝潁至襄鄧往來售所積獲利嘗什倍性􅄝茶訪於故家之善茶事者每歳春秋必詣峒山身爲貿易而自製之最精於是售茶復什倍晚年而家業益大振英甫心計纎悉利析秋豪然性亦喜遊俠圍棋飲酒詼諧滑稽精音律嘗臨觴度曲引聲窅眇善淒斷坐客皆欷吁隔戸聽之莫知其爲老翁也英甫長身骨立面瘦多髯其家與余湖庄相望然余十年始識英甫葢余隱居金墅不入城市不見一客先公析產莊奴爲僞契以售人者二百餘畆英甫與其友惠孟仁爲余履畆而歸之初莊奴盜售事覺親知莫能爲計金墅豪姓爲惠與秦售二姓者什二三或謂當先從事於易理其餘者則二姓不得不還英甫曰不然鄉人愚頑若舎二姓而先之其心不服莫肯吐且二姓以爲怯將生心不如先理秦惠秦惠既還而餘自出矣如其言不終日而二百餘畆皆復故余素不問生產出入歷年逋官租積七十餘金而貸息耗費又復不訾英甫呼余家蒼頭之任事者切責之曰若受主恩兩世矣若任何事而致欠官租七十餘兩若主朝不謀夕斷不能償即竭力以償幾金而不足以供倍稱之息無名之費是日愈久逋愈多費愈繁息愈重即捐身家何益若既任此若必先若主死矣蒼頭涕泣不知所對英甫復曰若能從吾吾能爲汝一日淸完何如蒼頭以首叩地曰是再生我及我主也敢不唯命英甫曰凡官租正額之外一切繁費若自任之英甫即日捐資七十餘金勒令書領劵督令三日内盡完之余遘疾病則英甫任醫藥之費余遘禍患則英甫挺身捍之嘗同余内親王生從余渡太湖􅅆旋二百里英甫懷刃自隨時余猶握髪也又數年遂卒英甫竟無子云野史氏曰吾交英甫而歎曰異哉英甫性纎嗇家累千金而平時敝衣冠食淡如窶人每臨事以計數不出一錢及其周余之急大者完官逋一日而捐七十餘金前後十五年其緩急有無者倍是而英甫不令妻孥知英甫年六十余以文爲壽絮述官逋事以東漢俊厨爲喻英甫匿不以示人觀其意若惟恐人知之者是豈今人之所能及哉是豈今人之所能及哉嗚呼異矣葛瑞五傳葛瑞五名芝本名雲芝吳郡崑山人也父太學君諱鼐祖太常公諱錫璠太常以進士起家歷官通顯有子八人多負才望季子復舉孝廉門地鼎盛聲華人物冠於一時尤昌明古學刋政經籍時􅁑氏書滿天下其盛如此􅁑子太常之孫也一出而名掩諸父上懷奇抱異俯視儕輩嘗稠人廣坐黙然凝思人莫能測也十五爲邑諸生試輙髙等時婁東二張先生􅀒天下望從之遊者如登龍門葛子爲南張先生之婿爲西張先生髙第弟子鏃礪名行文章擅一時每一文出人爭以爲髙文典冊二張先生亟稱之先逹薦紳及當事皆折節與交而􅁑子夷然不屑也當是時葛子年最少雅自􅀒謂富貴可立致苟出而返民俗于惇龎致軍國於太平匪異人任也既遘國變􅁑子盡棄其所爲學而潛心求道一以姚江爲宗求所謂致良知者姚江史子虚沈求如兩先生者良知正傳也􅁑子渡浙江入石浪山以訪焉沈先生則以言授􅁑子史先生則復入吳訪􅁑子葛子慨然曰茍不得不可以爲人於是舉人生可欲可喜之事痛自割絶而惟精求性命之微食息無間久之忽然身心洞豁而喜可知也而年未三十也􅁑子復遍叩諸方知識徴詰往復無所不至復與其同學葉君者入古南之室古南付囑之於是􅁑子乃以其所得通書於史先生史先生復之書曰人生惟此一著子尊兄瞥地証入良可慶幸台鼎不足貴萬鍾千駟弗與易也雖然百尺竿頭猶當進歩否則藕絲一綫亦能絆人不可不察也尊兄直下知歸幸立造純亦不已之域方不􅀒爲一大事出現於世耳􅁑子於是賣山而隱嘗盡屏其家累入山獨棲一室竟日􅉂坐久逾十旬亦時攜室入山水邊林下從容笑言婦張亦知􅀇學能辟榖夫婦之間自相師友誾誾如也僮䜿忻忻如也惟謹人見之者皆以爲神仙云葛子籍門胄之髙華早擅文章之譽有國士之目晚復以道自貴誠有所謂不改其樂者然其所遭憂愁拂鬱顚連坎坷亦極人世之所不能堪至繚戾而不可解葛子過之弗畱矣性孝友篤於師友死生之誼早及先公之門顧與余交晚而相得極懽嘗盡讀其所著書及其母夫人狀一篇余爲之泣下復讀其繼母狀余益悲不能自勝而􅁑子語其子曰徐子眞知吾者他日吾死不煩向人求誌其墓及吾之生存乞徐先生爲立一傳可矣􅁑子於書無所不窺文章聿稱名家其爲人沈靜英敏事有節制不踰分寸往往懷髙世之意人初不知事往而靡然心折也初世之變也崑獨距守赴義之士劃地嬰城葛子獨以誼不必任先期避地及城破死者數萬人而葛子家父子叔姪兄弟皆無恙給諫陳先生爲時事所染微行抵所知􅁑子泣曰以張儉投張儉豈得全乎越宿而不免而舎藏者亾身以及親焉人於此而益以識量推􅁑子云有臥龍山人集若干卷容􅂰居雜録若干卷行世而其秘弗傳者猶多藏於家野史氏曰吾聞􅁑子年九歳聞人傳說吳氓擊殺逮周忠介公緹騎立屏側涕泣曰㪅益我數歳庸渠不能從公於難奔義若􅄝欲其天性也而其後所見乃如是嗟乎賢者固不可測然非其與道絀伸能如是乎每與􅁑子飲酒悠然相對輙自以爲弗及也嗟乎葛子㴱逺矣貞孝聞氏傳嗚呼余讀聞氏貞孝紀畧而悲之孝經曰終於立身子輿氏曰不失其身而能事其親者吾聞之矣嗚呼貞孝之義明矣而求之古人或未易遘也今觀於聞氏何明决如是庶幾不失其身者乎此其爲不愧於貞與孝也因爲立貞孝聞氏傳貞孝聞氏者無錫甘露里聞見之季女也母夢異花而生生而頴異五歳而持長齋七歳而誦佛經晨昏不輟云以利益父母精女工易甘脆以奉父母父母與之菓餌仍間以進其仁孝自天性也性亦喜施捨能周急嫻靜明大義出言嘗驚其長老有至戚失其親懽欲逺行貞孝正辭曰茍父母之不容何有他人其人黙然而止年十三遘母疾黙禱於神割股以療母母愈聞與華比鄰相善華有子就日許字焉聘入而壻病勢不起貞孝嘿自傷服御居處俱貶於昔訃聞貞孝不泣而嘔血數升銷毁骨立其母授以藥不服因母以請於父祈奔喪父不許貞孝曰夫死而執喪姑無依而奉養常也今姑晝夜􅂘吾家止隔一垣忍坐而聽之乎乃縞衣絶髪直前請必行不行必死父大驚許之貞孝遂如華氏拜姑而臨夫喪斬衰憑棺􅂘幾隕見者皆􅂘時年十六耳既而母復病貞孝復割股未進而母殁當是時貞孝一身而荷兩家之俯仰早夜勤瘁心力殫盡事死事生恩禮兼備而居常容不對鏡言不見齒不窺庭欄其姑歎曰吾子不死矣居久之其㓜弟病亟貞孝曰吾父暮年而愛㓜子吾弟死吾父必不全死乃吾分遲之十年矣設吾弟當死何不令我未亾人當之乃絶食三日而禱於神曰願以身代吾弟之死禱畢而其弟病果愈貞孝大喜吿其父曰兒得請於神兒必死兒死必合葬南園南園者貞孝所預卜同穴之兆也遂不復食而預訣其父與姑及兩家之長㓜父涕泣固令其强食貞孝笑曰吾死晚矣又三日而起坐具櫛沐乃盡服其素所預製冠履衣裳懷記珠經卷而􅊕􅊕復甦而屬其父以定嗣事是日姑病不得再與訣復致語辭姑微笑而逝年二十六執喪後十年云初貞孝年十六未嫁而執夫喪自命名曰遂初曰必母違我初心也即預定終制衣裳冠履墳墓丘隴無所不周及臨死而指顧皆備復出一􅇸以授其父曰此華氏原聘金若干爲我棺餘還之姑吁眞能遂其初哉亦異矣野史氏曰吾聞長老述聞貞孝事有異焉當貞孝之欲奔喪也其父不許且曰守節何易嘗有沒齒而不見旌者貞孝曰夫守節以盡吾心也豈以求旌哉求旌是求知也守節而求知則人所不知必毁節矣又其初割股也適爲其姊所見貞孝泣曰割股而泄則病者不愈即引刀欲自殺其姊驚急抱持之且誓不泄乃止嗚呼忠臣烈士之心其如是矣至其臨死而顧囑詳盡從容話言若處置家事於平時者則又非獨忠臣烈士忼慨於一時者也昔歐陽子作五代史而爲死節傳不禁其三歎若謂當五季而乃有其人吾於貞孝則又進之矣周氏全孝傳語云人定勝天精誠之極金石爲開况於人乎故吾之立行徒能盡之於我者君子以爲􅃜而未全也茍得之於人而天亦隨之得全全昌斯無憾乎嗚呼難矣爲作周氏全孝傳全孝周氏者姓周名士晉字康侯吳郡疁邑人也妻李氏康侯㓜有至性兒嬉時旋繞其父母􅂰前即能察知父母憂喜愛憎而承順焉長而彌篤娶婦而孝益加凡人之所不能及者康侯以爲常行每父母有疾凡湯藥食飲必手調而口嘗之以進時其寒暖燥濕欠伸痛癢饑飽無一息之間康侯素不知醫然於父母之疾如洞見五臟癥結葢繇康侯之心與父母之體無間也妻李氏亦極孝事舅姑一以康侯之心爲心父母嘗云吾二老人得兒若媳如是眞天幸也既而母得痺痿之疾沈頓牀褥者數年日須以人參療之不然輙殞去康侯竭力承事久而資蕩盡不能供醫云庶進人乳可以再生康侯躍然密語妻李氏曰吾夫婦幸生兒今九月適有乳若過房此兒以乳乳姑甚善但一時不能即得而姑病危急於呼吸之間柰何不如竟棄此兒何如失子可以復得失母其可復得耶言已而泣李氏黙然頃之欣然曰苟能活姑無不可但姑素愛此孫柰何康侯因召日者令推算年命言此小子時日干支不利於其大母同處必病令母聞之果信次日漏未盡康侯及其妻李氏同抱此兒書兒生年月日繫之兒背棄兒道旁遂返語母云已過房舅家是日李氏即乳姑乳方二月母面如童顏乳三月母霍然而起去數年沈痼之疾起居如常人時康侯父故無恙舉手慶再生於是安居養堂者又二年自母病起而家益殖既而父病康侯露禱祈代既殁其母哀傷過甚遂復病病八閱月亦死康侯水漿不入口者七日幾不能起先是母病康侯遵母命延僧於家誦佛經以爲母延齡此僧素知星命因書所棄兒生年月日使推之後五六年有殷氏者亦請是僧作佛事亦令推算其子僧大驚曰此何與昔年周居士所棄兒無異耶其家亦大驚因固問即令是僧訊之康矦康侯拒不應殷氏即得子家其子果道旁之兒也既得實兩家通往來如親戚既而其家益落父旋故兒年十二其母决計令之歸宗康侯李氏所抱棄之兒竟復歸矣康侯棄子葢十二年云初康侯父殁時兩弟皆㓜康侯爲教養成立恩意甚篤而父遺命必葬山水間其母又諄諄囑累茍安吾骨勿渡湖康侯營塟不知所出十年未遂病成嘔血因禱於神明而祈之夢寐忽然神吿云塟離宫則父母之念皆得覺而從神宇推之堯峰爲離宫又無需渡湖遂决計卜兆三月得地五月而葬葬之日而嘔血症即愈一時傳爲純孝所感天祐之矣康侯既塟其親於是以家業盡推與二弟人有所􅀒盡焚其劵蕭然同其妻李氏及歸宗之子廬居木瀆以晨夕望堯峰云野史氏曰康侯孝子也然使其棄兒時其妻李氏少有濡忍之意則詎能成其志哉李氏乃能斷其慈愛勇於一割黙然之頃欣然以應即烈丈夫何以加之嗟乎余每讀其事至此未嘗不泣下也乃棄兒十二年忽然復合天也今歸宗之子亦克盡孝而康侯有女名上弘服西方聖人之教矢志終身不嫁以致養於親不㪅異乎此皆康侯有以得之也名曰全孝又何忝焉汪節婦黃碩人傳汪節婦者休寧汪暄之妻也姓黃氏家世休寧之髙堨爲邑望族碩人㓜而聰慧孝順精女工年十六嫓於汪汪氏稱素封重家範人多壽考碩人於歸逮事夫之大父母碩人奉事尊章承歡兩世而㴱得堂上心中外無間言人以爲難能也暄少倜儻􅀒奇氣而閨庭之内居處有禮年未三十病瘵而死臨死碩人泣請其遺言暄曰吾何言亦在汝耳碩人心識之既死碩人毁瘁幾不勝喪而黽勉拮据以立孤爲事初暄故以病瘵未嘗舉子碩人惟盡瘁家政佐其舅姑又幾年而暄弟皓舉一子即命以後暄於是碩人即撫以爲子􅂘而吿暄之靈曰君今有子矣吾未亾人庶幾黽勉教育期其有成以無􅀒君也名之曰璋自孩提以及成立哺煦保抱以及就傅聘娶事無旁委母道備盡有過於所生者璋亦不自知其非碩人出也姑范氏舅繼室也年與碩人埒而碩人事之克盡婦道弗踰分寸以率諸介婦姑亦輙舉碩人之懿行以督勉諸介婦俾以碩人爲師而所以孝養其舅者惟碩人是賴焉舅殁外侮疊至而碩人爲門戸計事中條理諸叔皆仰之治家有法庭宇肅然縫絍浣濯必潔以完凡幾十年言不見齒衣不見裏爲禮法之家所推重以爲世無其人也今年已八十而其所自處無異於初喪時噫是豈可及哉野史氏曰噫吾聞黃碩人之教育其嗣子璋也恩義備盡人不知其非所出及璋本生母戴氏病革碩人特率璋同其兄若弟拜訣於牀下泣語戴曰若兒璋在此然後知之噫其明大義如此宜乎其守身大節五十年凜凜不渝即偉丈夫何以加焉居易堂集卷之十二終
