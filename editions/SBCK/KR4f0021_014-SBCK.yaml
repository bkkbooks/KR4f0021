front:
  text: 居易堂集卷十之四
  hash: sha256:d8cb4676c60d2f4680af9170f7d5cedd539292b33e15684acd638bad64cf3f79
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_014-1a}
body:
  text: 誌銘處士次其時先生暨元配徐孺人合塟墓誌銘昔六國時齊有賢人時子者以著書顯於世而其後有時農迨唐之季􅄎㧞興彭城以滅賊功第一官司徒同中書門下平章事太尉中書令爵封鉅鹿郡王開藩於徐至宋而彥復以進士起家顯紹聖崇寧中官吏部尚書而家汴焉餘或在滕陽或居沂密之間無顯者而於吳不知其何別也吾聞明德之後其世必昌而蓄之愈久則發之愈大吾于時氏上下幾千年僅僅一再徴之而今益信之于次其先生矣次其先生者名琚字子奇亦稱次其故一時稱爲次其先生云先生故吳人其先居婁江之直塘遷於郡者三世矣祖處士君名某字質齋父文學君名際字行所力學爲名儒文行爲一時所宗授業傳經門多顯仕君雖老於諸生而師嚴道尊天爵自貴年八十餘視聽精明吳人推爲􅂄德長者生三子先生其季也先生幼有成人之度不妄言笑弱冠以文章鳴一時爲諸生即食餼縣官而内行修謹尤善承親歡當文學君壽八十先生年亦四十餘矣而愉愉懌懌承順佐佑色如嬰兒以故得文學君之愛重在兩兄上伯兄早世仲兄衍性濶略不問世事先生爲之綜理中外維匡調娛細大盡善而兄大適兄暮年而舉一女兩男迨殁而三􅀌皆穉教養成就一同已子而顧復之勤終身不倦焉即其病也亦以哭弟某之喪遂至不起葢先生孝友大節自其天性而又得賢配徐孺人以爲之助故家日益殖而德業日益聞徐孺人者余同曾祖姊也嫻静婉􅄟與先生同德尤孝事尊章閨闥之間相莊相敬白首伉儷四十餘年無一違言甲辰冬十月先生以疾卒孺人一慟幾殞既而時時哭泣遂以病病一年亦卒時乙已十一月也先生饒心計知去取徐孺人又以勤儉佐之故析産五十畆止以縣官廩餼師席修脯積纍滋息不十數年而殖産十數倍焉所居有曲池古樹修竹名花棋茗圖書簾閣彴广一二名師碩友觴詠過從入其室翛然絶塵不特不知爲城市也生平不爲崖岸嶄嶻之行恬愉溫靜無嚴毅之包言不出口而中有介然者則豪􅁵不淆尤不爲非義屈國變時羣湖漭間而以義稱者十百數而皆利鹵掠先生弗善也既先生避亂莊居亦爲所刼先生與其豪論義字甚晰委曲折之豪語塞大慚怒脇讋益甚而先生不爲動先生治家頗纎悉至是幾破其家而未嘗槩於中也先生既弱冠食餼縣官計歳積資當以明經授􅃟會國破遂止不就家事悉以委諸子而買山一雲搆一室居焉一身之外惟一童䜿及琴書一二而已形影蕭然閉閣瞑坐嘗竟日無聲閒亦攜杖巖磵之側獨遊移時不語不笑見者不能測也先生卒時年六十四徐孺人卒年六十五一子亮未國變時爲諸生醇謹能世其家娶殷氏亦士族二女皆嫁爲士人妻孫男五孫女二將以某年月日合葬於先人之兆亮以余有渭陽之戚也而來請銘焉銘曰遙遙厥緒維時之系爍彼晨星光煜於穊又如潛流一發而濞爰有先生聲施克繼上光前烈下裕後昆德明􅄟暗身逝聲存茫茫終古銘以永貞朱處士繼配周碩人墓誌銘碩人姓周氏隱君周虚菴名某之女爲處士朱希祖之妻而朱嘉明之母也碩人外家爲學憲沈公玉成而希祖祖諱節繇進士起家官肇慶太守碩人中外著望簪紱之遺積習詩禮㓜有至性知大義爲父母所鍾愛愼于所歸年二十始嫓于希祖年三十七而希祖卒稱未亾人年八十一而以壽考終葢碩人之爲婦者十八年而爲母者四十有四年焉當其爲婦也以中落之家理已廢之業始則支徭賦之煩中則弭訟䦧之阨繼則􅇜死喪之憂而及其爲母也始則長養于伶仃乳哺中則憂勞于㛰嫁學殖終則保護於喪亂流離嗟乎碩人自歸朱氏俯仰六十二年相夫而克成其夫教子而克就其子拓恒產復祖業皆于㷀㷀未亾之人而事克有終卒受成福噫亦難矣希祖元配沈氏有一子嘉運碩人撫之過已出終身無間言而碩人父母兄嫂卒俱爲之辦喪葬復撫兄之􅀌嫁兄之女無非碩人一身之所營而恩禮克盡焉此又丈夫之所難也乙酉之歳吳城被兵碩人家城南日憂不免期畢節園池比屋戮辱者纍纍矣而碩人家獨無恙先是有鄰人王某者與碩人家比屋謀避兵以千錢賃碩人家廡下人多怪之竟免于難及嘉明奉碩人入山王遂力請卜居其廬曰當兵阨時吾曾禱於神求示避兵所宜夢神告以朱母家兵火不入可避幸而不誣某家之得全寔母有以庇之也嗟乎碩人之德通於神明矣碩人出二子嘉明娶亦周氏嘉時早卒一女適琴川嚴氏孫一苼娶顧氏孫女二皆適士族曾孫五曾孫女一嘉明以碩人卒之歳庚戌冬啓處士之兆合葬於貞山銘曰周本姬姓以國氏汝墳之間系家著越秦及漢典午世江左膏腴冠吳會世德綿邈閱千􅥴慶餘􅀖媛媺徽懿二十言歸遂朱嫓朱亦曺胄髙陽裔沛國丹陽枝葉大鄒魯流風文行備鍾祥垂裕賢孫子承承繼繼有處士處士嘉耦碩人最爲婦爲母振遺緒碩人之徳永無墜􅂐此銘詩昭後嗣王節婦黃碩人墓誌銘王節婦者王歛卿名用福之妻而王明儒之母也姓黃氏父名守道兩姓之先皆以國初佐命功世食禄蘇州衛爲將軍校尉而節婦父獨好讀書爲諸生節婦生而有異秉五六歳侍其父讀書輙能記誦既長而益渉覽經史博知故事性至孝繞膝承顏曲有恩意父酷愛重之遭父母喪水漿不入口晝夜􅂘不絶聲蔬食三年疾病不食肉既歸歛卿爲婦則以孝其父母者孝尊章焉與歛卿恩義尤篤而歛卿病有子四歳矣病革顧四歳兒謂節婦曰吾知妻賢能無毁其志苐貧甚如此四歳兒何因睨節婦節婦涕泣固慰之遂以瞑于是節婦一慟輒絶絶良久乃蘇冢既貧甚又經死喪身外無一存於是家人必爲奪志之議節婦聞之不勝痛哭仆地遂以死自誓而議未止中外切切然節婦覺之􅂘曰吾夫死時吾與有言矣而今完吾節不能完吾兒奈何抱兒欲俱投池中死將入水而其兄至即投兒地上以屬兄而奮身赴池中兄以死援之而呼告其舅且以其義烈狀遍告其家人而異議始息時節婦年二十八歳也節婦以盛年矢節撫四歳之孤一貧無餘而家人無明於義者絶不能相恤又或凌虐之以故困益甚而節婦非手自營者亦不食也甞絶粒三日餓幾斃於家園採生桃而食未下咽而詬誶復至節婦僅以所摘者食其兒而已每冬以尺絮覆背遂中寒疾竟以寒疾終焉爲可悲也葢節婦爲所極難日瀕死以全其節以保其􅀌始終十一年而十一年中以寒疾而病者復七八年焉噫何爲而然耶節婦平生既尚節烈而尤敦學問動以古聖賢自律亦以朂其兒故每臨大節不難捐身以殉之而至於噂􅊱横逆之來則怡然也以故能忍而有成卒以成四歳之􅀌今者矻矻自持一分不移從明師求賢友讀書學道有稱士林伊誰爲之吁四歳􅀌者王明儒也嗚呼妻之事夫猶臣之事君也嗚呼國家養士三百年而今食士之報亦可概見矣即平時髙語氣節謂不難陟西山蹈東海而一當阨困則不能無動焉而以視節婦何如哉嗚呼聞節婦之風亦可以少愧矣而節婦一婦人何以然銘曰趣一義而不貪其生將歷千年而猶生氣善養而無餒于死故身長逝而不死嗚呼聞其風泚顏舉世將母同處士獻其胡君墓誌銘君諱琛字獻其姓胡氏系出安定其先自宋紹聖中始家於無錫至君而二十二傳班班見譜牒曾祖諱潛官奉化令祖諱允欽贈户部主事父諱之竑以進士起家累官中憲大夫山東按察司副使母吳安人而君則其長子也君性恬靜謹約能勞苦終年矻矻無子弟之過且篤志古處不汲汲於勢利憲副甚器之憲副歷中外安人常家居君入則督理家政出則問省治所憲副之所以得盡心於官而無内顧之憂安人之所以獨任伏臘蒸甞嫁女娶婦而巨細悉理勞而不瘁者君之力也君年二十補博士弟子員勤勵學業屢赴京兆試期一得當至乙酉國變年三十一即棄去經生籍當是時憲副吳安人俱在堂君服勞子舎謹謹致孝養志爲樂絶不問人世事閱十二三年憲副及吳安人俱謝世君居喪盡禮宗黨稱之愼終大事殫心刻骨靡所不盡襄葬既畢而息影杜門嘿嘿自守又十五六年遂以卒卒時年六十矣嗚呼士生於時其才非不及今人而能割絶榮進之路於壯盛之年迄於老死家非後門寒素而痛自刻削節衣揖食以終其身此其人非中有介然不可囘者耶初憲副公官户部榷􅀜九江政成而􅀜稅羡三千金矢不入私槖而又雅不欲奏額外之稅未得所處試以問君君應聲曰何不爲九江窮民代償租逋乎憲副大喜稱善又安定先生文昭公瑗於錫無專祠君建議捐資以率其族而建祠於龍山之陽嗟乎而後知君之節衣損食非徒纎嗇已也君生平不爲介介之色至其臨死諄諄遺言必乞余一言以爲銘餘無所言者噫可以觀之矣君凡再娶俱先君以卒元配孫氏河東運副衡公公之女大宗伯栢潭公之孫積習詩禮克盡婦道尊章以下交稱其賢及卒而華吏部鳳超先生許爲之銘先生既殉節而吾友馬國博大林寔銘其墓國博亦髙節著當世不輕推與者則其賢可知矣繼配華氏宜春令元初公之女字少君亦嫓前德婉嬺有聞人稱君再得賢婦云君生於萬曆乙卯年六十而卒即於是歳甲寅五月與二孺人合葬於梅里鄉張公橋之新阡君之命也五子宸鉉宸鑑宸鑾宸鎭宸鏡俱娶聘於大族六女俱嫁字於世胄鉉與鑑孫氏出華氏則生二女焉孫男五安澤安瀾安淑安濂安洛孫女四㓜未字君自㓜至壯克奉親之歡晚年而篤於教養子孫成立中外嶄嶄所謂少爲賢子弟老爲賢父兄者非耶可銘也矣銘曰有嬀之後再別於陳常儒非墨華胄彌振文恭文昭歷漢及宋世緒熾昌今古稱頌况於三吳寔被教澤所以子孫繩繩蟄蟄爰有胡君允稱令人孑孑斯世雅志沉淪六十全歸歸于此土燾後㣧賢無疆福祜吳文學徐碩人合塟墓誌銘吾甥􅅦􅁧其父若母之狀拜且􅂘曰吾父不幸悒鬱以死吾母又以痼疾先六年見背幸先生以吾母同氣之戚哀而誌其墓余亦泣因語榷曰昔而父手而祖御史公行狀以乞余銘吾文未出而又來告而母之喪亦乞余誌其懿行未幾年而又讀而父之狀也而父雖襲累世貴㣧而少倜儻􅀒奇氣議論激發常若有所不平於中者篤學奮志能文章讀書常雞鳴未寢時尚文社友朋聲氣而父常汲汲其間自謂富貴可立致稠人廣坐軒輊流輩酒酣以往或遂笑罵其坐客用不諧於時噂􅊱日聞世變後益鬱鬱不得意晚遘獄訟家破而長子又死吾嘗見其獨坐自語伊鬱久之曰吾不能光益先人之業今乃并淸白之貽而棄之何至此又忼慨曰丈夫當自奮何所不可致而乃區區概吾懷乃自笑噫爲可哀矣而母俯仰勤瘁淹􅆞疾阨中猶記丙午歳春過我山居自余二十七歳而母別去是年余四十五歳暌隔十九年乍見幾不識面相對閔黙已而相泣畱余山居幾三月而母謂我曰自我爲吳家婦始終疾病不能相夫子以有成且吾不能如古賢婦使夫子母嬰世事今以齟齬破其家無可言者吾弟知我心耳言已而泣遂別去又一年竟死君姓吳氏名昌文字修之吳江邑諸生御史公煥之叔子也家庭孝友時人不能以怨口掩元配徐碩人先宫詹學士文靖公之次女吾姊也孝慈備美中外稱之盛年遘病未衰而殞中更坎坷爲人世所鮮有余衰年多感傷展􅅦􅁧狀追憶生平泣不能已而亦未能竟敘矣家世詳御史公誌中君年五十有七碩人年四十有八先君六年卒七子長轍次􅅦俱能文俱邑諸生轍早死􅅦今以文章擅一時庶幾其後起者耶次援次昶次果幹次揆嫡出次法紹果幹法紹俱爲僧女三人俱適士族銘曰士求不愧怍而阨於謠諑女子以德勝而卒困於病天乎人乎馳於康莊何躓之多庶幾後賢再啓其家吳子墓誌銘嗚呼自吳子殁而天下絶援溺之望余不佞無生人之樂矣吳子天下才也天既篤生吳子而卒使之困阨拂亂東西南北奔走以死事欲集而復壞之時欲就而復沮之卒使之無所成立以死又何酷乎吾故聞吳子之死爲之呼天以􅂘􅂘而不能已也將造物者之好惡與人殊耶抑人之所謂忠與孝者固造物者之所不欲成就耶何吳子之萬死一生困阨拂亂而卒之無所成立而死也嗚呼吾知之矣天固有成其事者有成其人者成其事則如豐沛之屠販南陽之故舊附風雲而攀日月圖像耀於丹靑功名垂於竹帛者是也若成其人必困其身而後彰阨其遇而後顯必使之無所成而成無所立而立則吾不知其所以齟齬而蹙轢之者若何等也故每極人世之艱難盡事會之險阻爲死爲生亦絀亦伸若將成而卒廢若將立而卒隳使千古而下志士仁人讀其事聞其風猶爲之仰首呼天椎心飲泣而不能已已而其心之所欲爲亦足以白於千萬世與日月爭光也嗚呼人生必如是以死必如是死而後其心之得白於天下後世亦可悲矣夫成其事者富貴翕赫成其人者艱貞困阨故困不極則名不彰阨不奇則心不顯故成其事者嘗數年而功成若成其人非畢世不足以張之是天心之所重若視開國承家定策佐命爲尤難焉嗚呼人必如是以死必如是死而僅以白吾心固爲不幸而吾之心亦遂洞然明白於千萬世與日月爭光則天之殫厚之又何如乎吾故於吳子之殁既痛之而又歎其未始非幸也昔忠臣烈士有嬰孤城經百戰茹草飲血彌年死守曾無蚍蜉之援及城陷身死而援兵集劉越石崎嶇喪亂戮力王室忠感異􅀋而有末波之阨祖士雅志淸中原翦除荆棘將收河雒而有妖星之變此物此志也卒之吳子之生也雖瀕死竄越而窮荒遐澨苟懷忠義之心者靡不奉之以爲宗盟及其死也天下知與不知皆爲流涕而中原義士爲之起墳墓祭伏臘每臨其墓無不􅂘失聲者嗚呼吳子何以得此於人哉嗚呼吳子亦可以死矣惟是余不佞入歳而識吳子與吳子爲肺附戚稱兄弟俯仰五十年中同患難幾於駢首幸俱無恙始終交好五十年如一日傷其心悲其遇而痛其志之不遂而卒以死也吾又何以爲心乎吳子美姿貌善接納顧瞻謦吐令人自廢少能急人之困立捐千金無少惜結引豪俊奔走急難若徇􅄝慾以故天下翕然宗之趨之若鶩而每當險阨出奇應變無窮者酉戍之際江南初下勢岌岌涿州之子馮源淮提督浙西駐鎭嘉興吳子與之遊相善馮某之戚董生者即爲提督部將常詗察民閒亦與吳子交吳子以意厚之甞與抵掌言時事董生感激若以人不我知者余同年生徐闇公􅀒天下重望初毁家舉義兵敗遂浮海去望益重天下爭慕之至是復浮海而來欲於内地有所建立闇公故全髮魏然漢官威儀也既至無所容吳子密迎之館於家中吳子家顧在城市久之聲籍籍馮某乃遣董生來物色董生至吳子與相見未及有言吳子握其手曰吾有一言惟子可語欲成子忼慨之志董色動吳子曰徐闇公先生在此若欲一見否董驚怛絶倒且驚且喜曰徐先生果在此而吳子肯令我見之乎吳子即笑引之以見闇公董生一見叩首泣下曰聞公名二十年今日始得見然非吳子則吾豈得見公願效死三人即共爲盟誓相得甚懽乃以訛言復馮某而於提督麾下撥戈船出汛即衞闇公全髪以出復浮海而去初吳子遘吏部公之難資藉於官凡四萬金猶在嘉興之郡庫會世變吳子屬故舊之當事者爲之所四萬金將還歸吳子吳子思有所建立適故鎭臣陳洪範同下江南方用事與吳子有舊窺知吳子意即矢天自言其不得已因以奇䇿語吳子吳子即以四萬金與之洪範故唯唯適薙髮令下吳子遂舎之而去嗚呼吳子痛吏部公之難思有以大雪之凡其所爲于三十年之久出萬死不顧一生欲有所成立於天下而卒奔走以死也吳子諱祖錫字佩逺自號􅄞田原任吏部文􅃟郞諱昌時公之子而爲伯父貴州按察司按察使諱昌期公後原籍吳江吳江吳氏爲海内甲族自按察公始居嘉興吳子爲嘉興邑學生娶徐氏先宫詹學士文靖公長女而余不佞之姊也吳子秊六十二而卒吾姊年三十而卒十年前余已誌其墓五子三女準濩澓濟二女吾姊出灝一女側室氏出銘曰功成而天下後世見其心昭昭如日星事未立而能使天下後世信其心凜凜乎􅅆天填海之精誠嗚呼吾見其三十載之心有以大孚於四海而知千古之無以晦其明於以見忠孝之不泯吳子元配徐碩人墓誌銘吳子祖錫元配徐碩人先宫詹翰林學士文靖公長女而不肖枋之長姊也枋兄弟姊妹六人皆先夫人出崇禎壬申不幸而先夫人棄諸兒姊年十四撫率弟妹恩義井井確有母道焉先公愛而􅀹重之年十六歸吳子吳子故尚書吏部文􅃟郎諱昌時公長子而爲伯父貴州按察司使諱昌期公後兩房富貴赫奕家事塡委待吾姊主内政吾姊一身承順兩翁間寂若無事云既而遘貴州公之喪相吳子執喪盡禮既而遘吏部公之難吳子孑身北奔時禍不測家人一夕數驚兩房中外數千指吾姊一人主之卒以帖然家難未平復遘國變吳子再破其家思有所建立吾姊怡然盡弛裝服佐之於是世難交作網羅棘􅁄吳子義不顧家吾姊率家累變姓氏流離轉匿始終禍患者七年而一病遂以不起嗚呼亦可痛矣吾姊殁年三十吳子遂終身不再娶吳子者即海内所稱吳佩逺者也吾姊二女四男準濩澓濟吾姊之避難也澓濟猶在襁褓俱分散卒不復顧顧身撫其㓜姑攜持不離左右㓜姑卒以得成立噫是豈人之所能也枋不幸􅇜家坎壈姊嘗面誡枋諄諄反復言已泣下枋心常痛之吾姊殁及今二十二年始克銘其墓銘曰孟妃弛裝佐赤幟卒英昌言昭大義義姑棄兒不返視嗚呼吾姊備厥懿生年三十壽萬􅥴塔銘報國大律師茂林祗和尚暨戒幢朂律師同律師三代塔銘般若東漸聖賢應化每於一燈之微而大發其光燄一緒之系而大展其經綸所謂獅子獨行原無伴侣其袪末俗之沉昏而啓羣生之正信豈細故也哉故其始承前緒而既克熾昌以擲􅁚神力巋然獨鎭風雨不動安如泰山使諸方仰望隱若一敵國而風規道範翼子詒孫炤耀寰區垂五十載有如報國大律師茂林和尚及法子戒幢律師朂公法孫律師同公寔未易遘也茂林和尚諱性祗別號力果茂林其字也湖郡之長興人父沈君母丘氏夢異僧請託宿遂生師師貌端嚴初能言隨誦佛號絶不茹葷數請出家父母弗許及父母辭世師年十七遂出家於邑之彌陀菴師精心課誦勤瘁十年遂奮志一出遍叅諸方首叩雲棲時雲棲法席如海而一見器師入室密示復偕至弁山圓證寺俾力修淨業隨至天台見聞谷大師聞識師於稠人之中繼受具足戒於靈谷古心大和尚及古和尚説戒􅀇墓命師爲闍黎古和尚於人天衆前躬率大衆命衆羅拜於師座下而後出衣付師其奉重如此時師年三十有八既受衣復詣江右雲居山閱藏三年學充道尊而陸沉衆中又復十年而聲光不可復掩矣於是吾吳之報國禪寺請師住持時師年四十八爲前丁已歳也一坐道塲遂二十年而躬行寔踐密證潛修不間晦明不踰分寸一銖一縷一勺一粒必與衆同而談經說法標領􅀇微皆第一義於是人天歡喜逺邇傾心入其門者見金科玉條重規疊矩不約而束不厲而嚴咸謂此即如來再臨優波離稱持戒第一亦無以踰此矣報國歷年頽廢掬爲衰草而師既至則締搆莊嚴若天成地湧而師􅀹同維摩示疾之心㴱閔衆生之病􅀹注意於醫藥湯飲又誨人不倦諄複懇勤聞者流涕則師之生成人也爲何如哉師尊重師傳雖道法如是而猶恐失墜孜孜以後賢繼述爲亟而戒初勗公至矣朂公年已壯室心悅誠服於師故决志棄家遂入報國師一見知爲法器即與薙染師主法嚴苦學者多憚之而獨朂公以得眞師爲幸師既傾心善導佛法世諦條分縷析而公亦以師之心爲心先意黙體水乳融洽不特歩步趨趨也自具六合宿淸三業既隱然有荷擔大法之弘願而復遍歷講席廣叩禪宗始叅金粟博山復久叅三峰老人於鄧尉而慨然仍歸報國師􅀧首曰子之復來眞古人也克振前人之緒非子其誰丙子歳春三月之望師預知西歸將屆即以儈伽黎及應器呼朂公付囑曰吾受法先師隕越是懼今既得子可無􅀒先仁矣遂以授之先是水部徐公欲捨家園爲淨界以供養師未能如其請及師示寂即奉以爲師塔院而請公主席於是檀施填委殿閣湧現不數年儼然爲吳中巨刹名之曰戒幢禪院緇衲奔凑一同于報國而勗公法嗣同公亦于師主報國時禮勗公出家者也師一見亦即心許之合掌曰智過于師始堪承受此子其庶幾焉即命贊佐其師綱維内外其操行之淸苦戒律之精嚴眞無沗乃祖乃父而勗公時時勘驗其微密處無少㵕漏遂以祖衣付之是爲戒幢之第二代也自師初主報國以及勗公復住戒幢勗公順寂而同公繼之自前丁已至今癸卯俯仰四十八年滄桑變更亦云多矣即法門異同自相胡越亦未易一二數而獨報國一宗萬人如出一口五十年如同一日自祖而父而孫如同一身噫是豈易言哉是豈易言哉初師將及春而付勗公預于冬間歸脫白之彌陀菴爲講法華爲新佛宇反爲得度師祝髮說戒以酬其初度之恩師之篤於恩故如此故勗公㴱入三峰之奥宗㫖温研有得而還歸報國如長水璿既悟禪宗仍弘本教一時翕然稱勗公不愧古德葢師之篤行有以啓之也師復往徑山掃塔而別聞大師於瓶匋臨行曰君在靑山住我向白雲歸若來蘇再當一見及示寂既將封龕而萬衆擁泣遂至過期第三日而聞大師果至覿面掩龕云師世壽六十八臘五十一勗公諱海勗字戒初別號侣雲姓張氏海虞名族壽五十六臘二十七同公諱寂同字不二壽六十二臘三十五吳之姚氏子也葢師付法者十幾人得度者數百人而受戒聽法者無算而勗公同公之法嗣俱四人薙度亦皆五十餘人而受戒聽法之多幾埒于師噫亦盛矣哉三塔鼎峙于戒幢而來乞銘者則法裔雲章雯也銘曰緬維前葉律義榛蕪靈谷崛起顚墜是扶身爲一砥手挽頽波心地根本光瑩􅅣磨屹然中興天下楷模巍巍一宗孑身荷之嗣法主化枝二扶疎一枝䕃吳古佛再現爲乗願輪秉律持梵繩墨規矩森森燦燦毘尼大法道以人弘叶天生大士幻跡吳興追㴑其先平輿沈亭鍾祥餘慶乃誕異人以拯羣溺以燭重昬出塵奮翼翼垂天雲出入應禪􅅆翔宗教閱修多羅抉探微妙又三十年心光遍炤心印古心梵網重耀一律無餘佛口親詔弘開報國斯稱亢宗徽猷不墜金玉其躬克明師匠靈谷宗風我荷斯道聿求人龍我得眞子以續慧命靑陽苗裔出於弓正既現法身佛光彪炳南詢百城歷叅廣印一扣禪宗再探􅀇論仍主毘尼總持法柄我有聞孫出自有嬀稚稱應眞少戀庭闈甫及離塵佛日增輝堅秉木人般若範圍去來翛然三世同歸昔有奈園今爲寶所聿窣堵波彪從律虎鼎峙成舎利斯妥寶網香幢孫謀祖武浩刼不磨天龍呵護一碣常垂竺墳圖譜我有銘章如虹之吐瞻之仰之於焉終古穹窿擴南宏大師塔銘竺乾之法滅妄爲宗而像教衰遲風流日替方袍圓頂之徒伇志於名聞利養無其寔而希有其名不修其業而思踞其位者比比矣其有既遵覺塗洪探法海徽猷不愧師賢一時推爲龍􅁚而退然隱處剷跡銷光而其聲仍不可掩身愈退而道愈髙足以爲末法鍼砭者當世有一人焉則曰穹窿擴南宏大師也師揚之通州人族姓吳氏父守之母顧法字月華素好善既懷娠夢一僧龎睂皓然入其寢室叱之弗去次日遂誕師師生而嶷重端偉甫六歳即有出塵之思志慕禪悅其所嬉戲皆佛事也父母異之不欲拂其志九歳遂出家于州之西寺爲月洲師弟子寺故以法事應世俗之請吹螺唱唄日紛如也師年雖穉而厠跡其間鬱鬱不得志師慨然曰吾聞如來大法將以明心性出生死顧爾作劇耶吾其行矣時三峰老人主蘇州虞山之三峰法席聲聞遐播師遂决計渡海徑入三峰時年僅十九耳老人一見師器之遂令侍巾瓶依左右師服勤執事惟謹凡朝夕之所諮叩出入之所見聞砭肌薰心如奉龜鑑如是三年遂有省老人益偉之因與授具足戒爲大僧以師之泛海而南乃字之曰擴南名曰能宏葢懸記其擴宏吾道於南也而師年廿三矣時少室一燈浸微綿綿延延其系如綫老人奮於百世之下誓起濟上之宗而昌大之故凡陶鑄學者不特親證之一室亦必令徧叅海内善知識以廣覺源曰佛法大矣彼此一也但得眞子足起吾宗於是師復徧叅博山雲門金粟諸大老咸得法乳而復歸三峰焉及老人開法安隱立爲綱維之職繼主北寺淨慈眞如之席師無不贊從者既入萬峰主聖恩師復歷任兩序事遂立爲監院時叢林初復庶事草創任院事者􅀹爲艱劇師精心鉅力隨事周旋而淬礪道法于塵勞鞅掌之中維持慧命於風雨桑土之際老人歎曰楊岐再來也於是緇素皈仰逺近傾心咸謂萬峰會下之得人可卜其法席之熾昌於無窮矣後大司農宫保張公有譽追頌師曰綱維一衆如石霜之會監院􅁤範叢林如雲巖之份闍黎諸方皆以爲無諛辭其爲當世􅂄宿之所推重如此師既於佛法㴱有所契入屢爲老人之所顧念欲以西來心印付之爲記莂者屢矣而師堅不肻受暨老人示寂遂决計退隱穹窿有皇駕菴㴱居塢中竹樹環匝泉石㴱靚入其中者自知爲仙靈之所窟宅應眞之所遊戲也山故雄峻幽􅃉師顧而樂之時因了閑上人及檀信李居士之請遂移瓶錫居焉師雖退跡㴱居而道風德範播于叢林人爭延致於是平望之通濟菴復請主席平望爲吳越之衝通濟以飯衆爲事而師之受事適當崇禎庚辛之歳歳大祲道殣蔽野名山大刹不能宿飽而師發廣大願誓濟生死凡緇素來者咸畱宿食不以日限其饑踣于路者則四出徒衆收􅄟水陸以千計焉而儲力裕如也既復歸穹窿而學徒日衆草菴數楹無所容止師顧其弟子曰佛説尊那經甚㴱微妙功德七種而建立精舎寔居第二吾其敢忽諸乎亦惟吾力之視耳于是鳩工經始盡撤其舊而新之而煥然寶所不日而成而緇流相依甞餘干指老叅宿德樂幽耽寂久者甞一二十年餘亦不下數載人􅀹景師之德量也穹窿故在鄧尉靈巖之間東西相望各十餘里靈巖和尚既住靈巖則過從于菴尤數愛其地幽勝曰此黃龍別業也因㪅其名曰積翠而亦以師之德足配古南公也靈巖道法尊重海内宗仰其于古人猶未俯首而每見師必爲師禮足云乙已之秋師年七十一時名藍大老問訊供養江浙之間奔走香幣無虚日至冬而示疾罄其瓶鉢散之四衆遺言諄諄以道法厲其後人歡喜而逝時即乙已之十月也其徒遵師命覆仰二缶以奉師之全身閱三年歳戊申即建塔于菴之左坎山以􅄟焉師生於萬曆丙申世壽七十儈臘六十二緇素皈依稱弟子者無算薙度弟子一百若干人而指淵某公明初某公若而人則上首也師長八尺餘言貎伉朗風骨髙峻見者望而敬之而其接納後學愛好人倫則慈藹懇惻惟恐或失焉余亂後隱居避世自全師甞招余寄跡其精藍中去住者幾閱月而師不令俗人知每宵旦話言從容寢食察師之潛修密行眞有古德之所少者非人之所得而知也故其聲光所及迥異等倫而諸方望之亦如泰山北斗不啻隱若一敵國也上首某公某公以師之與余善故爲師來請塔上之銘焉銘曰博綜三乗之奥馳康莊也親入三峰之室憩津梁也不分一燈之燄韜其光也不競一薪之傳峻其防也不踞寶華王座爲衰季之藥王也身心塵刹現景卿之祥也何斥魔外掃彗孛之芒也伊蒲盛􅄿無嗟來之傷也胔骼􅄟霾有澤枯之慶也積翠十笏之地蓮花􅀖也觀樹三楹之室􅃟佛塲也淨界莊嚴爲寶坊也道風髙峻爲雪牀也琅函寶笈披縹緗也魚梵鯨鐘鳴鏗鏘也松杉重重䜿法幢也風泉㶁㶁駛惠航也靑山􅅆合啓􅀇堂也白雲去來師徜徉也於是而書無字之碑流百世之芳也合無縫之固千秋之藏也居易堂集卷之十四終
