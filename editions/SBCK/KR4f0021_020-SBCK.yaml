body:
  text: 頌蘭白華頌灾祥之于人猶影響矣易稱餘慶書曰百祥元精所鍾人物交暢苟嘉瑞之瑰異斯懿德之昭融雖曰有開必先亦惟積累後著非誠貫金石志通神明未易遘也所以和氣洽而甘露降孝德脩而鉤星明人文盛則雒如生政化醲則兩岐出莫不炳烺史牒炤燿古今豈造物之爲矯誣寔人事之臻極致迨乎輓季斯稱末流醇風罕覩于塵區故瑞應不昭于環㝢殊柯連理之木既曠世而無聞異畆同頴之禾亦百年而若接况綴奇葩于萎葉茁異蘂于枯叢華萼殊倫色香絶代爲書􅆻之所未載亘古之所莫窺者哉癸巳歲春二月梁溪髙彚旃先生階除之側有枯蘭生白華焉國香自然肌膚若雪鄙紫莖爲間色豈緑葉之常榮有如姑射仙人無異唐昌玉蘂楚騷香草未覩形容漢武芳聲于焉夐絶產兹靈卉寔曰休徴原其所繇葢有自矣先生世季囘之傳經紹文通之隱德遵忠憲之庭範同萬石之家風篤行則嫓董閭孝友則齊張仲自解巾釋褐以至身綰銀黃位望通顯逾渉廿載而外無異門内無異煙孝養温牀友于共被吉祥之氣煙煴閨闈堂上二人同躋七秩居則極養堂之歡出則盡板輿之奉非天倫之至樂人間之奇瑞乎書易所謂是爲不誣近者太夫人無疾而逝先生痛念罔極養過乎禮以爲桮棬弗御而繼志爲先謦欬弗聞而視聽敢後于是恪遵治命手繕法華冀四法之㝠通俾重泉之夜曉染翰方畢而瑤華斯見史云孝感不其然乎夫隱之􅂘泣則􅀟鶴警鳴乹邕哀號而羣鳩環集至性感被異物徴祥已足再榮安邑之槐兩寔廬江之橘况復修竺乹之妙諦拈調御之洪文銜涕操觚比張孝始之精釋典薰心拂楮若滕曇恭之睹佛光遂使黃葉含靈庶卉移性南陔有草忽同咒鉢之蓮九畹餘芳竟成刻玉之樹香聞十里暉暎三春雖金蛾玉蟬遜其芳麗長卿簡于愧彼珍奇曼陀雨旃檀之林優鉢附貝多之葉無以加矣豈新林墓側旅松百株孝政廬前生麻十尺之可擬哉吾聞采蘭孝子相戒以養也白華孝子之潔白也二德兼修靈瑞爰臻故蘭薰與雪白同芳乃瑤草偕琪花合體非行同曾史孝比參騫内行所孚無微不格豈能使王裒柏樹爲田氏荆株也哉道叶庶徴事窮往䇿歌詩滿于緗帙贊歎溢于同人聞風而興敢忘斯義不辭固陋用垂頌聲頌曰蘭之猗猗揚揚其香粲粲門子令聞孔彰循陔致養陟屺弗忘孝德備矣神斯降祥皎皎白華曄曄其色彼居之子馨香其德鮮侔晨葩直比瑞軼湼而不緇服之無斁既纂竺墳遂覩雪珂優曇花現白業不磨反枯爲菀瑞草榮敷濯濯其英蓼蓼匪莪凝膚若玉含膏如露偏其反而氷心霜跗萱背莫追椿景方富禎祥不虚福流永祚銘書函銘是非金人三緘其口曰戒之哉括囊无咎是非金人其口三緘曰戒之哉無易由言是非金人三緘爲何言有枝葉興戎孔多曰戒之哉竹杖銘爲楊明逺七十壽可與適道用之則行易傳曰堅多節老氏曰虚其心不知老之將至何可一日無此君雜著討蟣蝨檄病臥爲蝨所苦戲作此以討之爾麽蟲蟣蝨者身慙蚊睫質細蟭􅉂夤縁線索以爲生依附豪毛而自大聚族而處豈知蛾子之君臣遷徙不常詎有蜂王之國邑紀昌善射懸之而貫心王猛雄談捫之以揮麈固垢穢之滋孽實鋒鏑之餘生將軍有血戰之功汝依甲胄窮士貴蠖藏之用爾處袴襠厥有常居毋宜越境苟爲曼衍必致侵漁故設湯鑊之嚴刑重捕􅀗之功令十日大索五丁窮追爾無捍兹三章人亦寛其一面爾乃頭足方具便爾鴟張耳目未完胡然作孽􅃤人肌膚以爲樂吮人膏血以自肥腹既果然貪饕未已形同混沌蹣跚可憎投􅂩抵巇無微不入呼朋引􅀋寔煩有徒時尋蠻觸之爭罔覩蜉蝣之旦以鶉衣爲兔窟髙枕安眠望毛孔爲屠門朶頤大嚼但知口腹不畏死亾爾常噬臍人猶芒背遂使緼袍之士手不停搔伏枕之夫臥難貼席不耕而食徒知膏吻磨牙剥牀以膚自侈茹毛飲血猶恨天衣之無縫生憎荀令之薰香􅏐膚比于割鮮矢口矜其食肉蠕蠕蠢動曾玷叔夜之龍章􅀧􅀧殷紅時汙麻姑之鳥爪朗誦阿房之賦正如蒼蠅之泄赦文僣登宰相之鬚何異妖狐之升御座罪維滿貫惡極滔天誠罄竹難書續髮莫盡者也兹者渠魁既􅀗斧􅃏將施事急求生乞憐恨其無尾計窮就戮大患以我有身或憤燃其臍或戲切其舌或咀其肉以雪恨若劉邕之􅄝痂或數其罪而甘心若張湯之磔䑕然而未爲合律不足蔽辜乃􅃟五輪以爲兵排左車以爲陣歛袵成甲褰裳作旗巨擘若博浪之椎利齒同斬蛇之劒雷􅗟電擊風掃雲馳夫以槐安國之巖城猶然馘醜兜離國之形勝尚爾犂廷况乎烏合一旅之師羣居四戰之地裸身無􅎙甲之蔽脆弱無螗臂之摶將視斬級功多衆擬長揚之獻獸血流漂杆􅃤同雲夢之染輪仗我爪牙窮其巢穴無易種於新邑必殄滅之無遺提湯趣烹殺之無赦劾䑕文䑕之爲患害于天下也久矣或食郊牛之角而改卜或食田畯之禾而薦饑此凶于一國者也或慿叢社以爲祟或踞厫倉以自肥此賊于一鄉者也或穿墉以速訟或穿衣而見私此害于一家者也嗟乎䑕之爲患害于天下也久矣而空有迎猫之祀終懷忌器之心遂致孽蟲跳梁罔知畏憚晝出而宵舞什伯以爲羣馳驅藻井之間呌嘯牀第之側篝燈則啜膏而滅火旦日則冠幘而人言時銜尾而舞門亦去穴而登木夫䑕盗竊小蟲也而爲妖爲孽狀非一端良由小人道長賤人在位播惡於衆氣􅀋相感耳故殺之則福至縱之則禍生所謂開國承家小人勿用也若阿􅐣身係巨䑕而爲君則十三年而隋亾李斯學倉䑕而爲相則二世而秦滅張湯捕盗肉之䑕具獄而磔之則福流子孫中山王周南不應人言之妖䑕而䑕自顛蹙以死不更彰彰較著乎吾今吿之門神户靈爾捕爾誅母令盜竊公行必用勦絶其命庶幾人事安穩而家道肅淸矣絡野篇垂死病中備極諸苦而所尤苦者有三物焉一曰蟣蝨也一曰䑕孽也一曰庸醫也夫其人已百日沈疴六十日絶食而三物也者更相爲祟嬲之不置使晝夜苦惱臥不貼席求生不得以死爲幸幸遭仁遇神復延視息今將聚三物也者而訶問之衡其罪之輕重勒成爰書蝨則殺之被中䑕則磔之堂下而使庸醫薄而觀之以愧其心焉惟兹罪在尤重故以不治治之也客曰庸醫固有罪矣然子以等于孽蟲無乃已甚乎徐子曰唯唯否否夫蟣蝨以大被爲阿房而恣其作孽而所傷者肌膚之細微䑕以藻井爲雲夢而騁其畋漁而所損者不過服食之長物其于人也非關死生殄軀命者也若庸醫則不然彼固以人命爲草菅而以藥餌爲兵刃瞬息之間將寡人之妻孤人之子聚者以散生者以死其視􅏐膚穿墉貪饕盜竊之罪不萬倍乎以余論之蝨鼠猶末減耳客曰不然彼蝨鼠之作孽也皆拒之而不去者也若庸醫者非主人延之入室又何以至病者之前而以其妄術殺人哉若論其罪則子開門揖盜先尸其咎矣徐子曰唯唯否否夫二䜿遯于膏肓則醫和束手疾病在乎骨髓則扁鵲亾去彼固自審其能否而知病之治不治也人之生命庸詎可忽其人既舉一身而委之而以彼爲司命則當以能否爲進退何不審其術不察其病美錦學製徼幸萬一卒致六十日絶食之人復嘔咯血奄然竟斃也苟非今日之和緩起而救之則長逝者魂魄齎恨無窮矣庸醫之肉尚足食乎以余論之蝨鼠猶末減耳客曰是固然矣然子以人而等之孽蟲是亦有説乎徐子曰物以􅀋聚之三物者雖爲術不同厥罪亦異而其但知口腹之求不畏腰領之誅則正相􅀋吾故聚而論之也何也乾沒一試徒以求食非蝨鼠之尤哉昔人云醫者之治病猶獵者之逐兔也良醫知病之所在故用藥省而奏功多庸醫不知病之所在而妄冀一効故雜投而罔功正如獵者不知兔窟而廣絡原野漫然馳逐卒致人犬俱罷而兔竟不得也因賦絡野篇焉其辭曰厥有一人妄稱知醫鍼石矇然色脉罔窺意緒貿貿嘗若有爲坐不席㬉言語支離問厥淵源不飲上池之水而啜蹄涔之泥昔人見五藏癥結今也締五色而目眯昔人見坘一方人今也與病者對語猶面墻而觸籬以六旬絶食之病氣息一絲而猶曰中有積滯也仍攻之以消導尅伐之劑遂令嘔血十一日而云徂是將以冶􅁑續命豨苓引年烏啄療饑吾聞人之所病病疾多而醫之所病病道少以余之疾多而適逢其道幾乎而不化爲異物以歸夫造化之小兒我今賦此痛定思痛將以愼疾自警豈特爲庸醫殺人之爰書醉言貽王雙白衆人皆醉我獨醒此屈子之所以卒沈其身也悲夫後世遂有以醉全其醒者既遺世而獨立而又不能忘於情計無復之逃於一醉亦可悲矣則其沉湎昏酣惟日不足者其心又何嘗一日而醉哉故吾觀阮籍陶潛其人未嘗不弔之昔人云吾又以悲醉鄉之徒之不遇也夫士君子不幸而不能見明於時致逃於麯糵其可悲寧止不遇之爲弔耶苟既不能忘於情亦遂以不能無所預於世君子亦將何以自處乎則其醉也吾恐其正同於屈子之醒也此君子之所以重知幾也雙白先生醉鄉之後人也吾故書醉言以貽之難客徐子與客飲于草堂甚懽客曰昔子瞻性不能飲而所到必釀善酒以醉客身無病而嘗蓄良藥以應人之求曰病者得藥吾爲之體輕飲者甘於酒吾爲之酣適吾以爲於酒則可矣於藥則未可也徐子曰何以言之請聞其說客曰酒以合歡以導和爲利甚美若于藥稍誤則殺人其禍甚烈故不可也徐子曰否不然酒以合歡以導和藥獨不以􅁍病以引年耶然皆非所以語於子瞻也在子瞻則釀酒飲客而已耳製藥與人而已耳造物産百藥以療含生之疾痛千古論者未嘗以藥之曾殺人而并譏造物之生是藥也天生五榖以養人然病而誤飯飽而致淫者嘗立死則又當以飯之曾殺人而并憾天之生菽粟也哉子瞻亦猶是也即以利害言之酒之禍無異於藥且寔甚于藥其甚于藥又萬萬也古之天子以沉䤄於酒而喪天下者有矣未聞後之人君有以藥療人而亾其社稷者也釋氏有大德比丘比丘尼脩行堅固而以一醉之頃盡破五戒者矣未聞沙門有以飲藥而破五戒者也何也酒者人之所甘故有既醉而强飲者藥者人之所苦故有雖病而猶不服者則其禍之大小懸殊不較然耶子產曰火烈人望而畏之故鮮死焉水弱民狎而玩之故多死焉藥火也酒水也故酒之爲禍嘗萬萬於藥也客無以應唯唯而退書示馬生傳曰天下無道則言有枝葉夫辯言亂政讒人罔極此枝葉之言之在天下者也起羞興戎叢怨賈禍此枝葉之言之在一身者也生當末流轉㗋觸諱雖曰子輿好辯而尼父則欲無言雖曰隱居放言而吉人終歸辭寡病從口入禍從口出可不戒哉可不戒哉所以大易著括囊之辭金人垂三緘之誡也行矣馬生勉之勉之試墨墨堅如玉石其光如鏡其色則嫌􅃮之白此最精之墨也即質果佳矣然不堅則不足以發其光光不發則色亦減是以劑之爲難也墨以煙爲體以膠爲用以捶劑爲學問嗚呼既善其體又有其用又得于學而有不盡善盡美者乎君子立三不朽于世亦如是止矣而况微物乎目疾後五戒壬戌初夏陡然病目淹􅆞六旬患生所忽病中撿􅀧有此五端若危微之交理慾之界則休文之懴悔無一叔節之不惑有三久已信之寸心無煩銘之座右矣一戒髙聲徴色發聲炎炎奈何不杜其幾其傷必多釋氏謂怒爲無明吾恐其無明也二戒努力任過其力即左氏所譏不量力也凡有所過必有所傷一無所傷病乃得去優哉游哉聊以卒歳三戒勞心心過勞則神不寧神不寧則目不精明生於靜也晴日無風則加朗寒潭無波則自淸四戒多言多言則氣散氣散則神昏爾其念哉昔我有先正其言明且淸不多也願以愼疾因之寡尤五戒久坐靜能勝熱兀然正襟似可􅁍病然過久則鬱矣安坐有頃繼以散歩一室之内可語逍遙論文襍語偶閱一敘事之文謂其語句之病有六曰支曰複曰蕪曰贅曰謾曰習然此六字不過因一時病而發非古人曾拈此以評史傳者也今更細論之支支離也然支離亦有二種有本可直捷而故爲曲折有見理不明說事不暢而依阿牽綴不可究詰複重㳫也然非如檀弓之沐浴佩玉非如史記伯夷傳之非耶非耶貫髙事之泄公泄公項羽紀之軍鴻門覇上賈生傳之長沙卑濕壽不得長非如漢書王吉傳之吉上疏諫曰吉即上奏疏誡王曰吉上疏言得失曰龔勝傳之勝稱病不應徴勝稱病篤勝曰加以年老被病也此正史家妙境未易可幾今之所謂複者彼不自知其複而複者也彼自以爲絶不複而寔複者也蕪襍也冗也荒也穢也若一望荆榛沙礫汚邪灌莽不可耙梳芸治也贅贅痝也或不知史家之斷落而謬添接脉之語或不知其言說之既盡而更引已竭之音或忽著一故事或忽見一成語自侈其博而愈呈其陋存之則甚礙去之若本無此之謂贅也謾欺謾也誕謾也顢頇大言橫加突出既非英雄之欺人猶遜名士之妄語寔不足增伊人之價而徒爲有識者所羞習習套也熟爛也若言子孫則必稱箕裘堂構若言兄弟則必曰棣蕚塤箎自有一班到處塡塞人謂如此則篇篇可用而我謂如此則一生止可成一篇文也微乎微乎扁鵲謂人病有六不治吾謂人作文而犯此亦六不治也故不嫌絮言以示學者論文襍語此文昔年不揣大効他山之攻􅀧竄成篇者及今復加詳閱覺通篇是病竟至不堪指摘正如癘人遍體瘡痍疻痏又如廢地觸處瓦礫荆榛因復痛加攻治芟夷今始􅃀然成一鉅文矣惟吾明逺即如今所改者勿移一字重録付梓速將昔年灾木付之一炬始得耳不然則虚我一片苦心亦􅇳我十日之工也於此亦自喜學業長進見地筆力較之二十年前不啻徑庭直同霄壤矣獨望吾明逺之日進月新亦復相同更爲樂事因以此文之病一一拈出如左此文有三謬一曰體裁之謬人家行狀雖云件繫然寔是敘傳中文須語其大者重者今逐歲挨排直是年譜隨地標題直是遊記失其要矣故今將靦縷甲子遊歷處必痛刪之所以無失其爲行狀也一曰段落之謬凡敘傳之文煩簡重輕有劃然不可淆者故每於繁瑣處必須一總題過然後再著其精神命脉處故有直說完一生而重新追敘其中一二事者如是始覺精神明了今乃從戍亥起瑣細紀遊及至都忽然中間著一段如許大文至辛未出都又復瑣細紀遊那有此序法全無斷制全無裁剪此段落之所以不明而精神面目之所以不出也一曰行文之謬段落既失未有行文俊快者然或煩簡輕重有失其宜或頭訖呼應未能得當耳未有如此半篇之中而連著四段府君曰幾許說話者自古史傳中無此行文之法如此則散緩癡重䈥不束骨絶無生氣矣其餘㳫拖重􅃨不可究詰故痛刪之夫文猶人也人不能行則尸居視肉文不能行豈成其爲文哉此三謬者寔本四病一曰稚也一曰襍也一曰蕪也一曰陋也稚則必襍襍則必蕪蕪斯陋矣何謂稚不老成也老杜句云毫髮無遺恨波瀾獨老成惟能老成故無遺恨也此文有一好字可入者必欲入之有一好句可入者必欲入之有一好事可入者必欲入之斯稚氣也而襍矣蕪矣陋矣譬如織者錦綺布帛竝重於天下若匹素之内而爲錦者入焉爲紈者入焉爲綈者入焉甚至爲絺爲綌爲褐爲罽者亦入焉見者無不唾而棄之斯爲天下之廢物矣亦猶之乎醫但知其藥味之美而必欲用之而不知此方之内必不可入此味又不知既用彼味則必不可重用此味則必至於殺人矣以是言之究竟四病總繇於一稚也論詩襍語吾於詩學未下苦功故每不敢易言詩然詩文一也其體則異其理則同今姑就吾之所見淺而言之何如既賦長篇首重章法若章法未善即字句極工要未足以登作者之壇而章法之失亦有二段落不分前後舛午失在歩驟純駁不一雅鄭襍陳失在體裁二者皆章法之病也不可不審也余嘗謂作文有四錬錬字錬句錬局錬意有意而後有局所謂錬局者即章法也而字句之錬詩視文爲尤吃􅂃然非必組繪雕琢然後爲鍊有極淡極真而極鍊者更有極散而極錬者亦有同一字義而用彼則鍊用此則不錬者同一句法而於此則鍊於彼則不鍊者不可不審也要在心知其故耳卷之二十終
