front:
  text: 居易堂集卷之三
  hash: sha256:6d31962f575fd9b8dd38ac721528c8e2b51757fcdd8dd9c927b79ff8cb6316be
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_003-1a}
body:
  text: 書致巢孝廉端明書附答書又附書後一則滄桑以來揮忽二紀俛仰宇宙􅆌焉無儔獨我端明孝廉巋然靈光故國完人天下仰望不啻松喬之在霄漢間不肖弟沗屬同心神往徒切而欲一促膝論心則無如端老既廬墓不出不肖弟又土室自錮也常與佩逺語及左右戲謂之曰吳子素有神力能致吾兩人一時會合否佩老云吾不能必巢子以必來猶不敢强昭法以必往也乃於昔春道駕忽越二十餘年足不踰户不接親故之例破格逺顧􅅆旋二百里之逺踰嚴城遇非􅀋而不惜再越宿始到吾草堂此種至意未知不肖弟何以得此於端明孝廉乎驚喜感愧殆不可言然乍接顏儀猶以爲夢中相見旣得促膝論心則以爲巢子眞從天而降也驚喜感愧又何可言即滿堂賓客無不相詫巢孝廉破二十餘年之例特枉徐子山居誠一時美談千秋盛事也第恨別去之促僅僅脱粟一飯遂復返斾昔郭有道過袁奉髙不宿而去鍾士季見􅄞中散一辭而返始以道駕之枉存旣用自詡既以道駕之旋返又㴱用自懼矣悚息悚息如何如何別後倐易兩寒暑舎甥吳濮時時過從必問起居萬福知尊著益富曷任欣慰惟是弟既不能自踰土室造端翁之墓廬又不能以二十年種種􅁧著遥寄就政有道如何如何孟夫子曰窮則獨善其身逹則兼善天下甞竊論之君子既生於世未有不能兼善者即窮而在下然固有􅆆一世之風聲繫萬古之綱常者如伯夷餓於首陽寧非獨善而其所繋於世何如也且士君子不得志於時往往著書立說以垂教於後世弟之無似心竊慕之苐恨土室面牆孤陋寡聞即有成書不得如吾巢子者而是正之前者旣過草堂又以片刻促別眞當面錯過所以至今爲悵恨也如何如何專札馳候以布慺慺鱗羽之便弗吝教言自丁未暮春獲奉良晤倐忽三秋眷懷彌積時有緒言欲寄以乏便鴻祗有神往頃八月􅀄旬奉有手翰知道兄見懷之深注存之篤也并悉道履可勝慰籍唯我道兄質任堅剛窮而彌厲眞可謂百世之師矣弟盛淑其下風雖埋影孤村不與知故相接而時時奉一俟齋以爲師表聞聲相思豈必握手相語哉彼林宗不宿而去士季一辭而返皆漢晉之流習非世外之眞契也道兄何必引此以爲病耶曩日半晌之晤誠恨其促因有他賓在坐不可以畱然弟私心爲已多者古人相視而笑以爲至足寧尚存乎見少哉日月擲人去晨雞不􅈕鳴此非陶靖節之詩乎然於斯時卜居南村抗言在昔素心晨夕髙臥羲皇而今也欲言無和顧影自悲舉步萬難縮地無術唯有夢寐可慰相思而積思不舒沉疴益劇弟舊年雖了向平之事明歳履耳順之期而白髪蕭蕭槁項籬落去日苦多夙心終結亦付之永歎已矣如何道兄以未衰之年獲潛養之實咫步有閑耳目有屏外累旣遣内心自靜神宇泰定而學道愈充門以外截然寘之尚何觸耳而驚經心而痛者之有哉然愛重一身不唯爲已戒心慄慄無時不然終身之憂君子所履其兹日之謂乎若弟性鄙學荒離羣多疚今益年索氣衰不克自進祈髙明有以廸之無間於逺近也望之望之巢孝廉端明名鳴盛嘉興人乙酉世變後即遁跡荒野矢以廬墓終身不毁膚髪時天下稱遺民之中有同調者三人則宣城沈徴君睂生嘉興巢孝廉端明及余不佞也孝廉平居足不踰户親知都不接見丁未暮春忽破例逺顧余於山中􅋡沿二百里越嘉禾松陵吳郡凡兩宿而後到吾草堂逺道護持而來者即嘉禾黃子復仲而草堂中同集者爲江右曾靑藜山東姜奉世也一時傳爲盛事又二年已酉秋余寓書問訊孝廉此孝廉笞書及贈篇也又十六年余輯拙集得之笥中嗟乎今孝廉與徴君俱已逝矣俯仰之間愴懷者久之答笻公書名大􅉚字笻在靈巖嗣即宣城沈麟生五十之年忽焉已過惶惶焉惟以無聞自懼不敢以知非自解也重辱吾兄不相遺棄千里贈言華袞之加不啻榮幸主臣主臣不肖弟衰遲悠忽慙􅀒歳月雖學道有心而聞道未期吾兄以千里之逺三年之別而未荷諄切規誨勉其不及而津津揚詡其三十年之陳跡是非所望於吾兄也雖薑桂之性老而弗渝三十年素履未甞毫􅁵失墜然此是吾故有無足多談也鄒浩與田晝交生平以氣節相激厲浩爲諫官晝惟恐其不言及浩以爭廢立事得罪直聲震天下以謫歸浩見晝而流涕晝正色曰丈夫所當爲者不止此也在志完勉之耳浩茫然自失此眞朋友哉緼袍不恥是道何臧學問之機不舎一息三十年陳跡而猶以見詡弟益自懼矣大約身心學問不駸駸然日􅂶其所未及必并其所已及而亾之也惟吾與兄交勉之而已與葛瑞五書弟年來多病未老而衰頽然廢墮正恐乖隔多年無以相見昨辱逺過從容話言出佳味傾濁醪悠然昕夕若猶以我爲可與語者私心竊自喜坐閒偶談時事及蔡人云云因以與馮生書相示實恐同我于名士之妄語無其事而誇其談故以書實之耳非謂五年之別云云便足以藉手相見也人生苟有所􅆆立當日新其所未足凡屬故我即爲陳跡今所云云實故我也豈足道哉弟五十時有答笻老一書是吾心之所存矣而生平恥語氣節實以氣節非吾人歸宿之地况若弟之無似本無氣節之可語乎昔常侍坐退翁老人弟謂如吾昔之所遭則我今之所處正自不得不爾人生自有定格我僅能垂三十年不越此格耳不知我者以我爲異固已謬矣知我者又從而矜詡之不亦陋乎退翁稱善且人之能有所建明於世不與草木共腐者豈獨其可見者乎必潛德内行確乎不㧞砥于所不見守乎所不聞然後其不移不淫不屈隨事而見耳其不移不淫不屈千古所見者猶崇墉也猶岑樓也而必有所不見者以爲之基而後其可見者得以無隳也傳云本立而道生亦可語於此也若不於不見不聞是求而但髙語氣節鮮有不敗者矣古今史冊所書總不必言即知吾與兄身與遊處耳熟而目接如某某者其初非不赫然氣節之宗也耶而今爲何如也猶草木然不勤其灌溉培其根株而但希華葉之滋長鮮不立僨矣近有一老每誇言氣節吾所不屑今吾睹氣節之事甚小之矣弟謂此老失言客或見訝吾謂有説此老之小氣節者若不能駐足於此山之頂未免顛墮而謬謂此山之卑吾固不屑駐足也吾之不敢徒立氣節者若卓立於此山之頂而仰彼峰之更髙而必欲勉躋焉者也二者未可同日而語矣第此山之頂固無隕越而所謂彼峰之巔則渺焉其難攀而􅃼乎其無所措趾也是弟之所甚懼也是在聞道而知我者之有以力扶而勉進之耳八月秋涼廣庭嫰桂數株幽香滿屋兄能䇿杖一過甚樂甚樂與友人書君子執禮不可不嚴而存心不可不厚存心厚者善善長而惡惡短是也聞人之惡如聞父母之名耳可得而聞口不可得而言是也君子之與人也皆然而况處骨肉之間乎吾聞之骨肉之間以恩掩義不以義掩恩所以春秋之法爲親者諱也先師不云乎父爲子隱子爲父隱直在其中矣言父子而兄弟可知矣則從兄弟而推之者亦可知矣何也吾兄弟者皆吾父母之子也兄弟而有不善實父母之不幸而父母情之所欲隱義之所當諱者也隱者隱其過也諱者諱其惡也茍父母之所欲隱欲諱者而吾又焉得而不隱之諱之乎聞人之惡尚口不可言况兄弟之惡乎父母之名尚口不可言况父母之不幸而欲隱諱者乎所以人生不幸而遭家庭之變骨肉之亂可以正其辜而不可以聲其罪正其辜者正家道也正人倫也不聲其罪者恩掩義也爲親諱也故吾望兄於世譜中急急刪去某居蕩口一則及某氏某氏二則也兄之書此也豈敢謂兄存心之不厚乎葢吾兄疾惡既甚執禮過嚴故不覺其大書特書而未之思耳記曰銘之義稱美而不稱惡人之家乘庶幾有之况牆茨之詩所謂不可道者是三則者于例則不必書於事則不可書於情於義則斷斷不忍書矣葢可以正其辜而不可以聲其罪也然此非不佞之言也禮經之言也内則云不可怒子放婦出而不表禮焉嗟乎微矣嗟乎子婦猶爾而况於兄弟乎吾知兄不待吾辭之畢而刪去之惟恐不速也與宋生大樵書聞足下明歳謝遣生徒將專精醫學閉户下帷不得不止私心竊爲足下賀而復有惓惓欲一效於左右也昔人以醫道比之相業謂不爲賢相則爲明醫以其利於人者博而濟於世者大也是豈可以易言之乎故願足下之㴱造而精求之作沈船破釜之舉若得之則生者而後其學可成其道可行於以立身於以成名于以濟世於以成家即於以不朽矣此僕爲足下舉手加額以祝者也若悠忽從事作輟無時或得或否則所事爾爾又何必去故而謀新乎足下今年已强仕矣先師云四十五十而無聞焉斯亦不足畏也已二十年來時光學業既以悠忽失之囘首東隅豈容再蹈􅈝然警省則勇氣百倍自然夜以繼日坐以待旦以求之矣思之思之􅀑神通之俾醫學大成不特成名成家不􅀒此生亦庶幾成名成家不􅀒令親一片盛心也當今之世而能竭力捐貲以助親知之學業其人眞古人也令親既有古人之誼自能始終週全以玉足下於成耳沗在世誼謬荷推挹不辭覼縷聊備韋弦綂恃心知可勝惓切答休寧汪文儀書名燧山林枯槁適吾性分當此世界反爲藏拙手教見存亹亹引喻雖知已所期許然非僕之所敢安也愧悚愧悚惟是生平自期儉德危行求其實不敢求其名衾影所在􅂶類盡義慊吾心甞欲晦吾跡彼煦喣爲仁孑孑爲義以􅀒皎皎之跡翹翹之名者僕之所㴱恥也僕甞言君子立身期於無悔而已惟能無所悔然後能無所屈而吾之所謂無悔者不過貞黙自守以安時晦申屠子龍吾師也未知足下以爲何如承委巨幅爲甫翁先生七十稱慶雖筆墨之微而感於至性淋漓沈著十分滿志千巖萬壑足以擬貴里髙居之勝松齡鶴算足以致堂上千春之祝圖成不覺自賞喜而起舞也外賦得松鶴長歌一篇爲甫翁壽亦書一巨幅而日來賤體實抱微疴更復苦􅀬委頓書法未盡吾長且中有佚句信使行廹􅂓以伴緘知能笑畱倘不以爲惡亦自可重書也外令伯母亮節端蹤古人所少一讀紀畧便已欽注茍有心世教者孰不欲操觚􅁧述以芳靑史而昭彤管也作傳之役其何敢辭一俟徂暑便當泚筆必使氷霜之潔松柏之貞躍然語下耳與吳子佩逺書附答書客秋以垂死之病久閱三旬展側須人氣息纔屬乃既奉色笑歘然起坐談對浹晨夕十年離愁一旦大慰君子至止二䜿遂退三舎况復惠以大藥軫其饑寒乎其爲歘然而起無疑也則此一昔話言寧不可歌可涕耶言別之後別緒擾人且􅅆首往事又復十年愁痛一時攢集爲之黯然閔黙者竟日遂致復病病復浹旬直至九月杪始得强起因思吾兩人三十年來疾痛憂患聚散暌合歌哭夢覺生死死生誠一部十七史未易更僕而此十年中之可一謀面而不能可一通問而未得尤爲鬱結直至此一晤言而鄙心始豁總之三十年來疾痛憂患聚散暌合歌哭夢覺生死死生雖或形跡有殊仍復豪􅁵無間因爲作拙畵六幀拙詩百韻奉贈􅂓以記吾兩人不特休戚同體直復死生一致是可述也甲申乙酉弟依兄於汾湖蘆區爲一圖丁亥戊子兄依弟於金墅爲一圖癸已歳吾兄抑志北遊相送於靈巖支硎白馬磵爲一圖已亥歳弟屏居積翠兄來同棲止爲一圖辛丑歳兄於禍患中間道過存篝燈對語徹夜爲一圖及昨歳弟病垂死兄過存澗上爲一圖長律百韻則櫽括此六圖中歌哭涕笑而成章者也六圖百韻雖未悉吾兩人之百一然亦聊以􅀧染吾兩人頰上三豪聊以鼓吹吾兩人生平千載耳知吾兄必一笑而存之也日來硯水寒沍筆豪皆氷萬不能書寫千言故先寄畵來幷惟炤之累􅁓手教盈卷畵圖珍重開緘先讀數百言一字一痛讀至形跡雖殊毫髮無間二語則涕涙交迸如湧泉矣抱志之士遭值坎壈最難知者肺腸最可議者形跡不逢直諒多聞仁人長者誰爲恤其隱而鑒其外横被譏評者多矣閔凶之子于淪喪之後惟此中端明有知我之情西江宋未有有知我之言未有謂我于其門人曰此君渉歷四方胸有一大題目橫走䜿走皆不離此非他人浮游者所能藉口端明裹足不出户限者三十年自頃弟歸一至近郊再到吾廬諄諄懇懇以天祐不可不答末路不可不愼爲戒詞意俱苦言之不足繼之以歌詠然其動色相誡葢猶以我爲完人而邀我于逺道也自非知其肺肝鑒其形跡能以十五年之逺一見無猜疑相對如昨日乎至於吾兄則越萬里而形影相隨㪅百年而斯須不隔不特兄之許我毫髪無間弟亦自信爲毫髪無間可以無負仁人益友然日暮途逺敢不自懼敢不自勉哉生綃六幅初對之驚心眩目展轉再折三流涕相向忘其是畵矣見贈百韻幸於風日和好得暇書就俟弟來取但不知有佳􅁓否弟㪅有進者吾兩人可圖可咏將來似不止於此吾兄尚當濡筆以俟也與馮生書名羽字鶴仙僕自二十四歳而長往避世今已五十一歳矣俯仰二十八年其間所遭之憂患所受之侮虐及所歷之饑寒誠極人世之所未有未可以更僕數也而僕無不怡然受之二十八年未甞有一轉念未嘗萌一退心若憂患之可樂若侮虐之可甘若饑寒之可戀彌進而彌堅愈加而愈力所以然者僕豈有以異於人哉誠不敢大變昔年從死先人之初心誠不敢稍違先人長爲農夫之一言也乙酉之夏先人將殉節僕誓必從死先人呼僕而泣諭之曰我固不可以不死若即長爲農夫以沒世可矣僕死志未遂故謹守先人之一言至二十八年而不變也匿影空山杜門守死始則絶跡城市今并不出户庭親知故舊都謝往還比屋經年莫覩我面傭力自活采薇茍全二十八年從未敢踰越分量攀援一當世之士也顧敢一旦與公侯卿相通其交際耶况當世之公侯卿相亦安用此衰瘁之廢民乎憂患餘生一息僅係而去秋復病血痢兩閱月死而復蘇者屢雖得再生頽然衰瘁耳聾眼暗四體不仁少壯所讀之書􅃼如隔世宿昔所處之事轉瞬遺忘年雖五十而委頓如七八十老人此足下所目見者也則又安有毫髮之足采耶至鄙性硜硜概絶問遺自㓜而然非有所强故爲時之久垂三十年而片楮不通于人間一縷不入於吾室向年有骨肉手足五服之親千里見存一葛一扇而僕完璧衣􅄄未啟其緘昔歳先公營葬有一通家賻三百金僕絶不敢沾其豪􅁵而傭書賣畵典衣損食竭蹶以襄大事此通國所共聞見者也是冬祁寒氷雪連旬至典及絮被妻孥號寒酷同露處有一女止三歳冬無絮衣患成寒疾十年不差一兒年十二便能書畵見者以爲神童而饑不得食病不得藥遂殞其命夫人孰無兒女之愛僕獨非人情乎所以然者所謂二者不可得兼故寧受􅃤酷而不敢稍隳吾志也夫當至阨處極難猶不稍通問遺於一綫今旦夕苟安敢無故而靦顏以􅀩厚幣耶二十八年之故吾未敢一旦而有改也譬如􅄔婦盛年喪夫即毁容截髪誓死靡二守志閱三十年矣今年過五十矣頭白齒落矣母論此􅄔婦必不欲自變其所守即當世之賢人君子亦必不願其稍變其所守也今僕所處何以異焉故吾願天下知我者之哀憐而容宥之俯矜迂愚曲全微尚母奪其志母易其素俾得優遊山野苟安旦夕任其麋鹿之性全其草木之年則生死而肉骨之矣爲惠不更萬萬於千金之幣耶書後一則并録左方覽之可以見吾志矣善爲我辭以安吾素是在足下愼旃勉旃與王生書僕於今日實貴茍全既欲苟全其餘生復欲苟全其微尚大要日與世逺日與世踈則全否則必不能全也故僕三十年來息影空山杜門守死日愼一日始則不入城市今㪅不出户庭僕之自處確乎不移然亦冀友朋之黙體吾心有以相成也今足下自稱與僕相知乃甞言時時稱頌我於當世已大謬矣又甞謂我某公欲求見某公欲問遺某公欲一及徐子之門不更謬耶何不知我如是耶以僕今日所處一與世接便是禍機何也從之則改節違之則忤時忤時禍也改節尤禍也故僕於斯世宜使日就相忘而不宜使誤有採取也切望足下凡見當世之人絶勿置我於口頰總勿道及我一字更勿使今之人因足下而闌及於我則大幸矣譬如芝蘭生於籬壁而母爲之徑路則得以自全其芳珠玉逺在山海苟有爲之梯航則不得自匿其寶若足下貿貿然逢人説項是愛我者害我譽我者毁我也此吾之所以歎恨大聲疾呼欲足下之痛改之也毘陵王􅀟白名宿隱居然其性好交遊每相見不曰某公傾慕之極則曰某公欲一奉候而未敢僕即峻謝之曰王先生以後凡遇四方知交只如徐子已死㪅不必齒及一字設使諸公有齒及者則望王先生申申詈我若何乖僻若何不近人情以絶當世之垂念則受賜多多矣今吾所懇於足下者亦如是也勿稱道我於當世勿使當世之人有以闌及於我則是足下之有大造於我也靈巖退翁老和尚甞乞拙書七佛偈一鉅幅日夕懸方丈後忽易云美八分因相語云昨有當事來方丈中故藏去尊書又檗菴和尚每訂相過必極早一日過午纔至見語云頃有貴同年某公今之顯者畱連華山我必待其去逺然後來且諭執事人令勿露我欲過居士恐其欲偕來也嗟乎此眞知我矣中夜思之時爲流涕誠感其心知也足下苟能以二老之所以知我者處我則善矣若仍復如前云云以來當世之物色則自今以後不特使僕不敢復見足下之面并使僕不能復安居此山矣如何如何與吳瓶菴書讀鐵橋遊記中有齒及數語殊覺刺人眼目雖辱謬知然殊非鄙意總之交遊稱詡梨棗傳布非今所宜况不肖避世之人乎必改去爲妥老子云知我者稀則我貴矣不肖今日常恨微名猶落人間即傭書賣畵俱非吾意况可聲名標榜乎鐵橋異人必首肯吾言亟爲刪去也即如歸􅀇老向寓尊齋時有待雪詩亦齒及不肖者其句驚人已刻行矣弟亦懇其改刻􅀇老性素崛彊然甚見歎許即時改去可見勝流自是不同耳遊記中去此數語不特於不肖爲便即於左右亦殊覺穩妥如何如何尊跋中幷改賤字四字尤荷與仲甥吳濮書如此逺歸相見色喜又何俟言惟于此而識足下今日之所守即於此而卜足下異日之所立矣天下事未有不能守而能立者但無己之心所欲效者身心愈加敬懼耳勿以明足以察微才足以籠物辯足以折人而稍自寛假惟敬懼愈加然後所立愈不可量勉旃勉旃天下事失於愚魯者半而失於才智者甞過半也勉旃勉旃屬賦詩扇頭吾病未能因書經史數語於上倘心領吾言則斷章取義可也一則中或一字一句耳若謂老生之常談無足采者亦自不妨燬而棄之耳知足下往覲親幃而僕無一言半語致往寧不可笑亦可見相對次日之􅀒病矣逺行前倘能再一見而行尤善如不能亦勿强不盡答業師沈伯叙先生書諱明掄弟玉當諱明揚附答書重辱手諭示以二兄所上元昆一書閱之令人惋歎累日夕但未知何以爾爾昔吾師門兄兄弟弟孝悌友愛首稱吾吳幾不啻姜伯淮之撫仲季也通國稱頌者不特頌吾師以兄而兼師保之任所以造就而成全之者不遺餘力亦實頌二兄之克㳟長兄直以父師之禮奉事而且自知豪髮皆仰成於長兄而以稱説於同人人以此實重之今何以爾爾也然人之所以樂有賢父兄者以始終成就之也吾師幸勿以其爾爾而遽有介介必痛哭流涕教之訓之多方開導之令必即時克己旋復初心然後吾師之友愛爲有終而天倫爲無􅃜也不然吾師已八十二兄亦七十矣設因彼期期致八秩尊年恩撫之長兄而微有攖寧則二兄又何以自全乎若彼名教有玷淸議不容則亦豈吾師造就之素心乎如何如何諄切諄切久不過澗上草堂矣經數寒暑􅂊得聚首又以胸次隂憂塡委語多絮聒殊爲可惜然書聲琅然薄於林際筆研窓几皆有古香亦足使老人形神頓易矣再阻江村橋月色來親人微風到蓬䬃䬃有秋意昨讀手札一字一珠亦復一字一淚諸公雖多警䇿未有能若是之情理兼至使之聞之有不蹶然生悔非人情矣此􅀜係老人骨肉關係宇宙間天經地義非尋常文字可比也前扇如故珠復還稼老極爲欣躍十絶正如裴王贈答興復不淺來箑又如羲獻復出即當置之襟袖誇示同人以爲美談敬謝敬謝答寧都魏凝叔書病困之秋則惠大藥死喪之戚則損贈賻旅次珍攝乃復如是則先生之於不肖何如者况被之以明訓朂之以宏圖人非木石敢不勉旃至情之所極痛不欲生正以隱節未易孤撐而同心實難再得耳如涉大海風波震天而長年最能萬死一生僅以得免今安坐舟中者自若而操舟之人則已逝矣苟有人心能不痛絶内子賢聲頗著中外兒女又皆極孝大殮之際􅂘聲若崩城唁者役者無不堕涙亦可悲矣亦可見矣重承明訓故絮及之惠􅐠已領至意謹完上倘叔子先生果能洞鑒微末非阿私所好者不吝錫以一言則榮被泉壤是所願也非所敢望也敢布腹心伺道駕入山尚當率兒子泥首以請也致闔族書家之有譜猶國之有史也支系於是焉明昭穆於是焉辨盛衰於是焉徴旌別於是焉見係至重也所以大家世族莫不有譜與一國之必有一史無異然國無成史而百爾司存粲然具在舉而措之無難故國史甞成於易代之後而當時無害其爲政也若家而無譜則散漫無統不可收拾是使世家夷於庶姓而一本同於路人其害有不可勝言者當不止於支系之不明昭穆之不辨盛衰之無徴而旌別之莫見也吾家自先六世祖大中丞公發祥以來閱二百年簪纓八世世受國恩魁艾奇偉之人繼出不可謂非世家甲族矣而獨於譜牒缺然無成書先學士甞病之甞於癸未歳夏集族中長㓜而書其略方擬草創旋遘世變先學士捐身殉節致斯志未申斯事未遂枋雖不敏心竊痛之甞發憤欲竟其業懷此志者二十餘年矣一者饑驅食力碌碌未遑一者材駑識短恐弗堪任冀學力之更增成一家之紀載昌􅀺所云俟我五六十爲之未晚也今枋年已六十矣憂患餘生侵尋衰病聰明頓減鬚髩如雪不啻七八十老人近者天復遽割我賢助服食起居之不時饑寒愁苦之莫恤憂能傷人詎復永年故時患先業之終墜繼志之莫從以􅀒痛於無窮也去冬十月之朔特爲文以告之明神告之家廟矢願必於今春努力以舉廢典逺則宗廬陵歐氏睂山蘇氏譜法近則彷天平范氏松陵吳氏家乗而竊取之義間出獨裁務貴謹嚴以存風範故敢致書闔族共竭見聞以襄厥事上則書祖父之來系下則列子姓之支分各就本房詳其世緒以示我或祖父有一言一行之可傳者不論鉅細必以見告或其先人有何遺蹟不論全編或片辭斷簡亦不吝見付俟録成後各還原本俾枋得效其筆削編録成書則不獨枋之短淺實賴以有成即前人潛德之幽光亦藉以丕顯是使吾宗二百年故家風範得著千秋而不肖三十載繼志微忱成於一旦庶幾後生末裔睹髙曾之䂓矩識水木之本源廉立可期家風克振則祖先幸甚宗族幸甚不肖幸甚致於木大兄書編輯家譜乃弟二十餘年血忱今始舉行愼重其始故必敦請尊行髙年以徴文考獻然尊行中止請威翁二叔一人吾兄弟中止請吾兄自兄逹兄在兄穆兄五人餘則二三子姪而已所請六位缺一不可况吾兄乃本支宗子尤不可缺若兄不來是誤我大事也前語穆兄云弟此舉頗費若叅差不齊必須再舉則此費誰任也至於作譜事宜無論文章筆削自是我責即其餘百端勞費亦斷不欲費族中一錢亦不要煩族中一毫心力者恐吾兄未逹鄙意故復縷悉之與葛瑞五朱致一書不復以拙文就政有道者數年於兹矣近因督課兒曹未免見獵心喜時時有所課􅁧兹再得以近藁五首仰塵法矚弟邇年以來靜中若有所進臨文似別作一境界然未知吾兩兄果以爲視十年前稍長進否也幸不吝直言繩其可否以靑墨二筆各加批抹以示我庶不虚我逺來就政之心也弟文頗不欲示人苟其人果知文而非我知已則不敢就政之其人雖知已而未必果知文則又不欲就政之故惟吾兩兄是望知鑒我忱而不吝指誨也主臣主臣以弟向來三十餘年之艱苦而驟加以近者四十日内之􅃤酷實難存活然猶未至即顛殞者一則以立言之志未盡酬妄冀以未盡之年卓然大有所成一則今小兒能體乃父之志將來其文墨不必言尤其至性過人今實賴以延吾視息也此則可以稍慰道義骨肉者所恃至誼逾于同氣故敢及之先侯報音以慰懸切與姜奉世書宣城沈公湛兄不逺千里徒歩至吳者再以畊巖先生一傳見屬僕深愧其意去春臨岐至於灑泣僕尤深感之握別諄訂初冬爲期不謂一別之後未及數日遂嬰賤恙且兩病相繼至八閱月歳底益劇而支離委頓竟同廢人新歳以來幸漸向愈既服膺沈先生大節兼之銘佩公湛兄之至性不敢再遲發憤力疾以課此傳傳成凡二千六百餘言其前後叙事或不甚謬即傳中所載書疏一字一句無不於吾心口手眼中􅅆環數十必期於無憾而後出之即如答舉主張公一書前半數語雖極淺近簡易然必爾爾以入史傳似覺熨帖則其他可知矣未知果有當於諸賢之意否也僕年未篤老而衰病實甚恐益重其不文然吾文或不足以行逺而吾一字不茍之至誠自可附沈先生千秋以不朽耳如何如何與曾靑藜書名燦江西寧都人一字止山弟於詩學本未㴱造偶然感觸援筆寫懷眞所謂候蟲時鳥自鳴自止而已乃重辱奬詡過當不勝愧汗至承指謫一二處謂有字句之疵尤荷直諒益我弘多第亦有鄙見須細論者承批祖行二字及禪窟二字爲有出否愚謂論詩只當論其果佳與否不當問其有出無出也若其詩果佳即自我作之仍爲不朽如昌􅀺之陳言務去而爲千古所宗也茍不成詩則雖字字經典而愈增其惡所謂食生不化者也至祖行二字又更有說鄭當時傳其游知交皆其大父行每見古人之詩以人物事蹟烹錬入句有減字者有換字者有用意者司馬長卿而爲馬卿河南尹而爲河尹此減字者也茂陵玉椀而爲金椀此換字者也少陵以㸑犀爲燃犀東坡以頭痛爲頭風以笙簧爲鼓吹此用意者也繇此觀之則大父行之必可以爲祖行矣何也爲減爲換爲意無一不可葢古人先爲我作俑耳至於窟字古人觸著便用無所不施如仙窟鬼窟理窟慧窟豪俠窟游俠窟車載斗量不可計數豈必皆先有作者而後用之故謂禪窟二字即自我作亦無不可也又承批二仙字於三句中重見當避愚謂七言歌行又係長篇正取其淋漓傾倒痛快不應以字眼拘礙况古人於行句中一字而重出者亦不可枚舉今姑舉其最近耳目之前者如杜涼風蕭蕭吹汝急臨風三嗅馨香泣三句中二風字韓霞車紅紖日轂轓紅帷赤幕羅脤膰三句中兩紅字元塵埋粉壁舊花鈿上皇偏愛臨砌花三句中兩花字韓余未知生之爲樂也安得長翮大翼如雲生死生哀樂兩相棄五句中三生字如此之類古人俱所不避則似第三句中兩仙字亦不必避也不特此也苟當氣盛意得筆歌墨舞之際如杜一片花飛減􅁍春且看欲盡花經眼則律詩猶且不避况歌行乎又承批渭濱垂釣獲鉅鰲謂鉅鰲於渭濱不切須竟用熊羆字此則似止山直未晰鄙意所謂也此句􅂃接上句名塲獲雋而來渭濱謂敝房師垂釣獲鉅鰲謂其入簾取士而得我也以鉅鰲自稱即昌黎自謂傾國連城之意今若用熊羆字則不知何指若謂指不肖則無此事若謂即指敝房師則當時以一縣令且以齟齬終別無奇特遭逢而可謂之渭濱熊羆乎即謂之可亦於弟何著也意似止山未曾㴱晰鄙意故一縷及之每見昔人詩話甞於一字一句辨晰精微不嫌辭費又見晦菴千古一大儒而考正韓文不恡於片辭􅃗字亹亹論定則吾之再質之止山正欲止山之再有以教我此既古人之所有取且亦友朋質疑問難之一樂也弗靳誨言顒望顒望與楊震百書前者亡兒病中重荷師恩偕醫逺過診視次日服參稍有生機伏見長者喜動顏色至爲我長揖以謝醫家珍重而別此種至誼今人所無及不幸訃聞承於泥雨中奔赴臨􅂘盡哀又承畱駕待其飯唅經理殯殮慿棺一􅂘而後去何師恩之加於小子周旋其生死之際篤摰詳切至於如此也此在今日手足骨肉之所絶無者而獨得之於大君子此兒雖死可以不朽矣不肖弟惟有感極痛極不知所出至此兒能秉師訓其平時純孝篤行實有古人所少者今故後伏而思之渠如此少年而欲求其一言一動之謬竟不可得寔人所未能信然亦黙孚於人人不特中外無間言殞逝之日鄉鄰之知與不知俱爲流涕是不特鄙人有喪明之悲意夫子亦有喪予之慟也天乎亦酷矣旬月以來枉弔至戚之痛悼不必言通家如李文老奉老次耕諸君子無不相向而哭之失聲者時致老以病不能來先遣其郎君同敝門人葉生來弔致老寓書惠唁纒綿哀痛讀之惟有長號欲絶而已弟時答明老書云吾恐吾之悲之有不止於西河之喪明者可奈何皇明通紀謹完上前者屢次借書皆爲與此兒誦覽今則已矣亦可痛也將來尚擬奉求一文以爲此兒不朽計意伺我神魂稍定氣力稍續然後奉聞未知可得否也然弟意中所欲求者止三人耳前別後即擬削札以申哀感無如伸􅁓臨頴則悲從中來仍復廢閣兹者忍痛力疾作書而涙痕血􅀧濡染􅁓筆間矣心所欲言百不及一臨楮長慟不知所云居易堂集卷之三終
