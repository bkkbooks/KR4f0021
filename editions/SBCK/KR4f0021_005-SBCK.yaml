front:
  text: 居易堂集卷之五
  hash: sha256:b4c03810b84e244bfd5d32b93bf2e5ddd564173ce450cb3a5d08daa006964a3d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_005-1a}
body:
  text: 序通鑑紀事􅀋聚序天下非事不立非言不行兩端相依有同唇齒禮樂征伐事也而誓誥歌詩爲之本文移典䇿言也而因革損益存其際王者所以經緯天地綱紀萬物舎言與事莫繇矣夫以天下之大千百世之逺其言上自謨訓下至俚諺無不在天地間也而作史者節之其事大而軍國細而龜筴無不在史書間也而編年者略之故言之菁華莫萃於史而事之綱領獨備於鑑枋過不自量竊于其中勒成二書一曰廿一史文彚所以記言也一曰通鑑紀事􅀋聚所以記事也􅀋聚云者夫亦取善可爲法惡可爲戒而善善同淸惡惡同汚耳古者左右之史分紀事言善惡畢書無所諱避至執簡載筆以死繼之庶幾從繩則正監憲罔愆其職至重也秦并六國惡諸國之史譏斥其先于是焚燒典乗史記放絶漢興仍秦之弊論載缺如太史之職專司天官近乎卜祝之間司馬父子慷慨流連興墜起廢以一家之學網羅舊聞創立紀傳敘述書表誠以繼獲麟之絶筆起四百餘歲之廢典也班固氏因之遂成漢書凡一代著作一國興廢天文災祥輿地阨塞以至朝野得失人物盛衰綱舉目張巨細咸備有國家者資爲殷鑒掌典故者奉爲元龜於是國必有史代必成書良爲歷代之鉅典矣而末流之􅁦佞臣執筆穢史貽譏陳壽索米於􅀟丁魏收曲筆于陽固而南北分王以史爲兵南詆北爲索虜則有美弗録北斥南爲島夷則正朔皆廢甚者指前代殉節之臣爲逆黨稱興朝犯闕之師爲義軍善惡混淆是非舛午於兹極矣於是司馬文正起而正之改紀傳爲編年合僭竊于正統芟繁除穢矯枉去誣叅攷異同較若畫一刪諸國之史成一家之言筆則筆削則削可謂信信史之所未信正正史之所不正者矣夫百川分趣滙歸于海九州殊塗建中于雒不然者人馳一轍家擁異流汎濫紛紜何所底極哉文正之功所以不在春秋下也而其書卷軸浩博文繁事密文正之時即罕有能卒業者讀之終篇惟王益柔其後建安袁公喜讀資治通鑑而苦其浩繁爲之區別貫通要終原始作紀事本末朱子亦以本書太詳記識弗及乃表歳著綂大書分注以別之作通鑑綱目夫有本末而事之原委見有綱目而史之褒貶著庶讀者有視掌之明而學士無望洋之歎二子之書不有大功于文正哉獨是後儒左袒紫陽操戈涑水謂枉費十九年精神無益治道嗟乎不有通鑑何有綱目無乃所謂挹流忘源登枝捐本者乎枋才駑學淺無所知識而成童之初即好讀史帖括餘晷肆意討尋嗣後更家國之禍抱終天之痛苟活是懼求􅂮弗能於是杜門隱居專精史學讀歷代史則叅攷之史通通志讀通鑑則合觀之本末綱目􅅆環貫穿積有年歳或得或失頗悉於懷以爲有本末而事之原委見然政刑之沿革或未晰也有綱目而史之褒貶著然善惡之品目或未彰也通鑑以年分楊誠齋以爲逢其始而莫繹其終而本末以事竟吾又恐其得於此而失之於彼也夫兵農禮樂國之大事也然覽前代之所以益或遺後世之所以損刑賞黜陟國之大柄也然睹盛朝之所以得或忘亂國之所以失是則於治道之鏡鑑未備而學者之稽覽猶艱也枋因參訂三書獨立義例比事相引較悉毫􅁵人以事分事因􅀋聚凡分爲若干事聚爲若干部其書之要領可得而言也文正著書始於三家爲侯以爲周亾之漸葢以名器假人而爵賞無章也此特筆也枋故因之爲慶賞部凡析圭儋爵以及恩澤賜賚皆在焉人君代天理物實惟庶官而居重馭輕内外分職爲作職官部三代用人皆繇里􅃟漢室取士尚舉孝廉其後代不一制進匪一塗或繇科舉或取門第總之盛世則得士衰晚則失人其大較也爲作􅃟舉部王者以民爲天民以食爲天管子曰衣食足而知禮節故積貯者天下之大命也爲作食貨部非禮無以節上下非樂無以和神人庠序學校重道崇儒盛王之懿􅁤也爲作禮部樂部風教部益人神智者書籍也故知古知今而王道易易爲作經籍部君有不德則日星失行明王在御則地不愛寶爲作災異部符瑞部兵者凶器而安不忘危守在四夷而大刑陳野爲作兵制部征伐部堯舜之聖不戮一人而治天下未之有也而世輕世重民命係焉爲作刑法部懲戒部封山濬川以奠皇極故有土者王者之寶也爲作封域部城郭宫室上規星辰下卜地利所以禦宼暴壯神極也彼昏不知瓊臺漆城何居焉爲作營建部人君取天下之道不一正閏紛然逆順各異爲作建國部君國之修短生殁儲后之廢立安危雖曰人事有天命焉爲作國是部文景節儉俗登仁壽孝武多欲盜賊滿山治忽興亾係之君德捷於影響有若樞機故興朝之辟每多神明而亾國之君罔非昬亂爲作君德部天下安注意相天下危注意將將相者屋之棟梁國之干城也爲作相業部將畧部有君無臣莫繇致治而邪正異態忠佞殊塗君子進則國安小人用則國亂爲作臣節部三代之興皆本后德及其亾也率繇女戎有明德長孫之賢所以成漢唐之盛有南風獨孤之惡所以速晉隋之亾易著家人詩首􅀜睢有繇然矣爲作后妃部一人元良萬􅀖以貞儲貳天下之本也爲作儲貳部磐石之宗建國所重大封同姓所以泰山而四維之也而漢之七國晉之八王實爲厲階共稱戎首吁時事異矣爲作宗藩部新莽以外戚簒漢隋文以后父代周薄氏謹良聿興代邸梁冀肆逆實覆東京爲作外戚部秦之所以亾任趙髙也漢之所以亾寵節甫也唐用李輔國仇士良則亂宋用童貫髙俅則亂自古禍人家國者莫閽寺若矣爲作宦官部天下之人賢愚不齊可以垂青史者鮮矣而淑女亮節亦足昭彤管焉爲作人事部列女部陰陽推步之學醫藥卜筮之書聖人所不廢也爲作方術部始皇東廵不返志慕神仙漢武望思之悲徒惑迂怪梁髙祖佞釋氏而身殞臺城宋徽宗崇道術而國淪左衽以至王凝之之世奉天師而會稽遂破陸法和之素稱神異而臨江以亾孔子曰攻乎異端斯害也已爲作異端部職方之記備書域外禹跡所及亦載要荒爲作夷狄部竊國竊鉤盜城盜璧小大殊異而盜竊則同也如赤睂之據長安黃巢之登帝座欲不謂之盜得乎爲作盜賊部孔子成春秋而亂臣賊子懼作史者春秋之法也故漢書終王莽傳梁書終侯景傳唐書因之立叛臣逆臣二傳以終卷所以惡下流昭鑒戒也爲作亂賊部凡諸部分悉叅精義雖事本諸鑑而例因乎史自慶賞以及營建十六部則百王不易之規周官六卿之職猶諸史之書志也建國國是二部紀一國之廢興觀歷代之修短猶諸史之本紀也君德以及亂賊十六部則就一人一事爲􅀋猶諸史之列傳也嗟乎記事之學以􅀋相從引而伸之各極其量亦已詳矣而嚴華夷辨正閏別名分正綱常則尤兢兢于春秋之遺意也故義例或愧于謹嚴而是非無詭于至正其書法美刺皆本綱目而竊取之義時出獨裁鄭樵所云此出臣胸臆不􅀜漢唐諸儒議論枋雖不敏而於是書亦不無一得之見焉昔宋孝宗讀紀事本末而嘉歎頒賜東宫及江上諸帥曰治道備是矣綱目書行尹起莘諸儒謂爲先聖繼絶學爲後世開太平以枋微末詎敢妄擬先賢希蹤軼􅁤而原其作書之意則實欲隨建安紫陽之後爲文正之書之鼎足云建元同文録序年號始於漢武一變于後魏拓跋燾及梁武而大定于我太祖髙皇帝要其爲百王不易之法一也自建元以至洪武凡一千五百八年其間正閏紛然眞僞雜沓層見􅃨出不可更僕然又非可同日而語也有事貴嘉名如建武中興有時因符瑞如黃龍甘露有新君而遵舊號有革代而仍故國如乾化天福此無所嫌其同者也甚非謂者天王而襲列國之名正綂而汙亂臣之號不亦爲大典之辱乎昔人有得古器者其銘爲黃初元年二月傳玩以爲希世珍而末坐少年辨之以爲曹丕於漢獻帝建安二十五年十一月受禪即爲黃初元年則黃初元年無二月明矣一座皆驚知爲贗器嗟乎學者而悉若是也又何有宰相須用讀書人之歎哉余于己丑庚寅之際捜閱歷代正史有感于國朝之永樂天順天啓因于編輯之暇録年號之同者集爲一書以便稽覽宋徽宗改元建中靖國王覿云建中雖取皇極然重襲唐德宗紀號孝宗即位議改元重熙汪應辰謂契丹嘗以紀年遂改隆興古人之於年號相同者􅂚常不凜凜焉愼之哉則余是書其亦古人之所取乎唐封演有古今年號録一卷杜光庭有古今類聚年號圖一卷宋楊修有歷代紀元賦一卷或立説有殊當無非此詳愼之意也惜乎其書俱不傳余不得從而叅考焉若光庭之書殆先得我心者乎紀元亦稱建元因名爲建元同文録讀史稗語序太史公曰虞卿非窮愁不能著書㫖哉言乎然是未可以掇皮言也彼帬􅄚少年綺紈公子藉門胄之髙華處膏腴之豐飫幾視夫坎壈若異世曾不知困衡爲何物而亦有詞溢縹􅇸翰飛緗素者此之著書非史遷之所謂著書也必上可窮天人消息之數次可壯君國黼黻之猷内以盡性命之微外以極文章之盛退足自潤其身進足見之行事華實兼茂舒卷隨時斯無愧也詎所論於烟􅇘驅染月露風雲者哉余也不天丁罹荼毒乙酉家難集蓼銜􅁈血涙已枯松草變色既㴱復莪之痛又抱微管之悲年甫弱齡嬰此鉅酷此窮于命也舉目山河頓殊風景通天有表􅓦爾不靈彼黍之詩不忍再讀庾信切南枝之戀子卿無歸漢之期身忽忽若逺行日悠悠而長夜此窮于時也申屠蟠隱居梁碭因樹爲巢臺孝威採藥武安鑿穴而處而余避地丘隴之中側身環堵之内環廬竹木既所未希飲谷棲山徒成虚語實非何㣧之學舎有類子厚之愚溪此窮於地也􅄞康治鍛多病未能麟士織簾性所不習而家貧無漆工之業道頭少樵箬之資室人徧讁穉子恒饑任西華冬月練裠劉伯龍爲鬼所笑此窮于饑寒也敢曰長卿慢世寧學邢昕忤人而性與時違不工脂韋囀喉觸諱動輙見尤知已既少一人故舊多成異􅀋氷炭不入噂􅊱是聞此窮于賦性也有此五窮分應灰滅而讀禮之後一息猶繫不敢自暇有事遺書輒搜歷代正史伏而讀之上自五帝下迄宋元􅅆環貫穿不移寒暑竊不自量乃于其中勒成一書而編輯餘閒復爲稗語一集或摘古人之行事竊志微辭或探義類之􅀇賾比事相引雖原本正史而流似稗官固讀史餘事乎或亦稽古之家所不廢也雖然余之窮愁亘古不二而限於駑下不能奮發以自附于立言不朽之林求有當於窮愁著書之㫖而徒規規然取昔賢之陳筴甲乙章句宰割行􅇘也終恐隨時而謝耳悲夫讀史雜鈔序書傳于創不傳于襲也國朝三百年來文章之家不下數十百家莫不人持一幟不􅈕相降至雜說家者流則自升菴別集弇州説部衣被天下其後雖握珠抱玉裒然名家者無不于沈約集中作賊矣故其書雖髙懸國門而甫一開卷輒隨手棄去以覆醬瓿耳夫腐草爲螢非不希微熠燿而秋草未萎螢光先歇理固然也余自酉戍以後潛心讀史偶有所得任意書之如是積年遂夥􅁓筆于是分爲二種一曰雜鈔一曰稗語稗語以紀異事雜鈔以紀奇字也夫以靡猥之資探奥賾之府言之不文行之不逺而欲以語于傳世多見其不知量矣而偷竊江東自知免焉烈皇時先文靖申救黃石齋先生疏云臣一言一事矢不因人枋雖不敏請事斯語矣管見序管見者徐子之所作也徐子讀管子而有所見則筆之筆之而成書因名爲管見也凡爲書十一篇一百四十則一萬七千四十言微管第一衡量第二權書第三解解第四正言第五糾句第六晳義第七白􅀇第八訟尹第九辨疑第十惜逝第十一鄭業師雲遊詩序昔箕子過殷墟而作麥秀之歌周人經故都而有黍離之什非以爲詩也三閭大夫被放江潭睠懷君國乃作離騷九歌非以爲詞賦也不過直寫其情之所痛而已而尼山刪詩叅之典謨龍門辯騷擬之風雅豈非以情之極致斯爲辭之不朽哉語曰文生乎情詩固以情傳也余師鄭先生自遘世變杜門隱居將遁世以終焉顧事會迫人危機辛螫遂强顔北首一入春明當其登金臺渡易水顧瞻帝里恍如隔世城郭猶是人民已非此之爲悲悲可知矣所以花鳥助其傷心山河啣其􅃤怛而弋慕㝠鴻轉喉觸諱抒寫懷抱維時所難欲如謝臯羽之懷舊悲歌舉聲慟􅂘其可得哉故幽愁憂思付之蠧繭歸而綴輯乃得成書以示其弟子徐生徐生曰嗟乎此非詞人之詩也乃孤臣覊士癙思泣血叩心而出者也亾國之音悲􅂶爲主其視􅂂中原而成於役之書懷京都而作夢華之録者創巨痛深不㪅什伯乎此直與麥秀黍離離騷九歌竝垂不朽爾苟不知者引商刻羽沾沾焉求之詞賦之林斯過矣嗚呼詩固以情傳哉周玉鳬儀部讀史詩序尼山采列國之風而曰刪詩何也豈非以塗歌巷謳言滿天地而無當有無則概削去之惟存貞臣逸士憂時念亂流連諷刺之辭爲足觀興亾備鑒誡哉故自風騷以降代多作者而千古定論獨推少陵至尊其詞章號爲詩史良以一篇一詠不忘君國爲千古詞人所無也詩道寢衰人心日下而欲其睠故國而行吟託至性于篇什豈可得乎吾故讀周遯翁儀部讀史諸詩而㴱有感也其意切其辭哀怨誹本於和平諷刺存其哀痛援古證今悲傷時事于斯極矣余每一開卷輒爲掩泣不啻聞桓伊之唱黙爾傷心聽雍門之琴自然流涕也雖然難言之矣性本忠孝而文辭不副其悃誠才擅風騷而賦託不􅀜于治亂雖有紀述斯無足觀所以千古之貞臣多矣嫉俗憂䜛未聞人有離騷之賦千古之詞人亦多矣感時叙事未聞人有北征之篇必至性才華二者兼至庶斐然述作可語于不朽之林矣然則詩之爲道不綦難哉而儀部乃兼擅之故可與少陵頡頏也吾於此而愈有痛矣少陵遘天寶之亂京雒風塵竄身荒谷然而兩京旋復再覩休明而其爲詩已不啻長沙之痛􅂘以今所處囘視少陵又何如乎宜乎儀部諸詩􅅆環嘆嗟痛絶心臆也昔庾信國破流離辭賦以悲哀爲主人心不逺情文略同茍生此之時遘此一變而徒工月露侈言麗則則蟲鳥好音雖多亦奚以爲縱言語妙天下亦直刪之而已矣靈巖樹泉集序事之從歡喜讚歎中出者其事不立道之從安樂愉快中得者其道不明故子輿氏曰然後知生於憂患而死於安樂也生者道在之謂也非偷視息全軀命之謂也茍道從吾而明前吾之聖相得益章後吾之聖示之周行則九死猶生也千百世猶生也不綦難哉而欲安常處順飽食煖衣以希之吾知其沒世而無遇也大易春秋聖人垂世立教之書皆自憂患得之固也即三閭之騷義兼風雅龍門之史羽翼經傳彼其所爲率出於幽愁侘傺癙思泣血憔悴澤畔徽纆請室之時故至今與日月爭光天壤齊壽也夫歡喜贊歎其失則誣安樂愉快其失則偷雖繁文巵言徧滿天下亦等之電光石火已耳即不然而長存兩間亦天地之贅癅聖賢之蟊賊也而謂其于道有萬分之一哉顧不獨聖人之道爲然也縱論百家該舉二氏凡吐辭成經出聲爲律者靡不繇斯矣故瞿曇設教首言八難三塗調御道成猶歷四魔六外彼正法且然况像教之季乎靈巖儲和尚即印宗之所稱肉身菩蕯寶誌之所稱傳佛心印者也海内緇素翕然宗之而辛卯壬辰之交誤罹世網幾蹈不測賢士大夫無論知與不知皆殫竭心力欲脱師此厄如手足之捍頭目而師怡然受之身入湯火無所辭避今其言具在可覆而按也其佛法非不學者所窺而讀其書問詩偈巳見其衛道之嚴任道之重之一班矣其與諸方往還言及續慧命寄道綂則義形于色勤勤懇懇語皆沉痛若恐當吾世而墜于地者至于吉凶禍福則曰此定業也曰委然順受也非所謂不以其道得之不去者乎曰使眞宗不墜雖此身碎爲微塵猶爲幸甚非所謂朝聞道夕死可矣者乎曰果自反無愧即有意外風波自然久而論定非所謂禮義不愆何恤人之言者乎曰道人家得力全在不如意處曰鑊湯罏炭褰裳就之非所謂無入不自得而見危致命者乎嗟乎何其㴱有合于聖人之道也今之自號讀書明理被法孔孟者吾恐視師而多愧矣若暜濟羣品接引來學有叩則鳴循循善誘設寶筏慈航于問答之中寓金針玉綫于意言之表遂使宗風愈振大道益弘問法請益者躡屩擔簦飈騖景從惟恐不及得其片言半偈靡不尊而寶之謂竺墳五千餘卷佛說四十九年盡在是矣豈若楊雄擬易而後世不比之爻象之文束晳補詩而學者不躋之雅頌之列者乎嗟乎師何以臻此哉夫日月光華炤臨無際而一經風雨薄蝕若愈增其晶瑩皎潔者古之人有行之者矣大慧弘法嬰難竄謫梅陽嶺海瘴癘非人所居而緇衲奔湊法席愈盛識者謂其所説之法圅蓋天地􅇸括宗乗無他憂患成之也師不其然乎或曰􅀒苓者病作易之多辭牧豕者歌知道之黙黙况正法眼藏不立文字故拈華破顏黙然付受禪而必有録也無乃龜毛兔角乎此以質之知法者余不敢下一語雖然文中子曰不有言乎誰明道乎則師之所說自當與大藏充棟者竝垂不朽也醫家烱戒序吳門鄭氏受業于李東垣爲帶下醫尚矣傳至三山先生而克大厥緒能弘其道博覽無不通病者母論老㓜男女沉疴痼疾一經診治其病如失故先生足跡所至趨之者若騖正如秦越人操術以歷試諸國隨俗濟時不名一家也如是者垂五十年其所全濟者無算矣而先生猶慨然曰噫是能起吾藥之所及而不能起吾藥之所不及是能治病者而不能治治病者則吾所濟者狹而所救者猶末也夫醫之所病病道少所以術不精而嘗試與術精矣而操心不仁其害皆足以殺人乃輯秦漢以來醫家事蹟凡降祥降殃捷于影響者勒爲一書名曰醫家烱戒將使作善者資其津梁作不善者凜爲殷鑒不亦偉乎吾聞一醫之良全活千萬人先生此書出而勸戒學者昭示來兹是胥天下後世之醫而出于良也不將胥天下後世而躋之仁壽之域哉嗟乎仁人用心其利溥矣昔嚴君平隱居卜筮人有邪惡非正之問則依􅆱龜爲言利害與人子言依于孝與人弟言依于順與人臣言依于忠各因勢導之以善而人已黙受其福是寓其教于卜者也若先生者豈非以醫教而與人爲善者耶欽子逺猷畵解序孔子曰歳寒然後知松栢之後凋也故天下既亂則世多隱君子焉雖然涉橫流而知返恥亂􅀖而不居其節則峻矣而以言乎先幾之哲則未也若樂潛尚志未亂而隱確然獨行歸潔其身其髙風不可想乎求之古人亦惟梁鴻徐穉之流爲足以語於斯不謂於今而見其人如欽子逺猷也欽子少而孤苦家貧好讀書而性耿介峭厲落落寡諧遂終身不娶棄其家以推之於其兄而寄居蕭寺不與世俗浮沉惟日橫經教授閉户自精雖故人戚友罕睹其面時正太平稱明盛之世士而能讀一書通一藝輒思乗時以自顯而欽子獨隱約畏避絶塵逺引同人無不怪之抑知又十年而天下遂大亂矣噫於此而始益歎欽子爲卓絶也尤所難者孑身棲遯託命束脯而獨能教養諸弟使皆成立蔚爲方聞之士如吾友序三尤著名字天下徒知序三學博行髙而詎知成之者乃其無家之仲子乎欽子既篤學好古能强記于書無所不通而尤精於古今名物器數金石銘勒之學故凡他人所窮年覃思而不能記憶者欽子無不應口而出即如儀禮一書韓愈猶苦其難讀而欽子獨字櫛而句比之則其他可知矣而隱居之業兼善畵理煙墨驅染稽古爲先讀九歌則繪之像讀史記則爲之圖以至三百篇十九首無不有畵而山川人物衣冠尊爼皆按其地而可稽論其世而不謬鄭樵曰圖經也書緯也圖至約也書至博也即圖而求易即書而求難舎易從難成功者少古之學者左圖右書未甞偏廢故人易爲學而學易爲功欽子之意其在斯乎其在斯乎則其所以禆益後學者寧有涯量哉雖然苟非隱居求志二十餘年其精詣亦未能至此也近復以其性學所近著畵解一編以垂於世其言皆古所未有而謬以余爲知畵者索余言以叙其意余謂此則唐宋諸家之書具在能互相證明余故不論而論其沈幾髙蹈之概云靈巖報慈圖序凡有此身皆人子也故自始生以至老死皆報親之時也自毛髪以至身心皆報親之具也一言一黙一動一止經天緯地旋乾轉坤皆報親之事也帝王及乎氓隸神聖及乎愚夫婦莫不有報親之職也嗚呼天與我以報親之時之久報親之具之備報親之事之廣且細而又人皆有報其親之職然而能報者鮮矣敬身存心以竭其力以不匱而錫􅀋殆難言哉曠觀天下上下千百年而邈乎其不可幾也非千里比肩而百世接踵者乎吾固不能不致悲乎莫非人子而能爲人子者之殊絶也然非必有金章紫紱之榮三牲五鼎之養也非必光大其門閭尊崇其謚號也非必終身不違子舎足跡不離親闈也非必痛癢之抑搔衾枕之温涼而墓廬藥膳之長親也蓋必使吾親之沒而能長存也必使吾親之能幾于聖賢也必使吾親之能與天壤齊壽也而後爲盡其報之之義也素位而行充義之盡于人之若無所以報者而必有以報之而又大報之事或出乎彼而全乎此或相反而適所以相成嗚呼非天下之大人其孰能預于斯此靈巖老人所以有報慈之圖之書也佛爲三界導師而號稱能仁孝者仁之本也故在忉利天爲母説法夫說法非以爲孝也而正所以爲孝也此如來之報親也孔子曰吾志在春秋行在孝經禮經不云乎爲臣不忠非孝也故作春秋非以爲孝也而正所以爲孝也此聖人之報親也通是意也然後可以知靈巖老人報慈之指矣然後可以知靈巖老人報慈之盡矣傳曰爲人父止于慈蓼莪之詩曰欲報之徳昊天罔極報慈者報其親也而人或謂釋氏以恩田供親尊宿以織屨養母與靈巖報慈爲法門之孝嗚呼此豈足盡報慈之義哉故侍御秦大音先生遺筆序人有一見而足以繋人思至于歷年歳而不忘感存沒而益㴱者必不在聲音笑貌問也人有片言而足以繫人思至于歷年歳而不忘感存沒而益深者必不在文詞行墨間也庚子歳春二月余避跡鄧尉之靑芝山房時余乍棲廡下山中之人皆不之知而梁谿秦大音先生顧知之介余友俞君來顧余余因得以識先生坐未久啜一茗別去而余自隱居以後槩不敢報謁四方之客因即還先生之刺久之而吾心獨時時念先生又久之而吾竊自咎曰先生爲郷大夫之賢者又遺老也而吾之待先生至淺矣又久之而竊自計先生誠郷大夫之賢者又遺老也固當能貰我苐先生藹如之言粹盎之容得再一見乎既二年余又避跡梁谿常泰山之招提從德師遊德師與先生故善嘗述先生之所以稱道于余因知先生固不我罪而時時念吾亦同吾之念先生也而先生已逝矣余即于常泰招提爲詩望而弔之嗚呼先生與余一見耳而所以繫吾思者如此又三年宫保張大司農寄示先生手筆一卷索余題其卷首余展卷數讀而知先生書以與其宗子赤仙者也赤仙故受業於先生爲先生髙第弟子今觀先生之書談性命之微講文章之盛尊經援古各極其致而于人之疾痛疴癢飲食起居無不有以提撕􅅄勸引人入勝而一􅁤諸道所謂循循善誘者非耶宜乎赤仙氏尊其師説片言􅃗字奉爲龜鑑莊嚴卷軸若將以昭示來學而不獨爲秦氏之家珍已也昔楊雄草太􅀇其弟子侯芭尊之以爲過于周易太過夫子雲學問文章窮亘古今獨是漢祚甫移而侈言符命劇秦美新爲學者羞而其弟子猶尊之如此設以子雲之學問文章而又終之以大節與東陵之侯彭澤之老尚友無愧則其弟子之尊之又何如哉嗚呼以余之思先生于一見及赤仙氏之思先生于片言者可以知先生矣休寧何氏世譜序余讀休寧何氏世譜而慨然其有歎也於戲姓氏之亾在秦滅六國之後而姓氏之亂在南北六朝之餘何也始皇旣并六國則公侯子孫皆爲咸陽布衣而盡亾其氏自元魏孝文帝以中華之望氏改代北之複姓而宇文氏又以其國姓賜􅀜雒之名家而姓氏益舛而無所稽矣於戲惟姓氏亾於六國之後此韓之所以爲何惟姓氏亂於六朝之餘此南陽之何其後所以遂與國姓竝重也韓王安既滅於秦其子孫散處江淮遂於南陽著姓爲何氏隋唐之時實重門第茍神明之胄姓氏奕葉繼繼承承弗失其序則表其族望爲國棟梁而南陽何氏遂與武陽之李滎陽之鄭二十餘姓爲遙遙華胄也於戲廢興往復之理不可概見已乎是葢有亾而不亾亂而不亂者存也孟夫子曰所謂故國者有世臣之謂也又曰爲政不難不得罪於巨室繇是言之世家巨族爲國之毗爲民之表其係於􅀖國之治亂民俗之汙隆可勝道哉三代而後宗法不立世風以衰識者憂之所賴天下巨室各兢兢焉守其家世謹其氏族以辨貴賤以別婚姻以逺嫌疑以定昭穆􅂶其仁孝之心率其敦睦之行庶幾繇家以著于族繇族以著於郷繇郷以著于國繇國以著於天下而民俗以厚治道以成矣蓋一族如是而九族以風九族如是而四方是則萬姓是效其理然也則譜系之重推其極致其功用爲何如哉又豈獨一氏一族之所賴乎而吾於何氏之譜則㪅歎其善學六經者三焉稱祖則始自休寧南唐國師而絶不蔓引南陽廬江之逺祖此刪書斷自唐虞之意也宗約則首遵聖祖之訓而徐及於家禮此春秋尊王之指也叙事必重推先德長言而嗟歎之此詩人歌后稷公劉以及文王之風也於戲譜系之書之美備矣夫譜本於世家系本於世表此太史公遺法也世家則欲其累如貫珠世表則欲其較若視掌而後世多失之南北六朝之後爲氏族之學者數十餘家其爲書凡千餘卷而何承天姓􅁐獨爲世所宗則知於譜系之書何氏又有家學焉是其所以盡善也乎前星野語序三代盛衰著於詩書周之季也王迹熄絶而春秋繼作筆則筆削則削而亂臣賊子懼此後世之史所繇爲重于天下也嗚呼吾歷觀諸史而天下國家亂亾相隨續者豈非以小人哉漢髙建不㧞之基光武恢中興之業賢聖之君六七作誠以爲配歷殷周矣而閽寺蠧之濁亂天下而炎祚遂斬唐太宗負不世出之姿臻三代之治而開元元和文治武功無沗厥祖雖其間禍亂相尋然狡虜强藩舉不足以亾之而刑餘掃除互執國柄而李氏不祀宋興除五季之穢跡攬王政之餘風忠厚立國重道崇儒誠三代以後之盛朝也而權奸朋比斥逐正􅀋而中原遂喪南國以亾嗚呼小人之禍人國莫宦官朋黨若矣有一於此而不至滅亾者未之有也國朝至光熹之際尚忍言哉逆閹蓄窺伺之心爲攘竊之計其不爲新莽武氏者幾希矣故殺戮忠良毒流縉紳禍不可解而餘奸遺孽復揚其波以斵削國脉當是之時宦官之禍千萬于常侍軍容誅戮之􅃤什百于黃門北寺而朋黨之奸又倍蓰于斥元祐黜道學也則合漢唐宋之所以亾者而亾吾國雖有五帝三王尚能善其後哉吾故俯仰數十年間未嘗不流涕而痛哭也野史文秉氏故相國文肅公之冡嗣也心知其故而痛傷之慨然曰余聞之先人國朝之亂繇于門户門户之始本于建儲而不謂卒於此而遂亾也於是原本家學罔羅舊聞上自神廟下訖於烈皇帝勒成一書名曰前星野語以授徐枋而屬之序枋受讀卒業掩卷而歎曰此書出而使天下後世洞然知國朝之所以亾而列聖無失德而文肅未竟之緒又以此而克大也昔司馬文正作通鑑始于三家爲侯而識者謂一以示興亾之戒一以著周秦之端而遷固著書必推本之太史叔皮以母墜前人之緒二者秉之書備之矣而不知文正遷固之所以不得已于書即夫子作春秋之意也吾故晰其事而首掲春秋大義以序之惠而行詩草序夫人生事業文章有以卓然自立於天地之間者豈不以才與氣哉賈生年二十餘發䇿漢廷條對詔令諸老先生皆莫能及訾制作之非論和親之失欲改正朔易服色興禮樂繋單于之頸而笞中行說之背何其壯也及爲梁王傅無狀而哭泣自傷何也其氣竭也江郎賦稱凌雲辭擅雕龍聲華文藻掩映一時何其盛也迨乎遲晚而文筆衰落何也其才盡也夫人能立事業文章於天地之間者固以才與氣然徒恃其才與氣而不能養之􅂶之即氣如賈生才如江郎而不免於竭且盡而况其下者乎故人不可以不學也學者所以養吾氣而􅂶吾才者也篤學好問㴱思敏求􅇽泳漸摹沉􅁋淬礪釋其外假抑其虚憍不遷不挫者所以養吾氣也酌古斟今致賾鈎􅀇咀其英華益我神智大無不該微無不入日新又新者所以􅂶吾才也傳曰學然後知不足知不足則學益力故孔子大聖也遇老􅅨則問禮遇師襄則問樂遇萇弘郯子亦皆資之何况其下者乎人之于學固未有盡也或曰文人之所成就果如賈與江亦可矣曰否文章繫乎世運世愈衰則人之氣與才亦愈薄且弱而文章亦愈下其理然也吾甞論如易水之歌陔下之唱其人皆武夫劍客固未甞浸淫乎風雅比叶乎宮商而文章之美固已爲天地之元音有非曹劉鮑謝李杜之所能爲者不亶然乎苟生乎今時而騖乎賈與江者則其不能賈與江也亦明矣嗚呼詩之亾也久矣好沉雄博大者病在專事其聲音笑貌氣象規模而不求其神理好淸新俊逸者病在專趨乎纎巧衰澁影響謎覆而不究其指歸要之皆不學之過也而今世之所謂文章鉅公自負起衰救弊者又以暢逹爲性情富贍爲神采體格風調一概抹摋能言人之病而不能自知其病是其所同非其所異而天下莫之敢訾嗚呼詩烏得不重亾也乎惠生而行今年纔二十餘耳負奇氣能詩著有東籬草問業于余余故以學勉之俾其日事於學以厚養其氣益􅂶其才則其所就未可量也余於詩道知之而未能願與如生者漸涵停蓄於其中一二十年掃衰晚之弊而一昌明其道則大雅之作正始之音其在斯乎其在斯乎吾與生當共勉之姜如農給諫畵像序士大夫平時能慷慨奮發直言極諫斯其遘急難處幽憂無有以易其常度矣東京之末甘陵分部黨錮禍起膺滂之徒以言遘難無不傳考黃門北寺身嬰􅃤酷而其後黨人卒能爲國陳力其致然也烈皇躬神聖之姿而權奸禍國隳壞天下與漢季等給諫姜如農先生奮不顧身抗疏論之遂逮治詔獄復拜杖北闕下時先生直聲震動海内而時之所以死先生者亦至矣然而卒不死天也既而兩京隨陷赫赫中夏剪爲荆榛先生盡室南奔棲吳入越奉老母崎嶇數千里間憔悴江海之上而不返天下之亂亦已十年矣士之好氣激尚風義者初未嘗不北首扼腕流涕傷心也而與時浮沉浸淫歳月骨鯁銷于妻子之情志概變於菀枯之計不三四年而向之處者出已過半矣欲如先生卓然不汙時議十年如一日者豈易一二哉吾以漢中興前論之其時依託遜禪傅會禮樂或稱制方隅假名徴聘士苟自昧側身其朝猶未有仲尼微管之痛也則亦未可與今同日而語矣而焚衣而逃抱圖書匿林藪至受劒引鴆託疾自汚者綿歷歳紀未甞易慮以觀于今不亦逺乎苟無先生其人者立節礪行經緯其間不重歎古今人不相及而悲本朝之無人乎然先生今日之髙節不於今日得之而於抗疏直言時辦之矣先生一門忠孝過于漢室之三姜逺甚而當時伯淮以不應辟命致動當宁之慕勅使者圖畵其形狀此事而再見于後世也復旦有期自有爲先生著像丹靑者矣奚以葛巾草衣者爲先生屬余題其畵像有感而書之宛山顧氏家乗序立德立功立言得其一以不朽尚矣必兼三者而有之未易遘也果三者之克兼必名與天壤齊壽身同山嶽之安家有曾孫之慶者上下千載尤絶無而僅有者也功足以震世而不先之以德則功髙或有以􅆷其身何有于裕後言足以華國而不以德爲之基則言出適足以招郵寧詎以福流子姓哉自然之理也故或蹈瑕抵􅂩以爲功或疵物激淸以爲言雖輝赫當時震眩一世曾不一再傳而隤其家聲覆轍塗地至不可問矣伏讀故大司馬太保冲吾顧公家乗而重有感也公以縣令起家歷官至制府所在以最績聞爲當代名臣而撫督陜中功烈彌盛殱哱奴創火酋元老壯猷折衝萬里此功在封彊者也撤礦稅罷織造正己格君囘天浴日此功在社稷者也而其論織造礦稅三大害及請罷諸璫諸疏置身危疑極言無諱忠誠懇惻讀者流涕此所謂與伊訓說命相表裏者雖與日月爭光可也嗚呼太保之功如此太保之言如此此千古之所共見者也而其内行醇備恂恂謹􅅚孝于親和于家訓敕子弟一同寒素躬行日用必以植德爲先其所培養于人所不見之地最湥且固故發祥久逺不可限量艾年而舉五丈夫子其四皆翶翔皇路􅆒歷中外或以治績或以忠節皆克世其家而振其緒而㓜子爲處士敬熙先生則貞不字之節潛隱園巷三十年如一日而績學篤行敦倫追逺竭蹶從事若徇嗜欲故年踰七十而惟日不足建宗祠設祭田築聚族之堂譜世系之牒豐碑鉅坊無所不立給孤恤寡無所不至而皆捐一人之資竭一人之力以成之此處士之功也典禮既成工役既竣然後爲條約之文爲誥誡之篇以固後人之遵守而又申之以長言嗟歎之辭以興起後人之孝思以暢發其千流一源千枝一本之意先行後言亦云至矣此處士之言也嗚呼而孰知其悉本于德乎嗚呼處士聲實不讓先公又何啻第五之名無減驃騎也余既伏讀其家乗歎息而謂處士曰君家之功德之見於事業者也君家之言德之見於文章者也惟功與言人之所見德者人之所不見譬之崇墉大厦必致力于人所不見以爲之基而後巋然永峙以無毁而其所屏庇者大矣太保處士之世德良然不晰之家乗乎今者子子孫孫繩繩蟄蟄繁衍熾昌又何極乎吾於顧氏名德人物之盛而囘視所謂一再傳而隤其家聲覆轍塗地至不可問者天人之際可以觀矣鳳棲李吳氏家乗序譜乗之學所以救宗法之亾而隱然繋風教於天下豈特爲一氏一族之書而已哉古者族必定宗宗不易世蔚爲民望上下相維所以一國之慕繋于巨室而百世之澤綿乎本支家有宗子然後國有世臣繫至重也迨乎輓季宗法不立莫相維係一旦緩急存亾渙散不可收拾一家猶如路人况于國乎賴有海内之世家大族偉人喆士孝子仁孫秉詩禮之澤振箕裘之緒確然知氏族門地上重非可渙同路人非可夷于氓隸屹然起而修明之所謂尊祖故敬宗敬宗故收族莫不于焉見之而凡所以􅅚家範厲庭訓兢兢焉欲其子孫之世其德而亢其宗者亦莫不于此焉見之嗚呼使家有是書而人有是心不幾天下同風而俗若成康乎吾故曰隱然繫風教於天下也而近世之所以爲譜者又有異矣或逺宗以誣其先或集菀以非其􅀋無論先民尊尊親親善善惡惡之意無一復存而長澆趨競譜乗適爲蠹治之本此賢者所以有日下之歎胥溺之憂也吾友李子炳廬居墓田窮年矻矻旣編輯其憲副侍御兩先公文集減產而壽之梓而又􅁧次其家乗名之曰鳳棲李吳氏世譜鳳棲者漢陽山名也徐子受讀卒業作而嘆曰偉哉一編而忠孝之道備矣李之先爲楚人本姓吳氏自其始祖佐一公代其舅李姓者從漢陽來戍于吳遂姓李而子孫或稱李或稱吳或稱李吳其先人甞曰吾家復姓爲孝從李爲法孝吾情也法亦不可不遵嗚呼忠孝之道備矣而李子譜法復有可稱述者姬姓之吳散處江漢髙門鼎望所在林立而不援不附一以佐一公爲斷其下子子孫孫支系粲然昭穆秩然使讀之者知水源木本之㴱長舊德先型之久逺而合稱之曰李吳氏譜則又絶無僅有葢原本先人之緒言所謂本姬姓之舊爲不遺其親從渭陽之氏爲不忘其君而吳後於李者先國而後家也而義例謹嚴無所淆亂又足以砭世之爲者之膏盲不綦盛乎是眞吾所謂隱然繫風教於天下者也余無似亦擬殫二十餘年繼志之誠以作徐氏家譜今春方爲經始而李子則已成書且其書之備美如是是吾之所以愧李子恐瞠乎其後也因泚筆而爲序之居易堂集卷之五終
