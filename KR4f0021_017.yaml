front:
  text: 居易堂集卷之十七
  hash: sha256:50faeab3e799b7f312daa8d63aa4e5e3e3c96ae9bbed8690f97bb6c8a457cfec
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_017-1a}
body:
  text: 古體詩送逺詩十一首擬選體吳子北行非其志也意甚傷之因賦詩以送焉自一章至六章往事也采采蕙蘭花皎皎氷雪姿舍英當空谷正值秋風時秋風率以厲百草奄披離子獨執高節淩風揚芳菲二黨禍鶗鴂先雄鳴蘭蕙為不芳世路悲嶮巇讒言何髙張骨肉既徂謝豺虎蹲我傍微命值多難坎壈多憂傷願言撫疇昔幽思結中腸三乙酉良時既不再日月忽已沉杳杳竟長夜悠悠失路人臨風發三歎志意悲未伸人生能幾何百歲如颷塵修名恐不立躑躅長悲吟避世同所願結髮棲何津邂逅寸心違泣涕沾衣襟揮忽以八載園樹空凋榮四避難君住浙江頭我家五湖水江湖渺吳越悠悠隔千里湖中雙鯉魚會銜尺素𥿄短書慰別離中夜涕如雨五同居江水何瀰瀰江楓何鬱盤棄家辭舊鄉攜室來河干比屋慰相思恰如同株歡饑劬寧足傷薇蕨能同甘六歸去張羅弋鴻鵠鴻鵠起高飛終歲傷局促去去從此辭六翮志千里但悲生別離七素舸揚輕風春水橫我前駕言將逺遊關河阻且艱浩浩迷風塵遊子傷心顔故人家五湖不如繫征帆尊酒且慰意霑涕從潺湲夜長愁如歲短燭聊復然我有同心友攜手相周旋淹留忘歲月比翼何翩翩傷彼雙鴻鵠隨陽將北遷歡樂已極意哀情多相煎八灼灼三春花靡靡連阡陌皎皎遊冶兒遙遙上廣術纎綺揚輕裾燕姬挾趙瑟新聲隨回風哀絃動行客徘徊失路人聞歌暗垂泣桃李亦無言極目愁慘戚感傷非我春况復念行役不如傾斗酒歡宴娛心臆人生如風馳壽命非金石少壯當行樂母為傷蹙迫今日且盡歡連觴數盈百九幽愁八載餘歡言浹旬月長歌飲美酒忽復傷離別中腸惋以摧臨觴氣哽咽愁多不成寐參辰自橫列徙倚當空庭悲風吹天末十輕舟將言邁臨波風嫋嫋行旅已戒途客心慕逺道握手河梁上清尊且傾倒惜別留斯須垂涕盈懷抱我有遊子吟傷懷令人老俯仰發櫂歌輕舟逝遐討瀰瀰江中水萋萋岸傍草矯首望舊京千里路浩浩十一日月既代謝京雒多悲風塞馬嘶上林趙女驅雲中故舊不可期遊子誰為容顧盻聊寫憂明德君所崇願言早旋歸婉戀欣相逢飄蓬豈無根貞心比青松努力保歲寒共此芳蘭叢別詩六首擬選體楊子抑志逺遊念之靡已詩以送之一章言離別之苦次章以下語以各固所守也春風搖柔桑濯濯揚光輝采采盈懷抱頃筐悲路岐遊子辭故鄉行行將何之黃鵠一髙舉千里振羽儀飛沉從此隔淚下不可揮何以贈逺人采桑裁征衣時節更代謝光景如颷馳朱榮忽已凋白露霑羅幃願言稅客駕凉秋以為期二叢蘭生空谷凌寒媚幽姿嚴霜不能凋婉戀青松枝叢蘭亦有根青松亦有心馨香盈衢路結交誠相因努力遵修塗區區寶榮名千載永不移誰為岐路人三鳳鳥翔千仞戢翼棲遐陬幸有鸑與鷟徘徊求其儔鳳德猶未衰鸑鷟何逺遊奮翅鳴北林潛羽悲南洲寄語逺遊者燕雀非所謀四上山采薇蕨日暮不盈把苦饑良足悲將遺同心者良友逺別離踟蹰送于野我有盈觴酒黃流傾玉斚送以逺遊曲中懷期共寫清商一何悲四坐和者寡恐傷遊子心攬涕不敢下景光已西馳日月不我假五日莫一何速聊為秉燭遊漫漫夜未央清尊慰綢繆恨別不成歡躑躅空庭陬明霞起東偏晨風來平疇浩浩流水波悠悠逝輕舟六遊子既已別極目上河梁浮雲何奄忽飛鳥來西翔揮涕霑長纓引領遙相望不惜離別苦但悲岐路長昔我同心友寧為參與商願保後凋姿寒冬履嚴霜母為久行役俯仰令心傷秋風數歸期蟋蟀鳴我牀懷人詩九首靈巖和尚與余敦人外之契有年矣余嘗柬一友云靈巖為海內所宗仰諸方耆宿謂此唐宋以來諸大善知識中之所少也至其篤好人物別具至心望之若渴視之如傷余則以為此唐宋以來諸大善知識中之所絶無也靈峰絶天表孤雲傍琴臺傳燈曉長夜法界森昭回當兹象教晦一出𬈑濛開慈心接羣品物色來塵埃野人荷深鑒千載同襟懷視之猶如傷茫然令我哀仰首睇翠微幾時陟崔巍但聞塔鈴語惻惻從風來逺人逺遊之人也死生契濶數年不一面嘗夢見之而不能一言若存若亡邈如隔世亦竟不能舉其名字矣遂以逺人稱之可悲也已嗚呼魯仲連屈强不帝秦區區蹈東海大義終能伸胡然天帝醉金苻被强嬴眇焉匹夫節而與天帝爭十年遍天涯四海誰情親一心貴有託豈敢輕死生故人在畎畝攬涕為屏營念子不成寐落月空盈庭願言入我夢夢見遙吞聲月老名南潛靈巖嗣即苕上舊名士董若雨也亂後隱潯溪既皈靈巖即嗣法與余最善向年冒雨訪余於萬峰苕霅多隱淪沉冥老湖浦吾子繼風流登樓掩蓬户只此避世翁已足髙千古忽復歸靈巖棄家霑法乳出世復無倫居然龍象伍一鳴契真如法音震天鼓與余敦素交氣味芳蘭杜褰裳枉相存芒鞋踏寒雨何為兹數年不得親玉麈髯叟南明方夏氏也為人長者重然諾亂後與余定交周旋緩急時刻不爽嘗索余畫冊為余代償斤金焉甪里有髯叟幽棲稱隱君生平在然諾緩急嘗殷勤千金重心期一言比蘭薰余年踰弱冠賓從常如雲結交多老蒼不如髯超羣俯仰十六年所志髙秋雯索余一豪素價抵雙南金斯人未易期薄俗徒紛紜致一名用純吾師朱夫子長子也年十二與余同學有至性能文章以學行世其家亂後隱居與余尤善云東望玉山岑寥寥隔天宇孤穹絶塵坌冥栖一處子隱居不違親循陔掇芳芷盛年甘辭榮軒冕為深恥永稱避世人不愧黃與綺回首總角時讀書共窗几鬭藝何紛紜爭勝相爾汝有時學臨池墨汁翻素𥿄俄然已老蒼白髮垂兩耳蒲柳自早衰况復傷生死吾子幸壯甚相見每色喜一心徒區區千秋託儔侶撫事熱中腸歎息吾衰矣聞公名居甪墓里之廣慧菴素與余善簡靜自居諸方重之闢精舍數椽竹樹軒窗悠然塵外禪林有高士簡淡懷清風僻居城北村一鉢猶屢空蕭然竹樹下窗几無塵容近來法門侣往往鬭諍工惟公守冲愫卓爾寧雷同山中有故人髙臥芙蓉峰緬想契人外結交比青松涼秋試經過䇿杖歡相從瑞五姓葛氏名雲芝崑之世望族也志起絶學文章得史漢家法早及先人之門二十餘年近始與定交遂稱水乳吾生當喪亂大道為颷塵葛子紹絶學慨焉思經綸微辭决雲霧努力披荆榛所以處濁世非獨稱隱淪知君二十年近得諧嚶鳴惠然入我室一見歡生平俯仰貴有託浩蕩千古情嘗恐歲月晚零落隨羣英願言從吾友觀化懷澄清明逺名照楊曰補先生長子也性少可能詩與余交最早亦最久凡聞余所在必襆被而至遙遙城北郭中有草玄亭無心作解嘲憔悴形神并閉門在窮巷俯仰非世情𥚹性寡所諧枯坐甘窮經余為平生歡屢亦遭君嗔及余當憂虞慰問嘗殷勤嘗思具醇醪以破我獨醒一醉豁百憂曠然契君心斯事雖未遂知君良獨深年來㑹面難歲序空崢嶸臨風發長嘯颯颯來秋聲玄坦名宏度世醫王氏也為人靜逺與余交契十五年矣楚中尹右王云不以貴賤易心不以盛衰改節玄坦有焉閶門塵坌區依然棲靜者經户寂若無何殊處林野素心重交遊髙寄何瀟灑門巷舊烏衣山林皈白社壺中成隱居神契不可假采藥斸靈苗贈我嘗盈把余交真淡如耐久世所寡今日重思君歌詩繼風雅五君子哀詩病困無聊緬懷師友生者尚可得見而死者長已矣然余自結髮從海內大君子遊後先凋謝不可指屈而獨哀五君子者皆以亂後與余有金石契者也陳給諫為余父執而降分定交葉先生為吾師而以文章推挹過當楊隱君交余紀羣間而後遂如兄弟此皆吾之所極不能忘姜吏部膠􅃮過同氣鄭處士篤行不讓古人終身久要略無間然悼死愧生俯仰餘痛聊追往昔情見乎辭故給諫陳公子龍字臥子松江人陳公不世才顧盻空神州𬈑渤瀉胸懷峰泖佳氣浮枋也年十二遂得從公遊公處盛明時慷慨懷百憂指畫若無人奮焉思前籌誰知十餘年公言良盡酬先臣畢志死公心大復仇泣血提一旅回天掃旄頭風悲鬼神泣鼓咽旌斾愁一戰蕩煙水變形荒江陬軍敗公即為頭陀遁水濱余懷髮膚戀竄匿越阻修忽然與公遇氣哽淚不流蒼惶問死生慟哭蒼天悠余復嬰網羅公為卜筮謀既得再相見握手頻咿嗄酹酒偕再拜激奬同前修惟公吾父執降分為朋儔下公一懸榻上公百尺樓公雖伏草間報韓心未休再舉復再躓公心何所求張儉不得脫孔融俄見收公時死無憾一瞬為千秋慘黯峰泖側遺骨成荒丘寂寞薤露歌恐遺田橫羞故文學葉先生襄字聖野先生神駿姿稚齒志軒豁千里鳴長風雄心排紫闥掞藻花欲生處囊頴自脫詞場主齊盟意氣髙嶻嶭旦夕期致身廊廟潤鴻業豈期困數奇抱玉遭屢刖先生志益奮顧盻氣莫奪忽然經喪亂杜門被短褐圖書劇縱橫菁華供採掇冥搜閲百代貫穿文辭窟三皇汲典墳六朝繪雲月騷人侈雕蟲詞翰有健鶻正如大搜狩漁罟山澤竭又如凌滄洲處處結津筏發揮成大文汪洋肆閎逹雲漢秋天髙波瀾𬈑漲濶憶昔執經初枋年未束髮周旋函丈間撫時思奮發揮忽十餘年乾坤正蕩潏汨羅與土室先生痛存殁操觚血淚垂千秋託碑碣推獎冠獨行行墨起芳烈先生為先文靖公作傳謂余隱居避世為時獨行第一謂余立德言不朽成二絶先生見余通鑑紀事類聚草一史文彚建元同文録等書寓書于余云人生三不朽足下已有其二立德立言從此而兼并矣怵惕奉斯語嘗恐身隕越一言銘終身俯仰中腸熱蒼天酷斯人中年病消渴遺書委風塵歲月同蕪沒楊雄垂太玄侯芭守師說緬懷愧古人臨風嘗涕雪再讀北哀篇哀鴻呌天未甲申後先生著北哀賦故隱君楊叟補字曰補昔有大布衣詞場聊頓轡詩卷留人間磅礴蔚真氣翰染青山色筆寄滄洲趣憶登黃金臺易水吊古渡懷古有深情悲風激辭賦才名滿京華嘉會同修褉觀海之罘巔乘潮浙江澨胸襟蕩淜湃奇氣溢清製乾坤忽翻覆蒼茫哀北顧帝京好風景僅託豪與素幽咽玉泉渾慘淡天山鋭甲申後隱君有帝京十景圖及詩詠亂後知心期忘年金石契浩歌痛生存杯酒時酹地雞鳴風雨交形影同顧步踈髯常拂耳清風灑然至天骨瘦嶙峋提攜恣遊憩謂余畫學成俯仰空百世豈獨拜老生突兀存佳句隱君亟賞余畫贈詩云當使前賢畏豈獨拜老生余畫今日上斯人已云逝興酣畫入神往往橫涕泗斯人不可追風雅終憔悴故吏部姜君垓字如須萊陽人吾友神皇裔海岱聿挺生風騷緬哀怨感激空生平憶昔年弱冠賢書貢王廷先公分禮闈清鑒持文衡圭璋自特逹遇合洵有神射䇿漢闕下一出凌羣英終軍正年妙衛玠復神清綵衣綰紫綬翩翩馳帝京妙年奮直節慷慨輸忠貞擊奸穹碑碎粉署清軒楹如須官行人署中題名碑有逆案阮大鋮姓名如須特疏請碎其碑重勒石俞㫖鏟去大鋮名攬轡周四方江山助精靈咳唾珠玉落詩歌金石聲為國除大憝折檻有難兄若翁仗大義闔門殉孤城忠孝聚一門泣血動聖明將母避世難日夕從南征回首望日觀蒼茫隔蓬瀛禹穴討幽意蘇臺懷古情間關辭紱冕契濶甘柴荆與余為昆弟意氣浩縱橫俯仰死生間長慟中腸傾有時良宴㑹酒酣涕淚零涕淚咽笑語四坐懷酸辛余既終避世君亦長辭榮采薇與種瓜十年同伶俜胡然鵩鳥入龍蛇歲崢嶸賈生哭泣死千秋徒令名忠魂返帝鄉倣佛從霓旌中宵望天宇炯炯增華星故處士鄭君之洪字青山吾聞孔北海特立鄭公鄉鄭公實布衣非以官閥彰明德在一身閭里生輝光昔者有吾友千古寄令望孝友齊曾閔追琢逾圭璋余當總角時君年二十强十年自兄事差池敢雁行余少負奇志今古等粃糠圖書一鹵莽顚倒隨衣裳見君形神肅慚愧熱我腸欽君萬石風恭謹世所坊平居似捧盈視人猶如傷養親華趺潔循陔擷蘭芳壯年猶孺慕衾枕身溫涼學成謝名利髙寄攻岐黃素書河上至丹經肘後良一出名天下市隱同韓康幽棲如谷口不復知滄桑鬱鬱屹小山巖姿帶修篁鄭氏門前壘石為山俗號為假山鄭吾讀古聖經仁者斯壽昌斯言何不酬造物終茫茫蕭蕭花村路悲風吹白楊回首弔終古碌碌空彭殤青山葬處名花園村題畫芝贈方南明采采青雲芝依然綺皓心結根幽崖側擢頴髙山岑燦燦耀丹紫粹質逾黃金惟同蘭若芳不羡桃李陰卓哉逺塵境用得葆天真所以髙世士冥棲甘陸沉披圖聊相贈庶幾映清襟題落木菴贈徐元歎築室依名山園畦開數畝雜時花藥鮮歷歲松筠久棲遲成名勝聲聞及林藪數椽落木菴丘壑擅吾有髙樹蔭琴書清澗凉窗牖珍羽窺山厨錦鱗躍石溜禽魚自忘機樂此幽棲叟扣扉來髙人留客剪春韭蒼苔屐痕深列坐花茵厚披襟話羲皇俄頃斯不朽矗矗蓮花峰歷歷捫星斗髙隱十五年下視紅塵走世事任悠悠臨風一揮手箬廬詩贈趙封初採箬置道頭吾聞朱百年行人取箬去隨值留青錢趙君今隱者隱居靈巖前賣藥不計值但使沉疴痊心慕採箬人賣藥聊復然幽棲隔世塵蕭蕭屋數椽客去掩柴門悠然復垂簾堆牀多圖書花藥盈階鮮邈矣幽人居髙寄形神全名之曰箬廬清風其庶焉贈五牧劭和尚省墓詩我欽王偉元淚枯冡上柏哀哀悲蓼莪聞者心痛惻我欽裴子野時時省墓側因風灑血淚草枯緣哭泣嗚呼世風衰斯人邈難匹親在不知養况復歸窀穸近又遭亂離丘墳委荆棘去去不復顧墓穿狐兔窟壘然似無主或化為阡陌嗚呼世皆然滔滔吾誰責劭師出世人至孝性所植還歸禮親墓澘然淚霑臆登降扶松楸徘徊理兆域事事皆審詳永以妥親魄吾恐薦紳流覩師或踧踖我吟以贈師五內痛崩迫攬涕瞻陽山慘慘浮暮色先公墓在陽山長兒孟然三十貽以畫幅書此朂之嶺畔有青松菁蔥正華滋託根在崇岡自與青雲期年歲方及壯鬱鬱千春姿上有煙霄容下無桃李蹊大器自晚成何為嗟後知努力霜雪中共此歲寒時題孤楫江圖并序孤楫江圖者俟齊居士為其甥吳濩省親金陵而作也濩字商志為吳子佩逺仲子倜儻有竒志至性過人年雖少而髙視一切若不屑意當逺公之逺遊也適有弋人之慕事岌岌殆濩以身當之萬死不顧一生而後得遂其親髙翔千仞之志於是逺公足跡遍天下名山大川遊攬慿弔十四年不復歸濩又以庭闈隔絶訊問莫通每向其舅氏流連告語嗚咽涕泗以不能一覲親顔若至痛之在身而思釋也已庚之歲審知逺公寓跡金陵因决䇿北渡以展其覲省之私焉時逺公之寓跡甚奇即之若至阻而濩進不避難退不規利孜孜焉惟覲省之是求於是其舅氏俟齊慨然曰是可紀也因為作圖而復系以詩孤楫淩江濤行行楊子五月風濤壯稽天渺無涘濤崩蛟龍驚風疾雷霆駛濩也行不回直抵長干里長干維舊京親闈實寄此我心戀庭闈寧為遊觀美不玩秦淮月不渡桃葉水朝望白雲回暮宿淚如雨親闈雖在望水深山㠖㠖阻如隔天關誰謂道如砥吾心在一見靡他志自矢精誠試叩之俄爾奉音指遂得覲親顔不啻捧檄喜展轉十四年每自傷離仳今朝侍膝下猶如夢覺耳舞綵聊承歡采蘭猶有俟吾心既云遂抃躍詎能已喜劇轉悲酸有淚浥清泚周旋僅浹日寧獨萬金抵歸養計有期增䖍介丕祉送逺詩三十韻并序癸丑歲秋八月吳子自吳門遊中州載繇秦入楚過山中作别流連話言足慰契濶而臨岐之頃殊難為懷因賦詩三十韻效古人之贈言雖不復以黯然惜别形之文墨而珍重之意情見乎辭惟吳子知我心也我家硯山下衡門清澗濱日夕足幽賞澗水何𥻘𥻘終歲長閉户幽棲誠畏人客至户不啓回然絶世塵獨有吳仲來歡迎意氣真論述懷往昔歌哭緣情親晨炊解君裝夕飲漉我巾一尊欣共酌聨牀亦均茵久矣歎吾衰魂夢甘沉淪絶意當世事東海稱遺民吳仲天下士志願苦未伸鯤鵬小九州吾道貴經綸移山志不改填海力逾神駕言將逺遊攬勝無逡巡發軔宛與洛再遊楚與秦長嘯宇宙間俯仰千古陳峩峩熊耳山豈復空嶙峋秩秩舂陵道豈復愁邅迍卜年符周曆願言觀岐豳歷覽民情見宣王雅頌新入楚聽謠諺三户寧無因聞雞奮一旦起蟄雄千春乾坤豁雙照沐浴開天津咄哉我吳仲千秋寄一身周原橫豺虎古道多荆榛馭馬勿泛駕驅車母摧輪天心既可期奉身逾自珍吾觀古至人釣渭還耕莘遵晦已得時雄圖會良辰以此繞朝䇿願書顓孫紳壽宗子瞻明六十初度得五百字余家全盛日人文重山斗聲華被海內天下率奔走爭侍虎皮坐共歎龍門陡華堂開文社盛事誠希有宗黨及英賢楩楠與瓊玖等第甲乙嚴月旦豈云苟追溯蒞初盟歲紀當癸酉時余年十二君年始十九角藝意氣雄文壇壓儕偶社中吾二人髙第時稱首傳誦遍羣彥余文才出手婁江二張公金沙兩周叟及吾郡巨儒稱余不啻口以次遂及君才名相先後差池八九年膠序蜚聲久壬午余獲雋君志益抖擻窮年時矻矻績學氣彌厚先公賞君文謂必當速售何期遘滄桑夙昔成虛負先公赴汨羅絶筆繫君肘感君受顧託遺言斯不朽余既長避世君亦甘林藪决去經生籍隱居以養母抱甕時灌園茶笋滋數畝山棲逺世氛歲寒堅素守偕隱仰母賢同趣有萊婦二弟教養兼三荆歡同茂余時造君廬來偏因孝友淹留動旬日傾倒及瓶缶興至何淋漓題詩滿户牖探幽耽奧穴眺逺快髙阜山色一望賖泉聲數里吼遊劇杖屨罷歸亟柴荆扣俄復具盤餐烹葵復翦韭醉飲兼晨昏村醪雜醇酎蕭辰感搖落麗日傷花柳與君話疇昔涕淚落杯酒早敦竹林契針芥良有取余家多坎坷多君實左右周旋我憂患為我洗塵垢羡君處時晦坦道履無咎懷寶終不試連城惜未剖歷歷四十年俯仰一何趣盛衰自一時白雲倐蒼狗昔為終賈儔今為沮溺耦處為籍與咸出為廣與受少壯之所期不知能踐否君今稱六十逸羣故如舊君年添海籌余辭愧虀臼當兹初度辰長歌聊為壽題硃硯粲彼白玉田丹砂發華英眇矣醴泉水仙源自澄清研幾日無窮耕鑿以長生藉兹絳雪貴聊佐玄霜明吾心託寸丹點滴千春榮送别支山和尚避世二十年得交方外士龍象誠如林直諒無過子涇渭必無淆玉石晰精理清濁恐太分精確不相比有心清如氷皭然絶泥滓有道直如絃與世或齟齬忽逢天人師俾得飯法乳投竿引巨鰲觸邪賴神豸孔門有仲由惡言不入耳自許此身心報師良有以毁譽總不聞仰恃師知已師自善調御擾龍隨顧指美玉為圭璋良材耀祀梓西來傳心印密室旋囑纍受衣若懸絲自古嘗爾爾辭師逺行邁去去涉江涘空山箬笠行長江布帆駛我今且送君欲言不能已邀君過草堂臨飯還停七寸心重倫常立言有綱紀著書滿篋衍一一為披示吾交滿天下知心亦有幾死者不復生逺者去萬里孑立宇宙間俯仰涕如雨何意復逢君心期有如此深言晷影移斜陽已在樹挽子不能留子去還徙倚臨岐復再拜珍重無餘語所懷各區區古道期共砥千載有修塗努力從此始題畫芝神姿挺九莖嘉名蔚三秀綺皓託幽貞佺期永年壽仙都有玄圃維此神芝藪吾今將老焉晨夕啜瓊玖又幽蘭稱國香維芝與為友千秋相頡頏兹交誠耐久荃蕙或為茅芝獨固所守不榮復不凋又復誰與偶又藐姑射仙人顏色如處女丹芝如珊瑚服食良已飫久之生芬芳更復能輕舉所以長年者亦推黃與綺又吾聞宋遺民畫蘭不著土况復芝無根自然絶泥滓幽姿甘陸沉芳氣遍寰宇允矣古人言香草比君子又石介不可渝芝芳不可歇卓爾抱貞姿幽棲在巖穴託意豪素間墨瀋香風發君子永令名千秋垂不絶題畫木瓜寫生以筆簡而意到者為難所以墨蘭墨竹最稱畫苑至瓜果之屬而不施丹靑不加鉤拈點蔟而求其形神都似尤未易言近代惟白石翁最擅其妙余少時曾見白石翁一戲筆一西瓜一冰盤承之其瓜僅過半而緑沉之色如初出水見者驚絶然猶設色若僅以水墨渲染尤稱能手也因係以一詠披圖見楙實載詠思風人離離同黃臺而不以蔓生餘甘能却病微酢以解酲並蒂非其儔五色非其榮寫生有能手煙墨傳神情題畫雜詠茅亭踞江臯喬松俯其上遙望山翠寒近聽松風響波光渺無涯煙雲自來往披襟坐此中忘言足幽賞其二峭壁摩靑天層崕蔽白日山根雜蒲葦滄波同出沒矌然蕩心胸聊慰釣鰲客擊楫當中流悠哉共遙集其三澄波繞衡門茅屋堪棲隱竹林隔世塵泉鳴山愈靜閒雲滿庭户逺色來諸嶺俯仰貴有託晨昏拊淸景其四山色滿空濛漁村隔煙水疏柳垂古岸網集澄潭裏吾欲託漁樵山崕與水涘披圖激清嘯會心良有以春夏雜感癸亥咄哉東陵徒徑入西山室白拈無一遺青氊亦被厄雖然仍細事何足罣胸臆所怪鼠與梟變態滋百出梟鳴鼠更嘯拏攫爭白日見者為髮𥪡不復顧彈射區區各滿腹方始就寧戢一飽復幾何我為深歎息把臂歡入林平時謬推詡見得不復思便爾耶輸比顚倒恣欺謾倐忽變嗔喜盜泉共斟酌涓滴思染指彼謂掩飾工揚揚顔無泚肺肝衆如見旁觀盡裂眥不如胠篋者何嘗步踽踽壽楊震百五十楊子人中鳳苞采世所稀回翔上丹穴千歲一來儀冠仁復履義錯落生光輝時俗憎竒服棲棲竟何為惟豫與君交兩世敦孔李滄桑身幸全相期共終始豫同木石居君還託城市舊雨憶過從笑語雜涕泗知君避世心愛向深林遊山前開講舍墳史供冥搜有子業未成歲月徒悠悠受經秉師說庶幾紹前修别來復幾時風雨閲寒暑君今年五十賓朋觴遞舉操辭進為壽共詡松喬侣草堂秋月光願駕雲車度贈西山橘香同和尚時五十初度髙臥萬仞峰絶塵五湖水妙年寄物外飛錫得所止荏苒踰艾齡正復一彈指木奴侍巾瓶寶掌論年齒髙風自千秋西山有一士簡葛瑞五玉峰百里近如阻梁父艱側身勞東望遙遙不可攀雲巖極巉峭乃在城闉間吾友餐霞人於兹長閉關搘頤對林岫濯足澗潺湲山翠撲窗几山雲亦來還拊景怡心神髙視遺塵寰吐納松喬壽洪崖笑拍肩養疴復何為更聞體羸孱吾聞古至人願同衆所患維摩故示病說法緣無慳無為久不出徒阻平生歡憶君昔同遊晨夕相周旋選勝亟幽討探奇亦屢遷仙掌峰頭月蟠螭石裏泉花朝酒政肅齒粲春葩鮮每憶同志樂匪獨同遊盤微言多起豫危行母踰間蔚然蘭蕙姿詎肯沒榛菅共此千古心攬涕嘗澘澘憂喜如一身解推君有焉絺絺服無斁簡扎頻回環何為一乖隔揮忽踰六年貽詩以促君來遊踐君言有酒思君飲詩成待君刪彈琴泣楚囚采薇悲殷頑江河淪白日歲月凋朱顔俯仰歎身世寧知宇宙寬願言從葛子食桃上綏山一覽小九垓長嘯生羽翰鄧尉山多桂家舅吳明初先生山居之右尤盛月中桂樹千尺强繽紛落子吳山傍月中仙子名吳剛謫居此山開草堂仙人種桂桂無數千樹萬樹交芬芳黃花緑葉爛如綺微風入樹枝低昻秋來香氣瀰百里連蜷偃蹇窮山岡我來飲酒桂樹下仙人指點雲物祥仰天鼓缶聲嗚嗚矯首京雒悲蒼茫兩都王氣早消歇微垣帝座韜星芒邊聲朔氣彌宇宙安得片地非羶鄉惟有此中堪避世居然鄉國同蓮邦山花開落自年歲北窗跂腳猶羲皇此誠月窟别世界香氣郁烈腥風藏西堰有水通銀河挽之一洗金痍傷更將此樹種九垓坐使香氣被八荒攀援桂枝聊淹留身如奔月排天閶徐卿長歌歌未罷凉風瑟瑟鳴寒螿復驅煙墨似仙人仙人抵掌笑欲狂拭眼當令驢背墮且援北斗酌桂漿我亦願充修月户月中樹下嘗翺翔吁嗟桂樹與仙人庶幾馨香之德相頡頏吁嗟乎庶幾馨香之德相頡頏食蟹歌五湖秋晚風漠漠荒落家家催早穫客來剝啄開蓬門日暮秋聲雜歡謔明朝攜手入楓林霜葉靑紅照幽薄秋原彳亍多悲涼南鄰沽酒消寂寞湖濱漁父捕蟹來頓使滿堂增笑噱風味能令一坐傾鱸魚削色蓴羮薄隱居亦喜無監州且得銜杯恣大嚼童時早讀爾雅熟莫愁委頓身作惡野人口腹寧多求何獨于斯忍煎膊君不見酈生歷下且趣烹吕布白門遭急縛吁嗟物理將無同古今尤物誰相容鳯凰行非梧桐不棲何嘗上林巢一枝非竹實不食何嘗妄啄人間粒吁嗟乎一鳯兮一凰冠仁履義羅文章赤霄碧落九千仞龍門嶰谷雙翺翔雞鶩爭飲啄鴻鴈謀稻粱鳯凰矯頸望朝陽驂雲駕漢凌扶桑西山翠蕨霜摧折南山紫芝雜荆棘瓜田滅裂靑門下栗里蕭條白社側鳯凰去之不一顧寧爭一餐一宿嬰羈紲浩然摩長空搖翮萬里風下視遍九州碌碌吾安從雲霧杳冥符彩煥風霆雜㳫威儀工威儀工世莫容鴆媒當路鴇傔諑鷹眼睚眦鴂舌雄鳯兮鳯兮朝飲南𬈑夕東壁翠旗羽蓋光明滅瓊蕤瑤草紛藉籍坐歎冥鴻罹矰弋佇看潛龍清𬈑渤衆雛笑絶死鼠腥比翼啼霑杜鵑血君不見虞帝垂裳鳯來儀周室受命西鳴岐有時舜文來御㝢鳯凰飛鳴當在兹嗚呼鳯凰飛鳴當在兹鵷鸞鸑鷟相追隨長歌壽黃萊民六十吾聞夏黃公浩然遁商山吾聞老萊子棲遁周秦閒采芝療饑避濁世長年久視疑神仙今有遺民黃萊氏村塢柴門少塵事白髮長如鶴羽垂紅顔渥若朱霞舉吾疑黃翁吐納新翁言何事勞神髓爛然天真自大年大椿景富莊生篇翁居名山壽而隱岸然髙踞名山巔余亦移家與比屋飛揚跋扈遺時俗長吟應斷數莖鬚斗酒時聞濯雙足黃公黃公亦太奇耽吟嗜醉何淋漓有時瞪目驚四座唾嗤四坐屠酤兒四坐低頭不敢語黃翁掉臂歸來矣罄室惟容月入懷浩歌但覺清風駛君不見少微光聯老人星春來初度翁揆辰野人從今酌大斗十年一舉為翁壽采芝歌曄曄紫芝生南山南山髙髙不可攀惟有當年園綺翁終朝採掇滋紅顔吾聞子房辭漢祿願從赤松學辟穀何如南山采芝者不嬰世網成髙躅空山深谷聊容與駟馬髙蓋非吾欲鴻冥冥兮鳳千仞俯視一世皆雞鶩采芝采芝可樂饑千古寧讓西山薇昊天嗟嗟不可問唐虞世逺吾安歸七十二潭歌贈同年陳言夏再訂入山時太公八十壽余家住七十二峰峰峰盡是靑芙蓉君家住七十二潭潭水一似醴泉甘酌水起舞為親壽流霞迭進增餘酣朅來潭上開壽域隱居養親重鄉國忽傳德聚動星文少微一星聨南極南極照耀人寰區太丘家聲絶代無元龍意氣吞湖海仲舉聲名冠俊厨魚菽猶看從漢臘博奕也復臻皇塗作史嘗毁夏侯草傳經獨說丘明書傳經作史潭水上濯纓洗耳潭如掌春風花柳共低迷秋雨煙波颯蕭爽吟嘯無煩漁父悲浮沉寧博釣徒賞日長水曲且垂綸風靜波心一蕩槳荇帶魚驚曳水衣波紋鷗動搖書幌幽棲風物愜胸襟俯仰古今成浩蕩七十二潭連婁江江連𬈑渤浮方丈玉樓銀闕縹眇間碧落丹臺永相望休誇陳訓已得仙還攜徐市同長往吁嗟真人杳難期散髮滄浪未有時瓜田蔬圃且髙隱閉門却掃潭之湄滄浪一歌漁艇疾芰荷十里蓮舟遲扁舟且赴峰頭約回首梅花罨東閣雙丸跳躑不暫停又聞叢桂芳幽薄流水悠悠人去來空山寂寂花開落此來且復傾酒巵典衣沽酒歡追隨景山痛飲迷中聖孟公愛酒同鴟夷投轄應忘君是客懸榻欲下余何辭願學平原十日飲勿學過江三日醒西堰即是髙陽池接䍦倒著判酩酊攀援桂枝聊淹留小山自昔能招隱叢桂山幽花冥冥花氣不隨秋露零八月秋髙五湖白五湖波靜羣峰靑題石田墨梅嫩寒清曉行籬落偃蹇南枝香噴薄吟魂索句賦氷霜月魄當窗寫花蕚花蕚寫出氷霜姿華光𥙷之稱最奇一時逸興擅千古墨花筆蘂何淋漓後起不聞推作手俗工脂粉花神醜誰寫峻嶒骨相真柔枝弱幹亦何有今朝重見啓南翁筆底繇來見化工逺水尺縑渺萬里髙堂巨障開千峰倦餘一叩囊底藴猶然點綴工魚蟲况復寫生及阿堵幸不折來傷歲暮鐵幹寧因白雪低氷肌不受紅塵汚􅒎丫點出羅浮春零落愁吟廣平賦啓南髙隱盛明時江左惟傳大布衣問字有人長閉户看山鎮日獨搘頤北窗嘯傲弄柔翰素卷倣佛生南枝吁嗟乎剡溪藤寫孤山匹氷為心兮鐵為骨歲寒惟共靑松色自寫吳兒同木石使我撫卷增歎息題王勤中花蝶圖滕王蛺蝶黃筌花紛紛紫翠相交加風枝雨葉尋常出靈動蠉飛揣摹得欲將南苑鬬芳菲却恐東風恣狼藉朅來展卷春光浮化工爛熳何時收花枝低亞舒還斂蝶影蹁躚去復留纎姿弱態同妖女泣露愁風嬌欲語乍開紅暈欲蒸霞未褪粉衣初試舞柈中掌上逞腰身月下風前更有神不向楚宫伴行雨却來漢苑誇傾城明窗日影渾飛動醉看欲折瓷瓶供南浦春蘭帶雨斜東籬秋菊凝霜重故拋綵褎炫新粧頓使霓裳翻數弄翩翩亦自魏收驚栩栩甘同莊叟夢坐令見者生咨嗟寫生咄咄真堪誇寒叢數點增蕭瑟麗景隨意開韶華自詡傳神慿阿堵奪將造化來豪素煙墨能令真宰愁丹靑會使封姨妬天壤之間有王郎含豪吐墨流芬芳信手怡神工點蔟興來覽物窮微茫君不見張僧繇畫龍不點睛點睛破壁生風霆君不見曹不興落墨誤點為蒼蠅見者彈指疑聞聲今之王郎花鳥草蟲無乃是只恐凌風徑飛去我欲錦標玉軸縻繫之此身長向萬花谷裏住王郎王郎獨擅千載奇摩詰前身應畫師病中放歌丙辰歲秋年踰五十已衰絶短髮盈頭白如雪病中攬鏡更自驚吾髯僅存一莖兩莖黑讀書學道志不回世間萬事皆心灰自是吳兒同木石超然濁世無纎埃生平心期未止此寧須故步重徘徊登山必登萬山最髙峰奮身直上空九垓䈥力雖衰不為阻神凝志一何壯哉心神太苦病復至皇天病我非無意夢中有警知天心推枕長歌氣彌厲丈夫立志死不休肯復塗窮少顚墜人生險阻已盡嘗肓風怪雨獨徜徉精金自然過百鍊髙松必定經千霜吁嗟乎吾抱幽憂之病三十年平居曲折相周旋陡然作劇必有益此番一病寧徒然懷舊篇長句一千四百字平居懷舊意惝恍五十年間似反掌耆舊於今無一存音容歷歷猶堪想余年十四歌采芹蜚聲早擅靑雲上鄭莊有客大父行張楷造門皆父黨經學淵源從申公圻父尊嚴亟弘獎安車枉過吳趨里品題一及人矜仰申公謂文定也先祖贈翰林雲澗府君諱銓少受經於文定公以經學名家文定著書經講章一部獨列先祖姓名盛行於世大司馬申公用懋與先祖為通家兄弟余十四歲人學先文靖公率余往謁大司馬極加奬詡隨至吳趨報謁謂先公曰此子非常人也次年十五始觀場金陵文戰爭秋爽三試秋闈年草一名場得雋馳塵鞅渭濱垂釣獲巨鰲天水甲族稱人豪吏績時推天下最一朝掃跡棲蓬蒿壬午余為房師姜弱蓀先生所得士時知寧國縣諱荃林江右望族以卓異例補房山甲申之變即終隱不出忽然喪亂傾家國痛哭天崩復地坼先公殉國汨羅游止水無從居土室人師獨羡紫陽尊嬰城亦繼彭咸則當年貽詩勗忠孝臨風讀罷還悲泣先師崑山朱以發先生諱集璜崇禎乙亥貢士乙酉夏崑山城守城陷赴水死壬午秋贈余詩夙昔承家學忠孝天所紀載先生觀復堂集中􅶉齒即多長者遊况今避世荒江陬曾下常懸仲舉榻曾臥百尺元龍樓雲間給諫最相愛忘年降分為朋儔胡然兵解騎箕尾欲歸天上驅旄頭雲間陳給諫臥子先生子龍乙酉秋同避難蘆區憂患中尤相得後舉事不遂死之橫渠虎皮昔摳侍關西鱣堂從講求張翰林天如先生溥楊解元維斗先生廷樞竝叨國士無雙譽共擬曩賢第一流逝水婁江不可返遺音臯里空千秋縞素一時同會葬舟車千里爭相投湖濆崕廣往一哭風悲雨泣餘荒丘余受知於兩先生最早亦最深稱詡若一不啻口出翰林卒於崇禎辛已歲解元隱湖濵山塢中丁亥歲被執不屈死桐菴夫子真壽豈桃塢先生自魁磊往來二老誠風流鬚睂皓白衣冠偉問年八十相後先歲寒朋情終不改輕身歲歲必經過終始周旋三十載襆被攜尊每極歡圍棋睹墅頻爭采草堂題署墨猶新至今倣佛聞謦咳先師鄭孝廉士敬先生諱敷教别號桐菴李侍御灌溪先生模居桃花塢每歲兩先生必同舟過宿草堂飲酒話舊之餘則二老對奕也明農通隱周年華頌言初度敷天葩激賞因言為禦侮松楸勿翦交情賖少司農申公紹芳亂後自稱明農以六十壽徵余詩卒卯春先公墓木幾厄豪奪賴司農力禦之得以無恙時推黃閣能傳笏共道靑門好種瓜司農為文定公孫號靑門草堂賓從嘗屣履素交頻來矜舊雨周袁交我紀羣間周儀部玉鳬先生之璵袁貢士公白先生徴楊萬求於翰墨裏楊曰補隱君𥙷彭城萬年少孝亷夀祺嶷如斷山千載人臥雪髙風百世士山頭薇蕨每同甘慷慨分憂生死誼亂後心期稱最深伯仁邵公真莫比儀部周急袁先生捍患俱人之所難樊涇遺言心惄如隰西絶筆吾師矣古人交情十二年千里同心書一𥿄隱君亂後居樊涇自乙酉至丁酉與余契誼無閒謂余畫獨得古人正脉臨終遺言以其家所藏畫歸余孝廉精繪事亦亟稱余畫尺書見寄贈我畫幅乞為作隰西草堂圖及歸彭城遽卒季江視我同雷陳仲海因之亦孔禰同被恆矜孝友偏聯牀常妬塤箎美流連風景悼興亡寄託離騷同怨誹兩賢前後赴修文敬亭竺塢垂靑史萊陽姜如須行人垓與余為通家兄弟交最善如農給諌埰因亦莫逆給諫以當年謫戍宣城葬敬亭山行人遺言以延陵為法即葬吳門墓在竺塢䥝鏊山人時命駕淋漓歌哭人爭訝百六徴書絮未休十千沽酒罰無赦髙士例須憐麯糵銜杯每欲窮晨夜時人盡道次公狂坐客時遭禰衡罵崑山歸玄恭處士莊性放逹嗜飲酒自號䥝鏊巨山人每過草堂為酒令徴古事人物之極隱僻者應遲即罰酒酒盡玄恭輒出囊中錢沽之嘗夜半扣酒家門沽來罰如數乃已避地當時亦屢遷數椽茅屋天池邊買山空囊苦羞澀卜鄰喜得逢名賢徐摛年老愛泉石落木菴中啓禪窟竺塢天池稱比鄰徴詩問字相絡繹詩人徐元歎波隱居天池築室名落木菴余移家竺塢與相鄰元歎老而好學時時書方寸𥿄令童子持來有所徴考余立答之或有言在某卷某葉者元歎嘗誇之同人余則時以詩政元歎元歎亦喜為論說澄江尚書蓮社賢開封太守髠華顚澄江大司農張公有譽開府薛郡伯宷毗陵人尚友每尋髙士傳登仙獨上孝廉船居士現身棲寶地頭陀說法皈金仙大圓鏡中續無垢堆山米汁真逃禪郡伯亂後翦髣為頭陀居玄墓真如塢僧舍自謂吾名宷今不冠當去宀又剪髮當去丿僅存米字玄墓有米堆山因名米號堆山天真爛然飲酒終日不醉與余最善余嘗載酒飲之過其宿處室中惟有髙士傳一卷司農自號大圓居士常居靈巖往來玄墓余嘗玄墓看梅司農亦在將返靈巖時同人舟頗多司農獨附余舟笑曰吾自上孝廉船也爭言萬法還歸一逗我禪心耽寂滅天界遙聞大導師鄧山更有彌天釋天界覺浪和尚盛禪師鄧尉剖石和尚璧禪師一笠披雲出石頭一葉浮杯來震澤再宿湖莊惠話言十年湖畔踰阡陌浪杖人素未識面乙亥春從金陵至吳門特過金墅訪余安其隨行諸師於蓮華寺獨信宿余居易堂中及別余將送往解維余隱居金墅十五年從未過市中因紆道至寺紫雲仙人不可求黃面瞿曇今再出慈心為結人外契時時清盻成莫逆山中丘壑啓津梁煙雲供養披昕夕剖師與余最契嘗留余參紫雲仙人公案閉方丈門云直須悟却才放出其真切如此諸方謂剖師為古佛余畫鄧尉十景冊以贈師天上靈巖一退翁蔚然忠孝開宗風瀰空慈雲覆世界亘古正氣蟠心胸欲令大地出火宅欲令長夜聞晨鐘顧我尤深知已感一言一笑心無窮揮戈煉石有精意隻履雙樹垂芳踪靈巖繼起和尚儲禪師晚號退翁山頭殿屋金書天上靈巖四字其遇余尤異嶫嶫黃山氣無上徽音無忝明師匠昔在朝端現鳳麟後歸法苑稱龍象過余土室何殷勤自謂當仁誠不讓黃山檗菴和尚名正志靈巖嗣故給諫熊公開元也建言廷杖亂後出家前住華山嘗與靈巖先後過草堂論交欲得意氣真交滿天下無多人延州後人稱國器咄哉琨逖斯其倫時推俊及才弱冠身投湖海常垂綸矢心欲醒天帝醉出沒生死忘酸辛胡天沉酣不慗遺使我涕淚徒霑巾吳子佩逺名祖錫更有布衣一村叟捐金解厄稱吾友回首當時誇八厨東京名士亦何有姓字依稀三影間歌吟惆悵四愁後天道無知劇可憐孤墳片碣期不朽布衣張英甫名雋嘗為余完官逋一日而捐七十餘金余為作傳英甫無後將勒石樹其墓親朋凋謝歲月馳懷人拊景寧能追當時垂髫今白首俯仰歘忽成吾衰歲寒後凋意自勉碩果不食心相期中原遺民竟誰在獨立宇宙能委蛇偶然苟全幸無恙敢云獨抱凌霜姿嗟我生平多轗軻更傷骨肉多崎嶇遂令衰遲益老醜不覺憔悴增隳頽龍鍾鮐背同耄耋霜髭雪鬢何䯱䰄陽和亦凜氷霜慘豐歲長茹草木滋無酒自憐真獨醒閉門不厭邅長饑余居空山又復禁足每笑井邊無半李誰肯墻頭過一巵前年悼亡五十九天胡厄我喪吾偶居恆倀倀若無之閨中又失一良友枵然一室稱老鰥今年已是六十三低徊形影自相吊無端老淚嘗􅏰􅏰靜中八九數往事寧能一二開歡顔回首淪亡悼知已餘生倔强自世間生平友朋為性命那知造物偏吾慳情深一往不能已緬懷邈若悲河山黃公酒壚山陽笛人生有情淚霑臆諸公往矣那復得草堂寂寂無顔色居易堂集卷十七終
