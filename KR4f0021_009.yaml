body:
  text: 論封建論上王者之治天下其立大經作大法亦適乎時會而已適乎時會者宜乎民者也作法而宜乎民雖暴君汙吏之所建可以施久逺歷變更而不廢作法而不宜乎民則極賢智之規畫遵先王之陳迹然一舉而措之天下非亂則亡吾蓋有見於封建矣封建者唐虞三代聖人之制也郡縣天下者秦皇李斯之事也人君雖至愚然不致慕乎堯舜禹湯文武而慕秦皇者未之有也人臣雖至愚然不致慕乎臯夔稷契伊尹周公而致慕乎李斯者未之有也然而聖人之制必不可復而亡秦之法必不可易者何也宜乎民也後世固常封建矣封建而變計者亂封建而不變計者亡無封建之名而有封建之實者篡漢髙懲秦孤立之弊於是衆建諸侯礪山帶河聯城裂地而韓彭首惡七國繼叛天下岌岌卒用主父偃之謀解而更張而漢室始定其後晉以八王相殘卒喪中夏唐以強籓世繼遂禪朱梁嗟乎封建之不可行於後世也如是哉而後世之謀國者不知變通不適時會尼古迹而行之鮮有不敗者矣或曰然則昔人所論封建非聖人意不得已而行之者信乎曰否上古之世民人衰少而風俗醇厚醇厚則不爭不爭則上可以無阻兵攘地之虞衰少則難伇難伇則下不可以供征輸徭伇之無藝故聖人因時致宜衆建之君大國百里次七十里次五十里環地中而為之國都君有所教於民朝建令於朝而夕遍乎四境民有所效於君朝發之里閭而夕可附乎國都也則所以愛養休息於民者寧有既哉故取於民者什一而足用民不過三日上下相安如臂使指固聖人視民如傷之道也後世則不然地醜則奪勢敵則軋與之兵則日尋干戈與之民則視同草芥弱之肉強之食以兼並吞噬於其中不至於滅亡不止也漢晉唐可見矣故後世居重京師奔走天下雖徭伇之愁苦征戍之流離近者千里逺者常不下萬里而輸將之費或至三十鍾而致一石民力亦敝矣然而審時勢權利害斷不以彼而易此者誠以與民無孑遺亡不旋踵者不可同日而語也故曰後世之不封建以宜民也而三代之封建亦以宜民也若三代而不封建則不宜乎民與後世之封建等雖然非秦之所能為也時也封建論下或曰夫子曰其人存則其政舉其人亡則其政息然則三代聖人而生於今也其必封建乎曰否不然後世之不封建時也聖人不能為時時之所悖不可立也三代之治亦因時致宜而革政刑更禮樂矣故周之文不能返而為忠殷之忠不能返而為質若聖人生於今而必封建是欲返周之文而為忠返殷之忠而為質也有是理哉且封建之廢也三代已見之矣非於秦而然也禹會塗山執玉帛者萬國殷之受命歸者三千焉周之受命歸者八百焉則亦削而衰矣衰者息之機削者廢之漸也至於春秋而六十餘國矣至於戰國而七國矣至於秦而並為一矣夫繇萬國而至於三千繇三千而至於八百繇八百而至於六十繇六十而至於七繇七而至於一其勢然也江河日下歸於海而後止此不可以人力爭也今有人焉曰吾必遏四海之水而復為溝渠陂堰於天下吾見其畢世而無成功矣非特無成功也必且死亡淪溺魚鱉其人民也後世而復封建何以異於此哉吾故有以知聖人之必不為也或曰殷之三千周之八百亦止言其歸命之國耳曰否文王三分天下有其二以服事殷至武王受命而紂之惡益稔矣其貫已盈矣則其去殷而歸周者亦益多矣若天下猶萬國則歸之者無十一國猶三千則歸之者不及其半而曰三分有二可乎且以列爵分土之制而潔之於萬國則盡周之天下不足以供周之封爵矣吾是以知其日削且衰也天下有衰而不至於息削而不至於廢者乎故曰後世之不封建非秦之所能為也時也井田論井田之不可施於今猶塵羮塗飯之不可以飽也不原聖人立法之大意不知古今之異宜舉而施之施之而不當而必求所以濟之則是以塵羮塗飯之不飽而以烏喙療飢也幾何而不殺人哉或曰古聖人體國經野其制詳矣古可作之於前今必可行之於後古法無過豈欺我哉曰古聖人嘗巢居而穴處矣亦將去而宮室夷而城郭以從之耶堯常以天下禪舜舜常以天下禪禹矣今之有天下者亦必無子之授而求其人以禪之耶古聖人之所行而不可行於今者多矣何獨於井田而不然哉上古生齒不煩户口衰少天下必有土滿之憂故人限之田而取之賦生生之道與日俱增勢也繁衍孶息不可窮已而以有限之田供日增之民而可以不變計乎常以天下之大勢論之天下之田固為豪右之所兼並然農民之賃田出租者可計而數也今天下之民去本逐末者常十之四而胥徒戍卒遊手無籍浮屠道士以至仕而在朝出而為吏又十之四農民止十二而已然而身無立錐貧不能賃田者有矣賃田而或數畝或不滿數畝或數十畝所謂數十畝者上農也然稽其實常父子力作其中則天下之田固少矣若準井田之制人授百畝即以滄海為田豈能給哉昔王莽常行井田矣而農民失業涕泣道路四海愁怨天下嗷嗷卒速其斃其後王安石亦放周官之制為方田之法遂亂天下嗟乎非燕噲子之而學堯舜之揖讓乎吳王闔廬論孔子曰泰伯其可謂至德也已矣三以天下讓民無得而稱焉嗚呼泰伯與其弟仲雍默承太王之志欲讓位季歷故斷髮文身以逃荆蠻期於不違其父之志而已豈期於子孫千祀相繼為王也哉逮荆蠻義而歸之以開國承家綿綿延延既十九世至春秋僖文之際而吳益大壽夢稱王楚亡大夫申公巫臣教以乘車戰射于是通會盟於中國壽夢有四子長諸樊次餘祭次餘沫次季札季札賢王壽夢欲立之季札讓不可乃立長子諸樊兄終弟及欲以次必致位季札及餘沫卒季札終讓於是吳人共立餘沫之子僚為王立十三年而諸樊之子光以吾父四人當傳位季子季子不受光適嗣當立乃令專諸刺殺王僚而自立為王是為闔廬當是時用孫武伍胥之謀敗越伐楚取番入郢楚至徒都闔閭為霸及敗於姑蘇為越人所傷而死太子夫差立乃報越使為臣妾復伐齊伐魯爭長於晉而卒為越所滅嗚呼後之論者謂吳蠻夷伏處自泰伯至壽夢十九世不通中國而吳晏然自壽夢用巫臣乘車戰射之法後與晉楚兵爭中原以至於亡又謂夫差罷民以成私縱過而翳諫一夕之宿臺榭陂池必成六畜玩好必從夫是以亡二者皆非也夫吳不亡於壽夢不亡於夫差而亡吳者闔閭也何也楚語稱闔廬口不嘉味耳不逸聲目不淫色聞善若驚得士若賞遂以霸吳然其所以得立也乃倍其讓國之義而出於弒奪則小善不足以救大惡而祖宗之澤斬焉盡矣夫國於天地必有與立失所以立喪亡隨之譬如氓庶之家其前人勤勞節儉纎悉積纍克有成業而其子孫一旦侈泰無度無不立破其家者蓋侈泰未必為天下之大惡顧為人子孫而盡反其前人之所為未有不為天之所棄者也况祖宗以三讓天下之至德創業垂統甚光美而其子孫乃忍以篡弒劫奪之禍繼之不亡何待乎故宜其身之不免而其子遂以斬其祚也嗚呼以泰伯之至德先文武而開基綿歷千􅥴而卒以子孫之篡弒不祀忽諸悲夫范蠡論豪傑之士俯仰身世能斷然有所割然不能使其傑然精悍之氣即銷亡於一割之中故往往有所寄託以豁其雄心阮藉陶潛逃於沉湎彼其於天下豈遽忘於情乎廣武之歎荆軻之詠所謂傑然精悍之氣略己見之彼其以天下無所於容故寄之於酒范蠡佐勾踐滅強吳雪讐恥盡有江淮之地俾其主稱霸王於天下謀之二十二年而後功成而名遂而遂扁舟去於五湖而隱於陶乃復以財自雄而蘇子論之以為好貨天下賤士之所為也嗚呼人之不好貨孰有如蠡者當蠡之辭勾踐而去也勾踐約與分國而有之而彼不難拂衣而去之逮其後積纍數千萬而復能盡散其財顧詆之為好貨此固蠡之所笑也然而彼區區而為之者特其傑然精悍之氣無所發舒而一寓之於財耳舅犯從公子重耳亡十九年將返國及河犯以璧授公子曰臣從君巡於天下臣之罪多矣請從此亡公子投其璧於河與之盟而遂入留侯子房為韓報仇佐髙祖定天下及後辭封辟穀曰願棄人間事從赤松子遊而卒未能去嗚呼少伯之功逺過子犯而其成功之難實倍子房而子犯不能決去於前子房不能引退於後而少伯獨何如乎彼其去卿相之位如棄涕唾去韓魏之家如洗塵壒翛然長往而莫知所極乎渺矣不可幾及矣非千古一士耶嗚呼阮籍陶潛吾尚不能以酒訾之而能以財纍蠡乎嗟乎子瞻逮失之矣雖然蘇子亦千古士也彼豈不知蠡者而云然吾以為子瞻有為言之也俠士論賢者誠重其死乎曰非然也賢者誠不自重其死乎曰非然也吾死而重於泰山則賢者視死知鴻毛矣吾死而輕於鴻毛則賢者視死如泰山矣曰吾聞俠士輕生然乎否耶曰然諾不侵為知已死俠士之所積也然其感激一言捐身不惜未嘗不傅於義謀於道以殉於所知而要其所以必死者有三焉謀人軍國置人死地則義不獨生一死也社稷存亡決機俄頃則計不旋踵一死也吾事己立而吾言未酬則示信萬世一死也有此三者則一言為重七尺為輕赴湯蹈火斷脰絶吭怡然甘之則其為死也何嘗不重於泰山哉何也義不獨生則任其死者勸計不旋踵則決其機者奮示信萬世則厲其防也密吾於古得三人焉曰侯嬴也田光也程嬰也當信陵君竊臥內之兵符矯奪晉鄙軍欲以却秦而存趙誠萬死不顧一生之計也侯生定其䇿舉其人則杖䇿從軍同其生死義也侯生既不能從顧能髙枕牖下身居事外乎使幸而得成其功此五霸之伐也不然則侯生受知之公子及其所知之屠者同時灰滅而魏之社稷隨之當是時成敗未可知而為之首謀者奮然一死則人心震動正所以謝後死而決成功也此所謂義不獨生者也計不旋踵者也而田光之舉荆軻也不其然乎太史公論光欲自殺以激荆卿亦僅得其一耳至程嬰之一死也此所謂示信萬世者也何也屠岸賈討靈公之賊盡滅趙氏之族而大索趙氏孤兒趙朔之客程嬰公孫杵臼相與匿之將再索公孫杵臼曰立孤與死孰難嬰曰死易立孤難耳於是杵臼遂死之嬰乃出萬死存其孤是為趙武武既立復其位乃誅屠岸賈而復趙氏後嬰之功已成矣事已立矣獨死易一言無所驗於世嬰恐天下後世以我為需忍而適會其成功也以我為能言而不能行也故事成而卒自殺嗚呼聖逹節次守節若程嬰者可謂能守節矣彼其硜硜一死以揭吾之心迹於萬丗者正所以厲人道之大防於萬世也自其一死而天下萬世之偷生以誤國負諾而賣友者亦可以少沮矣則其死也雖與日月爭光可也嗚呼三人者可謂俠士矣而嬰尤錚錚哉至如荀息之不食言陳元逹之以尸諫若而人一死不足以洗失身之辱奚論其他乎此誠輕於鴻毛矣若三人者吾雖為之執鞭所欣慕焉刺客論太史公作刺客列傳曰曹沫曰專諸曰豫讓曰聶政曰荆軻凡五人顧此五人者非刺客也特古有刺客之名太史公求其人而不得故以此五人者實之耳然太史公即已言其非刺客矣何也太史公既傳而論之曰此其義或成或不成夫既曰刺客未有不成者也曰或成或不成者言其非刺客也又終之以魯勾踐之歎曰惜哉其不講於刺劒之術也不講於刺劒之術此言其非刺客也吾略而論之曰豫讓忠臣孝子也聶政荆軻俠士也能委身以殉所知而未能期於必成者也未能期于必成者固不得為刺客即幸而成矣而委身以殉之使人得而甘心者又豈得為刺客乎彼刺客者出無入有不可端倪所詣必臻所擊必中又如􅋧鳥一擊瞬息滅沒未可以轍迹尋也禆官侈言刺客事疑鬼疑神太過要必有近似者至舉則必成成則必不可得而蹤迹者則信史之所同也子房使東海力士為博浪之椎碎其副車亦成也以始皇之威力大索天下十日不可得其後如袁盎之被刺來歙之被刺岑彭之被刺如武元衡裴度之被擊從未有獲其賊者也夫排警蹕而擊萬乘無論矣即其人身為將相擁嚴兵踞禁近侍衛之森嚴刁斗之呵防何如者而彼懷刃而來剚刃而去如刈草木如御風雲不留聲影豈若入宫塗厠披圖把袖者之多其曲折哉吾故曰五人者非刺客也自史册可考刺客之不成者有二人一則鉏麑之於趙盾一則初刺袁盎者也然此二人者非不能成也特不欲成之耳吾故曰刺客未有不成者也顧刺客多為利用其誅擊多未合於道且其人名迹不可得傳太史公以必有關於國家治亂得失者而後可故傳此五人而仍微言其非刺客以明我之非昧於其義也不然則世有報仇之孝子白日刺人於都市又有惡少年以一朝之忿操刀而殺人者俱可名之曰刺客乎嗚呼世之所稱刺客者既不可為訓而此五人者又未能盡其術而無憾又安得以真刺客之術而必為豫讓忠臣孝子之舉其庶幾乎嗚呼吾安得而見之荆軻論上太史公傳刺客而論之曰此其義或成或不成然其立意較然不欺其志嗚呼豫讓之不成也行之過難而荆軻之不成也處之過審故其始則備愈多而氣餒其既則機不赴而氣盡皆必敗之道也天下無萬全之事也操必得之劵行康莊之塗而往往蹉跌者機變於瞬息而事乖於俯仰也凡事且然而况於蹈不測之地刺萬乘之主而乃欲萬全而後行吾見其必不全矣荆軻受太子丹之命以刺秦王一則須樊將軍之首再則須督亢之地圖三則須吾友與俱嗚呼又何其持重而周詳也夫豪傑之士而間行擊刺之術如風霆之猝至也完其氣赴其機瞬息相遇而事已決矣若使其風紆徐而披拂其雷殷殷而填填必不能有所震蕩而鋤殛矣今與秦王周旋於殿陛之間雍容言笑多其往復其氣已鑠其機己逝矣而又何以逞於一擊之間乎公子光之殺王僚也身與之為周旋而使鱄諸注心於一刺趙襄主之殺代王也身與之為酬酢而使厨人專精於一擊猝然而來間不容髮故魚炙進而王僚斃熱啜進而代王殞無他完其氣赴其機也今軻之見秦王也其如是乎人有以抗直自命者常欲面數其友之過及見其友言未及吐其友與之握手道故絮及生平於是其言終不發其過終不聞無他挫其機也嗚呼友朋之間一言之遺猶有機焉而况刺萬乘之主乎故氣完而機赴者雖庸奴如厨人可以集事如其不然雖賢如荆軻徒足以湛其族覆其國而已此魯勾踐之所以歎其不講刺劒之術也雖然豈特不講於刺劒之術而已哉荆軻論下侯子曰荆軻英雄而感恩者也徐子曰荆軻非英雄也特俠士耳太子丹之命軻也曰燕小弱數困於兵今計舉國不足以當秦諸侯服秦莫敢合從愚以為誠得天下之勇士使於秦窺以重利秦王貪其勢必得所願矣誠得劫秦王使悉返諸侯之侵地若曹沫之於齊桓公則大善矣則不可因而刺殺之及軻刺秦王不中斷左股被八創箕踞以罵曰事所以不成者以欲生劫之必得約契以報太子也嗚呼軻不獨不講於刺劍之術也而又不明夫時勢當齊桓公一霸而為盟主欲申信義於天下故曹沫得以一劒之任而使悉返魯之侵地然桓公嘗發怒而欲倍其約賴管子之信而後魯三戰之所失一朝而復之今秦之為秦何如者信陵君曰秦與戎翟同俗有虎狼之心貪戾好利而無信不識禮義德行不顧親戚兄弟若禽獸耳客謂韓王曰秦之欲並天下也不與古同行雖如伯夷猶將亡之也事之雖如子之事父猶將亡之蘇代曰秦取天下非行義也暴也秦之行暴正告天下必令其言如循環用兵如刺蜚困則使太后穰侯為和贏則兼欺舅與母則秦之為惡天下之人能知天下之人能言之而軻獨以桓公望之始皇而以管子望之不韋李斯之徒斯必敗矣且當時曹沫之所以得志於齊者獨求返其所失故其求易給而其言易酬若沫逞其一時之雄而有好大之心而謂桓公必盡返其所得於他國者則桓公必不能從而管子亦必不能信矣今不特以桓公管子望之始皇之君臣而且以桓公管子之所不能者望之不亦謬哉即果得所欲吾見其匙首一去而六國之侵地不可得而燕之危亡立至王翦李信之軍拔薊城而擊遼東者無異於軻之被誅也嗚呼不忍帝秦寧蹈東海而死當時稱義士焉太子丹以不忍召公之苗裔而屈服仇讐之暴秦獨非志士仁人乎顧其所見則嬰兒之謀也而荆軻乃以身徇之吾故曰荆軻非英雄也特俠士耳彼所知者士為知已者死耳嗚呼惜哉師説上世之盛也師道在君及其既衰而師道在下道之盛也以道為師及其既衰而以經為師矣書曰亶聰明作元后又曰作之君作之師言聖人首出庶物而踞大君之位以教天下也又曰皇建其有極汝則錫之福使羞其行而邦其昌言大君立教於天下而錫福於率教者造就其行以善我國家也於是鄉飲大射則於學授鉦飲至則於學以禮樂征伐皆大君教天下之事也教化既行長育人材育材既盛克處在位故其詩曰菁菁者莪在彼中阿又曰芃芃朴棫薪之槱之此大君為師而教行於天下之效也及周室東而王迹熄學較廢而子襟刺佻逹城闕風俗衰遲為人君者不能舉其師之職無以為教於天下而孔子崛起而設教於洙泗之間文行忠信循循善誘天下翕然宗之受業身通者七十有二人於時號為素王蓋言師者王者之事也而以布素尸之此師道之一變也孔子既沒微言絶而大道衰然七十子之徒各負其道以友教天下子貢居齊子張居陳淡臺子羽居楚子夏居西河而段干木田子方孟子荀卿各師其師各道其道以為教此又師道之一變也逮秦之季焚書坑儒漢興而六藝殘缺鮮能兼通於時田生言易申培公轅固生韓太傅言詩伏生言尚書髙堂生言禮胡母生董仲舒言春秋儒者各以一經為師而師道又一變矣嗚呼師不以道而以經非師道之極衰乎所以馬融堂羅妓樂徐遵明懸質絲粟王式貽恥狗曲轅固生來譏馬肝貶師儒之風而為後世笑也浸淫至於今日而今之為師者又何如乎以一經為師又可得乎向之所謂極衰而今又邈然其不可幾乎為可悲也余不佞幼而好學負奇志逮乎成立不汲汲於榮利慨然有志於聖人之道而病未能也然學固不專一家而冀以躬行為先及遭喪亂閉門隱居四方之問奇請益者一概謝去癸卯歲潘生次耕以其所業詩問業於余而余欣然有以教之於是潘生既中心悅而誠服於余余亦為之師而不疑兩人固相得也平居相與講道論德稱説詩書詠歌先王之風上下古今成敗得失之林天人消息往來之微輿地山川形勝之奇災祥圖緯歷數之異以至前言往行奇節異能之魁偉人妖物祟氣感風移之變態以至幽經怪牒廋詞隱語雜家小説之荒忽事無所不言言無所不盡推其極致要其指歸抵掌而談流連感激或泣或歌不能自已而簟食屢空不改其樂藜藿不糝歌聲若出金石所謂以躬行先之者然乎否耶嗟乎余於潘生又豈世人之所能知哉潘生從余遊一年余亦命兒子叔然受業於潘生且昌言師道以正告之固願余之於潘生潘生之於叔然共相與以有成也嗚呼今何時乎庠序學校之事不明於國灑掃辟咡弦詩象勺之事不明於家進無所程退無所資而師道絶矣夫天之所廢不可以興亦勉其人力之所可至者耳吾固願為師者奮乎百世之下起師道屢變之餘回江河日下之勢毅然以洙泗為宗而一反諸道毋徒硜硜為經生也余與潘生共勉乎哉吾觀潘生其才大其氣靜其志深長固將窮天人以為學故告之如此雖然人之患在好為人師余與潘生又當共自懼者也師説下吾觀於師而後知道之重也無其道天子而不能教一時有其道匹夫而可以教萬世道之所在師之所在也非必升堂而入室也非必親炙而私淑也聞其風範其防者皆是矣當春秋之時弒君三十六亡國五十二日食三十六地震五水災十四以至山陵崩陀雷霆失序星隕晝晦夏霜冬實夫戎翟交侵而亂賊接踵蒸報成風於是天變動於上地變動於下而人道幾滅孔子起而刪詩書定禮樂作春秋然後君君臣臣父父子子天地得以復位日月得以復明萬物得以遂其生上下數千䙫綿延不墜者皆孔子以道為師有以維持而永久之也夫師者道也道絶則師絶矣自孔子至今盛衰既殊汚隆不一雜亂糾紛湮沉晦塞無時無之而其中瀕絶者亦屢矣火於秦不瀕於絶也黃老於漢不瀕於絶也佛於六朝不瀕於絶也然而瀕絶者必有在也嗚呼今何時乎吾始言師道之變而今言師道之絶不更痛矣乎嗚呼亦危矣然而不終絶也夫人能弘道非道弘人以春秋之亂人道幾滅而孔子正之綿延至今苟今之人能推明孔子之道師以是傳之弟子弟子以是受之於師則於今乎何有而吾世其有瘳乎夫大聖不再生孔子不可復作苟得聖人之一端亦足以回人心而風教於天下而師在是矣而今誰其人也雖然事未有剝而不復者故當瀕絶之時天必篤生其人以維繫於一線亦猶澤中之有火而一陽之生於極隂也今正其時也嗚呼今正其時也而謂今無其人乎寒花説仲冬之月羣象閉塞萬木憔悴大地無萌芽之生極目無含榮之秀而余庭前籬壁之間有紅花自開凌霜吐葩風前獨笑偏反娟媚殆難為倫或顧而歎曰此花有松柏之後凋蘭蕙之自芳經秋不隕當比小山之招先春而開可入羅浮之夢乃離騷香草曾未擬於江蘺何草木之亦有幸不幸歟余曰否不然物固取於大者逺者非所論於瞬息之觀也昔有匠氏刻木為人能持鉢乞錢又刻木為鳬鵠能奮飛百里之外則其巧過公輸矣而不得厠名方技之傳無他小之也亦或有偶然之奇寸節之峻幸垂史册著其名字然而傳之後世知者鮮焉是故一羽之翠不如六翮之純白也一寸之錦不如全機之匹布也况朝榮暮落同於蒸菌則雖凌霜吐葩固不如春花之爛熳而以擬之歲寒後凋過矣君子亦務其大者逺者而已管子曰崇山之隈奚有於深平原之隰奚有於髙知言哉貧病説子貢結駟連騎排藜藿以見原憲憲攝敝衣冠見之子貢曰夫子豈病乎原憲曰憲貧也非病也固也然吾以為貧則未有不病者客曰噫甚矣子之憊也夫子謂君子謀道不謀食又曰食無求飽居無求安今吾子言貧則必病何若是之惡貧也得無悖先師之訓乎且吾子動法前賢彼歌聲出金石而不改其樂者獨何人哉噫甚矣子之憊也徐子曰唯唯否否夫人生平行不茍合義不取容而一旦緩急盜泉是飲亦病乎客曰然昔平原君朱建義不與辟陽侯交既母死貧不能發喪而卒受其金失身亂人竟以是敗非耶夫人而尚志居貞不縻世爵而飢來驅人隳節干祿亦病乎客曰然昔馬融始不應鄧氏辟命既遭飢困而遂違初志黨附成譏非耶夫人而殘身辱親殄先人之緒亦病乎客曰然昔史遷遘李陵之禍徒以家貧財賂不足以自贖故卒從吏議而陷腐刑非耶夫人而湛身覆嗣死輕鴻毛亦病乎客曰然昔王尼以無食而噉車牛牛盡而父子俱餓死非耶之數子者皆抱人傑之譽負天下之才平時抵掌言事慷慨伸睂其鋒莫圉及事會交困金盡氣索而或死或辱正同腐鼠悲夫悲夫安在其非貧之為病也乎客曰古人之事則吾既聞之矣今請言子之病徐子曰夫葬親愼終之大事而教子俯育之巨責追逺則潔蘋蘩於歲序平居則衛軀命以衣食一家之內婦子雍容有禮有則固生人之常道亦中人之所能也苟或悖此病莫大焉而今者天道周星猶遲反壤先人孤櫬藳葬兩楹一病也兒曹年逾象勺而家孰無師恐詩禮箕裘自我墜地二病也歲時伏臘時缺蒸嘗霜露既濡松楸莫展三病也邂逅疾病診療不時衣食不適致不訾之軀幾於橫死四病也兒曹衣不掩脛蓬頭跣足客至不能揖祀先不能拜故年雖長大而未間禮則見客而慙不能仰視五病也凡此五病繇於一貧中夜焦心令人次骨奈何未處其地不及身親驗之而輕肆悠悠之口哉至於藜藿不糝而不廢嘯歌簞食屢空而吾樂自在僕雖不敏猶為庶幾而非所以語於此也嗟乎嗟乎事固未易一二為俗人言也客無以應默然而退宋生名字説宋克昭氏少執經於吾宗子瞻明之門而亦私淑於余者十五餘年矣間嘗請余曰某聞名以制義字以敬名今某之名與字實未有以啓吾志而朂吾行願先生有以命之余重嘉其請而未有以應之也吳中山多名勝而大樵山介於天平石屋靈巖琴臺之間顧幽靚卓越若不屑吳山之嫵媚而獨古處者宋生樂其泉石之美林麓之邃流連晨夕讀書其下余於是躍然有以字之曰古人命名與字其義有三一曰取諸人則司馬長卿之名相如袁愍孫之名粲以至顧雍之雍桓溫之溫皆是也一曰取諸事則袁賀之字元服髙琳之名琳是也一曰取諸地則魯苫越之子名陽州趙岐之字臺卿是也今宋生既讀書大樵之麓而又愛此山之勝因字之曰大樵取諸地也學朱百年之伐樵采箬置諸道頭不與世接胡叟之曳柴而行客至不輟取諸事也學孫樵之文繼昌黎之正傳學鄭樵之學為一代儒宗取諸人也字之大樵而三義備矣於是名之曰采采者取也擇也夫人之能坐而進於聖賢之域者皆其善采者也故顏子之擇一善大舜之取於人皆是也茍如是以采於山奚止芝蘭之芳松柏之貞澗泉之潔煙雲之潤皆備於我乎如是以采於古人又奚止百年之隱胡叟之逸可之之文漁仲之學皆備於我乎學猶殖也仰有取而俯有拾進之而靡已則其所詣未可量也噫是其所以為大樵也歟恆軒説吾友歸子元恭天下士也性不可一世目中空無人遭亂坎軻不少挫其氣自號曰恆軒徐子問之曰子之自號其有説乎玄恭曰人而無恆不可以作巫醫又曰得見有恆者斯可矣則是恆者聖人之所深有取而復歎息慨慕若庶幾望見之者且吾自經世變吾深悲夫素絲之終染荃蕙之為茅是皆無恆者也故以為吾號以自期亦自警也徐子曰固然然吾有所進矣夫不一於恆以為恆者聖賢之學也一於恆以為恆者德之棄也此不可不察也孔子之自敘也自十五志學以至七十之不踰矩其為道也屢遷而孟子之稱孔子則曰仕止久速無可無不可其亦無恆甚矣譬如天地物之最恆者也然觀其造化之功則歲月日時推遷變革無一息之停斯無一息之恆矣以是而成其生生不息之真恆聖賢所以日有孜孜時異而月不同而經德立乎其中也夫天地以日新其化為恆聖賢以日新其德為恆非不一於恆者乎不然則易之所謂恆其德貞而夫子凶而洪範直以恆言咎徵矣其可思也夫其亦可懼也夫吾知歸子以不挫之氣成日新之德也故給諫東萊薑公埰私諡貞毅先生議行出於已名生於人易名之典俾民興行所以彰往哲詔來兹此誠砥世之大經名教之干城也茍其人而行合諡法則雖在草莽雖有一節猶所不廢如東漢之季所稱文範先生文德先生玄文先生或逸民獨行之流有其德則舉其諡無不標領史牒照耀古今而况始則位參禁近名顯朝廷既則堅臥山林起徵九列面折廷諍則事關君國卷懷遁世則身繫綱常者乎而時異典湮缺焉未舉門人故舊相與哭弔而托其懿行揭其大節以相與諡之亦猶行古之道也故東萊薑公埰於癸丑歲六月丙午以疾卒於吳門之舍館逺近聞之莫不悲歎遺民故老尤懷衋傷痛故國之流風悼哲人之斯萎於是起而議曰任天下之大事立天下之大節非貞無以守之非毅無以成之無往而非然矣公早歲聲華滿天下以進士起家為令惠政及民有如膏雨當官而行恤民則止不畏強禦不通津要治績既最十年不遷而守身不滓為淸白吏入為給諫拾遺禁闥時權姦誤國國事日壞公慨焉有澄淸之志於是譏切時政上書極言無所諱遂觸逆鱗之威遘蜚語之禍禍不測下詔獄治始終鍛鍊三木囊頭身備楚毒而公辭色如一視死知歸上疑刑官有所徇復震怒公復拜杖闕下杖至百逮歸司寇公槖饘不入肌膚不完而復遘太公殉難之變慟絶不欲生時天下無不冤公爭訟公而公無幾微幸心惟自安於纍囚以待天心之悔悟既得旨謫戍宣城而國變隨之公聞變慟而仆地既天下亂戍所不可居公以吾罪臣有君命即不能就戍必客處母還鄉邑於是往來儀真吳門之間天下稍定搜訪遺老公深避之之死靡二以久不還故里遂得免天下於是敬公之髙節而益服公之深見也如是者三十年俯仰如一日一言一動不忘故君疾既篤猶諄諄遺言必葬我宣城使我千秋無違君命其忠誼如此至其家庭孝友敦倫備禮又所衆著者也於是議者曰公篤行於家施於民效於君徇於國生平偉績簡不勝書而要之人之所不能者有三焉蓋濡十年而不喪其守瀕九死而不失其黃閲三十載而不變其操也夫確乎操持而不拔者貞也卒焉臨蹈而莫奪者毅也以公之聲華久紆墨綬淹迹腴邑而不涴淸白不慕通顯此公守身之貞也而斷然有以成其不滓者非毅乎以公之忠諫黃門北寺傳考備毒而坐待天心不欲自理此公蒙難之貞也而斷然有以成其不撓者非毅乎以公之位望而違墳墓去親戚隱身避世不遑寧處逾歷歲紀殆三十年為晉徵士為宋故相而簡書無聞干旌不及此公完節之貞也而斷然有以成其不屈者非毅乎嗟乎此非蔡雍氏所謂忠兼三義文備三德者乎有一於此猶可以稱於是合而舉之曰貞毅以諡之按之諡法質之羣議僉曰允矣吾無間焉遂諡為貞毅先生春王正月辨春王正月者周正月也周正月者建子之月也建子月者夏之仲冬月也仲冬不可以為春正而春正之者蓋王之春正月也王者周王也此夫子尊王之特筆而行夏之時之精意見之矣何也三正皆以歲首為春自然之理也然言正而不悖天時不失物性者惟夏正有之故直言春而無所系者時之正也夏之春也言春而必系之以王者此非時之春而特王之春耳亦明冬之必不可以為春而周正之必不可以不言春也故曰此夫子尊王之特筆而行夏之時之精意見之也曰松陵朱氏鶴齡之所謂三正皆可以為春或亦然乎曰否惟必不可以為春故系之以王也不然則夫子固周人也以周人而遵周正何不渾然統之以春而必系之以王乎且聖人立人倫之極以教萬世者也苟周正之無悖又何心以行夏之時乎哉曰豳風七月之詩何謂也曰此正夏時也曰然則朱氏所謂豳風歲令出於民間之話言而非朝廷之政令信乎曰否此直當夏之世而言夏之時耳非居今而反古者也又何疑於春王正月哉何也夫周之始以后稷后稷之子不窋即失其官至公劉復修后稷之業始立國於豳而周道興焉此豳風之所繇詠也自后稷至公劉僅四世耳非夏時而何此孟夫子之所以論其世也今之儒者大率以周正之不能通於豳風便謂春王之或非建子是以聚千古之訟而滋百世之惑也惟確見豳風之直當夏時即可以見春王之必為周正矣居易堂集卷之九終
