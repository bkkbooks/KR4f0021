body:
  text: 塔銘獅林廣運大師智公塔銘法華經王方便教詔至童子戲聚沙為皆成佛道而後世沙門闡士或國王大臣竭帑藏之儲殫生民之力以經營塔廟而斥為人天小果非無上菩提凡屬有為皆第二義何也心有所著也彼童子聚沙復何著哉有著則染染則不淨為力愈勞去佛愈逺矣故有國王大臣沙門闡士竭儲殫力巧取釣奇纍歲經年人窮物瘁而事難卒成功未易濟其理然也若真常不動迥脫根塵則一心所之無不如意蓋寶華莊嚴毗盧樓閣吾心自有不假外求出其故藏以示於世亦何難湧殿飛樓隨地而現琳宫寶所不日而成哉此無他得其無為而有為者應之則幻化塵勞皆為實際虛空世相盡是真如此華嚴四種法界而理事無礙乃在第三梵天七種福德而興立佛圖實居第一也噫亦難言之矣不謂當吾世而復見廣運大師其人也崇禎之末師猶未剃染現居士身來遊吳門以吳門為佛法淵藪决意棲泊止於城東古獅子林寺獅子林亦名菩提正宗故天如則禪師道場寺雖廢中有林石陂池之勝而師一心求道盡屏外緣足不窺園目不交睫以披誦如來修多羅藏及毗尼藏阿毗曇藏始終三年無不周遍淪肌砭骨以寢食周旋於古佛聖僧之中於是而圓融性相默契真乘觸處隨心無非佛事矣既而歎曰世風日替象教晚秋非假見聞不足以起正信非耀耳目不足以攝身心吾既精心於藏海不當搆傑閣以奉之乎乃兵燹充斥之後瘡痍未復之秋而師鳩工經始毅然不回不募檀資不假外護匠心獨運規畫經營而十方皈依四衆信向如鳥投林如川赴海一銖一縷之積一工一藝之良逺邇咸臻無不喜捨用是而寶閣不日成矣未幾而大雄氏之殿復成矣皆以香柏為梁棟而範銅為瓦以覆之金碧輝耀概日干雲締構精堅規制殊特不僅冠於三吳實五山十剎之所未有也功費萬計成於一人而韋布依然猶未脫白噫不更異哉及巨工方畢而功成不居蕭然退處於寂寞之濱山巔水涯隨意棲宿此尤人之所難求之古德亦所罕見嗟乎吾之所謂無著者不於其成之之不難而去之之甚易見之乎有張居士者同願宣勞而死於其事師悽然傷之且師自戊子歲經始殿閣一時披荆榛闢瓦礫相從於風雨桑土中者甚衆逾涉歲紀後先物故師歎曰此吾一會中人吾適後死吾其可無芘其遺骸乎吾當選勝地為張居士建塔而以衆從之會崑山顧文康公後人以石刻楞嚴經歸師師於是創楞嚴壇於吳縣鳳凰山之麓以奉石經而即建塔於壇之旁其莊嚴妙麗亦甲於諸蘭若方以次興構而師厭世矣時乙已歲之七月也師生於萬曆壬子世壽五十四臘僅五然師自有生以後般若外不知有他事故幼不茹葷血不㛰不宦其所見所聞無非此也少而參禮諸方遍歷名藍先入閩中上浣山香林和尚道場隨至滇之雞足山及入吳大有所為而遂終於吳焉先是於崇禎庚辰歲皈依三重律師受菩薩戒又十三年而剃度法名法智廣運其字也師浙之紹興會稽人族姓陳氏名大賢即吳門緇素皈仰而賢士大夫所亟稱之陳居士日新云張居士吾郡崑山人名士延字仲明同師首事故牽聯得書師律身精嚴與衆誠信而神氣閒淡進退自如每巨工大伇一身肩之不動聲色而衆力所趨不言而信不約而嚴故其所成就奇偉如此示寂後三年歲戊申其弟子法慧法泰法希等於楞嚴壇左建塔以瘞師之全身而來請銘焉昔佛滅度波羅奈王用七寶造塔藏佛舍利為作銘記此自西竺之垂範也今師種種功行有合佛制是固身宜入塔而塔宜為銘銘曰睦州尊宿再乘願輪幼耽白業夙誦玄文百億字句恆沙微塵字櫛句比心開目明神識涵濡髮膚漸淪慧燈長炳心薌時薰如是三年觸皆佛事目可得聞身可得視乃感天宫下移人世寶閣弘開琅函斯祕藏教如海不立文字如斯有為為第一義神力擲象定見移山視師所構如折枝焉理事無礙圓明現前行滿功成然後剃落如盧行者仰視不怍夏臘無多頓超正覺時節既至灑然西遊偶爾應化如水浮漚何去何來法峙聲流去亦非無來亦非有真常獨存浩劫曷朽復何一辭以昭厥後乃倣佛制為窣堵波乃鐫貞珉函舍利羅斯石可爛斯銘不磨五牧德慶琚和尚塔銘師名良琚字劭圓靈巖退翁儲和尚嗣也師從三峰老人剃染隨受具足戒為大僧鄧尉剖師靈巖退翁皆三峰真子故師輔佐兩山勳德最盛初掩關鄧尉􅑎然一室數年不與世接及一出而熾然建立無廢不舉兩山樓閣莊嚴金碧晶耀儼若兜率天宫下移人世者師之功也既謝諸事與退翁和尚機緣契合如水乳退翁以西來心印付之既受記莂遂出世於毗陵之五牧德慶禪院德慶三峰老人脫白之所也師毅然繼席諸方推重既復謝德慶事歸而往來兩山間或暫憩諸招提隨時久近絶無定跡如是十年人或叩之師輒微笑不應戊申冬示微疾輒坐筍輿遍別其師若友曰吾將逝矣因輿至金山之懷敬菴語其僧尚珠曰子當嗣我尚珠亦靈巖學人侍退翁最久者也師既以法付囑而病亦增劇退翁特過金山視師病因升座為師與尚珠證明授受師危坐榻上伺退翁下座側耳曰願聞法語退翁以語之語既畢師泊然脫去尚珠遂嗣其法時戊申十二月草五日自師輿至金山止十有三日也嗟乎人生自負其才必欲一用其所有餘及用之既遂氣滿志得而僨於不知止者多矣若順風揚帆於江河方甚酣適而能屹然以止者其必有過人者也當師之興建於兩山也信施填委如水湧坌集巨功大伇指顧而成出入金錢皆纍以千萬計而師能一旦謝事蕭然絶塵獨行獨止逾涉十年無立錐之地噫古德髙風何以過之宜其於生死之際灑然如脫敝屣也師生平敦孝友尚節概於五牧善堆山米大師於吳門善秦餘山人與兩人氣誼終身無間往還書問詩偈甚多米大師者故開封太守薛寀而秦餘山人則舊孝廉徐枋皆避世者也師族姓董氏浙之桐鄉人於鄧尉名濟琚嗣法靈巖改今名有五牧德慶語録一卷五牧頌古一卷省墓詩一卷隴雲集一卷行于世銘曰寶華莊嚴遍虛空隨心湧出諸佛剎一一樓閣皆現前如是功德世希有從無入有有亦空從空證入一實境觸處真如盡呈露森羅萬象皆說法諸佛菩薩為證明此是毗盧真法界師既了此大因緣現在靈山為授記一彈指頃歸太虛何去何來復何著空中忽現窣堵波全身躍入無壞者如夢如電如是觀究竟吾師常自在法林水觀禪師航公塔銘師諱照航字水觀吳郡吳人也族姓郁父名槐母黃氏信善之家故篤生師師幼而喜淸淨不好塵俗年十九遂决志捨族出家禮一雲山仰天塢之日觀菴體空師得剃染壬戍歲始來居陽山西之法林菴菴濱太湖去金墅鎮僅三里地僻甚屋止三楹逼仄荒陋人所不堪師獨以為避塵俗謝喧囂無宜於此遂决意居焉而專心本分事一住六年未嘗少有攀緣逺近益信之歲丁卬遂渡海至暜陀之茶山慧濟菴禮示權律師受具足戒為大儈歸而參叩諸方卒依天童密雲老和尚有省復還吳居菴中生平為人無少文飾衣一衲飯一盂人與之言佛法則應言世諦則不應持誦不輟口人初怪之既而綿歷歲紀先後如一日於是人爭信仰焉法林地最僻人跡稀少居民朴野偶相聚則量晴較雨年榖外無他言自師之居菴中晨鐘夕梵精嚴純一人漸販信或更具信心來叩問者師輒亹亹與言西方聖人之說日久風馳不特遍其村落四逺數十里間無不宗仰而法林之佛事益興有迥塵師者名暜淨族姓許氏即土人也亦起田間因皈信師心悅誠服遂棄其家室而從師為儈初師單丁獨居仰食村落及迥塵至則竭力經營開拓土田葺治屋宇莊嚴像設逺邇協助衆力咸臻雲水往來皆得飽滿於是荒野僻壤蔚然如名藍食指三百以為常淨公之下則有通瑩通定通慧通惠通徹若而人而通瑩尤賢今乞余文以銘師塔者則通瑩也法林初止十笏之地三楹之屋師亦孑爾單丁歲月無多而森然有成則迥塵淨公之力居多其賢而能繼志孜孜欲大其前人之緒者則通瑩也師十九歲而出家又十一年而住此菴又六年而得戒又四十五年而辭世世壽七十八僧臘五十九臨終跏趺說偈泊然而逝瞻禮者益增其信心即葬於菴之西為長洲縣四都彭華鄉師所卜也淨公先師二年示寂亦葬於塔旁皆通瑩所營也通瑩字凌雪於荒歲能襄大事蓋不可及云因應其請為之銘曰大雄設教惟貴一誠惟誠能立衆善之因一切有為皆從此起玉殿瓊樓天厨甘㫖食息如歸禪悅法喜并誠不立并善不名成性存存豁然天真還歸本來師復何心師今何在有窣堵波聿有文孫乞言於吾千秋長往吾言不磨再生道人塔銘再生道人者世吳人姓張氏名舜臣即吳中所稱張默全先生者也晚得浮屠法接濟上之宗少時曾病死浹日而蘇因自稱再生道人及卒而葬𥪡塔其上表得法也道人美風度善談笑耳聾然性機警見人有言以意接之輒無謬若盡力與語則終不聞及與宗門尊宿參叩往復機鋒捷出無少滯一時禪士俱遜之以故得記莂於某禪師也世業醫至道人而業益大振其用藥療病不循古方不拘常法隨意所及病者輒愈且預决人生死及婦孕之為男為女輒驗傾動一時逺近若騖以其得法也家設南面之座每早起道人方袍寬博幅巾拄杖而出則就醫者自門至堂常滿道人踞坐南面傍設一匡牀惟診脉者侍坐以次診畢則與藥詼諧揮攉給散如飛道人出入公府道裝長揖上坐不少屈有今大吏督撫某者母危病諸醫束手道人一藥而愈某故孝贈遺不訾臨出復令其侍姬以大珠一綴道人冠道人故滑稽即常冠之旁若無人也道人以業大售家擁萬金以數于金置吳中甲第奉母與其弟同居性至孝友於其弟平時極甘㫖而每旦復以所進藥資第一緘不問少多以奉其母其弟多子女長養教訓以及嫁娶以至家常囊篋瑣細饔飱朝夕食指餘百無一非道人任其弟若無預者而道人故一身也初道人有室某氏無出不得於姑道人知其無罪然恐失母歡道人有友讀書厲行而貧不能娶道人數周其乏至是遂遣其室歸之年六十道益行其門如市道人慨然曰吾當隱矣遂以其業及數千金甲第盡委之於其弟道人孑身惟攜一豎仗笠蕭然假居寒山僧舍遂以是終焉陳雨泉先生曰吳為三讓之後而民鮮懿親莫知其然余讀其言而尤悲之以觀於道人何如也是宜銘銘曰道人遺言火浴而灰骨於水家人不忍全身歸土而卵石是壘嗚呼還歸太虛何此何彼其人往矣而聲施甚偉我銘以彰儒行之醇懿而塔以表宗門之魁磊頤浩子山和尚壽塔銘師諱行如字子山自號櫜菴吳郡貞豐里人也其先為粵人族姓黃母徐有孫氏從母者無子褓抱師為子而恩勤顧復無異所生少長就學衣食修脯皆仰於針紉師少八歲母病且篤泣語師曰我死若愼勿更我姓遂死師遂稱徐氏痛念母恩同於罔極日夜思所以報惘惘不知所出如是九年值村坊演劇見目犍連事師時年十七慨然曰吾欲報母何讓佛祖遂棄所聘室不婚而逃首至金澤之頤浩寺乞出家不納轉之真寂寺時聞谷長老適至見師而偉之屬寺衆曰此小子非常人幸善護視之未幾而師之族物色師且至師復避之報恩時有所謂某和尚者以念佛為宗以施茶葉為功行一時稱其神異奔走若狂至以香供㸑不啻史冊所傳豪家之以蠟代薪也其盛如此而師一見夷然不屑長揖而出展轉至堯峰之興福寺禮西脉師服勞受業三年得剃染夾山林臯和尚亦出堯峰還山掃塔見師異之師晨夕咨叩益正信向上事矣時師年甚少而器度不恆有練川胥氏者一見傾心請歲以二十金為常供師固不肯受辭之不得因復棄而逃之夾山時附夜航腥穢雜遝師三日不霑粒米及還堯峰遂上徑山從若菴律師受具足戒為大僧時師年二十二蓋己卯歲也及歸復詣夾山叩竹林林命參話頭忽聞鐘聲有省機鋒捷出不可遏林命師往參南澗老人南澗門庭孤峻不可攀躋師至澗問話師屢下語不契輒被麾斥師才出至殿門忽然通身汗下洞徹玄㫖亟入方丈才揭簾澗以手約住云不是不是師喝云這老漢又來相瞞那從今以後三世諸佛歷代祖師且過一邊於是迅機若神如箭鏃相拄間不容髮自此執事左右凡八載直至記莂歲在戊子師年三十一耳巳丑師辭南澗老人老人以送歸頤浩法語懸記之過泖塔塔主遺師以逹大師一衲留住三年癸已吳中檀護欲延師主堯峰師不允而結茆於吳山之畫睂泉泉在石罅中人跡罕到師喜其僻手披荆榛闢砂礫以締數楹復住吳山之廣福寺渡湖登東山訪所謂九寺十三菴者知華嚴為首寺而廢不可支師深傷之華嚴山主劉氏固請師主席三年未許適山中之人有欲尼師者師恐祖庭漸為豪右所湮遂幡然受請既至而構新殿闢禪堂啓三門創傑閣熾然建立偉績方興而前之尼師者迄不能忍以橫逆加師師曳杖便行無少濡滯一時檀護欲為師申理師笑而謝之復歸睂泉而頤浩之請至矣師欣然應之杖䇿一至而百廢具舉復僧田葺復殿樹榆夾路繚以周垣主席才六年而締構莊嚴信施臻集正未有艾師今年六十餘矣所至翕然皈仰蓋繇其一誠所孚無少緣飾也性和易近人不念舊惡而介然之守確不可奪道法倚以為重云師之在南澗也往省林老人老人諄諄囑纍師悉遵之後示寂師為請南澗至竹林經理其後事龍象蹴踏食指萬餘時稱鼎盛蓋綱維細大皆師一身任之既十周師復辦瓣香重趼五百里以供其塔適蘧夫和尚至師暜說白衆推之繼席竹林無後而有後師之力也其篤於恩故又如此初師圓戒徑山祗樹一夕放大光明有黑白二虎蹲於門又萬金鐘不叩自鳴一時稱為三瑞吁亦異矣師既營壽藏於睂泉而乞余言以銘之銘曰藏有塔塔有銘佛遺制也末法浸失其傳等諛墓也舉以似師師所唾也師行同於古佛誦無二也窣爾壽藏芟巵辭碑無字也我銘以貞之一言可以百世也碑銘萬峰聖恩禪寺重建大法堂碑三界導師設教閎勝弘開覺路啓迪羣迷因事隨時方便教詔或熾然建立形歸成壞而攝入如幻三昧以袪妄趨真其致一也所以憫凡夫之貪著則樹下一宿折昏塗之我慢則尊崇塔廟入不二門理事無礙此之謂矣而後世耽苦空者不知破衆生之慳而啓愚氓之信嗜有為者則日逐逐於人天小果而不知為有漏之因二者交病焉惟古佛再乘願輪而來則真如世相互攝交融有為無為皆第一義故雖經營締構不屬塵勞丹雘塈茨皆成般若而非凡情之所能測也法運晚秋迷情膠結沉淪黑業未有出期苟無以聳觀聽而攝身心則何以袪昏蒙而啓正信故耆闍崛山有重閣講堂之勝蓮華世界侈琳宫寶地之嚴蓋繇敬生信繇信生悟此樓閣塔廟之所係於象教者極重也昔周穆王築中天之臺以奉化人漢明帝立精舍於雒城西門以居摩騰吳大帝赤烏中感舍利之異始大營浮圖以居康居僧會而晉宋之時佛圖即有講堂及逹摩西來直指人心拈花一宗盛唱東土始分創禪院而法堂之立從可知矣自是世奉代嚴歲增月益而叢林巨剎遍滿寰區湧殿飛樓充溢塵界而名山勝地尤無不開法王之席者如吾吳鄧尉山萬峰聖恩禪寺亦其最著者也山距吳城西七十餘里其岡巒層復嶺岫縈紆五湖涵漾其前二堰環帶其後山水交映泉石含暉草木菁華煙雲明媚而龍翔鳳翥之奇象回虎踞之蹟為障為屏若几若案此固吳山之最深而亦最奇者也既逾重巒復嶺回溪曲澗而豁然天開雄踞湖上左右翊衛前後承趨氣象非常形勢殊特而聖恩大剎巍然實踞其中焉寺之經始實於元季萬峰祖師有蓽路藍蔞之勤開人天龍象之窟地靈人傑再世益隆龍光昭回奎章赫奕寵錫薦加寺以增重然建立一時規制雖備而歷年三百傾廢為多故昔之金輝碧明大都涼煙衰草而昔之香林寶所半為酒坫歌臺今昔廢興為可感也於是三峰漢老人賁至而再興之而今剖師大和尚繼住而法席愈盛天龍雜遝緇素奔趨海湧雲臻川流坌集於是撤舊更新興墜起廢時像設之妙麗樓閣之崢嶸有若天成有同地湧不特盡還舊觀亦且什伯往蹟入其門者如踐天宫如遊化城寶華莊嚴毗盧樓閣無以加矣而大法堂之復建則於戊子春焉蓋其時諸廢具舉而法堂未立師慨然曰續佛慧命在於敷宣大法而一時會下嘗逾萬指茍椎拂所至而無以大容之則何以展龍象之蹴踏而聆獅王之哮吼乎乃與上首濟琚庀材鳩工壘基構室而檀施翕集畚鍤填委不日而大厦成矣凡為巨屋五楹間橫袤百餘尺崇三進五深峙宜稱而觚楞騫飛棟宇雄邃層橑蜚栱聯甍櫛甓地據殊勝形稱最髙於是日月經於上楹山河拱其洞户閎敞巨麗實為大觀直是兜率現彈指之間不特東林有神運之殿也所以一登斯堂才據髙座而五湖淜湃儼若朝宗萬峰環立若為拱聽將使滴水還源頑石點首又豈止化導法筵之四衆覺悟含識之羣生哉營建之功於斯極矣吾聞尊那經云無盡功德七種而建立精舍實居第二而福田經則又以興立佛圖僧房為梵天七種福德之第一何也噫吾知之矣但崇像設僅芘雨風而木石不通其性靈禽魚無駴於鍾鼓則雖髙閎廣厦概日干雲窮金碧之妍極侖奐之美而事止有為實第二義若獅絃於此而再振毒鼓於此而大鳴龍神於此而聽法天魔於此而摧鋒大機大用於此而闡其全為實為權於此而充其際則如虎之負嵎而威獰倍增如龍之得雲而神通愈大則其有關於明心之大法如來之慧命為何如哉故雖人天有漏之因即是無上菩提之道矣此福田經之所以稱為梵天福德之第一而有進於尊那之所云也因合掌稽首而復系之以銘銘曰有一大士說法如雷霆電交飛風濤并來鼓蕩萬彚聲施九垓震聾起蟄地劃天開遂破隂凝雲漢昭回神功一寂雷安在哉惟此大士說法如雨或灑稠林或膏瘠土潤遍莖根澤周天宇福蘖慧芽瞬花息蘂會襲珠衣頓森玉麈究竟千言實無一語所以聽法其衆如林瓊株駢條五樹千尋䕃芘大千蔚蔚森森所以法席其廣如海珊瑚干網珠璣百琲鯤鯨游泳島嶼塊壘沐日浴月坤函乾宰滄海雖廣函蓋容之鄧林雖稠巨野載之詎此大衆雨立風披乃購異材乃集工師豫章層構貞珉銜基虹梁霓棟雨桷星榱魚鱗萬甓龍首千栭八窗􅌑瓏修廊逶迤萬頃為沼層崖作梯香臺雲矗寶級天躋峰巒扶伏星漢低垂前俯巨浸後倚崇巇暑來西爽寒襲東曦山河萃美風氣罄宜既成斯堂以容法侣人天龍鬼爰萃爰止半偈敷宣四衆歡喜天樂要眇雨花繽紛香煙㳫霧花氣蒸雲道風漸被芳聲暜聞我聞洪名上弘下璧古佛現身如來寶積大定魏山精心慧日再乘願輪實據此室輔作之者亦大比丘名曰濟琚勤舊無儔兩山受記五牧重遊囑纍吾文以標禪窟譬如有人因指見月我一豪端湧現閎閥永無壞者在此銘碣南嶽儲和尚報慈室銘孔子曰吾志在春秋行在孝經天下有其志未立而克成其行者乎司馬氏曰為人臣子不可以不知春秋吾讀史而時見有其人者性至孝奉養克盡居喪過禮柴毁骨立而一失其身後世之言孝者莫稱焉吾每讀其事而未嘗不為之流涕也雖然通乎孝經之所以為孝者數世而一見而通乎春秋之所以為孝者則非數世而一見者也夫人秉五常以生而性本善又何以孝之難言如是乎吾見古今人營營而失其道者皆可悲也南嶽禪師儲和尚揚州李氏子早歲出家受記於三峰藏和尚提正法印十坐道場說法滿天下而今年踰六十矣自邅世變二十餘年余竊見其俯仰身世一言一動若有所深隱而不能釋者而身之所至必載其兩尊人木主以行香晨燈夕無異定省嘗為余言其兩尊人之賢而報慈自序曰甲申三月之變尊甫貽書曰吾始祖臯陶為理官子孫因氏理亦稱李後遂單稱李氏今逆賊犯闕先皇帝死社稷而賊亦李氏吾忍與弒君大惡同姓乎吾子孫當復古姓為理氏嗟乎此師之所以能盡其孝者乎師年六十餘矣出世四十餘年而明發之不忘僾乎其若見所謂終身之慕者非耶而師平時所縷舉其先人之德行不可以更僕數也而今獨揭此一言以昭示萬世非春秋之志乎師既得其志矣所以能成其行者也佛之生先孔子四百有餘歲其大報恩經所說人子之當孝於父母及人子之所不能報於父母者有非孝經之所能盡也而後世不察以為孝於親乃聖人之道而不知佛已先言之於四百年之前矣故後之人惟能率聖人之孝者方克荷佛之道者也鐔津明教嵩禪師深知之為著原教篇及孝論甚備有非後儒之所能言者先聖後聖其揆一也而佛與聖人之孝千百世而下惟鐔津為能言之而師為能行之鐔津亦李氏子吁亦異矣雖然鐔津原教之書孝經之行也而師報慈之一言則春秋之志也得春秋之志矣而有不能率孝經之行者乎吾故以為非數世而一見者也師立塔院於吾吳堯峰之巔而別構室三楹以奉其兩尊人木主顔曰報慈之室而屬余為之記兩尊人者揚州李孝敏先生諱嘉兆暨靜儀髙孺人也余自悲學聖人而不能報吾親以有愧于師也因揮涕而書之銘曰李氏之先為虞士師彼猾彼奸大刑以隨惟此大義春秋所資曰惟春秋聖人之志尊攘是司亂賊是懼千載而下斯義隕墜有一長者士師苗裔凜凜綱常赫赫名義易李為理一言萬世惟孝與忠誕生大士揭此一言日月昭示昊天夢夢以醒昏醉江河滔滔以作砥柱志既立矣行亦克成世出世間實惟斯人終身之慕古罕其倫迦文報恩嵩書原教彼千萬言於以教孝大士躬行一言為報我荷斯道回向大雄說法忉利實啓其宗為行為志後聖所同北斗告成西狩絶筆二義克兼始盡子職以兹報慈允答罔極巖巖堯峰翼翼廟祏有屋三楹報慈之室為刻此銘萬世是則法林菴逈塵淨公道行碑時將末法像教日衰桑門之徒無異塵俗非役志於名聞利養則陊入於貢髙我慢求其精修梵行不閒隱微勞苦辛勤以供徒侣沒齒無倦數十年僅若晨昏一縷不私此身外并無瓶鉢曠觀斯世實鮮其人兹法林菴逈塵大師者起自田間來歸法苑奮身衛衆性所安焉盡瘁無辭死而後已栽田博飯供四衆之往來力穡有秋萃三時之勤動酷夏暑雨則受淋漓炙暴之災歲暮氷霜則受慘栗瘒龜之苦起必先衆而起息必後衆而息食必衆之所賸事必衆之所難焦心勞思竭力殫悴以拓常住之業以供荷道之衆初逈公本師之住此菴也屋則一椽人則單丁師既脫白於此以精修而克倡於是徒侶日增佛宇日葺堂廡庖湢輪奐聿新梵唄鍾魚晨夕互答偶一入室儼然名藍仰師之功食師之德與歲俱永為時未央乃於己酉之秋忽然示疾而逝衆恐不能表師之德概且無以志衆之哀思於是秦餘山人徐枋合掌趺坐而說偈言逈塵大闡士法名暜維淨大弘彼願力為法轉食輪勤身衛四衆力田供三寶深耕復易耨胼手更胝足三百又六十無一息安養如是三十年勤動如一日歲歲大有秋香積溢穗穧雲水及常住赴之水歸壑玉粒盛霜來者皆飽滿衆心生歡喜齊聲彌陀佛聲徹梵天界功德等河沙以此最勝因得成無上道昔無相居士結跏作伽陀勤修喻治田菩提譬嘉禾持戒為保衛忍辱為涵受布施為糞壅精進為耘耔智慧為雨露種之自然生我今說偈言治田即修證堤防峻道範耙梳淨戒體灌溉滋福德收穫為證果一粒即真性無滅亦無生我有萬古田常稔而無瘠我與居士說異口實同吻唱和如螺唄是二還是一逈塵大功德如是復如是而今往西方隻履忽歸去法侶及眷屬涕淚而悲泣我今為彼言以解衆悲故功德苟及人來去無差別身逝道自存萬劫常不壞雜文書成告家廟文維年月日孝男枋敢昭告於顯考詹事府協理府事兼翰林院學士勿齊府君曰枋幼承庭訓長克志學兀兀孜孜罔敢荒怠雖謭劣無中材之姿而義方同聖功之養顧初專帖括罕習成書繼慕兼通旋遘禍亂家哀國恤萃於一身失墜荒迷冤哉酷矣乙酉之禍府君執枋手而泣曰吾固不可不死若即長為農夫以沒世可以無憾而枋不自揆量誓必從死雖志操不薄而前言不讐然面目靦然而辱親是懼既不忍汶汶以入俗又豈容默默以苟生遂思託之空言明其風素原本家學稍立綱維於是三虞讀禮之餘小祥卒哭之後陳篋數十伏讀遺書雖才匪三長而有心史學專精竭志極討窮搜疾病間臨外患時至而素業弗輟修輯罔移踰涉十年二書竣役一曰草一史文彚所以記言也一曰通鑑紀事類聚所以記事也文彚卷軸浩繁尚稽繕寫紀事經營卒業裝帙已成其為書人以事分事因類聚凡分為若干事聚為若干部共成若干卷人以愚瞽之見竊志妄言部系以敘事系以論凡為敘若干篇論若干篇小論若千首其間成敗得失之林治亂興亡之數櫛比字句較晰豪釐雖未成一家之言或不無干慮之得因思古人成書邅逢盛世莫不獻之當寧藏之天府而枋生當亂離淪身荒野見天無日兹事未期故雖列之几筵告之家廟披陳𣢾愫一寫悲哀雖學術荒疏致譏妄作然或褒貶是非規條品目無畔春秋之大義有裨先正之成書則願府君默啓其聰隂相厥事使枋所有志而未逮者次第得以告成焉則枋雖茍延視息於一時庶幾稍塞釁責於後世矣昔馬遷成書流連於太史之顧命思廉作史慷慨於吏部之遺言夫惟有哀思慘怛之心斯為述作論著之本事根忠孝夫豈徒然昔賢著書有繇來矣枋雖才愧古人而悲深二子偷生自悼乃營是書而歲月推遷遂踰十載音塵愈杳而成業無多撫序增悲摧心欲絶枋不勝哀感之至書故仁壽令殉節顧公逸事明仁壽令顧公諱繩詒字敬承故大司馬少保公諱其志之仲子也崇禎庚午舉鄉薦在解額楊公廷樞榜中南闈座主為江右姜相國曰廣是科得人最盛一時文章人物幾無遺賢榜首楊公外如張公溥陳公子龍鄭公敷教盛公王贊諸賢皆宿負譽望時論翕然不特人文冠十五國亦二百幾十年所無也一日大會於虎丘諸賢畢集言論丰采各各自得酒酣楊公離席起大聲揚觶而言曰吾兄弟中有能為方正學楊椒山其人者卒此爵楊公蓋自謂衆亦共目之顧公應聲起端拱趨出曰小弟能為引爵一飲而盡一坐大驚蓋公生平豈弟多智詼諧滑稽嘗一言傾其坐人人皆解頤指之曰此俊物非龍逢比干也今於大會大嚼不讓衆皆疑之未有心許者及崇禎末公官成都之仁壽令獻賊破蜀據會城以公循吏得民心因遣人招公公慷慨指天誓不辱賊即馳馬入學宫長縊而死嗚呼公之言酬矣此甲申七月事也及戊子歲楊公屏跡湖濱之山舍而為湖漭間起事者所染被執不屈臨刃亦罵不絶口嗚呼成仁取義兩公之言若合劵於十五年之前先後一揆快然無遺憾惟是楊公素有氣節之望者無論若公者詩酒自汚而其自信則又何確也故益不可及云告家廟文維辛酉歲二月乙酉朔越十有八日壬寅孝六世孫男枋同叔沐兄枚兄集兄栐兄栻兄杙姪炯姪輝姪􅕩男文止等百拜昭告於顯六世祖考通議大夫都察院右副都御史瓜涇府君顯六世祖妣纍封宜人贈淑人朱氏顯髙祖考江西南昌府靖安縣知縣左江府君顯髙祖妣碩人張氏顯曾祖考太學生素菴府君顯曾祖妣碩人沈氏顯祖考敕贈翰林院簡討徵仕郎雲澗府君顯前祖妣敕贈孺人邢氏顯祖妣旌表貞節敕封太孺人朱氏顯考詹事府協理府事少詹事兼翰林院侍讀學士勿齊府君顯妣敕封孺人吳氏曰徐氏逺有世緒後先暉映史冊天復篤生吾中丞府君振跡於前大尹大參府君繩武於後而吾勿齊學士府君復身係綱常爭光日月維此家聲史冊所罕而二百年來家乘未立譜系不明則何以昭先烈而裕後昆也枋追維學士府君將草創未遂痛思繼志二十餘年兹者邀請族長親房同集草堂經始其事謹以牲醴用申䖍告孝六世孫男枋臨告曷勝感愴之至告亡室張碩人文維碩人平時潔蘋蘩奉祭祀惟謹凡事關祖先宗族靡不竭力傾心而尤督促我創造家譜嘗語枋曰吾大姑二姑家有家譜松陵吳氏吾女家有家譜休寧江氏至如鄰家某某且有家譜天平范氏君家大族胡獨無之此是君之責也君今不為誰為之者必藉族長親房三四老成可以共圖然皆年七八十矣君今不為後必悔之祀先會族之費吾願任之無煩君心嗚呼傷哉碩人此言猶在吾耳而碩人今何往也吾痛念遺言不啻金石故發憤於今春舉行兹於今十八日敦請族長親房齊集草堂經始其事謹薦醴饌以告不勝哀愴之至居易堂集卷之十五終
