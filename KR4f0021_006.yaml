front:
  text: 居易堂集卷之六
  hash: sha256:85d997b59e60274dd38238df1f078f361c5f106fdd0371e7782f97cc455bd263
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_006-1a}
body:
  text: 序贈業師鄭士敬先生序儒者闡五經之微言析六藝之眇旨以友教天下啓迪後生其道至尊重也故道在則天下崇其道而尊其經道亡則天下騖其説而違其行苟欲使經學通明而儒術不墜必傅其道以行矣孫寶曰道不可詘身詘何傷夫甘心畎畝之中憔悴江海之上而學士奔湊如登龍門身愈困而益尊境愈厄而益亨夫豈章句訓詁之所為哉昔戴聖尹敏及徐遵明之徒皆經號專家師説具在而名或罣於吏議或妄託於讖書或懸納絲粟而遺譏於影質故雖説經硜硜名為宿儒而造就實寡何者有儒者之學而無儒者之道也惟通德之門則彬彬多大儒焉殆所謂以身教者乎小子枋年十五即執經從吾師鄭先生遊時崇禎之丙子歲也先文靖公進枋而命之曰吾交滿天下而性命之友指不多屈其散處四方者無論矣近則臯里楊先生西銘張先生及汝師鄭先生而三人焉夫臯里楊先生西銘張先生皆偉人也然吾不命若師之而獨師鄭先生小子亦知之乎西銘弘獎人倫訓納不倦故其徒多美風流臯里矜尚氣節天下已任故其徒多持議論非汝之所及也小子其務窮經飭行以事乃師枋謹受教時士專帖括為之師者亦教其弟子以掇取科第耳而吾師獨先經學矻矻窮年究竟同異研晰幽微必使聖賢精意通于學者而後已士習日靡以聲譽相髙而吾師獨尚風素敦內行恂恂不為虛憍之氣其教諸生也以躬行先之循循善誘辭氣溫霽或獨坐一室默不聞聲而諸生畏敬之如神明無不欲自砥礪以赴其師之意者故遊吾師之門多能成立以自表見論者以為吾師解經不窮則戴次仲沉靜樂道則杜叔和之流也庚辰後先文靖奉使歸里時西銘先生已下世而臯里先生聲氣日廣門庭如市先文靖心竊憂之獨與吾師性命水乳晨夕無間每憂時念亂商榷人物則促席竟日相對悄然或欷歔太息良夜乃罷而侍者不能聞其為何語也乙酉之禍迫脅士大夫便宜授官輒檄令之任同人多改操者而吾師獨陽為庳疾以跛自廢遂以得免其臨大節如此而生平恥語意氣常守雌節無矜激之色故其立身有恆介然不奪非色取一時者之所可幾也天下初亂士無不以氣節自命翹翹矯矯無所不至而吾師夷然不屑也歲月侵尋意與時移向之翹翹矯矯者亦發蒙振落矣而吾師獨潛隱園巷杜門教授十三年如一日嗟乎今天下而益知吾師矣於是執經受業負笈請字者雲合霧集踵趾相躡四方著録者不可勝數其親承教澤辟咡左右亦且數十百人而吾師之所以教之者一如二十年前之所以教枋等者也門人亦盡務實學尚謹飾從容雅步行於路而皆知為鄭先生之徒也烈皇時權姦以門戶搆難以西銘門徒太盛標榜太髙見於彈墨羅織周內幾成大獄後臯里亦為忌者所中幾幾不能免而吾師生徒之盛與西銘臯里等獨超然免于議論今之從學者倍盛當時而聞者景悅惟增慨慕嗟乎小子枋至於今而益知先文靖公所以命枋之意矣夫處黨人之時而不為讒邪之所側目居非命之世而不為異已者所驚疑豈非抱道躬行可行蠻貊乎故其所成就者率多自立不與時俯仰即小子枋茍存視息而猶頗識去就之分者亦吾師以身教之之所致也初史相國督師淮上吳人盧涇材以諸生慷慨從軍楊州陷盧生卒從相國以死以死節聞天下盧生者亦吾師髙第弟子也吾師之門多聞人而此其尤著者云贈兜菴序隱居放言斯特逸民之一節耳非所語於通德也故時當隱遁著括囊之文身處末流有言遜之誡君子愼其樞機以亨時晦言之于身不綦重哉昔人云居非命之世耳目適宜視聽口不可以妄言也余嘗覽其言而悲之則大易所稱或出或處或默或語豈非出有語之義處為默之時乎漢延熹建寧間甘陵汝南聲名題拂身為處士而裁量執政言非其宜卒成黨禍逮染名賢幾遍天下當時申屠子龍獨以貞默自守確然免於議論味道樂潛終成髙志人但知愼言所以全身豈知愼言正所以全節也哉夫嶢嶢者易缺皎皎者易汙以言為怨之府而舉身以殉焉者無論矣苟以言為身之文將以標榜於天下使天下有能言之目為可知之具遂來當世之浮慕而旌賁從焉此周顒北山藏用終南之所以遺譏于後世也吾故深歎張子今日以兜菴自命之知時而得所處也張子生長膏腴之地少擅文章之名而其言一似有憂患者嗟乎張子深逺矣其自命也以愼言而雜迹方外遊于酒人將以酒全其天使賓從相對亦各相忘于無言耳昔南北六季之時多髙蹈之士而文中子獨稱仲長子光為天隱謂其名彌消其德彌長無往而不適豈非以其能以瘖自名終身不與世交語而欣然引酌優遊卒歲乎吾今觀張子所處不獨效子龍之貞默蓋亦有仲長天隱之風焉余愧不能學王無功日以五斗酒與沉醉也送去息和尚住夫椒祥符寺序竺乾之法既入中華如海滙百川燈分千焰熾昌盛大不可思議遂與王者分民而治先師分術而教矣而其中絶世偉人傳佛心印者塗轍不一機用亦殊雖一月可印千江而同歸正如岐路有隱者有顯者有出者有處者荷擔大道隱若敵國彼此無間而其致蓋少差矣夫儒者以全道為重故重其在我每以處優于出而佛法以行道為亟故利存徇物每以出擾於處所以孔明不取干祿孟氏不義往見而瞿曇設教誓入五濁神僧應化不恥亂朝苟可續慧命濟羣品則舉身以徇之豈同儒者規規然以潔已為髙哉至千古過量人孤峰絶頂剷迹銷光木石與俱遺世獨立者亦多矣如大梅棲山縳茆燕處龍山無路移屋深居船子獨蹤立錐無地雖品詣卓絶風流不墜而以視握麈登壇弘法宣化陶鑄賢聖教育英才天下向風法席如海如臨濟德山洪覺大慧固未可同日語也雖然人但知出之優而未知出之難也夫十室之邑一旅之衆固易戢矣教令既習風俗既一而為之帥與令者復操生殺賞罰之威柄以整齊之然而違制梗化以覆軍敗官者比比也今五方之人雜然並處去來無常性情不一而又無生殺賞罰之威柄以整齊之而欲其從風向道更誠與一於軍旅之從其帥民庶之從其令不綦難乎不特此也慧燈若熄而狂花爭艷則續命之難也根塵難泯而懸絲易絶則衛道之難也肯堂弗問而析薪欲荷則嗣法之難也白法既衰而黑業逾積則導衆之難也荑稗充盈而嘉禾不碩則擇人之難也嗟乎禪者之出豈易言哉去息禪師得法靈巖將數年矣操履尊貴道風逺聞諸方緇素浩然歸重以為靈巖之克子而天山之聞孫也今將出而住夫椒之祥符寺夫祥符又靈巖昔日之祗陀林也必使當年寶所壁壘一新無沗徽音克明師匠而後無負靈巖付託之重則師之出較難矣而吾更為吾師慶也臨濟必踞鎮州叢席而後建立黃檗宗旨大慧住徑山後學徒雲集罔羅龍象而道法益尊則師今一出而繼述師傳造就學者盡在是矣從此而大振宗風蓋天蓋地其孰能禦諸余與師乃惠連康樂無著天親也師既開法席于名山便當褰裳相就不啻宗雷結社東林而于師之行先質言其難如此顧師之視余正同康樂之愛惠連受其質言契如針芥而余之視師則不能如天親受教無著而即證大乘以此愧師耳贈李秋孫序人生百年幸而際明盛遘太平父母俱存兄弟無故則中人之姿稍自勉亦庶幾所謂完人不幸而禍患迫之於前而冤痛慘酷感憤睚眥激之于內即世所稱賢者嘗潰而失其度矣昔人如蘇不韋報仇行權而王肅之奔拓跋吾每痛其志而又弔其遇之不幸也李子秋孫年三十矣當國變時不幸為怨家所乘有家門之禍時李子止年十四歲逃亡竄匿萬死一生僅以得免事已而怨家又搆之以大獄計必殺之以十四歲之孤出入瀕死于獄訟刀筆間又數年而後已以今觀之曾謂此十四歲之孤而足以捍之耶沉淪灰滅乃其分也而李子卒能卓然有以自立非所謂賢者乎余之遭亂也年二十四亦既成立矣然家冤國禍萃於一身搶呼莫聞以死為幸若李子又何如也庚辛之歲余與李子遇於山中往還過從勞苦告語每風雨晦明憂愁疾痛杯酒朋從酣醉笑呼兩人未嘗不相向而泣也而李子若有所不得已于世者又以不得已于世若有所重纍而思釋者于是棄家入山不攖世事蔬食布衣嘗同在疚居恆採攟自資妻子不免飢寒而不顧也嗟乎賢矣王肅之避家禍而北奔也受國士之遇為之更制度定典禮年甫踰壯宰相封侯為魏室宗臣誠亦盛矣然以彼其才即無所遇于時庸無所聞於後耶適丁屠酷竄伏以免而彈琴著書詠歌先王之風以老死巖穴所得不更多乎嗟乎李子深逺矣而吾猶願李子之有以終勉之也送磷雪上人行腳序男子志在四方况出家學道者乎無室家之戀無贏糧之難苟有志於大者遠者則足迹遍天下此其常也昔顯公西入佛土行遊二十餘年玄奘取經天竺周流一百餘國尚矣至如方州之內則慧逺之行化許雒襄漢一行之訪求師資貫休之去吳入蜀無不歷奧區探絶境汲汲皇皇不知老之將至而其人亦遂以不朽以是知逺行之無負於人也龍門年二十而浮江淮溯沅湘涉汶泗周旋齊魯梁楚鄱薛向子平棄家遍遊五嶽宗少文遍歷區內名山凡為一代偉人著業於不朽之林者皆然而方外道人益可知矣今以數家之墟十人之聚自東阡適西陌無不囁嚅刺蹙出門復入彼固不知有天地之大道里之逺又何怪莊生不云乎鵬之徙于南溟水擊三千里摶扶搖而上者九萬里蜩與鷽鳩笑之曰我決起而飛搶榆枋時則不至而控於地而已矣奚以之九萬里而南為人之所志不齊有如是哉磷雪開士所處固僻而英年具辦道之志汲汲逺行將以大其所學此自其天性為可敬也而人或尼之我故舉玄奘諸大士以壯其行願雪公學鵬之圖南以為諸大士且亦使人母為蜩鳩之笑也贈新安汪惟晦隱君序洙泗之傳既泯濂洛之學未興而聖人之道綿綿延延上下千百年未墜于地者實有所託以長存而不息蓋不獨恃六經之空言而恃篤行之君子有以載其道於躬行也自後丗曲學既繁偽儒雜出有侈心性之談而鄙實行為粗迹有標妙悟之宗而以決防踰間為無纍馴至四維不張五經掃地而世運隨之可勝悼哉繇茲以談有實行以基之則不言道而道存無實行以基之則言道而道愈亡矣文中子不云乎父母安之兄弟愛之朋友信之施於有政道亦行矣則如萬石君家孝謹聞於郡國長子建老白首貴郎中令而親中裙厠牏身自洗濯雖齊魯諸儒質行自以為不逮元魯山兄子襁褓喪母無資得乳媪魯山自乳之後以得成立陽道州妹壻客死道州徒行千里負其喪歸葬而撫寡妹養其孤孤年四十恩義不衰彼固至性蒸蒸行詣卓絶而又何嘗侈言夫道哉然如文中子之言則聖人之道所以不墜者非於焉是賴乎所謂載道之器者非耶假使有人躬行萬石魯山道州之行而又學濂洛之學則其所以昌明聖道又何如乎余讀新安汪氏庭範紀略又徴信於吾吳一二君子之言而確然識汪徵君惟晦之為人則誠所謂行萬石魯山道州之行而學濂洛之學者也而吾又有進矣徵君孝義誠篤敦倫植節一同於萬石魯山道州而立數孤撫數寡更喪亂值飢荒其遭際之險厄負荷之艱大真萬倍於古人而皆有以曲成而無遺憾此非獨其至性有以濟之而實其學道有以濟之也嗟乎淳古日逺江湖日下滔滔者幾流於不可知苟使徵君其人者樹立坊表昌明聖學以維持而挽回之則吾丗其有瘳乎然則身涉末流而負世運之憂者非篤行明道之君子又何以幾焉吳子自號瓶菴序吳子雨岑自號瓶菴而自為之序入山以請曰某蓋有意乎謹言惟先生有以教之余覽其説而重歎吳子之孝也記曰一出言而不敢忘父母此物此志也昔周儀部玉鳬稱道吳子不去口謂其少時曾刲股以愈其親之疾愼終大事傾資竭力而不顧至於今年踰六十嘗冒暑扶病不逺二千餘里以省其祠墓於故鄉拓墓田培松楸葺祠宇美侖奐獨力而成無將伯之助其所捐輸不啻中人之産是豈恆人之所能也此其大端也而觀其居常細微則又誠有一舉足一矢口而不忘者今其言曰某少失學不克有所成立揚名顯親某病未能惟是暮年衰齒日愼一日恐或遺羞所生此心未敢一刻忘也既不能立身以顯吾親或庶幾無失口以玷吾親乎守口如瓶吾之志也且吾聞之滿則覆瓶亦有是焉故聊以自警云耳嗟乎則是吳子命意於一字而金人之銘欹器之誡兼有之非敬身之至乎吾故重歎吳子之孝也而吾更有進焉士君子立於世而聲名標榜訾物激淸以成橫流之禍其或伏處閭巷而多言取尤直言觸諱以不能免於斯世者固其所矣即或有一言而為人排難解紛以至存亡而生死人之仰之不啻宜遼之丸聊城之矢而又自泯其迹不居其功深藏而逺避若是乎其言之無忤於世而有禆於人也而或者未食排解之德而先致傾動之尤以攖當世之繒繳而莫之避嗟乎人但知莠言之為患而孰知好言之尤甚乎楊子致歎於口出微乎微乎又何如以默以容無咎無譽三緘其口優遊卒歲者之無一朝之患而身名俱泰哉或曰瓶菴者平安也一謹乎言而無招尤無觸諱聿懷多福履坦貞吉矣故曰此敬身之至也嗟乎吳子加於人一等矣外祖母王太夫人九十伯舅氏吳明初先生七十壽序天之遇人也豐其後者必嗇其前人之遇人也落落於貴盛之時者必久要於患難之際者也夫天既與人以晚成之器必錫之以暮節之福其始必荼苦艱辛一鬱憔悴在富而約處泰而屯是正所以堅完其精神而成就其德器也其人也如金石以磨礪而不朽日月以晦蝕而升恆固天之所以壽也夫人既人趣于捷者我率其迂人集於菀者我集於枯風雨不輟其音霜雪不渝其色巨卿友而平子可瞑山公在而嵇紹不孤其立於世者甚偉故其得於天者必厚其人也如松柏歲寒而後凋薑桂性老而愈烈又天之所壽也枋故於外祖母王太夫人暨伯舅氏明初先生之壽而深有感也甲午歲外祖母登九秩伯舅躋七十慈孝一堂並臻上壽交遊親串無不操詞捧觴陳説景福頌禱盛事而枋以為此正能知太夫人及先生之壽而不能言太夫人及先生之所以壽也太夫人為我外王父元配先生嫡長子也初太夫人之嬪於吳家業未豐太夫人善事夫子克佐貧薄雖夙夜勤瘁而交謫不聞少君出汲德耀舉案椎髻布裙未易舉似此猶人情之所能也其後家日益盛資儲充衍外王父性豪上不為鄉里曲謹態故身雖布衣而俯視王公甲第開康莊後房曳羅綺東山絲竹西園遊宴殆無虛日而太夫人性安儉約獨居教子御布素躬織絍無異貧時雖寒沍手皴而操作不止札札機杼與膝前咿唔呫嗶聲相雜也一家之內豐約既殊甘苦或異而太夫人怡然安之無幾微不得之色此益人情之所難也太夫人時時命先生曰公父文伯之母曰瘠土之民嚮義沃土之民不材今兹勤苦天庸玉汝於成乎彼藉膏腴耽靡麗者固非恆久之道也若庶幾有所成立則寧拙母巧寧退母競寧眷眷於寒素無汲汲於勢利此吾心也先生天性孝友剛方諒直慷慨好義意有不得則義形於色千萬吾往雖其素所蓄積亦得於太夫人之教為多矣當先學士鼎盛時至親好友奔走旁午先生雖戚誼肫摰而往還簡略真淡如水也大率歲時伏臘嘉禮宴會歲不過過從十數耳及先學士身殉國難向之奔走旁午者曾不過而問焉而先生於兵火衝斥時馳使命冒不測所以撫唁枋者甚至復賻以兼金數金枋得藉手以為先人藳葬之具嗟乎人誰能之人誰能之當此之時人懷岌岌自救不暇即家力豐裕而平時最稱密契者猶或未及况以先生之貧而自處落落者乎枋於是而知先生真古獨行者流也未幾而懿親中之與先學士最密而受先學士恩最深者甘心反噬瞋目語難無所不至先生奮不顧身出而捍之排難釋患惟力是視如是十年凡羣邪之所媒孽醜正之所謡諑先生無不為之解紛焉亦有事可潛弭則枋未及知而宜遼之丸已奏膚功矣故枋雖風雨漂搖而覆巢無取子之禍遭家多難而荓蜂無辛螫之傷皆先生之力也枋因於太夫人説帨之辰跽而進曰世路榮華瞬息衰謝所不必言即以太夫人一家今昔言之俯仰數十年滄桑陵谷亦不知其幾矣向之口厭甘肥體窮紈綺者今亦有存焉者乎即諸渭陽年少於先生逺甚而零落過半而先生乃以七十老人華髮蒼顏拜舞於期頤之膝下非天之所以單厚者乎今曾玄繩蟄芝玉森如凡從先生後衣綵酌斗者且四世內外幾十人非千古盛事史䇿罕倫者乎福祚隆赫至於如此固非逸居苟安柔質淺器者之所堪負荷也則當年太夫人之備嘗艱阻非金石磨礪日月晦蝕乎今而後而不朽升恆者見矣向者先生之髙誼篤行非松柏薑桂乎今而後而歲寒後凋性老愈烈者見矣夫壽為五福之首又大德者斯得壽故不有過人之德不能躋過人之年不有天倫之完節不得臻人世之奇瑞何則遐齡大年固造物者之所不輕卑也今太夫人與先生獨得之非其所積者厚而所植者偉乎先生聞而軒渠曰子年少而能言天人消息之理津津可聽也曷為我紀之枋因質言以侑觴焉葉太師母八十壽序平居讀史尚論古人行事每見淑女亮節有國士之風焉未嘗不撫卷而歎也而要其所以垂青編昭彤管者非端操在躬徽美洋溢則造就後人聿成名世者也二者得一已足遺令名於無窮况兼之乎如葉太師母張太夫人則方之古人未易一二數也太夫人早年婦德婉瘱貞順中外著稱而尤所難者讀書知大義而能玉吾師於成也吾師聖野先生當象勺之年太翁方據臯比講學於外而家日益落太夫人撫先生而慨然曰噫子瞻年稚既弗克從明允以遊學邴原家貧復弗能入鄉孰以從師將奈何太夫人於是自教之機杼之餘説經授書靡間寒暑自幼學以至成立罔非慈氏之恩勤訓迪也先生年弱冠名滿天下詩壇文坫共推盟主而太夫人獎訓益勤或問其故太夫人曰名隳於既成而業荒於既精者多矣我故為之兢兢也時先生席珍待聘朱紫如拾方且拜身廊廟黼黻皇猷而天下遂亂太夫人進先生而命之曰我老矣不幸復睹此亂離今惟以若長侍膝下母子相依為樂他非我所期也昔介子之母尚與子偕隱况今日哉捧檄之喜吾不為若願也先生謹奉教太夫人又進先生而命之曰母集于菀母乾沒於榮利我既已言之矣若亦知嶢嶢者易缺而皎皎者易汚乎若其母為名髙母為氣矜隱不違親貞不絶俗昔人所尚若其勉之先生謹奉教於是天下之初亂也慕義之士入山惟恐不深至見一當世之子無不鑿壞踰垣以為快先生奉慈幃棲故里無異平時而交遊往還母失親故鄉曲之論或且致疑而荏苒歲月士氣浸消向之蹈海奔林長往不返者今且上書公車浮沉金馬矣而先生潛隱園巷不簪不帶自若也於是向以先生為和光者今乃知先生之耿介無不交口歎先生為不可幾而不知其稟聖善之令謨漸義方於慈訓者素矣先生聞望風流暉映一世奔走天下雖偃居窮巷而問業請益者冠蓋相望軒車接軫且內外親婭率多通顯而太夫人三旬九食怡然安之故先生與世相接坦懷無忤而神愫泊如物不為纍客退則閉户著書洗淟用酒以為歡嗟乎有是母斯有是子非虛語矣夫傳經紗幔本自宣文授書睂山出於賢母此今古所為讚歎而書史所為流連也况復明大義負偉節乎枋少從先生遊頗悉太夫人德概兹值太夫人八十壽將操詞以進復徵懿行於先生先生為枋言太夫人之所以處亂世者如此因受而書之楊隱君曰補六十壽序余幼從先文靖公於京邸凡賢士大夫以及文人處士之過從者先文靖必命余出見之捧手侍立以受長者之教遂得識曰補楊先生云蓋崇禎之庚午歲也時余方九歲從孰師受論語孝經孰師者虞山趙端吾先生趙文毅公之孫也其人古人也與先生善故先生每過學舍必與余師從容欵語道故舊移時乃去以為常余之識楊先生益稔矣比二年壬申先生南還居金陵先文靖亦奉太孺人歸里又五年為丁丑先生自金陵來弔太孺人之喪先文靖復命余出見先生時余年十六已補弟子員矣居無何別去又五年為壬午先生復自金陵移家還吳先文靖亦休沐里第相見益歡余復從容從先文靖以見先生余已忝登賢書年二十一歲而且有子亦三歲矣夫余年二十一歲而識先生已十三年矣嗟乎俯仰十三年間而時事之變遷已不可復問而詎知不二年而即有甲申之變又一年乙酉而復有南都之變乎自余之初識先生為烈皇初􅥴時稱太平京都輦轂風華文物天下所聚而尤尚風素重儒雅故先生以隱士居京師聲名籍甚著作一出無不傳寫子山之詞賦藏購陳遵之尺牘薦紳先生及通侯貴戚折節交好扶蓋接軫何其盛也不一二十年而北顧蒼茫神州陸沉矣是豈意計之所及哉初先生在都病瀕死殆弗克濟而先文靖為之營醫藥視湯飲調護甚至病遂以間弘光時權姦搆黨禍殺戮名賢遂煽蜚語染逮先文靖勢岌岌殆矣親戚交遊畏禍觀望而先生獨䇿蹇至金陵語所知曰天下事可見矣而尚欲殺大賢以快己私耶先生舊居金陵金陵之名公貴人無非先生友者故其言足重而事亦尋已金陵破先文靖死志己決獨操小舠出閶門就先生鄧尉山居謀死所周旋日夕慷慨流連惟先生是共則先生與先文靖之所以周旋於死生患難之間者為何如哉先文靖殉節以死余遂括髮亡命望門投止去吳門蓋逺矣先生獨偵知其處密寓書以唁余余後為邏者所得自分必死既展轉以歸遂廬先文靖之墓時弔者絶迹而先生獨炙雞絮酒束生芻以來哭極哀復執余手泣泣良久乃已余既不入城府親故斷絶而先生獨同其長君明逺時時顧余於土室中一日促坐飲酒歡甚時余師趙端吾先生復授兒子經亦在坐二老友絮語生平猥及少年之遊燕私瑣屑靡所不及笑語方酣而先生忽顧壁間詩低徊久之壁間詩雲間汪希伯先生作以哭先文靖者也汪希伯先生昔與先生同遊京師亦以詩名重公卿間先生俯仰今昔感慨興懷乃以箸擊案自為歌詩而舉酒屬余曰人生聚散寧可計乎人生今日旦夕莫必其命今日之樂誠難得也遂泣下坐者皆泣終不樂罷去自弘光乙酉至今丁酉又十三年先生壽登六十余年且三十六鬚鬢亦半白矣喪亂侵尋老成凋謝先文靖之殉節亦已十三年而余師趙先生及汪先生者又皆死獨先生在耳夫當烈皇全盛之時固不虞有今日而當申酉之際所謂旦夕莫必其命者又豈謂有今日哉今日者先生以周甲稱慶而余猶存視息操辭以為先生壽亦非意計之所及也先生神全德劭其壽靡算從此十年一舉觴而余之操詞以進者意必有異於今乎萬峰剖石老和尚六十壽序吾聞道德髙妙者如髙山大川其巖巖峻極固不騫不崩也其汪汪萬頃固澄之不淸淆之不濁也其嶷然孤峙固足以填末俗而砥狂瀾也其無為自化固足以潤衆生而濟羣品也此即儒者之所謂悠久無息而釋氏之所稱萬劫常住者也其人也固將同金石不朽天壤齊壽矣而可以人世之年歲壽命頌之乎雖然天人之際未有不相符者吾故於聖恩大和尚剖師之壽而有味其言之也吾師之踞法王座而弘法者閲二十年矣宗風愈振大道益弘奔走天下殆無寧晷每一歲中其來往參印於吾師會下者不下數千人凡得吾師之片言片偈而沛法雨於火宅炳心燈於昏衢者不知其萬億矣則吾師之開甘露門而暜濟德遍天下譬如湖海涵養萬物而莫能名其德也象教淩夷世當末法無論蚩蚩氓俗沉淪黑業往而不返即方袍圓頂居然衲子然大都寄迹浮屠匿其瑕玷而天下之所稱善知識者又競蓄異流以為奇貨無不羅為法嗣升之座端末流披猖一至於此故佛法至今日而稱極盛正極衰也吾師心獨憫之門墻髙峻鑒別精嚴非其人不傳非其倫不收也其衛道之嚴荷道之重髙型峻範金科玉律有非諸方之所可及者禪者又以語言文字相髙舉世若狂無所底止苟一影掠機鋒拾人牙慧輒復𥿄費木災汗牛充棟然究其歸著正如蛙鳴蜩沸靡有窺於半班曾未得其一指師歎曰續佛慧命傳佛心印固自有在安用此喋喋而呫呫夸多鬬靡為也於是剷其書不傳惟以躬行實履為諸方表率故屹豎湖濱隱若敵國海內緇素咸望萬峰片地為濁世之化城而迷塗之覺海奔湊如騖絡繹如織一見吾師皈禮頂戴畏愛兼抱以為此古佛再來也如是者二十二年於兹矣夫此二十二年中天下之禪林法席或毁於兵火或壞於風波或同大慧之嬰難而命如懸絲而吾師法席之盛甲於天下二十二年之久而天下逺近無一間言即極天下抗暴難馴之物不可理蓄者一至吾師之前無不若崩厥角歡喜讚歎而去矣豈非衛道之嚴荷道之重一以躬行實履之所致歟昔人之所為歎髙山仰止者也夫春秋二百四十年之間文武之道幾墜於地故天篤生尼聖以挽維而振起之意者今竺乾之教似盛而衰亦將有墜地之憂故篤生吾師以挽維而振起之乎余於甲申孟陬從先文靖公入萬峰謁師先文靖命余叩首關前執弟子禮是時始識師今已十四年矣俯仰十四年世界陵谷一家菀枯懸隔變遷寧異霄壤而吾師之所以勤勤懇懇耳提而面命於枋者固十四年如一日也枋固駑下根器淺劣不能有所自得以傅吾師之弘期然心竊感師之教誨我無已而十四年如一日也丁酉之夏值吾師周甲之慶貧無以為吾師壽於是畫鄧尉十景復為文以冠之以稍抒積愫焉客曰吾聞師之壽也天下宰官長者以及都人士女率傾囊倒篋布金輦粟以為升恆之祝而子獨以區區筆墨為壽既愧頭目之捐施復異寶瓔之供養子何為者余曰不然吾師道德髙妙正所謂如髙山大川者也固將與鄧尉湖山長存天地之間吾故畫五湖二堰之汪洋羣峰列岫之崒􅟭皆所以舉似吾師而為形容亦以長存於天地間也豈可以尋常布金輦粟同日而語乎晉金陵瓦官寺初置朝賢喜施無過十萬而顧愷之獨以畫維摩一軀施滿百萬然則安知余之所為區區筆墨者不侈於布金輦粟哉吾師固笑而頷之也吳母徐太夫人八十壽序遐年大耊天之所靳茍一得之為人倫瑞故無論士大夫家以及閭巷氓庶其宗族鄉黨率於其人降誕之辰托其懿美稱觴致辭以頌禱之以娛樂之此亦古養老之禮也顧人生享上壽于其所閲百年之內俯仰身世而無關於國家治亂之數不足觀感世道之興衰雖有細善又何述焉雖然人生亦渺焉耳以一身之微而必於其所閲百年之內關國家治亂之數而又足觀感夫世道之興衰此薦紳先生猶難之况閨幃之間乎吾故於幼洪給諌母太夫人八十之壽而重有感也太夫人為名侍御之女嬪於吳為贈公孟登先生之元妃而都諫虛臺公之冡婦也生長華胄敦詩説禮積習名教故施於家政動合禮則事尊嫜則孝相夫子則順而教子則慈而能嚴訓備三遷媺齊七誡積之既厚卒能玉三子於成處為儒宗出為國器此誠靑簡之所罕遘而彤管之所未頌者矣而所尤難者幼洪給諌既成進士司李三衢而太夫人尤兢兢誨諭之不衰故哀矜折獄率多平反三衢稱無冤民得之太夫人慈訓為多甲申之變南都新建給諫既拾遺瑣闥而其時權姦柄國大興黨禍染逮名賢給諫遂以言事下黃門北寺獄禍且不測知者憂懼而太夫人怡然安之顧語左右曰吾之所以教子正謂有今日也昔雋不疑為京兆尹每行縣録囚徒還其母輒問不疑有所平反活幾何人母即喜笑為飲食語言異於他時或無所出母怒為之不食不疑以此為漢名臣又范滂罹黨人之禍既詣獄其母就與之訣從容曰汝今得與李杜齊名死亦何恨既有令名復求壽考可兼得乎史册至今猶傳頌之自古賢母之所僅有者太夫人既已兼之矣即南都再壞遷革喪亂又十六年矣太夫人奉身儉約感槩大義不以捧檄之喜望其子不以鼎食之養督於家故給諌兄弟亦能以不失身事親十六年如一日此又古今賢母之所少也嗟乎太夫人為侍御之女都諫之婦在神宗朝正當國家全盛無論矣即其為雋不疑母平反色喜時猶及見漢廷之治也逮其為滂母而漢祚已移矣至於今所謂絶不言祿與子偕隱者其時又何如哉故於太夫人之一身俯仰數十年間而其有關國家治亂之數又足觀感世道之興衰有如此者吾故不辭為質言之以侑給諫兄弟獻千齡之觴也朱師母六十壽序崇禎丁丑歲先文靖公命枋從先師朱夫子遊時即聞師母陶太夫人之賢戊寅而先師攜伯子致一過館舍與枋同學先師家固貧而致一衣履鮮潔雖布素必整好余於時羡致一之有母而自傷失恃言笑之餘未嘗不飲泣也時雖髫年無所知識而已知太夫人之賢聲不爽矣己卯春先師以事留滯於家不入郡城枋遂負笈執經以從授館師門先師實飲食教誨之朝斯夕斯凡一湯飲一匕箸無非太夫人之所手調也先生為一世大儒人倫南國從遊請益者踵趾相躡竟同公超之市而産入束脯都不能給太夫人以十指佐之宅僅數椽紡績機杼操作無停時而室中竟日不聞人聲時余常夜讀書太夫人每令致一兄弟伺余飢飽常膳外必益以果餌酒漿以助其讀書枋感太夫人之視余如子而益羡致一兄弟入受慈母之恩未知何等俯仰感激時時泣下霑襟矣而益稔知太夫人之賢也枋受業先師者五年遂濫登賢書致一亦蜚聲膠序又三年而遘國變先文靖以不辱身殉節止水而先師嬰城固守城破義不辱亦遂舉身以殉之時為弘光乙酉枋年二十四致一止年十九耳致一固少余五歲猶未弱冠也時鋒燹之餘百事崩壞而崑邑受禍尤烈太夫人既遭大故失所天而舊業摧毁諸孤林立尚有呱呱懷抱者風雨漂搖茹荼集蓼太夫人以一身肩之支吾中外經理廢墜毁者完之廢者復之亂者理之主伯亞旅田園堂構尋復其故教育政一兄弟以次成立婚嫁以時閨庭肅穆而又不廢致一兄弟遊學之資交遊會集歲時伏臘致酒擊鮮飲食衎衎一如先師之存無改豪髮嗟乎余與致一遘家國之禍同遭君父之變同余年既加長於致一而受先人之遺又數倍於致一也顧十六年來伶仃轗軻遂已無家矣而致一兄弟獨如昔者豈非徒以有太夫人在乎余每見致一兄弟而自傷鮮民之生不自知其涕之無從也庚子春為太夫人設帨之辰致一兄弟將稱觴為壽太夫人不許致一兄弟固請而太夫人固不肯曰乙酉之禍義不圖存若吾在爾父之側亦必從爾父於地下矣邂逅茍全固不期有今日也而忍以未亡人為娛耶遂泣下致一兄弟遂割意不敢言舉觴而徐枋聞之曰嗟乎吾師母陶太夫人之賢有大過人者三是將與金石齊壽矣而吾其能無一言乎變革之際喪亂頻仍即鼎食之家以破巢毁室一廢而不復頓者多矣太夫人以煢煢婺矛牙婦從瘡痍荆棘中收拾餘燼不數年而規摹如昔一不可及也一身而任中外之責兼教養之勤此在丈夫猶難之而太夫人外則桑土綢繆內則乳哺紡績而訓修義方敦詩説禮以玉諸子於成二不可及也且古之賢母如截髮丸熊亦既輝耀千古矣然大都欲其子延致名譽或掇取科第耳而大夫人則不然致一以象勺之歲名播詞場咸望一日而致千里乃既遭國變太夫人即令去經生之籍謝絶當丗隱居以教授故致一年未三十即有處士之目學成行立處乎遺民故老之間若魯之兩生者於是故家子弟閭里俊秀仰象賢爭先師之一如昔日之師先師也然則太夫人之感概大義自致不朽者又豈往昔賢母之所能望哉此三不可及也今以周甲之慶誼當舉觴而太夫人以大義却之確不可奪非大過人者能如是乎枋既始終慨羡致一兄弟而令能真知太夫人之賢故略言太夫人之與金石齊壽者如此太夫人雖不受觴能無受枋一言之頌乎居易堂集卷之六終
