  text: 居易堂集卷十九辭
  hash: sha256:b5105207ad19dfec21ac12dd22cb0528c5d84e99fc82564a0b56f657d83a3549
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_019-1a}
body:
  text: 姜吏部如須哀辭并序癸巳歲春二月草有三日庚申姜如須先生以疾卒于吳門之舍館其友徐枋聞訃哭之慟而以越在數十里屏居土室不入城府不得一視殮唅理喪事心戚戚若有所失越十有四日三月癸酉乃服朋友之服復為文而哭之嗚呼人之生死亦大矣哉士君子不幸生當革運之會錯趾屯邅之時苟非懷二心遺君親者未有不以死為歸者也齒劒仰藥懷沙沉淵國亡與亡九死未悔不以皎皎之身而試汶汶之俗此其最也剷跡銷光蓬纍泥蟠奉身長往皭然不滓而一飰不忘君德行歌慘于痛哭此又其稱也昔陶潛浮沉詩酒優游卒歲殁于宋文帝元嘉四年距晉亡已九載而良史特書為晉徴士家鉉翁隱居教授以天年終卒于元大德中去宋亡幾二十年而載筆者必褒為宋遺臣跡二子之所為亦老死牖下已耳而每與銜鬚結纓赴湯蹈火聲施竝永何哉豈非死有前後節殊顯晦而原心定論則之死不渝同歸一致乎吾今日于姜如須先生見之矣國破以後先生棄家奔吳入林不返雖身存將母而與死無間艱難契濶逾涉八年而乃心本朝夷險靡二行當拂亂而益堅時攖困厄而逾壯一鬱侘傺繚悷怫結一見之于詩歌詞調激揚藻麗橫發而神理沉鬱措思哀痛論者以為靈均之怨誹少陵之悲壯先生有焉其立節既嚴故束物亦峻每以余之屏跡隱身杜門守死詠歌獎訓往復過從不能已已其或低回時路亦刺譏立發客歲有明室遺老厠名啓事先生恐其彈冠脂車有隳素守乃貽詩規諷懇懇千言則先生之心為何如哉人徒見其賓從笑歌杯酒留連以為若忘于情者而不知其神傷心摧也夫家冤國恤萃于一身創巨痛深并集方寸人非金石亦何以堪故新亭風景西臺登臨無一非其傷生之具矣今年甫四十而一病不起嗚呼憂能傷人不復永年信哉余之所遭與先生有同痛而先生忽然以死俟河之清人壽幾何拊事悼心能不摧絶先生為先文靖公禮闈所得士乙酉之禍先文靖殉節止水門生故吏幾同路人而先生五年居吳四叩先人之墓每臨殯宫哭泣甚哀先生豈自以為壽不得長將相從地下耶先生之太公亦仗節死事罵賊不屈者也則先生父師淵源積漸有素豈偶然耶范滂將赴死與母訣曰仲博孝敬足以供養滂從龍舒君于黃泉存亡各得其所任末奔師喪病革敕其後曰必致我尸於師門死而有知魂靈不慙若是乎父子師友之間死生之際蓋凜凜乎難言之今先生潔身固節全而歸之不墮家聲不愧師傳矣于其生也無間于前人之死則其後死于今日豈復有二于畢節當時者哉是先生雖死而實有不死者存若彼後君遺親生理滅絶雖假視息而其臭腐固已久矣故曰人之死生亦大矣因揮涕而為之辭其辭曰天帝既醉九宇分披金苻暗竊玉鉉潛移皇綱解紐突騎橫馳鴟梟雲翔鳳凰枳棲祥麟迸野廟登狐狸于是志士成仁忠臣取義弘演納肝睢陽碎齒汨羅三閭止水萬里餘亦􅃮身吞炭剪鬚截指隱身門卒全節傭伍或託靑盲以避時或加白刃而不顧右引鴆毒左推􅌧組既無間於純忠又豈殊于九死若乃蹈江海奔山林變衣冠埋姓名蓋一往而不返亦百折而不傾仙人隕涕于辭漢處士寓言于避秦汙穢榮祿糞土簪纓懷瑾握瑜雪白蘭薰實以礪俗豈曰偷生吾友姜子實惟其人原姜之初本自炎帝神皇發祥綿歷萬􅥴功熾隆周德昌漢世又千百年吾友誕嗣嶽降星臨無雙國士結志靑雲拜身丹陛年逾弱冠頓轡皇塗才名蓋代直節不磨五鹿折角九閽叩呼論事則氣劘諸老說經則席奪羣儒稱詩齊于十詠獻賦嫓于三都方黼黻乎休明豈躓跋于囏虞天步頓傾皇輿再瀦園陵鞠草社稷為墟公曰惟臣死節矢志不渝痛惟先臣罵賊捐軀臣有老母臣死誰依疊山後死職是踟蹰于是奉母避世不遑寧居間關南北載馳載驅既非崔邠之脫帽又非安仁之板輿家國傷心愴焉以悲世路險仄蹙蹙靡之乃至四鳯異林三荆分株既不同夫伯淮之被亦莫牽夫仲海之裾為臣為子集蓼茹荼凜凜臣躬其敢隕越憔悴放廢姱修信潔擷衆芳以為佩指後凋而為節世界重昏不見日月君父痛深母兄念切采薇作歌彼屺時陟方寸幾何堪此崩裂旦復旦兮庶幾生活昊天夢夢長夜漫漫俯仰山河摧絶心肝賈太傅哭泣以早死盛孝章憂傷而天年帝構玉樓天降玉棺哲人萎矣梁木壞焉人百何贖泣涕漣漣秦人歌其黃鳥蒿里悲其素驂謂天愸遺大濟時艱佐建武之風猷覩司隸之衣冠豈期碩果遽墜重泉嗚呼哀哉疇昔之夜惟余心動巨卿死友元伯入夢玄冕垂纓髣佛長慟感舊則鄰笛懷悲傷逝則人琴抱痛嗟眭夸之縞衣受唁愧范式之素車奔送嗚呼哀哉惟公之靈實明我心八年草土絶跡市城繐帷在望若隔寰瀛慿棺一哭俟之河清于是乃登髙丘而延望敶楚些以招魂嗚呼哀哉歲在龍蛇而賢人嗟月犯少微而隱士卒巷不歌謠行路啜泣况余與公體同休戚孔李通家雷陳膠􅃮其為痛悼罔罔靡極攬茹蕙以掩涕衣裒為之盡浥命也奈何如兹奄忽死生異路永從此訣嗚呼哀哉退翁老人南嶽和尚哀辭壬子九月二十七日吾師退翁老人南嶽和尚長逝于吳靈巖之大鑒堂其白衣弟子徐枋頓首為文以哭之曰維竺乾之道東流震旦垂幾千年其間顯晦紛紜亦或隨時隆汚雖大道固然未為全虧然歷數不世出之至人雷轟電掣海涵嶽峙日耀星臨所以震動昌明光大乎佛道者固已悉其神力而要未能一攝其全而釋疑萬古自吾師退翁老人南嶽儲和尚一出而始能為佛洗千百年之謗而佛之道始大全今而後有名世之大儒巨公者出無不快然知佛之道固足以陶鑄堯舜包含周孔而無遺憾也何也蓋吾師能以忠孝作佛事也昔昌黎廬陵為吾儒𥪡赤幟而濂洛以下諸儒復揚其波詆訾佛道幾同楊墨歷千百年固儒曲說守其城塹牢不可破而荷擔佛道者亦未能一辭而闢之何也垂世立教旋乾轉坤實以道而不以言在躬行而不在鬬諍也苟無其道言之何益苟非躬行諍之愈損故亦間有一二立說輔教者詎能破曲儒之見而釋萬古之疑乎惟吾師一以忠孝作佛事使天下後世洞然明白不特知佛道之無礙於忠孝且以知忠孝實自佛性中出是使佛之道若日之晦而復明也若月之缺而復圓也若天地之混沌而復開闢也於戲則吾師之於佛道世道為何如而胡不永其年而未七十而遽長逝乎是故于其逝也無論知與不知皆為流涕而慿龕一哭聲若崩城嗚呼可以見人心矣或曰吾師之以忠孝作佛事可得聞乎滄桑以來二十八年心之精微口不能言每臨是諱必素服焚香北面揮涕二十八年直如一日身為法王年垂七十而明發之懷孜孜靡已每言必樂道其二人之盛德惟恐二人之盛德無聞于後所謂終身之慕者非耶鬱然至心有非賢士大夫之所能者吾師之忠于國孝于家者如此吾師嘗言錫類之仁孝為忠本故自為孝經箋說以刻之而復敦請大德居士講說孝經于叢席俾一千五百衲子無不薰染于其中而又推其忠孝之心以翼芘生全天下之忠臣孝子不容悉數即嘗為不肖枋排大難禦大患者謬以枋能無毁先人之志孝也必使枋能無失故國之身忠也即一嘉惠于枋一人而師之忠與孝全矣於戲吾師之所以嘉惠於枋一人者即所以嘉惠于千載之倫常也故于吾師之逝也枋哭之慟一慟而不能起也於戲是豈為我一人痛乎實為千載痛也吾師之所嘉惠于我一人者即所以嘉惠于千載則吾之為千載痛者寧獨非為我一人痛乎於戲痛哉吾嘗讀史知例以義起如魏書之有釋老志宋史之有理學傳創也創而得其義為不刋矣然千古國史未有列釋門大老者即如寶志一行僅僅列于方術傳彼固不能特創一例也若有深明春秋之大義得史法者當于故國之史特立一大人傳以吾師一人竟之創千古之義例開千古之心胸使天下後世學佛學儒者無不快然知佛道之固足以陶鑄堯舜包含周孔而無遺憾也以吾師之能以忠孝作佛事也於戲吾意盡矣而吾痛未盡吾痛未盡再託之辭其辭曰維釋迦文雅思淵才言如萬華春遍九垓琅函寶笈雲漢昭回拈華一宗不立文字少室廓然惟第一義直探心源言為道蔽不二門中本來一體從古大老得彼失此於維吾師廣大崔巍心傳諸祖文繼如來言滿天下為霆為雷文峰卓立學海弘開以斯至文於焉載道觸處敷宣甚深微妙河沙世界罔弗詔告詔告維何維忠與孝昔我尼父行在孝經百行維先萬世作程師知其義孜孜是勤叢林標榜塵剎儀刑移孝為忠實惟一致志在春秋天經地義孑然孤撐以支天墜片言不磨以醒帝醉長夜一燈狂瀾一柱維師之道實範吾儒君臣父子大義克扶彼儒詆佛非迂則愚內聖外王徒為區區佛無不該奚止合符吾師之生為佛洗謗西竺東魯汝和豫唱無忝徽音克明師匠昌黎廬陵師扼其吭而今而後萬古是諒師之出也如日中天無幽不燭萬彚昭然三代禮樂盡在是焉以兹慧命覆此大千胡為長逝而不永年吾師之逝山頽木折天上靈巖摧其嶻􅑖大地銜悲諸天慟絶日霾無光衆星隕越羣生安仰怙恃斯奪如風斯號如雨斯泣如聞遺咳如覩慈容獅絃失響猊座長空嘹嘹哀梵漠漠悲風含悽道慘夕磬晨鐘吾之痛師無可告語激楚􅞽辭纒綿怨悱魂逝腸回言無綸緒屈宋大招惟心痛只曽吟恆悲莫知所指於戲我心云何不爾吾痛無盡以告終古李侍御灌溪先生哀辭并序天誕偉人必使之被顯名躋大年非以厚其人所以厚天下也非以厚一時之天下所以培民彛於無已也故其人嘗巋然獨峙以繫天下之望天下亦羣焉仰之其人而存固無所為屑屑於天下也然信史書之千秋頌之即以存故國之風為狂瀾之砥而隱然寄綱常之重焉昔宋室既亡故相家鉉翁隱居教授不涉世事又十九年而逝而史稱為宋遺臣嗚呼自昔適丁革運之會守身異代之後未有如此之貞確久長而不渝者設歷年更久守身益固年考益髙而皭然不滓聿稱完人則其人之存亡不更重於往哲乎吾故于前侍御灌溪李先生之沒而俯仰歎悼為史冊之所希有也先生年二十餘薦登上第早膺民社之寄即著廉吏循吏之稱考績入最官為御史觸邪指侫奮不顧身有破柱折檻之風及忤時在貶奉身里居仰事太翁色養備至不言躬行有舞褎洗裙之孝昔人稱李景讓孝于家忠于國者先生真不隤其家聲矣逮遘世變先生潛節固守確乎不拔自鼎革時年未五十乃自五十而六十而七十而八十而守益固節益髙三十餘年有如一日因回環先生一生之著績或出或處無時無事不合於道此天下知與不知無不痛先生之殁咨嗟涕洟謂天下之不可以無先生也此吾之所以為天下痛先生也至我一人之私則更有無已之悲焉先生為先文靖公總角交少同硯席壯則同朝晚同里居文章事業激揚砥礪逮先文靖畢節止水先生為後死存其孤而恤其後藏之中心未易一二言嘗會葬先公先生悲不能自勝見者皆為流涕又以不肖之息影土室也先生絀父執之分忘逹尊之年時操小舠酒尊襆被顧我於空山荒野之間又必偕吾師鄭桐菴先生及一二方外同心之友晨夕談笑流連信宿必極意而後返而歷歲無倦焉則其氣誼為何如者去年臘月先生于風雪中獨過草堂劇談移晷聰明步履有同壯夫余竊慶幸先生之壽未艾胡期今之遽爾長往也嗚呼先生往矣典型淪喪木壞山頽即微知已之感世誼之戚而有餘痛而况如不肖者宜乎旬月以來淚如縻而心如搗也更有痛者土室中人不出户庭人間世事一概廢絶致不能一弔先生之喪一臨先生之穴今將就窆而我心缺然則我無已之悲其有以自解乎嗚呼創臆填膺無所抒寫聊敶楚些以志吾哀其辭曰偉人之生實維嶽降元精亶儲鍾祥休鬯胚胎前光卿長無讓早綰炎符清風逺揚履職臺端霜威慷慷國步未傾皇猷克壯中外經綸為時哲匠胡遘滄桑旋隱園巷一砥巋然百川為障令聞風馳逸情雲上八十之年受天之貺江左夷吾渭濱公望維公之殁靈光既傾大星宵隕赫曦晝暝未期旦旦遽即冥冥民之無祿喪此典型逺近痛悼追維德馨巷不杵相孺亦涕零維公之年胡不百齡載綏視履以躋澄清公今往矣如彼蒼生我敶大招告公之靈嗚呼我公維余父執元禮龍門童年早及函丈周旋孝穆殊特夙昔褒稱聲名題拂我當孤露公實覆翼感知懷舊填膺創臆屠維協洽暮商無射維此歲月我公隕殁俯仰銜悲維余啜泣嗚呼哀哉公稱肥遁聿號癯仙山林無悶逍遙引年豈期一旦哲人萎焉嗚呼哀哉精靈仿佛乘雲騎箕上下星河經帶寰區公雖往矣亘古終譽我今安仰矯首東維夏屋之封婁江之墟千秋一宿永夜安居老友蒼睂張君哀辭并序歲甲寅十月壬辰老友蒼睂長逝訃聞徐子傷悼之至不自知其涕之無從也嗚呼乙未歲冬始識蒼睂于今二十年俯仰二十年間蒼睂之翊我憂患慰我窮愁未易一二言其所以解紛禦侮為之惟恐不力趨之惟恐或後若饑渴之切身若嗜欲之不可解于心也則于其死也吾能無悲乎第其死時不能與之一訣其殯時不能視其飰唅吾又何以為心也耶是宜乎其死後三四十日而余猶戚戚若有所失也嗚呼吾見其一棺戢身蕭然無餘有足悲者夫復何言幸有其友惠君孟仁篤古人之誼其所以周旋其身後與蒼睂存時無異而且力索余一言以哭蒼睂嗚呼蒼睂可以瞑矣蒼睂平時嘗語余曰某閭閻窮叟自與草木同腐所幸者一生得識徐孝廉而吾友惠君可屬肝膈耳今于其死後而惠君諄諄乞余言甚急若非此則無以慰蒼睂于地下者余甚愧之而亦可以見蒼睂之知人矣語曰人之相知貴相知心惠君知蒼睂之心而能必慰之于其身後此余之所謂古人也余既悲蒼睂之忽然長逝而又重惠君之諄諄無已因揮涕而為之辭辭曰造化茫茫萬物逆旅死何以悲生何以喜譬如晝夜事有必爾倐而扶桑忽焉𪷟汜人生百年有如此矣嗚呼張君號曰蒼睂年躋七十壽稱古稀晚慕禪悅脫然去來生無所纍死又何悽余之悼君余心自悲惟君於我急病讓夷余昔盛時交滿天下接蓋扶輪執轡命駕陵谷滄桑掉臂交詫翻覆雲雨欺紿變詐獨有蒼睂交憂患時視我采薇若已有饑視我葛帔若身無衣我有外侮以身禦之大憝含沙嚴辭往諭巨浸稽天漏舟徑濟衛我種種靡他自矢君之衛我人所莫喻有時載酒慰我牢愁抗聲髙歌浮白相酬諧笑雜􅊱以解我憂我嘗疾病君求醫藥當我沉綿君心煎灼必我霍然君始大噱我當行遁竄跡僧寮君常伴我慰我寂寥寒飈淅淅夜雨瀟瀟或時奔走雪咽風叨篷窗暑夜芒屫霜朝如是草年靡所不歷心同憂喜有如一日猶記昨歲君忽遘疾我來視君贈君藥石君疾有瘳謂君再生君必長壽以幾令辰庶幾報稱以展我心我聞古人無德不報一飰必酬我心是效况于草載憂患殷勤我心如結欲效無因豈期一旦遽赴冥冥病不我招訣不我聞逮造君廬桐棺是陳嗚呼哀哉我何為情君每見我笑言稠密問訊勞苦覼縷休戚胡我此來惟我啜泣我言莫應我嗟何及幸有惠君托君遺蹟邀余一言慰君窀穸嗚呼哀哉死而有知實聞我言兼聽我辭我敶楚些魂兮何之君嘗屬我為君立傳誓必為君重開生面託之貞珉千古無眩君必聞之斯言若券含笑九京我言是頷贊莊子贊黜聰墮明爰葆其真釋仁去義性乃無敝吾知之矣真性若水五味既調厥水乃淆惟其甘㫖旋亦腐穢若彼湛然亘古無愆惟葆我真物莫得攖惟浮我性物莫能竸吾全其我無可不可止若乘空行若御風脾睨揶揄吾無隱乎忽為大鵬翼垂天雲水擊風負能小天下忽為蝴蝶輕舉一葉彼栩栩者我夢覺也大而能化審乎無假擴而能收與造物遊今我擬之伊誰似之莊生莊生其人其人漢壽亭侯贊髯之逸羣有國士風風霆前驅日月在躬威震華夏千古為雄奚止氣吞乎當塗而勢壓夫江東嗚呼前有納肝同公不二心之極致後有碎齒繼公不兩立之純忠而皆未能如公有以禠敵國之魄而摧奸雄之鋒嗚呼我公此所以為千古人臣之宗觀音大士十贊一一大士趺坐蓮花上手執如意身微俯者極樂國土乃有大士塵沙剎界功德無二說法現身微言妙諦度彼衆生維我如意二一大士坐蓮花瓣上風而行悠然中流我坐蓮瓣是般若船泛香水海三千大千援天下溺如已溺焉舍身狥物以大悲故三一大士素衣獨行淨瓶楊枝花趺草茵一無所有空諸所有獨步無上現種種身是為人相妙鬘垂纓是為我相大慈大悲諸相非相四一大士擁膝坐蒲團上首微俯前一淨瓶插楊枝擁膝而坐儼若有思思濟羣生是曰大慈慈容端好珂睂寶目三千大千在我化育伊維慈母亦太導師嬰乳蒙求視此楊枝五一大士坐草茵上一手搘地一手垂膝首微側顔似微笑音亦可觀寂亦可聞兹默然者如海潮音吾一叩之開言含笑說無可說道無可道六一大士立蓮花瓣上浮大海中風濤拍天大士低睂俯視安隱自在為乘戒舟為鼓慈棹風波稽天如履坦道風自何發波自何興我心既定風波永寧誕先登岸度彼迷津七一大士現童子相一手輪珠箕踞坐草上回顧一瓶一鉢現身維何為默為說身外何有一瓶一鉢解我瓔珞為此記珠行遊婆娑念兹在兹八一大士聳身危坐巳品蓮上辟支聲聞梵王帝釋惟此一心紛紛籍籍千手千眼亦惟一心還歸本來曰是普門諦觀大士面目誰真九一大士手執淨瓶以楊枝灑之雙足踏寶蓮華而行澍我軍持八功德水承我雙趺寶華香蘂以此恩波暜濟萬彚以此芳躅納民於軌我有大願此水此華芬芳潤澤永永無涯十一大士閉目斂手結跏安坐一磐石上四面雲氣圍繞身頂皆見圓相慈意妙雲悲心慧日雲蔭大千日照無極宴然瞑坐周恆沙國惟此大定浩劫瞬息惟此幻身壽逾磐石移居十景圖贊余山居屢遷因集古人移居十事皆讀書隱居者以自况因作移居十圖而各系以贊凡十首霸陵山漢梁鴻字伯鸞扶風人始受業太學家貧尚節介博覽無不通歸鄉里勢家慕其髙節欲女之謝不娶娶孟氏女光光歸鴻七日盡釋齎裝椎髻布裙操作而前鴻喜曰真吾配也共入霸陵山中以耕織為業詠詩書彈琴以自娛伯鸞淸髙爰求賢匹裘葛俱隱節尚悉敵彈琴著書夫耕婦織共入霸陵樂是潛德上黨魏巨鹿張臶字子明養志不仕少游太學學兼內外後歸鄉里袁紹前後辟命不應移居上黨以髙隱終年一百五歲咄哉子明永臥園丘不事天子不友諸侯移居避世百歲何求方城晉張華字茂先范陽方城人也學業優博詞藻溫麗朗贍多通圖緯方伎之書莫不祥覽文史溢於機篋常徙居載書三十乘茂先博物賜麟角筆書三十乘博物是出以是為遷非徒壁立桐廬宋戴勃譙郡人晉處士安之子也與弟顒竝隱遁不汙修父業安授以琴勃顒各造新弄數部以彈焉以桐廬多名山兄弟往遊遂留居之勃顒竝隱克修父業新聲十弄彈琴一闋往遊桐廬山雲自悅兄弟留居與塵中絶衡山宋劉凝之支江人也少慕老萊子嚴子陵之為人推家財與兄子及弟娶妻梁氏女遺送豐盛畢散之親族夫婦率安儉苦築室于野非其力不食後攜妻入衡山絶嶺結小廬居之采藥服食焉落落劉生尚友真隱攜室入山結廬絶嶺俯視寰區茫茫悠永會稽南山宋朱百年㑹稽山隂人攜妻孔入南山而居以樵箬為業每得樵輒束置道旁為人所取去輒復置久之須者隨所直多少留錢歸之轉居南山樵不取錢道頭樵者伊朱百年積金澗梁陶弘景字通明丹陽秣陵人也幼多異操及長身有奇表齊髙為相引為諸王侍讀奉朝請閉影不外交惟披閲為務永明中脫朝衣掛神武門而去止句容之句曲山乃中山立館自號華陽陶隱居晚移積金東澗特愛松風庭院皆植松聞其響欣然為樂時獨遊泉石望見者以為仙人仙人通明掛冠神武華陽隱居丹砂自煮三朝盛名與泉石伍移居東澗松風長午北渚唐王績字無功人也性簡傲棄官不仕沈于酒退耕東臯即以自號時絳州仲長子光無妻子結廬北渚績愛其真淡徙與居時對酌甚歡子光未嘗與交語績有田種黍春秋釀酒養鳬鴨藝藥草自供以周易老莊置牀頭時讀之彼王無功棄官不仕五斗亦醉號東臯子仲長天隱塊然無侣維德不孤績來北渚田十六頃歲惟種黍對酌甚歡不一交語箕山唐田游巖將母妻入箕山就許由廟東築室山居自稱由東鄰髙宗幸嵩山詣焉問之曰先生比佳否對曰臣泉石膏肓煙霞錮疾不佳也泉石膏肓煙霞錮疾許由有鄰游巖築室岐亭宋陳慥字季當人工部郎希亮子也少使酒好劒輕財為俠與蘇軾游軾大奇之壯折節讀書不遇棄田宅隱於光黃間岐亭菴棲焉徒步往來山中妻子奴婢皆自得人莫之識也見其帽似方屋而髙曰此豈古方山冠乎因謂之方山子軾謫黃過岐亭識之人始知為慥云季長好俠折節盛年棄家埋名遁光黃間往來山中人號方山不遇大蘇姓字不傳宗子炯太君王氏遺像贊并序彤管所稱靑簡所載中閨名彥邦媛芳規尚矣然盛女德者或未聞其婦則著婦道者或未覩其母儀此固至行之難兼實亦全人之希遘所以絳紗之幔止載傳經黃絹之辭僅稱孝女萊妻暨乎鴻匹而慈訓未及寧馨七誡等於三遷而令模不推中饋雖千古為烈惟一節可稱况義備三從德兼四行者乎拜瞻圖像用贊蕪辭辭曰生稱女表沒號禮宗爰託豪素著其徽容庶幾髣佛亮節端蹤堂前垂美孝里遺風尚論孝行若叔先雄為婦為母斷織九熊玉成令器聿為人龍女誡懿德萃美厥躬挹彼風烈昭我管彤鄭靑山泛舟小像贊并序余少讀范宣城書覽逸民獨行諸行事未嘗不致慨于聞其語未見其人也及與吾友鄭子靑山定交見其事親孝交友信敬身嚴始憬然而歎此即古獨行之流歟客曰志捍金石意嚴冬霜斯獨行之所繇名也鄭子其何居焉噫世當挽季江河末流士鮮惇茂之行家無世守之學且爰自江南卑薄之域而角立傑出內行淳修庸德實為奇節矣是以論其世也鄭子年躋强仕而孝事尊君有嬰兒之色居恆極甘㫖潔滫瀡志養兼修惟恐不及余固獲交紀羣間尊君嘗語余曰余少未克盡孝養于先人今受吾子之奉良有愧焉嗟乎夫人子之事親而無間于親心如此斯其至性通於神明矣鄭子退然如不勝衣其言呐呐不出口而急人之急然諾不侵生平主敬弗虧暗室所謂火滅修容衣帶必恭鄭子有焉鄭子少修博士業余與同學既而知天下將亂乃慨然盡棄其學而以醫學世其家沈思篤嗜不二三年遂渙然不逆於心湯尉所及沈痼立起一出而名重天下矣亂後數年味道守真終亨時晦雖形依城闕而冥然有遐舉之志故自畫其像單舸水裔類古通隱者流斯又逸民之亞也昔宋學士濂修元史列名醫朱震亨于儒林傳中豈非以其人不敢以醫命歟故至今稱為良史若鄭子篤行似夏統貞默似申屠蟠而孝友樂義則似郭原平嚴世期吾願異日珥筆作皇明史者遵漢書京房故事為鄭子立兩傳分列逸民獨行中也因為之贊贊曰韓康賣藥女子知名夏統扣船風雨隨聲寶筏利時玉函垂經吾聞醫理實同相業若濟巨川女作舟楫吾聞金仙實有慈航暜濟羣品是稱醫王則是桂櫂蘭枻浮家泛宅者將與造化分工和緩抗席豈特郭翻野人之舟陶峴水仙之遊也哉楊曰補小像贊其中溫良澤乎風雅勃顒竝隱耦耕于野山髙水深千仞不下古之沉冥無復過者吳佩逺琴書小像贊一時玉人千古國器有湖海心食神仙字中路飄搖風風雨雨名編鈎黨世推君顧共保歲寒松石間意獅林廣運大師遺像贊像教東漸異人輩出荷擔大道增輝佛日或假有為以示神力樓閣湧現莊嚴瞬息飛走丹靑虛空金碧頓開化城竟躋樂國見者皈心砭愚袪惑五濁慈航津梁罔極以兹誓願適然來集功成身逝不留朕跡身尚不留况於勳德去來翛然義諦第一式瞻遺影威儀抑抑智囊眼黃塵寰足白睦州現身淨名示疾丰標儼在清風披襲故宫保張大司農遺像贊并序於戲此故太子太保户部尚書張公靜涵遣像也公勳德重于本朝風節表於今世篤行同於古人學道超于先哲守身不二逹尊兼三以是而往可以無憾公殆所謂完人者耶余自稚齒即奉教于海內大君子如倪文正黃相國諸公獨公則于世變後始獲交焉而奉公之教最深且久俯仰二十餘年公略其分位忘其年齒而謬推挹于余故余銜公之知亦最深非諸公所同也甲辰秋公寓書論道奬詡過當而復屬余題故御史秦公大音遺墨秦公與余一見而亦為知已余拊時懷舊掩卷太息不能已已不謂不四五年而公亦繼秦公往矣而今復為公題遺像也於戲遺臣故老身任綱常而泰山梁木一旦頽壞則故國風流于斯頓盡避世之士無所瞻依此余之所重悲也而况有知已之感乎而余更有所進矣昔所題秦公之遺墨實與其宗子燈巖氏者而今公之遺像亦燈巖所繪也燈巖師事二公學問淵淵得二公之精微求無忝其師傳故兢兢惟恐失墜如是又非獨眷懷於存亡今昔者是非余之所能及也因為之贊贊曰特贊之貴計相之年博望之節曲江之賢西銘南軒稱其學無盡無垢逃于禪在昔一人得一已千古而今公則包舉數賢肩其全余昔辱公之教書聯六𥿄而今復讀公與其弟子論學之篇雖稱小友于公者二十餘載而愧未能究公之一焉於戲聞公之名四海所共知公之心千載無愆而晰公之學則或同室而茫然今繪公之像或以見公之容貌而因以不泯公心學之宗傳嗚呼是像之所以為具瞻吾固知髙山之仰不專而咸而朝斯夕斯如炙羮牆者則公髙第弟子秦氏之燈巖吳江周長生畫像贊孝侯伯仁俱生令子咸有父風史載其蹟于今為烈如遘音容維茲玉立翛然風貌令聞克從不墜家聲緬懷前哲亦將無同吾知其為忠毅之子上下千載而克振其宗者耶張蒼睂畫像贊寫像為顧生拜石為丈水亦吾師髙懷曠適五湖之湄仙癯鶴瘦伊遁稱肥交契雲霞性同鹿麋既絶塵而違俗嗣萊民之芳躅亦抗志而尋幽從赤松以同遊棲託則竹中髙士漁釣則苕霅孤舟名成三影詩稱四愁引如意以擎凡耕東林之山疇折松枝為麈尾而清談玄箸弄鐵笛以自娛而聲遍方州若乃周郎顧曲桓伊彈箏陸羽煮泉韓康賣藥既諸藝之能精亦千金而一諾急病讓夷傾蓋垂槖嗟乎斯人為善最樂于是虎頭寫其狀貌孝穆頌以辭章傳神阿堵德隅不忘張公一生江海客身長八尺鬚睂蒼徐次洲畫像贊水聲潺潺松風謖謖彼有人焉絶塵髙躅意氣欲吞江湖雅志不移陵谷遡早時之盛事實歲晚之孤芳飛騰六藝豪蕩千觴釀傾次道翰輟中郎逸情雲上髙論風翔既感時以長往斯卷懷而善藏慕向長之遣纍學陸賈之析裝今吾舉似阿誰可擬伯珍樂潛爰棲九巖修仁誡子不問園田景山中聖孝克逃禪所謂懷文抱質而抗志箕山者非耶吾知其人無忝家聲南州髙士東海遺民薛逸菴畫像贊吾聞大隱在朝市李伯陽為柱下史東方曼倩浮沉金馬隱于朝者也梁伯鸞賃舂廡下王君公市儈牆東隱于市者也古人負絶俗之姿尚浩然之志正不必憔悴山林長往不返以矜其髙唯夷猶寓託隨地可隱而其隱始大薛子逸菴雜跡塵坌之區而翛然有塵外之致入其廬爐香茗碗秩秩琴書入其圃藥闌石磴修竹方池花藥盈階蔬蔌滿畦彼非隱者能如是乎昔薛公藏於賣漿家薛方終身嘉遁固世有其人若逸菴者其能不墜家聲歟故觀其畫像湛矣神清幅巾竹杖飄飄出塵吾目之為大隱而亦歎其為先民題瞻明宗子居士像贊幅巾染衣欲掃塵跡孝克逃禪東林遺則似翛然物外能息心乎淨域而不知其少壯之時飛揚跋扈文章硯席故今觀其睂宇猶爾丰神之奕奕嗟乎吾今而後知髯之逸羣角立傑出業師鄭桐菴先生畫像贊惟我先生今之商瞿出處默語以易為模終亨時晦自履坦途峩峩髙山具瞻德隅熙怡悅澤道勝而腴而口欲無言目若有營者吾知其為易之憂患而不敢忘乎故吾猗歟先生故國遺民斯時碩果避世之士列仙之儒故贈大理安甫陸公遺像贊并序人臣以身許國幸而際會休明身名俱泰不幸而畢節致命以死繼之尚矣雖然難言之矣或秉國之鈞或膺民社之寄而國亡與亡義無可諉或處禁近之地任諫諍之職而事機迫人言與禍會則其死也所謂死于其官者也所謂不失其職者也若曰進退綽綽成仁取義則有間焉善矣歐陽子作五代史而分立死事死節二傳也若夫退休林下不綰軍國之柄而驟更世變死繫綱常暨身未離乎士林非有拾遺補闕之責而抗直不撓卒觸邪指侫以死此其死也重于泰山千古為烈成仁取義又何愧乎昔正德初逆瑾為亂流毒縉紳時陸安甫先生諱初成進士無官守無言責實未離乎士也而獨以直節忤瑾致伏闕暴死時論痛之以為公名父之子抱非常之才甫成進士或少斂其鋒鍔以需其大且逺者所得不止此嗚呼是豈知公者乎以瑾滔天之惡舉世風靡公獨不惜孱然之軀以捍之使天下後世知士氣必伸有寧死而不奪者則公一身雖死而其所綱維于萬世者何如也嗚呼膺滂遘節甫之禍對獄慷慨謂死當葬首陽山上不愧皇天下不愧夷齊若公之死可以當之矣然後可以列于歐陽子死節之傳矣然後可無愧于孔孟成仁取義之言矣拜瞻遺像敬係以贊贊曰所絀者孱然之軀所伸者浩然之氣其為氣也上為星辰下為山河亘千古而靡替嗚呼陸公死于一時生于萬􅥴元鎮東儒學提舉朱澤民先生鏡容贊并序旌表貞節朱太夫人睢陽之裔也先學士文靖公奉母純孝篤渭陽之誼與朱氏宗黨周旋無間居恆尤喜稱說外家文獻故余小子童時即得備聞朱氏之前言往行焉猶記崇禎癸酉歲之端陽朱太學汝梅氏敬奉其先世所藏睢陽五老圖乞先文靖公題詠五老者即宋丞相杜祁公太子賓客王公渙光祿卿畢公世長尚書郎馮公平及兵部郎中朱公諱某者朱氏即其後也於時歐陽文忠公有次韻五老詩白髮憂民雖種種丹心許國尚桓桓可以見之矣余時年十二得觀五老之像瞻禮敬對不敢漫視又不能釋手又五年戊寅先文靖公延先師以發先生授經于余館吳趨里第先師攜其先世手澤赴館復得見澤民先生鏡容及水亭圖余時年十七其為敬愛瞻禮亦同于五老圖因得遍讀諸名賢題識知朱氏世德之長不啻崑崙之源而諸圖之去而復來及再失再得或閲幾傳或踰百載而完好如新復歸世守種種神異不减張僧繇所畫天竺先生像者豈非名德精爽與世長存固有不依形而立不恃力而傳者乎癸亥歲九月之朔先師長君致一偕其羣從過余澗上草堂復出鏡容水亭二圖屬小子題冊尾再一展禮回首如昨而距戊寅歲已四十六年余今年已六十二滄桑陵谷何可復言即先公先師捐身殉國亦三十九年俯仰今昔余與致一不覺相視泫然而尤幸世守之如昔也敬係以贊贊曰偉哉澤民孝友之裔朱氏自唐名仁軌者稱孝友先生居睢陽亦孝亦友克世厥懿敦此大節蔚為名世文同三閭孝比參騫昔賢所目公庶幾焉公不騖時時其舍旃入參文苑出寄戎索在所著績原本于學為仕為隱不愧不怍存復同初何遜濂洛公精于理學有存復齊集同初銘斷石著異摹鏡稱神於戲偉哉鬱林後身公大父卜兆于陽山之原將營葬公大母夢一衣冠偉丈夫告云勿奪我宅吾將為夫人孫次日役者鑿地遇古墓得一碣漢鬱林太守陸績之墓異之欲重掩而碣已斷碣旁刻六字曰此石斷人來換因重刻一碣仍舊瘞之施夫人復夢前偉丈夫曰再感盛德吾真得為夫人孫矣是夜公生詳載公墓志居易堂集卷十九終
