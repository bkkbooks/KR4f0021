body:
  text: 題䟦題倪文正公尺牘後昔黃相國石齋先生以忤時去國倪文正公特疏畱之乞以已官授先生而自就斥既奉嚴綸矣先文靖公一疏再疏乞允文正所請謂先生飭躬皎然可信文正進說誠然不欺今讀文正尺牘雖朋從往還率爾數語而憂國愛才如痌諸身所謂誠然不欺者不愈可見乎後十餘年文正以甲申死先文靖以乙酉死石齋先生以丙戍死殉義不屈後先一揆意者在天之靈語及生平當以相知之㴱相視而笑言及天下事恐又不止如卷中之長太息也偶題友人畵梅昔華光老人值梅數本於方丈毎花放時移牀其下吟咏終日莫知其意偶月夜未寢見窗間疎影橫斜蕭然可愛遂以筆規其狀晨起視之殊有月下之思因此好寫梅得其三昩此墨梅之所自始也山谷見而美之曰嫩寒淸曉行孤村籬落間但欠香耳其爲名賢所珍重如此後則有楊補之最擅其勝自兹以降畵者日繁而傳者無聞焉梅花標致既已淸絶畵之者稍落筆墨蹊徑去之彌逺矣茍非何水曺林處士其人者未可語於梅也然其人未必能畵能畵者又未必其人則華光補之豈得不稱絶調哉余性習畵理少而知之山水樹石隨意點染至於梅則撤翰矣畵梅有丁有點有蕚有鬚奇兩三七厥有微著不較難哉故蹊徑不可有而規矩又不可亾也若神韻雖好而家數未諳其失則畵法則具備而意理塵俗其失則人非人畵俱妙其無畵梅哉曼倩氏曰談何容易其畵梅之謂乎題邵僧彌墨菊屈子憤世嫉俗謂荃蕙爲茅蘭芷善變而獨欲餐秋菊之英非以其有淩霜之節耶故逸人髙士往往寄託呼爲端友良有以也癸巳中秋偶見邵子僧彌墨菊一幅傳神阿堵風致宛然使范石湖見之亦當誤入七十一種譜中因書鄭所南先生題畵菊詩以顏之花開不竝百花叢獨立疎籬趨未窮寧可枝頭抱香死何曾吹落北風中題唐伯虎先生畵像嘗覽吳先民故實唐子畏先生有至性敦大節放浪不覊其寄也古人困窮於時不能自明有陽爲盲啞者矣先生侘傺無聊而僅自託於狂則猶幸耳顧當全盛之世以先生之才壹鬱而出此可悲矣不幸而更遭世之末流無所于容則其所自託又當何如哉題七姬墓誌銘七姬者元江浙行省左丞潘元紹之侍妾也至正末大兵臨境城未破七姬同日死節義著一時張羽誌其墓宋克爲書碑七姬姓程翟徐羅卞彭段皆良家子人非死之難而處死爲難非能死爲難死而能得其所爲難也賢者誠重其死匹夫慕義何處不勉焉若七姬者可謂得死所矣其行芳其志潔身殉大節一死重於泰山雖古烈士何以加諸夫觀於七姬而世之無從頌而死者皆愧矣嗟乎等死也猶不能無少遜焉而况於不死者乎臨石田四景䟦偶得石田十景臨仿其四右幅則姑蘇臺也其屋角隱隱露雉堞者桃花塢也煙柳春耕湖山平逺者長洲苑也而墨瀋山則靈巖也余但愛其畵故不復志名于幀首石田畵桃花意甚淡逺然望之蔚然如蒸紫霞余不善傅色遂以墨臨之善畵者固不求形似也論者謂石田翁畵摹古者更佳於本色其畵姑蘇臺純用子久法靈巖圖樹石仍出子久而皴斫分披則荆關也予愛而彷之姑蘇臺固佳若此幅則恨古人不見我矣米芾論董元平淡天眞品格髙妙近世無比而煙嵐出沒咸有生意溪橋漁浦洲渚掩暎一片江南也石田翁所作長洲苑圖亦然題竹石贈方南明六十竹之後凋與松栢同而其孤標風致則似過之所以古人具邁俗之韻者往往寄託流連或圖寫其形狀以自娛悅雖然此非渲繪之事也茍非其人豈易言之故畵竹非子瞻與可之流不可也倪雲林自題其畵竹云吾畵竹聊以寫我胸中逸氣耳寧辨其形與似哉嘗塗抹久之而他人視之或以爲麻或以爲蘆余亦不能必名之爲竹也余之爲此得無似之丁酉春方子南明六十初度余貧無以爲壽乃舉所畵竹石以貽之竹以似其人石以似其壽耳題楊曰補畵冊昔人善作小景其意逺其神全其景物㴱厚妙處每在筆墨之外故雖尺幅之微而能令觀者移情也近代畵家罕有得其意者頃見楊曰補先生所遺聞機上人畵冊而始歎其不可及也余於夏間亦作鄧尉十景爲萬峰和尚壽邀曰老共賞之曰老畏暑不能過從及秋而曰老逝矣余將誰與證此者余雖終身不復作畵可也題畵芝隱者采芝以療饑神仙餌芝以長生茍能療饑便能長生矣古來眞隱去仙不逺梅子眞世傳仙去陶隱居自希白日升天良有以也客笑曰畵芝者仙耶隱耶夫十九年無悶山林不謂之隱不可而當其含墨吮豪造化在手即神仙奚讓焉放筆大快并題似雪公一笑又尚論逸民無愧采薇獨商山之芝耳余隱學商山饑同孤竹時畵墨芝以寄吾意寧止離騷香草比德君子哉題山東董樵谷樵隱圖余嘗覽古人行事至於朱百年胡叟未嘗不廢書而歎也百年性至孝隱居會稽南山伐樵採箬輙置道頭爲行人取去明旦亦復如此人稍怪之久之始知是朱隱士所賣須者隨其所值畱錢取樵箬而去胡叟則嘗曳柴而行客至不輟至國朝遜國之變有東湖樵者余聞其風而悲之夫賢者處世固欲有所建明於時乃卒不免於負薪其有託而逃焉者耶亦無所可用不得已而自資耶嗟乎賢者處世而不能免於負薪其時葢可知矣而吾尤以見其人也題歸元恭小像詩三百篇聖賢發憤之所爲作也離騷者猶離憂也所謂物不得其平則鳴者非耶嗟乎歸子其遇窮矣故發爲文章託之歌辭惝怳流連淋漓感激痛哭長歌則千人自廢而今乃擁膝枯坐拊影黙黙何耶其昔人所云生非命之世耳目適宜視聽口不可以有言耶嗟乎歸子吾知之矣其自契於道而無爲不平之鳴耶故其擁膝枯坐拊影黙黙正可上繼風人而逺希正則題華藏菴迎翠閣積翠南老人隱居穹窿之皇駕塢垂三十年其髙風峻範諸方歸重眞如大梅縳茅龍山移屋不特掃跡廛市即叢林法席罕睹其面今其大弟子玉嶠禪師復開法苑於靈巖山麓搆小樓於佛宇之西偏顏之曰迎翠虚其閣以爲老人方丈以佇老人之來也當老人息影皇駕則白雲緘戸寂若無人及老人來而彈指閣開西望穹窿萬山蒼翠盡收入方丈中矣昔老子過函谷惟關尹喜知之謂紫氣東來當有眞人出關意者今老人之來亦必有光景彷彿獨玉嶠知之乎余爲書額因復識之題畵芝商山紫芝節比采薇離騷香草芳同蘭􅉅此固幽人貞士之所寄託者也余山居暇日輙喜畵芝竊自比于所南之畵蘭墨瀋所成香風可挹或謂所南畵蘭不著地而子必畵坡石或此獨遜古人夫吾之所在即乾淨土也何爲不可入畵乎吾方笑所南之隘也題俞禹聞先生畵昔有髙士㴱隱名山人目之曰丹崖百丈靑壁萬尋其人如玉維國之琛又郭翻隱君不應辟命以漁釣自娛嘗乗小舟往來吳楚間自目其舟曰此野人之船也禹聞先生偶拈小景峭壁插江扁舟水裔一人扣舷危坐逍遙容與想見其胸中浩然之致有黙契古人者故爲書前事以識之先生往矣見其遺墨如見其人於此知彭澤紘歌益增隱致耳千古通人自當以我爲知言先生復起亦不易我言也題畵芝劉彥和論離騷童蒙者拾其香草此不善言騷者也離騷其志潔其行芳􅉅蘭蘅若臭味所託耳豈童蒙之所能竊取乎癸卯仲夏余畵香草十幀以贈次其先生先生棲心塵外翛然髙寄余亦絶俗垂二十年兩人心期同此芳潔庶幾足以有之不然吾恐荃蕙之爲茅矣吾故謂彥和之不善言騷也又少室山中芝如車輪言其異也而海上仙山有芝成宮闕者漢武好神仙宮中產芝一穗九莖言其瑞也而宋祥符間有進芝萬本者若余之所畵則商山之所采掇離騷之所詠歎而已黃綺遯世無悶則采芝以療饑三閭憤世嫉俗則託香草以懷君子二者吾俱有焉癸卯秋寄跡東渚雨中作此不禁其撫卷太息也題畵余家藏石田先生夏山飛瀑圖筆墨濃潤蒼翠欲滴開卷之際覺隂森撲人葢全師董巨者也乙酉棄家入山家世收藏盡皆羽化二十年來時時追憶其意魂夢不釋癸卯夏日避跡秦餘杭山房坐看層巒積翠茂樹重隂宛然昔年巨幅也因縱筆寫此景原本董巨而仍以白石翁意出之董宗伯云如鳥雙翼吾將老焉蒼睂居士其許我否幷題似一笑題畵芝倪髙士自題畵竹云吾畵竹聊以寫吾胸中逸氣不能必名之爲竹也或以爲蘆無不可者而余畵墨芝其澤理神彩嘗欲奪眞設令商山老見之亦當誤爲採擷昔曺不興誤點墨因畵爲蠅見者以手指彈之畵苑傳爲佳話又豈倪髙士所云雖然惟髙士不求形似乃正所以神似也二者差可與吾畵芝叅觀耳又商山采芝歌云瞱瞱紫芝可以療饑千載而下想見山阿香草秀色神彩不夷凡卉而避世逸老擷之採之正如餐霞吸露吾畵芝不特爲香草寫眞亦將使千載髙風出之筆端子瞻云恕先在焉呼之或出也題畵董宗伯仿子久時兼董米墨法披圖蒼翠欲滴而余更以荆關筆意出之使子久而在亦當相視而笑也題畵芝芝草有蘭蕙之芳而又同松柏之後凋比􅕴軼之瑞而却同醴泉之無源爲可尚也隱居之暇好以煙墨傳其神采意亦有所取焉子瞻與可之寫墨竹鄭所南寫墨蘭華光老人楊補之寫墨梅將母同乎徐子墨芝當位置一席於其間矣題畵册贈張黙全黙全先生與余交最晚而相知最㴱每過余山居輙畱連不能去甲辰㴱秋約過爲十日之飲而以有洞庭之遊遂阻過從草木揺落風景蕭然撫景懷人臨風獨嘯昔人云秋冬之際殊難爲懷適先生求余作畵册因爲摹宋元名家十二小景以志我意筆精墨妙恨古人不見我先生其鑒之昔宗少文圖名山以臥遊余之作此則以懷人也畵始於九月十七日成於十月初七日云題畵芝鄭所南先生嘗自題其墨蘭云淒涼如怨望今日有遺民託興湘纍思㴱故國雖數語直與離騷同其哀怨余毎讀而悲之乙巳小春偶畵墨芝捉筆黯然以其時考之則可矣又墨成香草寄思美人聊比湘纍紉蘭纕蕙昔人題畵竹云不根而生繇墨生以目余畵芝尤當若視筆能生花而徒侈雕蟲者吾置身寧啻百尺樓上也題秋林落木圖畵家皆祖顧長康長康博學有才氣文賦諧謔爲人髙邁不覊故當時推爲三絶謂癡絶才絶畵絶也余嘗謂人必胸中自有所藴蓄而寄之於一事故能神韻超舉天機卓絶若長康者苟無其才與癡則其畵亦未必能精詣至於此也後世若郭恕先之蟬蛻生死米襄陽之遺忽形骸黃癡翁之髙寄倪迂叟之淸絶其風調爲何如者此皆有不可一世之概無所於容而一出之於畵則當其驅染煙墨圖繪山川神會所寄不僅謂之畵也昌黎論張旭草書喜怒窘窮憂悲愉佚怨恨思慕酣醉無聊不平有動於中必於草書焉發之嗟乎得之矣昔宋之亾也有遺民鄭所南先生隱居不出而嘗寫墨蘭以寄意余謂所南畵蘭一花一葉無不具風人之哀怨楚騷之離憂而可僅謂之畵耶故其畵亦超絶千古丁未秋日偶作秋林落木圖贈靈白大法師并爲題此師覽余言當爲我首肯也至搖落之感所謂秋冬之際尤難爲懷則又無俟余言矣題畵狗客曰吾聞昔賢圖畵皆所以昭勸誡而今墨客吮豪猥及狗馬何也徐子曰噫亦庸何知此之不足以備勸誡哉昔江左風流不矜節概而張彪獨徇梁室之難其畜狗亦遂徇彪以死嗟乎此墨客吮豪所以不畵黑頭寧畵黃耳也題畵芝文與可畵墨竹楊補之畵墨梅鄭所南畵墨蘭各極其致而余謂各有所寄焉與可寫其髙補之寫其逸所南寫其怨而余今畵墨芝則又何居乎客曰意將兼有之而不無所偏也因相視一笑題蓮不菴截流六吉兩大師南澗老人嗣也其叅學同時受記同日今髙隱同志結茆同室因取詩人美兄弟之義顏其所居爲蓮不菴昔大梅縳茆龍山移屋後世非不仰其髙風然豈若兩師偕隱更輝暎千古乎吾知其當來乗願必世世如南嶽靑原或且爲無著天親矣題黃孝子端木畵此黃孝子端木氏之筆也孝子萬里訪其親於滇路經龍塲驛因圖之其墨法實得北宋名家意今以歸自安法師法師即孝子之甥其孝行酷似其舅其人與其畵其地相爲輝暎尤足千古矣題沈貞居隱士遺墨後貞居先生既遭世變矢欲自全爲故國之完人而不得信其志於是隱居梅原而託興於寒梅集唐人句流連吟嘆以寫其伊悒之思焉此固靈均被髮江濱時也其一字一句自與離騷同其哀怨所謂擥幽蘭擷芳芷豈誠玩於物耶庚戍冬日賁園氏奉其先人遺墨攬涕示余余一展卷而黯然神傷者久之余固重有所悲也若賁園之克修父業不啻戴顒之似安道織簾髙風益以不墜矣題畵冊畵主南宗而氣韻本乎元大家此大略也葢畵自宋以前雖荆關名世然猶力勝於韻而筆逾於墨迨乎元季四家專主氣韻故天機神會超然形似而與造化者遊進乎技矣而後世宗之太過但驅煙墨不求法矩每多寓意於虚無縹緲而能事不臻吾恐其漸趨於弱而未免項容有墨無筆之誚也草堂主人則願氣韻本於元而筆力則進乎宋以駸駸五季及唐庶幾求古人之所未備成一家之學壬子孟夏偶作此圖意匠經營位置不茍固未敢曰筆墨兼到力韻雙舉而要其獨得恨古人之不見我至煙雲出沒林壑㴱窅溪橋漁浦水邨山落可遊可居躍然殊境雖多畵江南山水然如董元之平淡天眞自足千古勿謂吳儂僅自得於東南之聳秀也故復題幀首以博眞賞者一笑題畵武陵桃源避世之士所結想而寓言也後世遂因其說而爲之圖然何庸知天地之内必無是境乎余素懷絶塵之志有長往之思因復以意而作是圖絶不規儗前人而巖壑洞穴窈窕㴱阻試窺其中別有天地原田墟里人煙村落水閣山亭溪橋漁浦可遊可居儼然殊境而遙睇天末咫尺千里孤汀逺際輕舠出沒渺然復有江湖之心焉圖成自賞幾將長嘯入圖不啻褰裳濡足即欲强訶之曰天地之内必無是境而不可得因笑昔人言桃源而硜硜焉辨其有無仙隱之爲固也庚戍孟冬畵於澗上草堂幷題以貽吾甥商志商志其善寶之以無忘吾之素意其筆墨則兼用洪谷子關仝法此則從商志所請也題畵倪髙士畵稱逸品昔人以逸品置神品之上畵苑云縱橫習氣即黃子久未斷幽淡兩言則趙吳興猶遜雲林神會自別氣韻超舉其爲諸家所推重如此余嘗謂髙士之畵其所以不可及者不在神韻簡逺而反在筆墨精到不取於有無滅沒之間此固三百年來所未窺雖然又寧獨於此乎得其人斯得其畵此非王蒙輩所能夢見又豈今人以筆墨形似得其一木一石者可語也庚戍新秋戲爲遜如大師拈此并題以博知者一笑董宗伯云雲林畵江東以有無論淸俗則吾之必持此爲贈亦可以知遜公矣寶華大律師見月老和尚小影題語大雄設教正法流通有三藏焉一曰修多羅藏華言經藏也二曰毘尼藏華言律藏也三曰阿毘曇藏華言論藏也三藏之化導有情解粘去縳釋妄趨眞顜若畵一而其嚴重則未可同日而語矣葢修多羅藏則佛與諸菩薩等所說阿毘曇藏則賢聖僧所著惟毘尼藏則必佛口親宣而非諸大弟子所得預聞則律之獨重於三藏可知矣故後世能持佛說而悉遵其五戒十戒以至二百五十戒三百四十八戒之律豪髮無遺恨者豈非古佛現身以袪五濁而淨六塵將以其一身爲大千世界衆生之標領而拯舉世於苦海出斯人於火宅哉當吾世而有一人焉則寶華山見老大和尚是也斯世之言佛法者舉自託於拈椎𥪡拂瞬目揚睂跌蕩縱橫無非義諦遂有流爲躍冶之金墮入野狐之隊者矣是即以其拈椎䜿拂瞬目揚睂而謗法也然則見老和尚之卓然獨立於斯世又豈特爲苦海之寶筏火宅之淸涼甘露乎實今日佛法中之狂瀾一砥也辛亥之歳式瞻相好歡喜翹勤頭面頂禮而識之題畵壬子春日積雨晚晴山居逺眺煙嵐出沒林壑窅㝠躍然有得正如造物惠我三昩因竊子久雲山置之尺素亦昔人所云休文集中作賊也聊以爲知者一笑耳題畵董宗伯自題畵妍而不甜縱而有法得之令穰伯駒如鳥雙翼吾將老焉昔有兩人合作一畵者此獨一畵而兼彷兩人此老於是不凡矣壬子孟夏偶作此景筆墨亦在洪谷河陽之間因爲拈出眞賞者當爲首肯題芝蘭松柏芝蘭生於空谷不以無人而不芳松柏茂於歳寒不以經霜而改色傳曰君子愛人以德又曰君子成人之美吾願知我者之勿奪芝蘭之芳勿摧松柏之節可也故作芝蘭松柏以遺馮子題俞禹聞畵此俞禹聞先生遺墨也江山廓然一茅堂全據其勝想見其胸中浩落之致令似仲培從他處購得之屬爲題識仲培食貧自力而每見其先人手澤損衣節食以求之必得而後已昔張敷至孝録一遺扇每至感思開緘流涕垂美史牒若仲培則又過之矣題畵長松叅天山澗𥻘𥻘茅亭踞其中中有兩人披襟對話如聞松濤磵泉之聒耳隔岸一人䇿杖而行矯首相顧用意頗到此白石翁意也余家收藏白石翁眞蹟有此圖後於象山丈室復見尺幅因爲布景略用彷之昔人有善繪事者欲長嘯入圖中子瞻云恕先在焉呼之或出吾今而知非欺我矣所見皆彷荆關法皴斫紛披非舉世流傳筆墨木强者并爲識之題畵余家靈巖山北朝霏夕靄日與翠屏相對十易寒暑而相得彌㴱癸丑秋日輕隂倐霽蒼翠撲人庭戸余坐澗上草堂爲彷彿此景不覺山嵐林色入我筆端放筆大快因爲題此題畵芝芝草無根以瑞氣爲之根故其形常如雲氣輪囷離奇所謂雲體無定也而間亦有作樓臺有如人物者葢雲氣亦多樓臺人物之象也善畵芝者能得其若雲非雲輪囷離奇之致方可許之爲寫生矣己酉重陽節并題畵冊䟦語布衣張蒼睂吾老友也生平不可於世顧獨善余性頗纎嗇節衣損食惟恐不至顧獨能傾􅌩解余阨聞者異之蒼睂笑曰使人人能如徐孝廉吾又何難傾吾資乎於是知者不能測也尤嗜余筆墨得余一畵一字殘縑斷瀋無不藏弆纍纍滿篋衍而未已也余亦樂爲之盡故雖絹素塡委戸屨常滿而必揮却別請以應之癸丑夏秋之交蒼睂病甚病中無所念顧獨寓書於余索余畵冊甚急且曰吾得子畵饑爲之飽病爲之起今吾病瀕殆子奈何吝一舉筆乎余於是刻期而成而蒼睂病果愈余語蒼睂曰吾畵果如是君當以藥價歸我於是相與大笑且屬余識其後昔陳琳之檄足愈頭風桓康圖形爲人止瘧况余與蒼睂乎其得吾畵而病起無疑也後之覽余此文者可以知蒼睂矣題宛山顧氏家藏聖教序聖教序於右軍書中別具罏鞴自成一家細玩其通篇章法脉理之妙盡在行墨之間廻顧頓挫無異一時濡毫運腕而出者誠千古一奇也余嘗謂觀聖教序如焚百和之香如雜百寶以成器今人但聞妙香但見重器而不知其爲百和雜寶也宜乎今古書家之宗之如此而不斷本尤爲收藏家所重此帖故佳識者目能鑒別余故不論而論書法云題畵蕉蕉產南州其吐赤花者非常種也其葉差小而紋細俗呼爲美人蕉風前搖曳綽有姿致其花亦穠麗艶冶非凡花可比吾又聞中庭而植之或置之室正中則其花亭亭直上若稍偏於東則其頴必西向偏於他處亦然花既負正色而性復中立不移此固得天地之正氣以生者也朱子子禧得昔人畵蕉一幅意甚珍之人之嗜好必本於性髙人介士之有託於芝蘭者皆然也則朱子之珍此幅也非有契於蕉耶題畵關家山水其筆墨兼到風骨自殊後賢罕及元季四家無不從董巨荆關來雖氣韻逺過而風骨仍須推前人也庚申孟春偶得繭𥿄甚佳興不可遏因彷關同筆意作重巖逺靄圖洪谷子云春則逺水拖藍遙山映碧夏則林木蔽天倚雲瀑布近水幽亭然則余此圖葢春夏之交也圖成自賞復題四絶句過庭所謂𥿄墨相發一合也偶然欲書一合也余於此圖則兼有此二者矣并題以質之知者題顧尊實收藏黃孝子眞蹟余題黃孝子端木氏畵三幀矣一爲浮屠自安師所藏一爲李于輹氏所藏此則顧頭陀尊實所藏也法書名畵託於筆墨楮素本自同於煙雲之倐忽蜉蝣之旦暮而流傳人間語於不朽固有物以行之有物以持之也故有穹碑鉅勒磨滅無餘斷𥿄殘縑久而益顯嗟乎是豈在筆墨楮素妍媸工拙間耶端木獨行卓絶自擅千古况其所圖又皆足存宜乎知者之爭購之也此幀則山崖詭奇樹石突兀而懸泉千尺挾風雨之勢以俱來若聞其轟豗喧激之聲者亦奇矣視自安于輹所藏較勝顧頭陀其善藏之題畵郭淳夫云東南之山多奇秀天地非爲東南私也東南地下水歸以漱濯開露之故其山多奇峰峭壁斗插霄漢而亦多曲巘廻巒盤礴水面米襄陽云董元平淡天眞漸近自然溪橋漁浦洲渚掩映一片江南也又云人稱江南葢自顧愷之以來直至南唐董元巨然皆一體不移至關同則云饒有關河之勢而少秀氣昔人之論山水論畵法乃爾爾余平居作畵好彷荆關董巨然學荆關者惟師其筆法風骨耳至於分布位置命意取景則居然江南山水也乙卯夏閏五月酷暑閉戸謝客坐澗上草堂覓長幅作橫卷經營點染寓意幽勝山巒層複林木蒼鬱幽奥處寔欲生雲濃翠中若可避暑而慿眺則有平逺之山討尋則多崎仄之徑昔人所云可遊可居或庶幾焉圖成自賞因書所見以遺好事者并博一笑云題芝蘭卷園綺采芝於商顏靈均搴蘭於澧浦其徘徊容與偃仰歌吟於髙山㴱谷逺渚芳洲之間擷芳潔而寫離憂爲何如也余避世三十年而足不踰戸者又十五載矣兀然一室俯仰千秋偶有所觸輙寫芝蘭以寄吾意意之所得自謂不讓古人則是吾土室十笏之地而商顏之髙山㴱谷沅湘之逺渚芳洲無不在是矣墨瀋淋漓香風披拂以兹尚友寧曰臥遊所謂恕先在焉呼之或出也吾以質之知者題集古錄唐昭懿公主碑䟦尾自漢以後天子之女稱公主謂天子不自主婚而以公主之故也然所謂某國公主者公主其定稱某國其封號也歐陽公乃以某國公主之爲說謂差不失公主之義則誤甚矣此不過如某國夫人某郡夫人之稱耳若果如歐陽公之說則某國長公主某國大長公主則又何以解耶此最淺而易見者而以歐陽公尚爾甚矣著書立說之難也題碓菴和尚效寒山詩九方臯之相馬也若滅若没若存若亾得其天機斯得眞馬矣嗟乎彼天下俊物便不可以形似求之况形而上者乎匠人胡寛營構新豐門閭巷術如一徙者争歸其家至於鷄犬亦各識其處然不可即謂之豐優塡國王思慕於佛募神工以牛頭旃檀刻佛像豪髪無遺後佛再至像遂出迎然不可即謂之佛徙效之於形似也若於道也得其天機如印印空規矩縱橫其揆則一不然轍跡可循去之彌逺矣竺典云菩薩聲聞不能作佛語亦在其所得耳豈效之而能然乎雖然吾聞之詩曰惟其有之是以似之得之斯效之矣易曰擬議以成其變化效之斯得之矣題畵作墨竹如作草書貴流麗作飛白雙鈎竹如作小篆貴遒勁縝密老杜句書貴瘦硬能通神又云鉅劒長㦸森相向吾當移以目此也辛酉夏日放筆怏甚并題自賞作寒林須筆墨間自具蕭森淒緊之意始得昔人所云見北風圖覺涼者是也昌黎句森森萬木夜僵立寒氣屓奰頑無風此圖有焉山水澄靜林巒曠遠扁舟獨釣眞有遺世獨立之意吾意其人當是子陵志和之流也俯卷佇想者久之題彷倪雲林畵畵至元季專主氣韻未免墨過乎筆此大癡仲圭猶然獨雲林畵雖以天眞幽淡爲宗然意匠殫精筆墨兼到不多取意於煙雲縹緲之間吾故謂雲林不可及處不獨在超然淡逺而反在神力精到此又三百年來畵苑之所未窺也余向見友人收藏雲林眞蹟有溪山勝概圖爲臨此景自謂神似當不作石田翁彷雲林爲趙同魯所訶也題畵冊一喬林叅天幽崖出水連峰曲磵囘合縈紆而山家村落叅差掩暎此固人間之殊境而畵境之所必取也箇中擅勝尤稱北苑北苑於骨力氣韻兩者兼長故曲臻其妙允稱絶詣耳二作畵自必胸懷浩然饒有古人風致淡蕩天眞觸處而出萬頃澄波一綸垂釣拊景遐思悠然自逺其子陵玄眞之流歟昔時見巨然筆因想見其爲人久而不能忘也三山色滿空濛漁村隔煙水疎柳垂古岸網集澄潭裏此余向時題惠崇畵句也今即以題此漁汀鴈渚蓼雨蘋風筆墨之間呼之或出恨古人不見我非虚語也吾當起古人而問之四茅亭踞江臯喬松俯其上遙望山翠寒近聽松風響波光渺無涯煙雲自來往披襟坐此中忘言足幽賞余向時有此詩即寫其意詩則似摩詰之有畵而畵則筆尖墨淡純用關家山水法也五畵推南宗以其丰致韶令無傖楚面目也趙大年宗王右丞名貴之氣溢出縑素命意用筆不落凡徑眞神仙中人也若木末孤亭石梁斜度橫波逺岫一片江南固不獨京雒間景耳吾以質之知者六竹林茅屋逺山古樹小橋流水廻繞吾廬見者翛然有塵外之想嘗有句云竹林隔世塵泉鳴山愈靜閒雲滿庭户逺色來諸嶺可以目之矣而畵則許道寧意也七石壁排空懸泉萬仞命意固雄而煙水淪漣山根出沒扁舟容與與波上下令人一見復有江湖浩渺之思未當以筆墨觀也松雪嘗作此景其追寫前人於苕霅間耶八髙峰突兀下炤淸漪古樹扶疎恰臨野屋中有人焉拊景嘯傲跋脚北窓非羲皇上人耶可以逺想可以忘世非范中立不能也文潞公嘗謂寛於山水爲寫生手每覽其畵而益信斯言九北宋以前畵尚骨力元季四家畵尚氣韻故多寓意於煙雲有無之間而力遜於前矣惟倪髙士則筆力精到專主荆關有非一時大家所能及者不特以無筆墨蹊徑而兼幽淡兩言也可與知者道耳當證之千古十山有三逺而㴱逺爲尤難然不有髙逺則㴱逺之意不出古來大家極盡能事固未易言即能擅勝而就其所作亦累十而一見耳昔見黃子久春山疊翠圖㴱逺髙逺兼而有之試彷其意茍有知者當相視而笑也十一昔人論畵或有筆無墨或有墨無筆二者未能兼長即擅名藝苑未稱絶詣若梅花道人則兩無憾焉而墨法尤勝然未易幾茍風致未逮古人而妄於筆墨求之則去之彌逺古人復起不易吾言十二黃鶴山樵有萬松書屋圖余向時見之今猶能彷彿其意然鉅幅也今縑素未盈尺而千巖萬壑飛泉懸瀑石梁鳥道孤亭曲室無所不有而位置悠然對之如聞松濤如聽泉響吾不欲僅以前身畵師如摩詰自謂也題二誌二傳余不文謬爲海内所知猥以文事見屬碑版傳誌執簡受役已有年所然實不敢泛應一字必前賢景行懿親密友吾心所灼知者然後應之故凡吾所撰述多偉人也而其中尤俊偉魁傑稱不世出者凡四人焉此四君子者出處不齊名位迥異而其立意較然不欺其志足以凌轢千載興起百世則無不同吾幸得操觚以爲之誌與傳故合四篇爲一書以貽吾朱子致一吾知致一之善藏之也嗟乎碑版之文不得已而後應應者嘗什一辭者嘗什九然積而累之亦不一矣雖不敢蹈昌黎之諛或亦未免中郎之愧若四君子則惟恐吾文之不足以張之豈謂有一言之溢乎四君子者宮保尚書袁安節公狀元宰輔文文肅公貢士朱先生文學沈徵君也居易堂集卷之十一終
