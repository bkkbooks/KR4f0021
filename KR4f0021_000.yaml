body:
  text: 長洲徐枋俟齋著門人潘耒編校孫男徐垕繕録卷之一書答蘇松兵備王之晉書答長洲縣知縣田本沛書答吳縣知縣汪爚南書答陳給諫臥子先生書致楊解元維斗先生書答楊解元維斗先生書與胡其章給諫書與欽遵一書答吳憲副源長先生書與徐禎啓書答房師姜弱蓀先生書與武部李霜囘使君書與闔族書與楊明逺書與楊明逺書與葛瑞五書與潘生次耕書與時次其書答惠生而行書卷之二書與葛瑞五書答宫保張大司農書答靈巖老和尚書與堯峰月涵和尚書與天善開士書答惲孫菴書答友人書與朱致一書答退翁老和尚書與堯峰月涵和尚書與寶安去息和尚書與葛瑞五書與靈巖曇應和尚書與王雙白書與王生書與朱致一書卷之三書致巢孝廉端明書答笻公書與葛瑞五書與友人書與宋生大樵書與休寧汪文儀書與呉子佩逺書與馮生書與王生書與吳瓶菴書與仲甥吳濩書答業師沈伯敘先生書答寜都魏凝叔書致闔族書與葛瑞五朱致一書與姜奉世書與曾靑藜書與楊震百書卷之四書誡子書尺牘答業師鄭士敬先生答友人與袁公白先生與葛瑞五致靈巖老和尚與友人與古民上人答瑞五又答周玉鳬儀部與古民答吳子偑逺又答老和尚柬瑞五致華山和尚蘗翁與支山和尚與笻在答笻公又又與王雙白致老和尚柬歸玄恭與惠而行與愍莖上人與雪公答玄恭與葛瑞五與二弟貫時與楊明逺與葛瑞五答楊明逺與周敉寧卷之五序通鑑紀事類聚序建元同文録序讀史稗語序讀史雜鈔序管見序鄭業師雲遊詩序靈巖樹泉集序周玉鳬儀部讀史詩序醫家烱戒序欽子逺猷畫解序靈巖報慈圖序故侍御秦大音先生遺筆序休寧何氏世譜序前星野語序惠而行詩草序姜如農給諫畫像序宛山顧氏家乗序鳯棲李吳氏家乗序卷之六序贈業師鄭士敬先生序贈兜菴序送去息和尚住夫椒祥苻寺序贈李秋孫序送磷雪上人行脚序贈新安汪惟晦隱君序吳子自號瓶菴序外祖母王太夫人九十伯舅吳明初先生七十壽序葉太師母八十壽序楊隱君曰補六十壽序萬峰剖石和尚六十壽序吳母徐太夫人八十壽序朱師母六十壽序卷之七序布衣張蒼睂六十壽序靈巖老和尚六十壽序五牧劭圓和尚六十壽序髙母馬太夫人七十壽序張徴君德仲先生七十壽序鄭老師桐菴先生七十壽序李侍御灌谿先生七十壽序潘母吳太君五十壽序嘉禾處士徐九巖五十壽序楊處士明逺六十壽序法林菴凌雪禪師四十壽序從嫂蔡太君七十壽序玄墓知浴禪師募齋序法林菴募造大悲香像序僧性行募建佛殿序白龍寺募鑿池救田序法林禪士募衣鉢序法林菴募製莊嚴序卷之八記吳氏鄧尉山居記芥舟飲酒記病中度歲記再生記箬廬記顧氏松風寢記甲寅重九登髙記鄧尉十景記虎山橋司徒廟銅坑銅井石壁槎山七十二峰閣西灣磡上玄墓鄧尉畫冊復還記思樂亭記卷之九論封建論上封建論下井田論吳王闔廬論范蠡論俠士論刺客論荆軻論上荆軻論下師說上師說下寒花説貧病說宋生名字説恒軒説故給諫東萊姜公埰私謚貞毅先生議春王正月辯卷之十書後書平凖書後偶書侯嬴事後書李斯傳後書諸葛武侯傳後書張􅌘事後書傅伏事後書沈客卿施文慶事後書五王反正中宗後書韓愈對禹問後書昌黎潮州謝表後書柳宗元封建論後書蘇轍燕論後書蘇轍三國論後書先文靖公墨刻後贈靈巖老和尚書璜溪陳烈婦楊氏行狀後書王咸中乞臨曺娥碑後書周忠介公墨刻後書殷汝劼先生私謚議後書鐔津集評讓篇後書周氏李孝婦卷後書石刻姜如須遺蹟後書鷓鴣賦圖卷後書李氏收藏黃孝子畫蹟後書三聖圖後書芸齋周先生復仇血疏後敬書先六世祖大中丞公貴人歎後卷之十一題䟦題倪文正公尺牘後偶題友人畫梅題邵僧彌墨菊題唐伯虎先生畫像題七姬墓誌銘臨石田四景䟦題竹石贈方南明六十題楊曰補畫冊題畫芝又題山東董樵谷樵隱圖題歸元恭小像題華藏菴迎翠圖題畫芝題俞禹聞先生畫題畫芝又題畫題畫芝又題畫題畫芝題畫冊贈張默全題畫芝又題秋林落木圖題畫狗題畫芝題蓮不菴題黃孝子端木畫題沈貞隱士遺墨後題畫冊題畫題畫寶華大律師見月老和尚小影題語題畫題畫題俞禹聞畫題芝蘭松栢題畫題畫題畫芝畫冊䟦語題宛山顧氏家藏聖教序題畫蕉題書題顧尊實收藏黃孝子眞蹟題畫題芝蘭卷題集古録唐昭懿公主碑䟦尾題碓菴和尚效寒山詩題畫題彷倪雲林畫題畫冊十二則題二誌二傳卷之十二傳朱先生傳沈徴君傳楊伯雨傳楊無補傳姜如須傳張英甫傳葛瑞五傳貞孝聞氏傳周氏全孝傳汪節婦黃碩人傳卷之十三誌銘明故正治上卿資政大夫太子少保南京吏部尚書贈太子太保謚安節袁公墓誌銘明故資治尹嘉議大夫禮部右侍郎兼東閣大學士贈禮部左侍郎謚文肅文公墓誌銘明故文林郎四川道監察御史吳公墓誌銘奉直大夫吏部驗封司員外郎華公暨元配談宜人合葬墓誌銘奉政大夫分廵登萊道按察司僉事沈公墓誌銘卷之十四誌銘處士次其時先生暨元配徐孺人合葬墓誌銘朱處士繼配周碩人墓誌銘王節婦黃碩人墓誌銘處士獻其胡君墓誌銘吳文學徐碩人合葬墓誌銘吳子墓誌銘吳子元配徐碩人墓誌銘塔銘報國大律師茂林祗和尚暨戒幢朂律師同律師三代塔銘穹窿擴南宏大師塔銘卷之十五塔銘獅林廣運大師智公塔銘五牧德慶琚和尚塔銘法林水觀禪師航公塔銘再生道人塔銘頥浩子山和尚壽塔銘碑銘萬峰聖恩禪寺重建大法堂碑南嶽儲和尚報慈室碑法林菴逈塵淨公道行碑雜文書成告家廟文書故仁壽令殉節顧公逸事告家廟文告張碩人文卷之十六賦主藥神賦鷓鴣賦張公賦卷之十七古體詩送逺詩十一首别詩六首懷人詩九首靈巖逺人月老髯叟致一聞公瑞五明逺玄坦五君子哀詩故給諫陳公子龍故文學葉先生襄故隱君楊叟補故吏部姜君垓故處士鄭君之洪題畫芝贈方南明題落木菴贈徐元歎箬廬詩贈趙封初贈五牧劭和尚省墓詩長兒孟然三十貽以畫幅書此朂之題孤楫江圖送逺詩三十韻壽宗子瞻明六十初度得五百字題硃硯送别支山和尚題畫芝五首題畫木瓜題畫襍詠四首春夏襍感壽楊震百五十贈西山橘香同和尚時五十初度簡葛瑞五鄧尉山多桂家舅吳明初先生山居之右尤盛食蟹歌鳯凰行長歌壽黃萊民六十采芝歌七十二潭歌贈同年陳言夏再訂入山題石田墨梅題王勤中花蝶圖病中放歌懷舊篇長句一千四百字卷之十八今體詩晤含光法師過宗子瞻明一雲山居覺螺菴同姜如須分韻二首集舅氏吳明初先生鄧尉山齋試夾石泉喜見季甥即事風雨中素菴見過竟日憶别季甥有懷顧爾音招過得閒亭吃楊梅畱飲竟日即事梁谿張方來賣藥山中山居抱病張方來以藥起之復見貽長生酒食園笳經月雨濕友人見貽名香喜而有作過明上人華藏菴送笻在師越游三首笻公爲余作澗上草堂賦梵林師賦詩見訪索和依韻酬之贈别友人李君朱致一過山齋依韻答贈同胡其章給諫鄧尉看梅謁剖老和尚歩韻春日寄居僧寮同陳言夏集徐次洲山樓看梅分得絲字三首五月五日讌樂志堂卜居西堰所思舟行堰中即事有客悵望三首塞上二首湖中山寺壽周茂蘆六十次韻題王氏鄧尉山居贈張默全次韻贈笻公壽家舅氏五十初度重過治平寺次先中丞公原韻壽華山蘗翁和尚七十初度四十韻贈葛瑞五五十初度兼稱雙壽三十韻奉贈李侍御灌溪先生五十韻奉贈周儀部玉鳬先生五十韻懐友二首題畫老人騎牛題畫即事二首題畫題畫八首題畫卷贈碓菴和尚繼席靈巖三首贈曇應和尚住古堯峰二首題畫松二首題畫四首題畫題畫二首題畫卷之十九辭姜吏部如須哀辭退翁老人南嶽和尚哀辭李侍御灌谿先生哀辭老友蒼睂張君哀辭贊莊子贊漢壽亭侯贊觀音大士十贊移居十景圖贊覇陵山上黨方城桐廬衡山㑹稽南山積金澗北渚箕山岐亭宗子烱太君王氏遺像贊鄭靑山泛舟小像贊楊曰補小像贊吳佩逺琴書小像贊獅林廣運大師遺像贊故宫保張大司農遺像贊吳江周長生畫像贊張蒼睂畫像贊徐次洲畫像贊薛逸菴畫像贊題瞻明宗子居士像贊業師鄭桐菴先生畫像贊故贈大理安甫陸公遺像贊元鎭東儒學提舉朱澤民先生鏡容贊卷之二十頌蘭白華頌銘書函銘竹杖銘雜著討蟣蝨檄劾鼠文絡野篇醉言難客書示馬生試墨目疾後五戒論文雜語論文雜語論詩雜語居易堂集目録終
