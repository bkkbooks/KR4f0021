front:
  text: 序聖人立教首言文行而文必先乎行者以行必於文焉見之也何也六經聖人之文也然舍六經則無以見聖人之道下及諸子百家千岐萬彚爲文不同然於以抒其蓄積槩其生平則無不同所以有聖人賢人即有聖人賢人之文有忠臣孝子即有忠臣孝子之文誠積於中而形於言是有所不得已者如唐虞之所吁俞伊周之所訓誥鄒魯洙泗之所稱說以至伯夷采薇之歌屈原懷沙之篇伯奇履霜之操竝懸日月同敝天壤使千古而下讀其書如見其人如聞其聲爲之或泣或歌流連而不能已是皆文之用也嗚呼難言之矣非身之所履心之所之畢世不移之死靡二其誠可以貫金石泣鬼神則未可以語於此也余不佞痛遭家國之變時年二十四先學士文靖公死節報國余誓必從死死志未遂苟存於時於是束身土室與世訣絶時即碌碌苟安無所齟齬而傷心之悲終天之痛慘灼酷烈鮮民之生不如死之久矣而况世變至今四十年中崩天之敵稽天之波彌天之網靡所不加靡所不遘而再益之以饑寒之凜慄風雨之漂搖世事之詿誤骨肉之崎嶇靡所不更靡所不極嗚呼亦可痛矣余不佞眞千古之窮人而無告者也而爲時之久已四十年而吾之心未嘗有豪釐之移未嘗有須臾之間於是吾之心亦遂得灼然爲海内所諒而此四十年中前二十年不入城市後二十年不出户庭故凡交游之往復故舊之懷思風景之流連今昔之感傷陵谷之憑弔以至一話一言之所及一思一慮之所之非筆之於書則無以逹之故危苦悲哀之辭悒鬱侘傺之思質言而長言者不覺層見而疊出嗚呼余之不文文固不足以傳而吾之心則可以俯仰千百世而無愧故歷四十年之所積不可以泯也於是别其體類定其義例録成若干卷名之曰俟齋文集後之覽者見吾之文因以見吾之心之所存乎嗚呼有聖人賢人即有聖人賢人居易堂集目録
