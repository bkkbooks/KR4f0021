front:
  text: 居易堂集卷十八
  hash: sha256:a3ab9ee3ed31d853b2c65e6ec221ccd3fba8f2a2a116371a521792410a9fbb43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0021_SBCK_018-1a}
body:
  text: 今體詩晤含光法師支公揮麈地法席據髙岑世界悲陵谷精藍無古今論詩一夜月聽講十年心嗣響真無愧松枝𥪡義㴱過宗子瞻明一雲山居避世稱同志隱居真亢宗西山薇蕨在北谷水雲封好客貧無減謀生老更慵多君髙世意越陌喜相從去螺菴同姜如須分韻零落寒山路香林帶晚露藤垂翳日蔓菊吐故叢花燈火山窓暗星河石竇斜踟蹰頻感舊中夜幾長嗟二老屋依巖底蓬門接水隈諸天花作雨五夜澗爲雷乞飯舂新榖攢睂憶舊醅流光老我急節序巧相催集舅氏吳明初先生鄧尉山齋令節星霜改荒村物色移春溪平野濶山月出林遲夜飲家醅盡風吹鄰笛悲梅花依舊白囘首一淒其試夾石泉山根誰劈劃脉脉細泉翻决溜寒濤出淸泠太古存已知同法雨渾欲注芳尊尚有罌瓢在提攜過野園喜見季甥空山多寂寞喜爾獨相尋故墅三年别孤舟千里心煙塵迷海嶠風雨暗商參我亦無家者相看淚不禁即事何處欵柴荆空山暑氣清關河遊子意風雨渭陽情宿草悲慈母髙文啓後生三年重到此喜極淚先傾風雨中素菴見過竟日風雨枉相存來過澗上村亂雲連客座㴱竹暗柴門笑語書千帙詩篇酒一尊言歸將日暮山路巴黃昏憶别季甥有懷會面無多日覊棲我獨愁關河雙别淚風雨一歸舟啼鳥江村暮浮雲海國秋傷心渺天末那復更登樓顧爾音招過得閒亭吃楊梅畱飲竟日即事迎門待遊屐客到具盤餐丹果當窗落靑山入户看桮浮竹葉暖雲度石溪寒幽興晚來劇餘酣坐藥䦨梁谿張方來賣藥山中吾聞張處士遯跡到東林白社空王業丹砂出世心風塵全藥裹杖屨愜雲岑一入千峰裏孤踪不可尋山居抱病張方來以藥起之復見貽長生酒渇疾經時劇雲林獨臥遊掩扉三徑雨伏枕五湖秋病減黃精熟愁消緑醑浮長房如可教願得更淹畱食園茄園蔬生自好微物亦盤飱錦里芋相似靑門瓜共繁嘗新霑夏寔垂露摘秋原遙憶霜風裏根株何處存經月雨濕友人見遺名香喜而有作嘉惠知君意薰爐然自今喜同鷄舌貴寧逐麝香尋一氣消殘暑終朝清此心野人愧荀令也復滿衣襟過明初上人華藏菴初公開覺地門徑入雲蘿暑氣香林隔涼風竹院多禪燈晝滿月蓮漏夜舒荷白社招尋遍明朝許更過送笻在師越遊三首笻公爲余作澗上草堂賦瓢笠容君老江山未定居行吟過越嶠作賦愛吾廬澗上鶯花寂天涯鴈侣疎君行吾悵望且復寄雙魚其二花雨淹遊屐樵風送客舟江山猶故國耆舊盡荒丘一往滄洲逺千春杜宇愁此行非避地乗興獨相求其三茫然爲送别聊復數歸期山館松花落江村榖雨時採茶畱供客待爾共烹葵莫忘春㴱約浮沉歎路岐梵林師賦詩見訪索和依韻酬之相逢歎遲暮詩句幸先聞浮渡來髙躅食薇思逸民山林同至性魚鳥共情親夙契敦人外猶能話苦辛贈别友人李君愁如春草不須刪把酒寧能一破顔坐對鬢絲徒種種悲看燭淚亦澘澘真人佩綬貽中水中聖風流讓景山燈火寒江共岑寂布帆應怯渡潺湲朱致一過山齋依韻答贈五載漂搖笠澤隂偏因歌笑每霑襟遺民獨濺天南淚歸鴈猶傳塞北音目極江湖淪故國意存松石賞鳴琴艱難契濶人間世未許閒情别討尋同胡其章給諫鄧尉看梅謁剖老和尚歩韻斷岸懸崖濟上宗却于語黙見針鋒千年津路原無筏萬樹花光何處鐘自有玄言袪五濁寧須神島問三峰澄湖極目無多子入鉢終能馴老龍春日寄居僧寮此身漂泊竟如何一歳春光又半過滿地煙蕪寒食近孤村風雨落花多賦詩茅屋添新淚回首溪堂廢浩歌最是無家成久住蒼茫何處慰蹉跎同陳言夏集徐次洲山樓看梅分得絲字故人遙集五湖湄且喜山中共酒巵垂柳岸廻停去楫落花風送罥遊絲五噫髙調誰能和百罰㴱桮未許辭最是登臨重惆悵樓頭新月復如眉二終歳幽愁兩鬢絲驚心物候向南枝花間東閣詩成早夢裏羅浮月落遲徐邈嘗矝中聖醉陳遵豈爲尚書期無家我已久如客飲罷蒼茫何所之三諸君詩酒重相期光景年年入夢思山色迎人斜炤裏春風送客落花時次公醒去狂尤劇孺子歸來意獨悲㴱掩柴門且髙臥不堪舉目淚如絲五月五日讌樂志堂綺席芳尊同燕喜百年此日黯銷魂酒傾蒲葉知佳節風動橊花憶故園江上齊歌哀郢曲山中猶有武陵源愁看景物判酩酊身世蒼茫那可論卜居昔人百萬曾買鄰余何得居清澗濱鄧尉祠前看村社西堰水畔尋漁人三閭大夫獨哀郢魯連先生寧帝秦乾坤澒洞不可住空山聊復容吾身西堰風景百年歸勝地淹畱一向到花源橋連浦港蒹葭水山入田原烟雨村亦有疎鐘來翠靄每看孤月動黃昏此時身世雙愁絶且共漁樵盡酒尊所思十年兩鬢霜華催獨客懷人對酒桮東海尚畱一老在南溟不見雙魚來天寒蕭寺共覉旅目斷中原半草萊落日憑髙千里望傷心更復一登臺舟行堰中即事囘首春遊今再過江湖秋水又生波蒹葭岸岸風濤濶楊柳枝枝煙雨多樓閣已看銜暮景汀洲何處起漁歌此身直付輕鷗外一棹滄浪奈若何有客有客前從江上來乗風䟦浪去旋廻不隨漁父理煙艇且動星文傍釣臺白水幾時懸日月滄𬈑掲地開風雷秋髙金行氣肅殺掃盡天宇無氛埃悵望三首中散平生多懶拙虞卿此日獨窮愁百年身世雙蓬鬢萬里江關一釣舟未有眞人來白水敢言吾道付滄洲乗槎已分無消息又復驚心八月秋其二西來山色滿晴空東望重溟霧靄濛碧水天邊低落日白蘋江上動秋風垂綸不爲鱸魚美書帛難慿鴈羽通人事年年多錯迕誰云吾道已終窮其三新秋疎雨晚蕭蕭歳月江河共寂寥悵望天南多戰伐悲歌日暮起漁樵幾年未見參旗舉入曉猶看斗柄招已罷東風乗汐汛那知吳市有吹簫塞上二首黃河萬里繞龍沙百二秦關道路賖夜入靑山霜似月寒生白草雪爲花畱連閨怨聞羌笛淒斷邊聲雜暮笳已分瓜時仍絶域男兒歳歳逐輕車其二五更乗障戍樓寒月傍關山不忍看刁斗嚴城星漢墮羽書絶幕角聲殘塞門久斷雲中鴈秦地空孤鏡裏鸞少壯從軍今白首幾時瀚海靖波瀾湖中山寺蒼茫獨上泛湖船每到登臨意惘然殿閣秋㴱涼似水山林晝永靜如年僧同蓮社招元亮我愧潮州遇大顛來日山幽攀桂樹又看萸菊藥闌前壽周茂蘆六十玉函寶笈著江東碧藕氷桃頌禱中懸榻曾聞徐孺共安車喜與子陵同松筠晚歳淩霜色花藥長春摘露叢誰似鹿門偕隱者君家不愧古人風次韻題王氏鄧尉山居山市喧卑仍避俗草堂安隱寄幽思門前種竹縁苔徑檻外飛花點硯池南垞遊將裴廸共東皐醉與仲長期春來好景知無限萬樹梅花壓短籬贈張黙全泉石煙霞引興長知君隨意度年芳祗林長者黃金地藥市壺公白玉堂靈草已能扶善病玄言却喜對淸狂空山寂寂經過少爲探寒梅共采香次韻贈笻公濤江一去意翛然作賦名山去復旋瓢笠經行看鴈侶關河寥落有魚箋談天玉麈原無語擲地金聲不離禪今日山靈知俗甚巢由也要買山錢壽家舅氏五十初度時值中秋隱几蕭然秋水篇南山避世種芝田霞觴浮白三辭祝桂樹花黃八月天髯自逸羣垂往䇿睂能徴壽喜齊年鹿門在昔稱耆舊偕隱誰云讓昔賢重過治平寺次先中丞公原韻一葉蒼茫泛五湖登臨勝境屬浮圖靑山白社人空老古寺閒房興不孤極目林巒隨杖屨會心煙水暎菰蒲千秋手澤重瞻對丈室居然冠我吳寺有先六世祖大中丞公所題詩及先學士文靖公所築書屋故云壽華山蘗翁和尚七十初度四十韻浩刦真乗際千秋象教辰現身知舊德夙世自能仁蓽露開江漢山靈降甫申家聲長赫奕國歩昔邅迍折檻容明主持鈞憶老臣憂天先已墜覺地豈重淪幸有身心在無忘塵刹尊埋名誰與耦出世復無倫北斗推崇望南星見老人名山華藏界碩果法王身杯渡原來楚蓮邦亦避秦逃禪同釣渭安隱是畊莘舉目山河異揚睂法化新百城通問訊萬象屬陶甄境外安心地豪端轉法輪已知身是幻不與世爲鄰獨立危峰頂周行法海津雨花嘗繞座香草自重茵樓閣層層出巖巒故故神峰顚畱鳥篆松老盡龍鱗翠巘題名遍丹梯寫象眞喬柯風謖謖曲水磵𥻘𥻘講席言詮盡齋厨草木珍苦心霑露蘂直節傲霜筠雲懶渾歸岫風髙廻絶塵靑蓮爲淨域白社愛遺民耆舊風襟逺師資雅範親小生慚孔李先子辱雷陳降分過從數忘年簡札頻草堂資待遺簞食惠無貧東澗欣遺老西華憫負薪三登情繾綣萬仞壁嶙峋佛藏瞻揮麈天章歎翦鶉金箆時刮眼玉椀共沾巾景物橫今古滄桑近暮辰行行慿楖㯨采采問葵蓴杖倚鳩還拙車安鹿易馴過溪寧獨笑浮笠會從嗔西竺傳優鉢南華說大椿如來無量壽奚止八千春贈葛瑞五五十初度兼稱雙壽三十韻勾漏仙源逺綏山道系傳世家瞻斗岱奕葉富丹鉛晉宋光朝著荆吳艶璧聯草堂聞逸老金匱秘鴻篇玄業君能受丹砂子豈捐貞姿同玉雪雅量謝韋絃典冊髙班馬幽微探易玄棲真欣物外避世得人先元甫辭交辟仙公偶應縁詞華才衮衮經術腹便便寡過知蘧瑗爲儒比服䖍有時歌一鳳空復集三鱣平子愁難減維摩病可痊山叢招隱桂社結逺公蓮龍杖投陂去鶴書赴隴還酒辭金谷飲醉愛竹林眠山簡頻招手洪厓笑拍肩幽居遵澗壑處士動星躔薇蕨山堪擷蓴菰水可搴賃舂鶴市隱採藥鹿門仙偕老詩稱矣刑于德有焉鮑姑塵外侶萊婦室中賢㧞宅玉峰畔移家金澗邊婆娑私歳月吐納共雲煙夙世羅浮客前身香阜禪千山花覆雪萬壑水鳴絃茅屋賢人聚柴門逸興偏擁書開萬卷學易絶三編巨擘推吾黨靈椿况大年慚余隨仲季賴子得陶甄奉贈李侍御灌溪先生五十韻一代龍門峻千秋虎觀尊虞廷觀祖德周史啟仙源自是風流逺應知奕葉蕃天河羅象緯宿海出崑崙國器瑚璉重家聲琬琰存韋平勲繼美卿長德彌敦碧漢髙翔鳳滄𬈑逺化鯤先公推畏友時論屬元昆惠化霑遐甸淸風滿故園素絲終不染朱紱若爲煩去莠炎天肅嘘枯寒谷暄霜威驚破柱風節動臨軒宦寺辭休沐循良賴霽温許身同稷契致養比參騫出處皆爲政升沉總勿諼方期夷國歩誰謂塞天閽九㝢風塵斥三辰歳月昏廻天矝獨力填海豈重冤盲雨天心泣狂颷海氣吞秉威追細柳長嘯想劉琨既已雙丸墮終愁四澨飜一軍皆化鶴萬里盡啼猿夢鹿應維谷猶龍豈觸藩斯時捐紱冕吾道託丘樊巖築兼磻釣顔坏更段垣爲農自錦里學圃亦靑門蠲忿難慿酒忘憂空樹萱煙雲看變幻華蕚任偏反杜宇終啼血湘筠有淚痕攬茹還掩涕采蕨詎加飱風景新亭異鶯花故國繁木門長謝衛土室竟同袁商調哀金石秦聲聒缶盆杞天悲隕墜漢臘淚潺湲帝醉愁難問陸沉寧可援朔風占夜氣東望起朝暾天上憐窮髪人間愧盡髠吳山思故老湘水弔忠魂感舊傷鄰笛懷人吹伯塤澘澘沾宿草黯黯泣荒原但聽悲風咽寧聞相杵喧死生情繾綣書問意便蕃愛我來蓬徑忘形臥石根空山嘗枉駕永夜更開樽古道今無匹玄言誰與掄羣鷄容立鶴腐䑕豈棲鵷紫氣瞻神瑞白衣酬國恩架開三萬卷書著五千言舉爵推忠孝傳經重討論孤懷懸日月髙義動乾坤奉贈周儀部玉鳬先生五十韻跡隱東岡畔人稱南國贒異才誠不世大雅振當年風調江山助文章日月懸詞塲推哲匠禁苑著先鞭掞藻彤庭麗含香粉署妍雲衢開逸驥天路渺飛鳶萬里風雲合千秋雅頌傳職司叅典禮郎署應星躔鶴立矝風度鵷行羡璧聯補天瞻鳳德華國賴鴻篇榮問傾前輩名儒自列仙天心方晦塞國歩忽迍邅魏闕煙塵裏周京禾黍邊龍髯悲墮地鵬翼歛垂天白首松筠矢紅顔紱冕捐後凋羣卉暮孑立衆峰巔一室生虚白孤亭自草玄江南哀庾信幕北阻張騫嘗絀智林麈同依慧逺蓮獨醒漁父忌髙臥阿儂先顧曲餘三爵羲書韻一編腹容卿數百掌故禮三千倒薤書寧易晚菘秋正鮮幽棲傷伏臘逸興託林泉雌霓還知賦髙山獨賞絃忘年愧膠􅃮知已正陶甄廿載存孤露三緘屬佩絃穉璆同下榻摛捨敢隨肩喪亂過從數棲遲氣誼偏湖村風漠漠山墅月娟娟薇蕨分同飽芝蘭每共搴傷時棲硯北懷舊泣尊前墨瀋煙雲出詩歌涕淚漣荆扉支谷口蘭楫㴑江漩八九吞雲夢沿洄憶澗瀍衡陽廻去鴈澧浦擥芳荃投賦湘纍泣傳書社橘牽九歌聲轉咽三户䜟仍然嶺海悲歌入甌閩意緒煎十年悲蜃市一旅付蠻煙道是乗槎去其如犯漢還滄桑同窹寐旦夕異山川寧獨潯陽隱還同鍾阜禪淸風回鶴市麗藻染魚牋掛劒情猶昔亾琴痛未蠲哀榮襄吉壤楚些泣荒阡髙誼空千古關情惠一椽紀羣齊齒遇孔禰早周旋感激形骸盡蒼茫歳月遷明公真碩果避世恰華顛懷友細雨寒江路疎燈獨夜舟故山今寂寞爲訪玉峰秋二風雨送君行君行天復晴山村煙樹冷一片夕陽明題畵盡日澗潺湲白雲鳥道邊山中成獨往草木亦忘年老人騎牛天涯芳草滿平原踏盡芋綿碧浪痕聞說真人函谷去阿誰乞取五千言題畵即事流水衡門隱者家石梁山徑逐溪斜仙癯自是甘肥遯盡日松風吹落霞二荷裳芰帶舞衣寛之子循陔學采蘭偕隱時推同介子養親應不愧周磐題畵欹樹寒崖空復春橫波天末炤閒身胸中會可吞雲夢安得人間有片塵題畫瀑布每穿幽壑出石梁獨跨亂泉行探奇滿目飛寒翠不覺浮雲屐底生二千春流水渺無津萬樹桃花好避秦髙臥此中堪白首不知人世有紅塵三山圍空翠撲人來松起寒濤去復廻盡日看山渾不厭茅齋低傍白雲隈四髙閣慿空俯碧流西山南浦望中收登樓不盡懷人意猶有孤帆天際頭五絶巘嵳峩箭栝通飛泉一綫恰當中閒慿水閣堪遊目更喜淩空臥石虹六翠岫靑林渾寂寂孤村流水故蕭蕭山中風景閒如許盡日無人渡野橋七依然緑樹與靑山木落山空風物閒自是經秋露眞骨不將麗景鬭塵寰八一水𥻘𥻘隔岸聞重嵐積翠此中分空山鳥道行人斷葉落楓林亂白雲題畵卷靑嶂浮空緑樹垂江村初夏晚晴時數聲欵乃千山靜萬頃煙波一釣絲碓菴和尚繼席靈巖詩以贈之字僧鑒名曉青現在靈山豈易逢法幢髙踞碧芙蓉喜看南嶽朱陵後更有參天第一峰其二片雲無意傍琴臺彈指聲中法苑開狂象馴龍俱聽法溪聲山色盡西來其三支許襟期三十年同懷蘭雪意翛然時聽法語霑沙界何啻仙音落梵天贈曇應和尚住古堯峰名文杲超然法象踞髙峰丈室雲生苔徑封不是風標絶塵題畵山中樓閣銜空靄水面林巒隔翠微拊景懷人成獨往登山臨水送將歸題畵千巖倚天蒼翠㴱逺山浮空逺水隂水村山墅叅差出白雲碧樹相侵尋其二髙松修竹愛吾廬檻外閒雲自卷舒無限景光來眼底仙山何必逺方輿題畵抱琴獨坐水雲間隔岸松風欲入絃不復登樓慿逺望愁予渺渺屬江天居易堂集卷十八終
